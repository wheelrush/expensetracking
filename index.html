.hero{background:linear-gradient(135deg,#171724 0%,#0D1A24 100%);border:1px solid #242438;border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::after{content:’’;position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:#F0720008;border-radius:50%}

/* Surcharge toggle row */
.surch-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1E1E2E}
.surch-row:last-child{border-bottom:none}

.tog-wrap::after{content:’’;position:absolute;top:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px #0006}
.tog-on{background:#F07200}.tog-on::after{left:22px}
.tog-off{background:#242438}.tog-off::after{left:3px}

.empty{text-align:center;padding:60px 20px}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.4}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px;color:#7A7A9A;line-height:1.6}

/* Animations */
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.syncing{animation:pulse 1.4s infinite}

@media(max-width:360px){
.frow{grid-template-columns:1fr}
.pay-grid{grid-template-columns:repeat(2,1fr)}
}

const goal=Number(s.weeklyGoal||1200);

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function weekStart(d){
const dt=new Date(d+‘T12:00:00’),day=dt.getDay();
dt.setDate(dt.getDate()-((day+2)%7));// Fri-Thu week
return dt.toISOString().slice(0,10);
}
function weekLabel(ws){
const d=new Date(ws+‘T12:00:00’),e=new Date(d);e.setDate(d.getDate()+6);
const f=x=>x.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’});
return `${f(d)} – ${f(e)}`;
}
function groupByWeek(jobs){
const m={};
[…jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
.forEach(j=>{const k=weekStart(j.date);if(!m[k])m[k]=[];m[k].push(j);});
return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
}
function nextFri(){
const d=new Date(),diff=(5-d.getDay()+7)%7||7;d.setDate(d.getDate()+diff);
return d.toLocaleDateString(‘en-US’,{weekday:‘short’,month:‘short’,day:‘numeric’});
}

// ─── CUSTOMER HELPER ──────────────────────────────────────────────────────────
function buildCustomers(jobs){
const m={};
[…jobs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(j=>{
const ph=(j.customerPhone||’’).replace(/\D/g,’’);
if(!ph)return;
if(!m[ph])m[ph]={id:ph,phone:j.customerPhone,name:j.customerName||’’,jobs:[],spent:0,lastDate:’’};
m[ph].jobs.push(j);m[ph].spent=r2(m[ph].spent+Number(j.revenue||0));
if(j.date>m[ph].lastDate){m[ph].lastDate=j.date;if(j.customerName)m[ph].name=j.customerName;}
});
return Object.values(m).sort((a,b)=>b.spent-a.spent);
}

const wjobs=useMemo(()=>jobs.filter(j=>weekStart(j.date)===tw),[jobs,tw]);
const tjobs=useMemo(()=>jobs.filter(j=>j.date===today),[jobs,today]);
const rev=r2(wjobs.reduce((s,j)=>s+Number(j.revenue||0),0));
const dc=r2(wjobs.reduce((s,j)=>s+directCost(j,settings),0));
const gp=r2(rev-dc);
const fixed=weeklyFixed(settings);
const net=r2(gp-fixed);
const goal=Number(settings.weeklyGoal||1200);
const goalPct=clamp((net/goal)*100,0,100);
const avg=wjobs.length?r2(gp/wjobs.length):0;
const need=avg>0?Math.max(0,Math.ceil((goal-net)/avg)):0;

const o1=net>0&&ao1?r2(net*(Number(settings.profitSplit1||50)/st)):0;
const o2=net>0&&ao2?r2(net*(Number(settings.profitSplit2||50)/st)):0;
const recent=useMemo(()=>[…jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,5),[jobs]);

const ws=new Date(tw+‘T12:00:00’),we=new Date(ws);we.setDate(ws.getDate()+6);

return(

function WeeklySummary({jobs,settings,onExport}){
const grouped=useMemo(()=>groupByWeek(jobs),[jobs]);
if(grouped.length===0)return<div className="screen"><div className="page"><div className="empty"><div className="empty-ico">📊</div><div className="empty-title">No data yet</div></div></div></div>;
return(
<div className="screen"><div className="page">

<button className="btn btn-ghost btn-sm" onClick={onExport}><Icon name="share" size={13}/>CSV</button>
</div>
{grouped.map(([ws,wjobs])=>{
const rev=r2(wjobs.reduce((s,j)=>s+Number(j.revenue||0),0));
const dc=r2(wjobs.reduce((s,j)=>s+directCost(j,settings),0));
const gp=r2(rev-dc);
const fx=weeklyFixed(settings);
const net=r2(gp-fx);
const margin=rev>0?Math.round((gp/rev)*100):0;
const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
const tax=net>0?r2(net*(Number(settings.taxRate||25)/100)):0;
const o1=net>0&&ao1?r2(net*(Number(settings.profitSplit1||50)/st)):0;
const o2=net>0&&ao2?r2(net*(Number(settings.profitSplit2||50)/st)):0;
// By service
const bySvc={};wjobs.forEach(j=>{if(!bySvc[j.service])bySvc[j.service]={gp:0,ct:0};bySvc[j.service].gp+=grossProfit(j,settings);bySvc[j.service].ct++;});
const svcRows=Object.entries(bySvc).sort((a,b)=>b[1].gp-a[1].gp);
return(
<div key={ws} className="card" style={{marginBottom:16}}>
<div className="card-pad">
<div style={{fontWeight:800,fontSize:14,marginBottom:12,color:’#F07200’}}>{weekLabel(ws)}</div>
{/* KPIs */}
<div className="kgrid g3" style={{marginBottom:12}}>
<div className=“kpi” style={{padding:‘10px’}}><div className="kpi-l">Jobs</div><div className="kpi-v" style={{fontSize:18}}>{wjobs.length}</div></div>
<div className=“kpi” style={{padding:‘10px’}}><div className="kpi-l">Revenue</div><div className="kpi-v orange" style={{fontSize:16}}>{fmt(rev)}</div></div>
<div className=“kpi” style={{padding:‘10px’}}><div className="kpi-l">Margin</div><div className="kpi-v green" style={{fontSize:16}}>{margin}%</div></div>
</div>
{/* P&L */}
{[[‘Revenue’,fmt(rev),’#F0F0F8’],[‘Direct Costs’,’– ‘+fmt(dc),’#7A7A9A’],[‘Gross Profit’,fmt(gp),’#F07200’],[‘Fixed Overhead’,’– ‘+fmt(fx),’#7A7A9A’],[‘Net Profit’,fmt(net),net>=0?’#1E9E6E’:’#D94040’]].map(([l,v,c],i)=>(
<div key={l} style={{display:‘flex’,justifyContent:‘space-between’,padding:‘7px 0’,borderBottom:i<4?‘1px solid #1E1E2E’:‘none’}}>
<span style={{fontSize:13,color:i===4?’#F0F0F8’:’#7A7A9A’,fontWeight:i===4?700:400}}>{l}</span>
<span style={{fontFamily:‘DM Mono,monospace’,fontSize:13,color:c,fontWeight:i===4?700:400}}>{v}</span>
</div>
))}
{/* Payouts */}
{[{n:settings.owner1Name||‘Owner 1’,a:o1,on:ao1},{n:settings.owner2Name||‘Owner 2’,a:o2,on:ao2}].filter(o=>o.on&&o.a>0).length>0&&<>
<div style={{fontSize:10,fontWeight:700,letterSpacing:’.08em’,textTransform:‘uppercase’,color:’#3A3A55’,margin:‘14px 0 8px’}}>Payouts</div>
{[{n:settings.owner1Name||‘Owner 1’,a:o1,on:ao1},{n:settings.owner2Name||‘Owner 2’,a:o2,on:ao2}].filter(o=>o.on).map((o,i)=>(
<div key={i} style={{display:‘flex’,justifyContent:‘space-between’,padding:‘6px 0’}}>
<span style={{fontSize:13,color:’#7A7A9A’}}>{o.n}</span>
<span style={{fontFamily:‘DM Mono,monospace’,fontSize:13,color:’#F07200’}}>{fmt(o.a)}</span>
</div>
))}
{tax>0&&<div style={{display:‘flex’,justifyContent:‘space-between’,padding:‘6px 0’}}>
<span style={{fontSize:13,color:’#7A7A9A’}}>Tax Reserve ({settings.taxRate}%)</span>
<span style={{fontFamily:‘DM Mono,monospace’,fontSize:13,color:’#E8A020’}}>{fmt(tax)}</span>
</div>}
</>}
{/* Top services */}
{svcRows.length>0&&<>
<div style={{fontSize:10,fontWeight:700,letterSpacing:’.08em’,textTransform:‘uppercase’,color:’#3A3A55’,margin:‘14px 0 8px’}}>By Service</div>
{svcRows.map(([svc,{gp:sgp,ct}])=>(
<div key={svc} style={{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,padding:‘6px 0’,borderBottom:‘1px solid #1E1E2E’}}>

<span style={{fontFamily:‘DM Mono,monospace’,fontSize:12,color:’#1E9E6E’}}>{fmt(sgp)}</span>
</div>
))}
</>}
</div>
</div>
);
})}
</div></div>
);
}

function App(){
const[user,setUser]=useState(null);const[authReady,setAuthReady]=useState(false);
const[tab,setTab]=useState(‘home’);
const[jobs,setJobsRaw]=useState(()=>LS.get(K.jobs,[]));
const[settings,setSettingsRaw]=useState(()=>({…DEF_SETTINGS,…LS.get(K.settings,{})}));
const[sync,setSync]=useState(‘local’);
const[showJobForm,setShowJobForm]=useState(null);// null | {} | job
const[detailJob,setDetailJob]=useState(null);
const authInit=useRef(false);

const setJobs=useCallback(v=>{const n=typeof v===‘function’?v(jobs):v;setJobsRaw(n);LS.set(K.jobs,n);},[jobs]);
const setSettings=useCallback(v=>{const n=typeof v===‘function’?v(settings):v;setSettingsRaw(n);LS.set(K.settings,n);},[settings]);

// Auth
useEffect(()=>{
let unsub=null;
const tryAuth=()=>{if(!_auth){setTimeout(tryAuth,150);return;}
unsub=_auth.onAuthStateChanged(u=>{
if(!u){setUser(null);setSync(‘local’);authInit.current=false;setAuthReady(true);return;}
if(authInit.current){setAuthReady(true);return;}
authInit.current=true;setUser(u);setAuthReady(true);
});
};tryAuth();return()=>{if(unsub)unsub();};
},[]);

// Firebase sync
useEffect(()=>{
if(!user||!_db)return;
setSync(‘syncing’);
let boot=false;
const u=fbListen(jobsCol(),docs=>{
if(docs.length>0){
if(!boot){boot=true;const local=LS.get(K.jobs,[]);const fbIds=new Set(docs.map(d=>String(d.id)));const only=local.filter(j=>!fbIds.has(String(j.id)));if(only.length){const b=_db.batch();only.forEach(j=>b.set(jobsCol().doc(String(j.id)),{…j,id:String(j.id)}));b.commit().catch(()=>{});const merged=[…docs,…only];setJobsRaw(merged);LS.set(K.jobs,merged);setSync(‘connected’);return;}}
setJobsRaw(docs);LS.set(K.jobs,docs);
}else{const local=LS.get(K.jobs,[]);if(local.length){const b=_db.batch();local.forEach(j=>b.set(jobsCol().doc(String(j.id)),{…j,id:String(j.id)}));b.commit().catch(()=>{});}}
setSync(‘connected’);
});
return()=>u();
},[user]);

const saveJob=useCallback(entry=>{
const isEdit=jobs.some(j=>j.id===entry.id);
setJobs(prev=>isEdit?prev.map(j=>j.id===entry.id?entry:j):[entry,…prev.filter(j=>j.id!==entry.id)]);
if(user&&_db)fbSet(jobsCol(),entry.id,entry);
setShowJobForm(null);setDetailJob(null);
},[jobs,user,setJobs]);

const delJob=useCallback(id=>{
const sid=String(id);setJobs(prev=>prev.filter(j=>String(j.id)!==sid));
if(user&&_db)fbDel(jobsCol(),sid);
setDetailJob(null);
},[user,setJobs]);

const signOut=async()=>{try{await _auth?.signOut();}catch{}setUser(null);setSync(‘local’);authInit.current=false;};

const weekGross=useMemo(()=>{const tw=weekStart(TODAY());return jobs.filter(j=>weekStart(j.date)===tw).reduce((s,j)=>s+grossProfit(j,settings),0);},[jobs,settings]);

if(!authReady)return(
<div style={{height:‘100%’,background:’#09090E’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,flexDirection:‘column’,gap:16}}>
<img src={LOGO} style={{width:60,height:60,borderRadius:16,objectFit:‘contain’,opacity:.6}}/>
<div style={{color:’#3A3A55’,fontSize:13}}>Loading…</div>
</div>
);
if(!user)return<AuthScreen onAuth={u=>{setUser(u);authInit.current=true;}}/>;

// Detail view takes over full screen
if(detailJob)return(
<div className="app">
<JobDetail job={detailJob} settings={settings}
onEdit={j=>{setDetailJob(null);setShowJobForm(j);}}
onDelete={id=>{delJob(id);setDetailJob(null);}}
onRepeat={j=>{setDetailJob(null);setShowJobForm({…j,id:’’,date:TODAY()});}}
onClose={()=>setDetailJob(null)}/>
</div>
);

return(
<div className="app">
{/* Screens */}
{tab===‘home’&&<Dashboard jobs={jobs} settings={settings} sync={sync} onNewJob={()=>setShowJobForm({})} onOpenJob={setDetailJob} setTab={setTab}/>}
{tab===‘jobs’&&<JobHistory jobs={jobs} settings={settings} onOpenJob={setDetailJob} onRepeat={j=>setShowJobForm({…j,id:’’,date:TODAY()})}/>}
{tab===‘quote’&&<QuickQuote settings={settings}/>}
{tab===‘clients’&&<Customers jobs={jobs} settings={settings} onNewJob={pre=>setShowJobForm({…EMPTY_JOB(),…pre})}/>}
