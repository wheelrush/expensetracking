<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wheel Rush" />
  <meta name="theme-color" content="#111111" />
  <title>Wheel Rush — Business Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;font-family:"IBM Plex Sans",sans-serif;background:#f4f4f4;overflow:hidden;color:#111}
    input,select,textarea,button{font-family:"IBM Plex Sans",sans-serif}
    input,select,textarea{font-size:16px!important}
    button{cursor:pointer}
    .app{height:100%;display:flex;flex-direction:column}
    .header{background:#111;color:#fff;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
    .header h1{font-size:18px;line-height:1.1;font-weight:700}
    .header p{font-size:11px;color:#666;margin-top:3px}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}
    .badge.dark{background:rgba(255,255,255,0.07);color:#888}
    .badge.green{background:rgba(74,222,128,0.15);color:#4ade80}
    .badge.orange{background:rgba(234,88,12,0.2);color:#fb923c}
    .screen{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
    .page{padding:14px 14px calc(100px + env(safe-area-inset-bottom))}
    .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:#999;margin:18px 0 8px}
    .section-label:first-child{margin-top:0}
    .label{font-size:12px;color:#777}
    .sub{font-size:11px;color:#999}
    .value{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:700}
    .value.big{font-size:22px}
    .value.green{color:#16a34a}.value.red{color:#dc2626}.value.orange{color:#ea580c}
    .mono{font-family:"IBM Plex Mono",monospace}
    .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:10px}
    .card-pad{padding:14px 16px}
    .card-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid #f0f0f0}
    .card-row:last-child{border-bottom:none}
    .dark-card{background:#111;color:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.15);margin-bottom:10px}
    .dark-card .muted{color:#555}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#ececec;border-radius:14px;overflow:hidden;margin-bottom:10px}
    .kpi-grid.three{grid-template-columns:1fr 1fr 1fr}
    .kpi{background:#fff;padding:14px}
    .kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#999;margin-bottom:5px}
    .kpi-value{font-family:"IBM Plex Mono",monospace;font-size:19px;font-weight:700;line-height:1.1}
    .kpi-sub{font-size:11px;color:#999;margin-top:4px}
    .goal-track{height:8px;background:#f0f0f0;border-radius:999px;overflow:hidden;margin:10px 0 6px}
    .goal-fill{height:100%;border-radius:999px;transition:width .4s ease}
    .goal-fill.full{background:#16a34a}
    .goal-fill.mid{background:#111}
    .goal-fill.low{background:#ea580c}
    .mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#ececec;border-radius:14px;overflow:hidden;margin-bottom:10px}
    .mini-box{background:#fff;padding:10px;text-align:center}
    .mini-box strong{display:block;font-family:"IBM Plex Mono",monospace;font-size:14px;line-height:1.2}
    .mini-box span{display:block;font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .stack{display:grid;gap:8px}
    .job-row{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .job-icon{width:38px;height:38px;border-radius:10px;background:#f4f4f4;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .job-main{flex:1;min-width:0}
    .job-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .job-meta{font-size:11px;color:#999;margin-top:3px;line-height:1.5}
    .job-right{text-align:right;flex-shrink:0}
    .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;line-height:1.4}
    .pill.green{background:#dcfce7;color:#166534}
    .pill.red{background:#fee2e2;color:#b91c1c}
    .pill.orange{background:#ffedd5;color:#c2410c}
    .pill.gray{background:#f3f4f6;color:#6b7280}
    .pill.blue{background:#dbeafe;color:#1d4ed8}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#888;margin-bottom:7px}
    .field input,.field select,.field textarea{width:100%;border:1.5px solid #e3e3e3;background:#fff;border-radius:12px;padding:12px 14px;outline:none;transition:border-color .15s;min-width:0;box-sizing:border-box}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:#111}
    .field textarea{min-height:72px;resize:vertical}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-width:0}
    .chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
    .chip{border:1.5px solid #ddd;background:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;color:#666;transition:all .12s}
    .chip.active{background:#111;color:#fff;border-color:#111}
    .chip.sm{padding:5px 10px;font-size:11px}
    .chip.city{background:#f0f9ff;border-color:#bae6fd;color:#0369a1}
    .chip.city.active{background:#111;color:#fff;border-color:#111}
    /* City search */
    .city-input-wrap{position:relative}
    .city-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #e3e3e3;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;max-height:240px;overflow-y:auto}
    .city-option{padding:12px 14px;font-size:14px;border-bottom:1px solid #f5f5f5;cursor:pointer;display:flex;align-items:center;gap:8px}
    .city-option:last-child{border-bottom:none}
    .city-option:active{background:#f4f4f4}
    .city-section-head{padding:6px 14px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#bbb;background:#fafafa}
    /* Quick quote */
    .quote-box{background:#111;border-radius:14px;padding:16px;margin-bottom:14px;color:#fff}
    .quote-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
    .quote-row:last-child{border-bottom:none;padding-top:10px;font-weight:700;font-size:15px}
    .dec-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;margin-top:10px}
    .dec-badge.strong{background:#dcfce7;color:#166534}
    .dec-badge.okay{background:#fef9c3;color:#854d0e}
    .dec-badge.low{background:#fee2e2;color:#b91c1c}
    /* Source quick buttons */
    .src-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
    .src-btn{border:1.5px solid #e3e3e3;background:#fff;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:#555;transition:all .12s;display:flex;align-items:center;gap:5px}
    .src-btn.active{background:#111;color:#fff;border-color:#111}
    /* Sticky save bar */
    .sticky-save{position:sticky;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ececec;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:50}
    .preview-row:last-child{border-bottom:none;padding-top:10px;font-weight:700;font-size:14px}
    .btn{border:none;border-radius:12px;padding:14px 16px;font-weight:700;font-size:14px;transition:opacity .1s}
    .btn:active{opacity:.8}
    .btn.primary{background:#111;color:#fff}
    .btn.secondary{background:#fff;color:#111;border:1.5px solid #ddd}
    .btn.sm{padding:9px 13px;font-size:12px;border-radius:10px}
    .btn.xs{padding:6px 10px;font-size:11px;border-radius:8px}
    .btn.danger{background:#fee2e2;color:#b91c1c}
    .btn.success{background:#dcfce7;color:#166534}
    .btn.blue{background:#dbeafe;color:#1d4ed8}
    .btn.orange{background:#ffedd5;color:#c2410c}
    .pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
    .pay-btn{border:1.5px solid #e3e3e3;border-radius:12px;padding:10px 4px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#666;transition:all .12s}
    .pay-btn.active{border-color:#111;background:#111;color:#fff}
    .pay-btn .pay-icon{font-size:18px}
    .bottom-nav{display:flex;background:#fff;border-top:1px solid #ececec;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
    .nav-btn{flex:1;border:none;background:none;padding:7px 2px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#bbb;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .nav-btn.active{color:#111}
    .nav-btn .ico{font-size:16px;line-height:1}
    .settings-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f1f1f1}
    .settings-row:last-child{border-bottom:none}
    .settings-inp{border:1.5px solid #e3e3e3;border-radius:10px;padding:10px 12px;font-family:"IBM Plex Sans",sans-serif;font-size:15px;outline:none}
    .settings-inp:focus{border-color:#111}
    .expense-row{display:grid;grid-template-columns:1fr 90px auto auto;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid #f2f2f2}
    .expense-row:last-child{border-bottom:none}
    .expense-row input{border:1.5px solid #e3e3e3;border-radius:10px;padding:9px 12px;width:100%;font-family:"IBM Plex Sans",sans-serif;font-size:15px;outline:none}
    .empty{padding:50px 20px;text-align:center}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty-title{font-size:15px;font-weight:700;margin-bottom:6px}
    .empty-sub{font-size:13px;color:#999;line-height:1.5}
    .tax-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-top:10px}
    .tax-box .tax-lbl{color:#92400e;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .tax-box .tax-amt{font-family:"IBM Plex Mono",monospace;font-size:18px;font-weight:700;color:#b45309}
    .tax-box .tax-hint{font-size:11px;color:#92400e;margin-top:4px}
    .inline-note{font-size:11px;color:#999;line-height:1.6;margin-bottom:14px}
    .source-bar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}
    .source-bar:last-child{border-bottom:none}
    .source-bar-track{flex:1;height:6px;background:#f0f0f0;border-radius:999px;overflow:hidden}
    .source-bar-fill{height:100%;background:#111;border-radius:999px}
    .auth-screen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;padding:32px 24px}
    .auth-title{color:#fff;font-size:24px;font-weight:700;margin-bottom:6px}
    .auth-sub{color:#555;font-size:13px;margin-bottom:32px;text-align:center}
    .auth-inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:16px;outline:none;margin-bottom:12px;font-family:"IBM Plex Sans",sans-serif}
    .auth-inp::placeholder{color:#444}
    .auth-inp:focus{border-color:rgba(255,255,255,.3)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .syncing{animation:pulse 1.2s infinite}
    /* Success actions */
    .success-strip{background:#dcfce7;border:1px solid #86efac;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .success-strip-title{font-size:12px;font-weight:700;color:#166534;width:100%;margin-bottom:4px}
    /* Form group divider */
    .form-group{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .form-group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#bbb;margin-bottom:12px}

    /* Compact header */
    .header-compact{background:#111;color:#fff;padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
    .header-compact h1{font-size:16px;font-weight:700;line-height:1}
    .header-compact p{font-size:10px;color:#555;margin-top:1px}
    /* Auth premium */
    .auth-field{margin-bottom:14px}
    .auth-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#444;margin-bottom:8px}
    .auth-inp2{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 18px;color:#fff;font-size:17px;outline:none;font-family:"IBM Plex Sans",sans-serif;transition:border-color .15s}
    .auth-inp2::placeholder{color:#333}
    .auth-inp2:focus{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.09)}
    .auth-btn-main{width:100%;background:#fff;color:#111;border:none;border-radius:14px;padding:17px;font-size:16px;font-weight:700;font-family:"IBM Plex Sans",sans-serif;margin-bottom:10px}
    .auth-btn-main:active{opacity:.85}
    .auth-btn-google{width:100%;background:rgba(255,255,255,.07);color:#fff;border:1.5px solid rgba(255,255,255,.12);border-radius:14px;padding:15px;font-size:15px;font-weight:600;font-family:"IBM Plex Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px}
    .auth-btn-google:active{opacity:.8}
    /* QuickQuote v2 */
    .qq-suggested{text-align:center;padding:14px 10px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
    .qq-suggested-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#555;margin-bottom:4px}
    .qq-suggested-price{font-family:"IBM Plex Mono",monospace;font-size:34px;font-weight:700;color:#fff;line-height:1}
    .qq-dec-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:700;margin-top:8px}
    .qq-dec-badge.take{background:#dcfce7;color:#166534}
    .qq-dec-badge.raise{background:#fef9c3;color:#854d0e}
    .qq-dec-badge.low{background:#fee2e2;color:#b91c1c}
    .qq-apply-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px}
    .qq-apply-btn{border:none;border-radius:10px;padding:9px 4px;font-size:11px;font-weight:700;font-family:"IBM Plex Sans",sans-serif;cursor:pointer;line-height:1.3}
    .qq-apply-btn:active{opacity:.8}
    .qq-apply-btn.suggested{background:#4ade80;color:#14532d}
    .qq-apply-btn.premium{background:#fb923c;color:#431407}
    .qq-apply-btn.custom{background:rgba(255,255,255,.1);color:#fff}
    .qq-breakdown{padding:0 12px 10px;display:flex;gap:8px;justify-content:space-between}
    .qq-stat{text-align:center;flex:1}
    .qq-stat-val{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:700;color:#aaa}
    .qq-stat-lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    /* More Details toggle */
    .more-toggle{width:100%;background:none;border:1.5px dashed #e3e3e3;border-radius:12px;padding:12px;font-size:13px;font-weight:700;color:#888;font-family:"IBM Plex Sans",sans-serif;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
    .more-toggle:active{background:#f9f9f9}
    /* Tighter pay buttons */
    .pay-btn-tight{border:1.5px solid #e3e3e3;border-radius:10px;padding:7px 4px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;color:#666;transition:all .12s}
    .pay-btn-tight.active{border-color:#111;background:#111;color:#fff}
    .pay-btn-tight .pay-icon{font-size:16px}
    /* Better sticky save */
    .sticky-save2{position:sticky;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #111;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:50;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
    /* Edit banner */
    .edit-banner{background:#fef9c3;border:1.5px solid #fde047;border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .edit-banner-text{font-size:13px;font-weight:700;color:#854d0e}
    /* Customer cards */
    .customer-card{background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:8px}
    .customer-avatar{width:44px;height:44px;border-radius:12px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;font-family:"IBM Plex Mono",monospace}
    .customer-main{flex:1;min-width:0}
    .customer-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .customer-meta{font-size:11px;color:#999;margin-top:2px}
    .customer-right{text-align:right;flex-shrink:0}

    @media(max-width:375px){
      .field-row{grid-template-columns:1fr}
      .mini-grid{grid-template-columns:repeat(2,1fr)}
      .pay-grid{grid-template-columns:repeat(2,1fr)}
    }


    /* QuickQuote active price selection */
    .qq-apply-btn.active-sel{outline:2px solid #fff;outline-offset:1px;}
    .qq-apply-btn.suggested.active-sel{background:#4ade80;color:#14532d;}
    .qq-apply-btn.premium.active-sel{background:#fb923c;color:#431407;}
    .qq-apply-btn.custom.active-sel{background:rgba(255,255,255,.25);color:#fff;}
    /* ── Responsive / device fit ── */
    @media(min-width:600px){
      .app{max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.15)}
      html,body,#root{background:#e8e8e8}
    }
    @media(max-width:360px){
      .pay-grid{grid-template-columns:repeat(2,1fr)!important}
      .field-row{grid-template-columns:1fr!important}
      .kpi-grid{grid-template-columns:1fr 1fr!important}
      .mini-grid{grid-template-columns:1fr 1fr!important}
      .page{padding:10px 10px calc(100px + env(safe-area-inset-bottom))}
      .form-group{padding:10px}
      .section-label{margin:14px 0 6px}
    }
    @media(min-height:812px){
      /* Tall phones (iPhone X+) — a bit more breathing room */
      .page{padding:16px 14px calc(110px + env(safe-area-inset-bottom))}
    }
  </style>

  <!-- PWA icons — inline SVG favicon so no external file needed -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛞</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛞</text></svg>">
</head>
<body>
<div id="root"></div>
<script>
// Firebase config — this key is intentionally public (client-side SDK).
// Security is enforced by Firebase Security Rules in the console, not by hiding this key.
// Restrict usage at: console.firebase.google.com → Project Settings → API key → HTTP referrers

<script type="text/babel">
const { useCallback, useEffect, useMemo, useRef, useState } = React;

// ── Storage ──────────────────────────────────────────────────────────────────
const KEYS = {
  jobs:'wr2-jobs-v2', settings:'wr2-settings-v2', inventory:'wr2-inventory-v3',
  expenses:'wr2-expenses-v1', sizes:'wr2-recent-sizes-v1', cities:'wr2-recent-cities-v1',
};
const load    = (k, fb) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch(e) { return fb; } };
const persist = (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} };

function migrateOldJobs() {
  const OLD = ['wr-jobs-v5','wr-upgraded-jobs-v1','wr2-jobs-v1','wheelrush_jobs'];
  const cur = load(KEYS.jobs, []); const ids = new Set(cur.map(function(j){return String(j.id);}));
  let mg = [...cur], cnt = 0;
  OLD.forEach(function(k) {
    try {
      const o = load(k, []);
      if (Array.isArray(o)) o.forEach(function(j) {
        if (!ids.has(String(j.id))) {
          mg.push({...j, id:String(j.id||Date.now()), source:j.source||'Google Search', tireCost:j.tireCost||j.cost||0, miscCost:j.miscCost||0});
          ids.add(String(j.id)); cnt++;
        }
      });
    } catch(e) {}
  });
  if (cnt > 0) persist(KEYS.jobs, mg);
  return mg;
}

// ── Business logic ─────────────────────────────────────────────────────────────
const jobDirectCost  = function(j,s) { return r2(Number(j.miles||0)*Number(s.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.miscCost||0)); };
const jobGrossProfit = function(j,s) { return r2(Number(j.revenue||0)-jobDirectCost(j,s)); };
const weeklyFixed    = function(s) { return r2((s.expenses||[]).filter(function(e){return e.active;}).reduce(function(t,e){return t+Number(e.amount||0);},0)*12/52); };
const monthlyFixed   = function(s) { return (s.expenses||[]).filter(function(e){return e.active;}).reduce(function(t,e){return t+Number(e.amount||0);},0); };

function premiums(j) {
  let p = 0;
  if (j.emergency) p += 20;
  if (j.lateNight) p += 20;
  if (j.highway)   p += 15;
  if (j.weekend)   p += 10;
  if (Number(j.miles||0) > 25) p += 20;
  return p;
}
function suggestedPrice(j, s) {
  const direct = jobDirectCost(j, s);
  const isRepl = /replacement|installation/i.test(j.service||'');
  const target = isRepl ? Number(s.replacementTarget||110) : Number(s.repairTarget||90);
  return Math.ceil((direct + target + premiums(j)) / 5) * 5;
}
function jobDecision(j, s, weekGP) {
  if (weekGP === undefined) weekGP = 0;
  const rev    = Number(j.revenue||0) || suggestedPrice(j,s);
  const profit = r2(rev - jobDirectCost(j,s));
  const skip   = Number(s.skipThreshold||70);
  const miles  = Number(j.miles||0);
  const goal   = Number(s.weeklyGoal||1200);
  const goalPct= goal > 0 ? weekGP / goal : 0;
  if (profit < skip) return {label:'Too Low', cls:'low', dec:'low', reason:'Profit '+money(profit)+' below min '+money(skip)};
  if (goalPct >= 1.0 && miles > Number(s.riskyMiles||25)) return {label:'Too Low', cls:'low', dec:'low', reason:'Goal hit — skip the drive'};
  if (miles > Number(s.riskyMiles||25)) {
    const adj = goalPct < 0.5 ? skip-15 : skip;
    if (profit < adj+30) return {label:'Take It', cls:'okay', dec:'okay', reason:miles+' mi — watch margin'};
  }
  if (profit >= skip+40) return {label:'Strong Margin', cls:'strong', dec:'strong', reason:money(profit)+' profit'};
  return {label:'Take It', cls:'okay', dec:'okay', reason:money(profit)+' profit'};
}
function weekSummary(weekJobs, s) {
  const jobs = Array.isArray(weekJobs) ? weekJobs : [];
  const revenue     = r2(jobs.reduce(function(t,j){return t+Number(j.revenue||0);},0));
  const directCosts = r2(jobs.reduce(function(t,j){return t+jobDirectCost(j,s);},0));
  const grossProfit = r2(revenue - directCosts);
  const fixed       = weeklyFixed(s);
  const net         = r2(grossProfit - fixed);
  return {revenue, directCosts, grossProfit, fixed, net, jobCount:jobs.length};
}
function getWeekStart(d) {
  const dt = new Date(d+'T12:00:00'), day = dt.getDay();
  // Use noon to avoid any DST-edge midnight issues
  dt.setDate(dt.getDate() - (day >= 5 ? day-5 : day+2));
  return dt.toLocaleDateString('en-CA', {timeZone:'America/New_York'});
}
function weekLabel(s) {
  const d = new Date(s+'T12:00:00'), e = new Date(d);
  e.setDate(e.getDate()+6);
  const f = function(dt) { return dt.toLocaleDateString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric'}); };
  return f(d)+' – '+f(e)+', '+e.toLocaleDateString('en-US',{timeZone:'America/New_York',year:'numeric'}).split('/')[2];
}
function nextFriday() {
  const now = new Date();
  // Get current day-of-week in Miami time
  const dayStr = now.toLocaleDateString('en-US',{timeZone:'America/New_York',weekday:'short'});
  const dayMap = {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
  const day = dayMap[dayStr.slice(0,3)];
  const diff = day===5 ? 7 : (5-day+7)%7;
  const fri = new Date(now);
  fri.setDate(fri.getDate()+diff);
  return fri.toLocaleDateString('en-US',{timeZone:'America/New_York',weekday:'short',month:'short',day:'numeric'});
}
function groupByWeek(jobs) {
  const map = {};
  [...(Array.isArray(jobs)?jobs:[])].sort(function(a,b){return b.date.localeCompare(a.date)||b.id.localeCompare(a.id);}).forEach(function(j) {
    const k = getWeekStart(j.date);
    if (!map[k]) map[k] = [];
    map[k].push(j);
  });
  return Object.entries(map).sort(function(a,b){return b[0].localeCompare(a[0]);});
}

function buildInvoiceText(job, bizName) {
  // Plain-text fallback (used for clipboard copy)
  var biz  = (bizName || 'Wheel Rush Mobile Tire Repair').trim();
  var sep  = '================================';
  var lines = [];
  lines.push(biz);
  lines.push('Phone: 305-897-7030');
  lines.push(sep);
  lines.push('INVOICE');
  lines.push(sep);
  lines.push('Date:     ' + (job.date||''));
  lines.push('Service:  ' + (job.service||''));
  if (job.tireSize) lines.push('Tire:     ' + job.tireSize + (Number(job.qty||1)>1?' x'+job.qty:''));
  if (job.area)     lines.push('Location: ' + job.area);
  if (job.customerName)  lines.push('Customer: ' + job.customerName);
  if (job.customerPhone) lines.push('Phone:    ' + job.customerPhone);
  lines.push(sep);
  lines.push('Total:    ' + money(Number(job.revenue||0)));
  lines.push('Payment:  ' + (job.payment||''));
  lines.push('Status:   ' + (job.status==='Pending'?'PENDING - Payment Due':'Paid'));
  if ((job.note||'').trim()) lines.push('Notes:    ' + job.note);
  lines.push(sep);
  lines.push('Thank you for choosing Wheel Rush!');
  return lines.join('\n');
}

function exportCSV(jobs, settings) {
  const headers = ['Date','Service','Area','Source','Revenue','Tire Cost','Misc Cost','Miles','Direct Cost','Gross Profit','Payment','Tire Size','Qty','Customer','Phone','Notes'];
  const rows = [...(Array.isArray(jobs)?jobs:[])].sort(function(a,b){return a.date.localeCompare(b.date);}).map(function(j) {
    const dc = jobDirectCost(j,settings); const gp = jobGrossProfit(j,settings);
    return [j.date,j.service,j.area,j.source||'',Number(j.revenue||0).toFixed(2),Number(j.tireCost||0).toFixed(2),Number(j.miscCost||0).toFixed(2),Number(j.miles||0).toFixed(1),dc.toFixed(2),gp.toFixed(2),j.payment,j.tireSize||'',j.qty||1,j.customerName||'',j.customerPhone||'',(j.note||'').replace(/,/g,' ')].map(function(v){return '"'+v+'"';}).join(',');
  });
  const csv = [headers.join(',')].concat(rows).join('\n');
  const blob = new Blob([csv],{type:'text/csv'}); const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'wheel-rush-'+TODAY()+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── CityInput ──────────────────────────────────────────────────────────────────
function CityInput(props) {
  const value = props.value; const onChange = props.onChange;
  const [q, setQ]      = useState(value || '');
  const [open, setOpen] = useState(false);
  const inputRef        = useRef(null);
  const recentCities    = useMemo(function(){return load(KEYS.cities,[]).slice(0,6);}, []);

  useEffect(function(){ setQ(value||''); }, [value]);

  const matches = useMemo(function() {
    if (!q.trim()) return [];
    const lq = q.toLowerCase();
    return CITY_LIST.filter(function(c){return c.toLowerCase().includes(lq);}).slice(0,12);
  }, [q]);

  const pick = function(c) {
    onChange(c); setQ(c); setOpen(false);
    const recents = load(KEYS.cities,[]).filter(function(x){return x!==c;});
    persist(KEYS.cities, [c].concat(recents).slice(0,8));
    if (inputRef.current) inputRef.current.blur();
  };

  return (
    <div className="city-input-wrap">
      <input ref={inputRef} value={q}
        onChange={function(e){ setQ(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={function(){setOpen(true);}}
        onBlur={function(){setTimeout(function(){setOpen(false);},200);}}
        placeholder="Type a city…"
        style={{width:'100%',border:'1.5px solid #e3e3e3',background:'#fff',borderRadius:12,padding:'12px 14px',outline:'none',fontSize:16}}
      />
      {!open && !q && (
        <div className="chip-row" style={{marginTop:8}}>
          {TOP_CITIES.slice(0,6).map(function(c) {
            return <button key={c} type="button" className={'chip city sm'+(value===c?' active':'')} onClick={function(){pick(c);}}>{c}</button>;
          })}
        </div>
      )}
      {open && (
        <div className="city-dropdown">
          {!q && recentCities.length > 0 && (
            <div>
              <div className="city-section-head">Recent</div>
              {recentCities.map(function(c){ return <div key={c} className="city-option" onMouseDown={function(){pick(c);}}><span>🕐</span>{c}</div>; })}
              <div className="city-section-head">Quick picks</div>
              {TOP_CITIES.map(function(c){ return <div key={c} className="city-option" onMouseDown={function(){pick(c);}}><span>📍</span>{c}</div>; })}
            </div>
          )}
          {q && matches.map(function(c){ return <div key={c} className="city-option" onMouseDown={function(){pick(c);}}><span>📍</span>{c}</div>; })}
          {q && matches.length === 0 && (
            <div className="city-option" style={{color:'#999'}} onMouseDown={function(){pick(q);}}>
              Use "<strong>{q}</strong>" →
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── QuickQuote ─────────────────────────────────────────────────────────────────
function QuickQuote(props) {
  const form = props.form; const settings = props.settings;
  const onApply = props.onApply; const onFormChange = props.onFormChange;
  const priceMode = props.priceMode || 'suggested';
  const setPriceMode = props.setPriceMode;
  const customRef = useRef(null);

  const hasInputs = Number(form.miles||0)>0 || Number(form.tireCost||0)>0 || Number(form.miscCost||0)>0;
  const directCost   = jobDirectCost(form, settings);
  const suggested    = suggestedPrice(form, settings);
  const isRepl       = /replacement|installation/i.test(form.service||'');
  const premiumPrice = Math.ceil((directCost + (isRepl?130:105) + premiums(form))/5)*5;
  const prem         = premiums(form);
  const skip         = Number(settings.skipThreshold||70);
  const displayPrice = priceMode==='custom' ? Number(form.revenue||0) : (priceMode==='premium' ? premiumPrice : suggested);
  const profit       = r2(displayPrice - directCost);
  const decLabel     = profit<skip ? 'Too Low' : profit>=skip+40 ? 'Strong Margin' : 'Take It';
  const decCls       = profit<skip ? 'low' : 'take';

  const handleMode = function(mode, price) {
    if (setPriceMode) setPriceMode(mode);
    onApply(price==='' ? '' : String(price));
    if (mode==='custom') {
      setTimeout(function(){ if(customRef.current) customRef.current.focus(); }, 80);
    }
  };

  const inpSt = {background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.18)',borderRadius:8,padding:'8px 10px',color:'#fff',fontSize:15,outline:'none',width:'100%',fontFamily:'"IBM Plex Mono",monospace',fontWeight:600,textAlign:'center'};
  const lbl   = {fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'#555',marginBottom:5,textAlign:'center'};

  return (
    <div className="quote-box">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:14}}>
        <div>
          <div style={lbl}>Miles</div>
          <input type="number" min="0" inputMode="decimal" placeholder="0"
            value={form.miles||''} onChange={function(e){onFormChange('miles',e.target.value);}} style={inpSt}/>
        </div>
        <div>
          <div style={lbl}>Tire $</div>
          <input type="number" min="0" inputMode="decimal" placeholder="0"
            value={form.tireCost||''} onChange={function(e){onFormChange('tireCost',e.target.value);}} style={inpSt}/>
        </div>
        <div>
          <div style={lbl}>Misc $</div>
          <input type="number" min="0" inputMode="decimal" placeholder="0"
            value={form.miscCost||''} onChange={function(e){onFormChange('miscCost',e.target.value);}} style={inpSt}/>
        </div>
        <div>
          <div style={lbl}>Qty</div>
          <input type="number" min="1" inputMode="numeric" placeholder="1"
            value={form.qty||''} onChange={function(e){onFormChange('qty',e.target.value);}} style={inpSt}/>
        </div>
      </div>

      {!hasInputs ? (
        <div style={{textAlign:'center',padding:'8px 0'}}>
          <div style={{fontSize:13,color:'#555',fontWeight:600}}>Enter job details above</div>
          <div style={{fontSize:11,color:'#444',marginTop:4}}>Miles · Tire cost · Misc → auto-calculates</div>
        </div>
      ) : (
        <div>
          <div className="qq-suggested">
            <div className="qq-suggested-label">
              {priceMode==='custom' ? 'Custom Price' : priceMode==='premium' ? 'Premium Price' : 'Suggested Price'}
            </div>
            <div className="qq-suggested-price">{money(displayPrice)}</div>
            <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:8,marginBottom:8}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,color:'#555',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:2}}>Cost</div>
                <div style={{fontFamily:'"IBM Plex Mono",monospace',fontSize:15,fontWeight:700,color:'#777'}}>{money(directCost)}</div>
              </div>
              <div style={{width:1,background:'#222'}}/>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,color:'#555',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:2}}>Profit</div>
                <div style={{fontFamily:'"IBM Plex Mono",monospace',fontSize:15,fontWeight:700,color:profit>=skip?'#4ade80':'#ef4444'}}>{money(profit)}</div>
              </div>
              {prem>0 && (
                <div>
                  <div style={{width:1,background:'#222'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:10,color:'#555',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:2}}>Surcharge</div>
                    <div style={{fontFamily:'"IBM Plex Mono",monospace',fontSize:15,fontWeight:700,color:'#fb923c'}}>+{money(prem)}</div>
                  </div>
                </div>
              )}
            </div>
            <span className={'qq-dec-badge '+decCls}>{decLabel}</span>
          </div>

          <div className="qq-apply-row">
            <button className={'qq-apply-btn suggested'+(priceMode==='suggested'?' active-sel':'')}
              onClick={function(){handleMode('suggested',suggested);}}>
              {priceMode==='suggested'?'✓ ':''}{money(suggested)}<br/>
              <span style={{fontSize:10,opacity:.8}}>Suggested</span>
            </button>
            <button className={'qq-apply-btn premium'+(priceMode==='premium'?' active-sel':'')}
              onClick={function(){handleMode('premium',premiumPrice);}}>
              {priceMode==='premium'?'✓ ':''}{money(premiumPrice)}<br/>
              <span style={{fontSize:10,opacity:.8}}>Premium</span>
            </button>
            <button className={'qq-apply-btn custom'+(priceMode==='custom'?' active-sel':'')}
              onClick={function(){handleMode('custom','');}}>
              {priceMode==='custom'?'✓ ':''}Custom<br/>
              <span style={{fontSize:10,opacity:.8}}>Enter →</span>
            </button>
          </div>

          {priceMode==='custom' && (
            <div style={{padding:'10px 10px 4px'}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'#555',marginBottom:6,textAlign:'center'}}>Custom Price ($)</div>
              <input ref={customRef} type="number" min="0" inputMode="decimal" placeholder="0.00"
                value={form.revenue||''}
                onChange={function(e){onFormChange('revenue',e.target.value);}}
                style={{background:'rgba(255,255,255,.12)',border:'2px solid rgba(255,255,255,.3)',borderRadius:10,padding:'12px',color:'#fff',fontSize:22,outline:'none',width:'100%',fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,textAlign:'center'}}
              />
              <div style={{fontSize:10,color:'#555',textAlign:'center',marginTop:5}}>
                {'Profit: '+money(r2(Number(form.revenue||0)-directCost))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Auth ───────────────────────────────────────────────────────────────────────
function AuthScreen(props) {
  const onAuth = props.onAuth;
  const [email,setEmail] = useState('');
  const [pass,setPass]   = useState('');
  const [mode,setMode]   = useState('login');
  const [err,setErr]     = useState('');
  const [busy,setBusy]   = useState(false);

  const submit = async function() {
    if (!email||!pass) { setErr('Enter your email and password.'); return; }
    setBusy(true); setErr('');
    try {
      const c = mode==='login'
        ? await _auth.signInWithEmailAndPassword(email,pass)
        : await _auth.createUserWithEmailAndPassword(email,pass);
      onAuth(c.user);
    } catch(e) { setErr(e.message||'Auth failed.'); }
    finally { setBusy(false); }
  };
  const google = async function() {
    try { const c = await _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); onAuth(c.user); }
    catch(e) { setErr(e.message); }
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#0a0a0a',padding:'0 24px',paddingTop:'env(safe-area-inset-top)'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',paddingBottom:16}}>
        <img src={LOGO_SRC} alt="Wheel Rush" onError={function(e){e.target.style.display='none';}}
          style={{width:84,height:84,objectFit:'contain',borderRadius:20,marginBottom:20,border:'1px solid #222'}}/>
        <div style={{color:'#fff',fontSize:26,fontWeight:700,marginBottom:4}}>Wheel Rush</div>
        <div style={{color:'#555',fontSize:13,fontWeight:600}}>Mobile Tire Repair · Miami</div>
      </div>
      <div style={{paddingBottom:'calc(32px + env(safe-area-inset-bottom))'}}>
        {err && <div style={{background:'rgba(220,38,38,.15)',border:'1px solid rgba(220,38,38,.3)',color:'#f87171',padding:'12px 16px',borderRadius:12,fontSize:13,fontWeight:600,marginBottom:16,lineHeight:1.4}}>{err}</div>}
        <div className="auth-field">
          <label className="auth-label">Email</label>
          <input className="auth-inp2" type="email" placeholder="you@email.com" value={email} onChange={function(e){setEmail(e.target.value);}} autoCapitalize="off"/>
        </div>
        <div className="auth-field" style={{marginBottom:20}}>
          <label className="auth-label">Password</label>
          <input className="auth-inp2" type="password" placeholder="••••••••" value={pass} onChange={function(e){setPass(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')submit();}}/>
        </div>
        <button className="auth-btn-main" onClick={submit} disabled={busy}>{busy?'Working…':mode==='login'?'Sign In':'Create Account'}</button>
        <button className="auth-btn-google" onClick={google}>
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continue with Google
        </button>
        <div style={{textAlign:'center'}}>
          <button style={{background:'none',border:'none',color:'#444',fontSize:13,cursor:'pointer',padding:'8px'}} onClick={function(){setMode(function(m){return m==='login'?'signup':'login';}); setErr('');}}>
            {mode==='login' ? 'New here? Create account' : 'Have an account? Sign in'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────────────────────────────
function Dashboard(props) {
  const jobs=props.jobs||[]; const settings=props.settings; const setTab=props.setTab; const onRepeat=props.onRepeat;
  const today=TODAY(), thisWeek=getWeekStart(today);
  const weekJobs   = useMemo(function(){return jobs.filter(function(j){return getWeekStart(j.date)===thisWeek;});}, [jobs,thisWeek]);
  const todayJobs  = useMemo(function(){return jobs.filter(function(j){return j.date===today;});}, [jobs,today]);
  const totals     = useMemo(function(){return weekSummary(weekJobs,settings);}, [weekJobs,settings]);
  const avgProfit  = weekJobs.length ? r2(totals.grossProfit/weekJobs.length) : 0;
  const goalPct    = clamp((totals.grossProfit/(settings.weeklyGoal||1))*100,0,100);
  const jobsNeeded = avgProfit>0 ? Math.max(0,Math.ceil(((settings.weeklyGoal||0)-totals.grossProfit)/avgProfit)) : '—';
  const fixed      = weeklyFixed(settings);
  const ao1=settings.owner1Active!==false, ao2=settings.owner2Active!==false;
  const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
  const o1=totals.net>0&&ao1?r2(totals.net*(Number(settings.profitSplit1||50)/st)):0;
  const o2=totals.net>0&&ao2?r2(totals.net*(Number(settings.profitSplit2||50)/st)):0;
  const tax=totals.net>0&&settings.taxRate>0?r2(totals.net*(Number(settings.taxRate)/100)):0;
  const sources = useMemo(function(){const m={};jobs.forEach(function(j){const s=j.source||'Other';m[s]=(m[s]||0)+1;});return Object.entries(m).sort(function(a,b){return b[1]-a[1];});}, [jobs]);
  const maxSrc  = sources.length ? sources[0][1] : 1;
  const recent  = useMemo(function(){return [...jobs].sort(function(a,b){return b.date.localeCompare(a.date)||b.id.localeCompare(a.id);}).slice(0,5);}, [jobs]);
  const barColor = goalPct>=100?'full':goalPct>=50?'mid':'low';
  const thisWeekLabel = weekLabel(thisWeek);

  return (
    <div className="screen"><div className="page">
      {todayJobs.length>0 && (
        <div>
          <div className="section-label" style={{marginTop:0}}>Today</div>
          <div className="mini-grid" style={{marginBottom:10}}>
            <div className="mini-box"><strong>{todayJobs.length}</strong><span>Jobs</span></div>
            <div className="mini-box"><strong>{money(todayJobs.reduce(function(s,j){return s+Number(j.revenue||0);},0))}</strong><span>Revenue</span></div>
            <div className="mini-box"><strong>{money(todayJobs.reduce(function(s,j){return s+jobGrossProfit(j,settings);},0))}</strong><span>Gross Profit</span></div>
            <div className="mini-box"><strong>{todayJobs.length?money(todayJobs.reduce(function(s,j){return s+jobGrossProfit(j,settings);},0)/todayJobs.length):'—'}</strong><span>Avg/Job</span></div>
          </div>
        </div>
      )}
      <div className="section-label" style={{marginTop:todayJobs.length?undefined:0}}>
        {'This Week '}
        <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:'#bbb',fontSize:10}}>{'· '+thisWeekLabel}</span>
      </div>
      <div className="kpi-grid" style={{marginBottom:8}}>
        <div className="kpi"><div className="kpi-label">Revenue</div><div className="kpi-value">{money(totals.revenue)}</div><div className="kpi-sub">{weekJobs.length+' job'+(weekJobs.length!==1?'s':'')}</div></div>
        <div className="kpi"><div className="kpi-label">Gross Profit</div><div className="kpi-value">{money(totals.grossProfit)}</div><div className="kpi-sub">before fixed</div></div>
        <div className="kpi"><div className="kpi-label">Fixed Exp.</div><div className="kpi-value">{money(fixed)}</div><div className="kpi-sub">weekly</div></div>
        <div className="kpi"><div className="kpi-label">Net Profit</div><div className={'kpi-value '+(totals.net>=0?'green':'red')}>{money(totals.net)}</div><div className="kpi-sub">after all costs</div></div>
      </div>
      <div className="kpi-grid three" style={{marginBottom:10}}>
        <div className="kpi"><div className="kpi-label">Direct Costs</div><div className="kpi-value">{money(totals.directCosts)}</div><div className="kpi-sub">travel + parts</div></div>

        <div className="kpi"><div className="kpi-label">Jobs Needed</div><div className="kpi-value">{jobsNeeded}</div><div className="kpi-sub">to hit goal</div></div>

        <div className="muted" style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',marginBottom:12}}>Friday Payout Projection</div>

          {money(totals.revenue)+' rev − '+money(totals.directCosts)+' costs = '+money(totals.grossProfit)+' gross'}<br/>
          {money(totals.grossProfit)+' gross − '+money(fixed)+' fixed = '+money(totals.net)+' net'}
        </div>
        {tax>0&&<div className="tax-box" style={{marginTop:12}}><div className="tax-lbl">💰 Tax Reserve ({settings.taxRate}%)</div><div className="tax-amt">{money(tax)}</div><div className="tax-hint">~{money(tax/2)} per owner — move to savings</div></div>}
      </div>
      {sources.length>0 && (
        <div>
          <div className="section-label">Lead Sources</div>
          <div className="card"><div className="card-pad">
            {sources.slice(0,6).map(function(entry) {
              const src=entry[0], count=entry[1];
              return (
                <div className="source-bar" key={src}>
                  <div style={{fontSize:12,color:'#555',width:120,flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{src}</div>
                  <div className="source-bar-track"><div className="source-bar-fill" style={{width:((count/maxSrc)*100)+'%'}}/></div>
                  <div className="mono" style={{fontSize:12,color:'#999',width:20,textAlign:'right',flexShrink:0}}>{count}</div>
                </div>
              );
            })}
          </div></div>
        </div>
      )}
      <div className="section-label">Recent Jobs</div>
      {recent.length>0 ? (
        <div className="stack">
          {recent.map(function(job) {
            const profit = jobGrossProfit(job,settings);
            return (
              <div className="job-row" key={job.id} style={{cursor:'pointer'}} onClick={function(){onRepeat(job);}}>
                <div className="job-icon">🛞</div>
                <div className="job-main">
                  <div className="job-title">{job.service+' · '+job.area}</div>
                  <div className="job-meta">{job.date+' · '+(job.tireSize||'No size')+' · '+(job.source||'—')}</div>
                </div>
                <div className="job-right">
                  <div className="value">{money(job.revenue)}</div>
                  <div className={'sub '+(profit>=0?'green':'red')} style={{fontWeight:700}}>{money(profit)}</div>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <EmptyState icon="🛞" title="No jobs yet" sub="Add your first job."
          action={<button className="btn primary" onClick={function(){setTab('add');}}>Add First Job</button>}/>
      )}
    </div></div>
  );
}

// ── AddJob ─────────────────────────────────────────────────────────────────────
function AddJob(props) {
  const onSave=props.onSave, settings=props.settings, jobs=props.jobs||[];
  const prefill=props.prefill, onClearPrefill=props.onClearPrefill;
  const editJob=props.editJob, onClearEdit=props.onClearEdit;

  const [form,setForm]           = useState(EMPTY_JOB());
  const [error,setError]         = useState('');
  const [saved,setSaved]         = useState(null);
  const [tick,setTick]           = useState(0);
  const [editingId,setEditingId] = useState(null);
  const [priceMode,setPriceMode] = useState('suggested');

  const isEditing   = !!editingId;
  const recentSizes = useMemo(function(){return [...new Set([...load(KEYS.sizes,[]),...DEFAULT_TIRE_SIZES])].slice(0,8);}, [tick]);
  const weekGross   = useMemo(function(){
    const tw = getWeekStart(TODAY());
    return jobs.filter(function(j){return getWeekStart(j.date)===tw&&j.id!==editingId;}).reduce(function(s,j){return s+jobGrossProfit(j,settings);},0);
  }, [jobs,settings,editingId]);
  const lastJob = useMemo(function(){
    return [...jobs].sort(function(a,b){return b.date.localeCompare(a.date)||b.id.localeCompare(a.id);}).find(function(j){return j.id!==editingId;})||null;
  }, [jobs,editingId]);

  useEffect(function() {
    if (editJob && editJob.id) {
      setForm({...EMPTY_JOB(),...editJob,revenue:String(editJob.revenue||''),tireCost:String(editJob.tireCost||''),miscCost:String(editJob.miscCost||''),miles:String(editJob.miles||'')});
      setEditingId(editJob.id);
      setSaved(null); setError(''); setPriceMode('suggested');
      if (onClearEdit) onClearEdit();
      return;
    }
    if (prefill) {
      setForm({...EMPTY_JOB(),service:prefill.service||'Tire Repair',area:prefill.area||'Miami',payment:prefill.payment||'Cash',source:prefill.source||'Google Search',tireSize:prefill.tireSize||'',qty:prefill.qty||1,tireCost:String(prefill.tireCost||''),miscCost:String(prefill.miscCost||''),miles:String(prefill.miles||''),emergency:!!prefill.emergency,lateNight:!!prefill.lateNight,highway:!!prefill.highway,weekend:!!prefill.weekend,customerName:prefill.customerName||'',customerPhone:prefill.customerPhone||''});
      setPriceMode('suggested');
      if (onClearPrefill) onClearPrefill();
    }
  }, [prefill, editJob]);

  const setF = function(k, v) { setForm(function(p){return {...p,[k]:v};}); setError(''); };

  const useLastJob = function() {
    if (!lastJob) return;
    setForm({...EMPTY_JOB(),service:lastJob.service,area:lastJob.area,payment:lastJob.payment,source:lastJob.source,tireSize:lastJob.tireSize,tireCost:String(lastJob.tireCost||''),miscCost:String(lastJob.miscCost||''),miles:String(lastJob.miles||''),emergency:lastJob.emergency,lateNight:lastJob.lateNight,highway:lastJob.highway,weekend:lastJob.weekend});
  };

  const saveJob = function(andAdd) {
    const rev = Number(form.revenue||0);
    if (!rev) { setError('Enter the job price.'); return; }
    if (form.tireSize) { try { const p=load(KEYS.sizes,[]); persist(KEYS.sizes,[form.tireSize,...p.filter(function(s){return s!==form.tireSize;})].slice(0,10)); } catch(e) {} }
    const entry = {...form, id:editingId||uid(), qty:Number(form.qty||1), revenue:r2(rev), tireCost:r2(form.tireCost), miscCost:r2(form.miscCost), miles:r2(form.miles)};
    onSave(entry, isEditing ? false : andAdd);
    setTick(function(t){return t+1;});
    if (isEditing) {
      setEditingId(null); setForm(EMPTY_JOB()); setError(''); setPriceMode('suggested');
    } else {
      setSaved(entry);
      if (andAdd) { setForm(EMPTY_JOB()); setError(''); setSaved(null); setPriceMode('suggested'); }
    }
  };

  const cancelEdit = function() {
    setEditingId(null); setPriceMode('suggested');
    setForm(EMPTY_JOB()); setError(''); setSaved(null);
  };

  const requestReview = function() {
    openReviewSMS(
      form.customerPhone,
      (settings.googleReviewUrl||'').trim(),
      form.customerName,
      form.service,
      form.area
    );
  };

  const FLAGS = [['emergency','🚨 Emergency',20],['lateNight','🌙 Late Night',20],['highway','🛣 Highway',15],['weekend','📅 Weekend',10]];

  return (
    <div className="screen" style={{paddingBottom:0}}>
      <div style={{padding:'14px 14px 0'}}>

        {isEditing && (
          <div style={{background:'#fef9c3',border:'1.5px solid #fde047',borderRadius:10,padding:'10px 14px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:700,color:'#854d0e'}}>✏️ Editing Job — {form.date}</span>
            <button className="btn secondary sm" onClick={function(){cancelEdit();}}>Cancel Edit</button>
          </div>
        )}

        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          {lastJob && !isEditing && <button type="button" className="btn secondary sm" onClick={function(){useLastJob();}}>↩ Use Last Job</button>}
          {prefill && !isEditing && <button type="button" className="btn orange sm">🔁 Repeating Job</button>}
          {!isEditing && <button type="button" className="btn secondary sm" onClick={function(){setForm(EMPTY_JOB());setSaved(null);setError('');setPriceMode('suggested');}}>✕ Clear</button>}
        </div>

        {error && <div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#b91c1c',marginBottom:14,fontWeight:600}}>{error}</div>}

        {saved && !isEditing && (
          <div className="success-strip">
            <div className="success-strip-title">{'✅ '+money(saved.revenue)+' · '+money(jobGrossProfit(saved,settings))+' profit'}</div>
            <button className="btn primary sm" onClick={function(){sendInvoice(saved,settings);}}>
              {saved.customerPhone ? '🧾 Send Invoice' : '🧾 Copy Invoice'}
            </button>
            {saved.status==='Completed' && <button className="btn success sm" onClick={function(){requestReview();}}>⭐ Send Review</button>}
            {saved.customerPhone && <button className="btn success sm" onClick={function(){window.open('tel:'+saved.customerPhone);}}>📞 Call</button>}
            <button className="btn secondary sm" onClick={function(){setForm({...saved,id:'',revenue:String(saved.revenue)});setSaved(null);}}>🔁 Dup</button>
          </div>
        )}

        <QuickQuote form={form} settings={settings} weekGross={weekGross}
          onApply={function(v){setF('revenue',v);}}
          onFormChange={setF}
          priceMode={priceMode}
          setPriceMode={setPriceMode}
        />

        <div className="form-group">
          <div className="form-group-title">Pricing &amp; Costs</div>
          <div className="field-row">
            <div className="field"><label>Job Price ($)</label>
              <input type="number" min="0" inputMode="decimal" value={form.revenue} onChange={function(e){setF('revenue',e.target.value);}} placeholder={String(suggestedPrice(form,settings))} style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:18,padding:'14px'}}/>
            </div>
            <div className="field"><label>Tire Cost ($)</label>
              <input type="number" min="0" inputMode="decimal" value={form.tireCost} onChange={function(e){setF('tireCost',e.target.value);}} placeholder="0" style={{fontFamily:'"IBM Plex Mono",monospace'}}/>
            </div>
          </div>
          <div className="field-row">
            <div className="field"><label>Misc Cost ($)</label>
              <input type="number" min="0" inputMode="decimal" value={form.miscCost} onChange={function(e){setF('miscCost',e.target.value);}} placeholder="plugs, stems…"/>
            </div>
            <div className="field"><label>Qty</label>
              <input type="number" min="1" value={form.qty} onChange={function(e){setF('qty',e.target.value);}}/>
            </div>
          </div>
          <div className="field">
            <label>Conditions — adds premium</label>
            <div className="chip-row">
              {FLAGS.map(function(flag) {
                const key=flag[0],label=flag[1],amt=flag[2];
                return <button type="button" key={key} className={'chip'+(form[key]?' active':'')} onClick={function(){setF(key,!form[key]);}}>{label+(form[key]?' +$'+amt:'')}</button>;
              })}
            </div>
          </div>
        </div>

        <div className="form-group">
          <div className="form-group-title">Job Details</div>
          <div className="field"><label>Service</label>
            <select value={form.service} onChange={function(e){setF('service',e.target.value);}} style={{width:'100%',border:'1.5px solid #e3e3e3',background:'#fff',borderRadius:12,padding:'12px 14px',outline:'none',fontSize:16}}>
              {SERVICE_OPTIONS.map(function(s){return <option key={s}>{s}</option>;})}
            </select>
          </div>
          <div className="field-row">
            <div className="field"><label>Date</label><input type="date" value={form.date} onChange={function(e){setF('date',e.target.value);}}/></div>
            <div className="field"><label>Status</label>
              <select value={form.status} onChange={function(e){setF('status',e.target.value);}}>
                <option>Completed</option><option>Pending</option>
              </select>
            </div>

          <div className="field"><label>Lead Source</label>
            <div className="src-grid">
              {SOURCE_QUICK.map(function(s) {
                return <button key={s.label} type="button" className={'src-btn'+(form.source===s.label?' active':'')} onClick={function(){setF('source',s.label);}}>{s.icon+' '+s.label}</button>;
              })}

          </div>
        </div>

        <div className="form-group">
          <div className="form-group-title">Location &amp; Travel</div>
          <div className="field"><label>City / Area</label><CityInput value={form.area} onChange={function(v){setF('area',v);}}/></div>
          <div className="field"><label>Miles Driven</label>
            <input type="number" min="0" inputMode="decimal" value={form.miles} onChange={function(e){setF('miles',e.target.value);}} placeholder="0" style={{fontFamily:'"IBM Plex Mono",monospace'}}/>
          </div>
        </div>

        <div className="form-group">
          <div className="form-group-title">Tire Size &amp; Payment</div>
          <div className="field"><label>Tire Size</label>
            <input value={form.tireSize} onChange={function(e){setF('tireSize',e.target.value);}} placeholder="225/55R17"/>

        <div className="form-group">
          <div className="form-group-title">Customer (optional)</div>

            <div className="field"><label>Phone</label><input type="tel" value={form.customerPhone} onChange={function(e){setF('customerPhone',e.target.value);}} placeholder="(305)…"/></div>

        )}
      </div>
    </div>
  );

// ── History ────────────────────────────────────────────────────────────────────
function History(props) {
  const jobs=props.jobs||[], settings=props.settings;
  const onRepeat=props.onRepeat, onDelete=props.onDelete, onEdit=props.onEdit;
  const [filter,setFilter] = useState('All');
  const [search,setSearch] = useState('');
  const [view,setView]     = useState('weeks');

  const cities = useMemo(function(){return Array.from(new Set(jobs.map(function(j){return j.area;})));}, [jobs]);
  const filtered = useMemo(function() {
    let j = jobs;
    if (filter==='Repair')       j=j.filter(function(x){return /repair/i.test(x.service);});
    else if (filter==='Replacement') j=j.filter(function(x){return /replacement|installation/i.test(x.service);});
    else if (filter==='Pending') j=j.filter(function(x){return x.status==='Pending';});
    else if (filter!=='All')     j=j.filter(function(x){return x.area===filter;});
    if (search.trim()) {
      const q=search.toLowerCase();
      j=j.filter(function(x){return (x.customerName||'').toLowerCase().includes(q)||(x.customerPhone||'').includes(q)||(x.tireSize||'').toLowerCase().includes(q)||(x.area||'').toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q);});
    }
    return [...j].sort(function(a,b){return b.date.localeCompare(a.date)||b.id.localeCompare(a.id);});
  }, [jobs,filter,search]);
  const weekGroups   = useMemo(function(){return groupByWeek(filtered);}, [filtered]);
  const thisWeekGross= useMemo(function(){const tw=getWeekStart(TODAY());return jobs.filter(function(j){return getWeekStart(j.date)===tw;}).reduce(function(s,j){return s+jobGrossProfit(j,settings);},0);}, [jobs,settings]);

  const handleDelete = function(id) { if (!window.confirm('Delete this job?')) return; onDelete(id); };
  const markPaid     = function(job) { if (onEdit) onEdit({...job,status:'Completed',_markPaidOnly:true}); };

  const JobRow = function(rowProps) {
    const job = rowProps.job;
    const profit = jobGrossProfit(job,settings);
    const dec    = jobDecision(job,settings,thisWeekGross);
    const decCls = dec.dec==='strong'?'green':dec.dec==='okay'?'yellow':'red';
    const sendReview = function() {
      openReviewSMS(
        job.customerPhone,
        (settings.googleReviewUrl||'').trim(),
        job.customerName,
        job.service,
        job.area
      );
    };
    return (
      <div className="job-row">
        <div className="job-icon">🛞</div>
        <div className="job-main">
          <div className="job-title">{job.service+' · '+job.area}</div>
          <div className="job-meta">{job.date+' · '+(job.tireSize||'No size')+' · '+job.payment+(job.source?' · '+job.source:'')}</div>
          {(job.customerName||job.customerPhone) && <div className="job-meta" style={{marginTop:2}}>{'👤 '+(job.customerName||'')+(job.customerPhone?' · '+job.customerPhone:'')}</div>}
          <div style={{marginTop:5,display:'flex',gap:6,flexWrap:'wrap'}}>
            <span className={'pill '+decCls}>{dec.label}</span>
            {job.emergency && <span className="pill orange">🚨</span>}
            {job.lateNight && <span className="pill gray">🌙</span>}
            {job.status==='Pending' && <span className="pill orange">⏳ Pending</span>}
          </div>
        </div>
        <div className="job-right">
          <div className="value">{money(job.revenue)}</div>
          <div className={'sub '+(profit>=0?'green':'red')} style={{fontWeight:700}}>{money(profit)}</div>
          <div style={{display:'flex',gap:5,marginTop:8,justifyContent:'flex-end',flexWrap:'wrap'}}>
            {onEdit && <button className="btn blue xs" onClick={function(){onEdit(job);}}>✏️</button>}
            <button className="btn success xs" onClick={function(){onRepeat(job);}}>🔁</button>
            <button className="btn primary xs" onClick={function(){sendInvoice(job,settings);}}>🧾</button>
            <button className="btn blue xs" onClick={function(){sendReview();}}>⭐</button>
            {job.status==='Pending' && <button className="btn success xs" onClick={function(){markPaid(job);}}>✓ Paid</button>}
            {job.customerPhone && <button className="btn secondary xs" onClick={function(){window.open('tel:'+job.customerPhone);}}>📞</button>}
            <button className="btn danger xs" onClick={function(){handleDelete(job.id);}}>×</button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="screen"><div className="page">
      <div style={{marginBottom:10}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="🔍 Name, phone, city, tire size…"
          style={{width:'100%',border:'1.5px solid #e3e3e3',borderRadius:12,padding:'12px 14px',outline:'none',fontSize:15}}/>
      </div>
      <div className="chip-row" style={{marginBottom:10}}>
        {['All','Repair','Replacement','Pending'].concat(cities).slice(0,9).map(function(c){
          return <button key={c} className={'chip'+(filter===c?' active':'')} onClick={function(){setFilter(c);}}>{c}</button>;
        })}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className={'chip'+(view==='weeks'?' active':'')} onClick={function(){setView('weeks');}}>By Week</button>
        <button className={'chip'+(view==='list'?' active':'')} onClick={function(){setView('list');}}>All Jobs</button>
        <span style={{marginLeft:'auto',fontFamily:'"IBM Plex Mono",monospace',fontSize:12,color:'#999',alignSelf:'center'}}>{filtered.length+' jobs'}</span>
      </div>
      {filtered.length===0 ? (
        <EmptyState icon="📋" title="No jobs found" sub={search?'Try different search.':'No jobs match.'}/>
      ) : view==='weeks' ? (
        <div>
          {weekGroups.map(function(entry) {
            const wk=entry[0], wkJobs=entry[1];
            const t = weekSummary(wkJobs,settings);
            return (
              <div key={wk} style={{marginBottom:20}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{weekLabel(wk)}</div>
                    <div className="sub">{wkJobs.length+' jobs · '+money(t.revenue)+' rev · '+money(t.grossProfit)+' gross'}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className={'value '+(t.net>=0?'green':'red')}>{money(t.net)}</div>
                    <div className="sub">net</div>
                  </div>
                </div>
                <div className="stack">
                  {wkJobs.map(function(job){return <JobRow key={job.id} job={job}/>;} )}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div className="stack">{filtered.map(function(job){return <JobRow key={job.id} job={job}/>;})}</div>
      )}
    </div></div>
  );
}

// ── Expenses ───────────────────────────────────────────────────────────────────
function Expenses(props) {
  const expenses=Array.isArray(props.expenses)?props.expenses:[], setExpenses=props.setExpenses;
  const [form,setForm] = useState({date:TODAY(),category:'Fuel',amount:'',note:''});
  const CATS = ['Fuel','Oil/Fluids','Equipment Repair','Supplies','Food','Tolls/Parking','Other'];
  const setF = function(k,v){setForm(function(p){return {...p,[k]:v};});};
  const add  = function(){
    const amt=Number(form.amount||0);
    if(!amt){alert('Enter an amount.');return;}
    setExpenses(function(prev){return [{...form,id:uid(),amount:amt},...prev];});
    setForm({date:TODAY(),category:'Fuel',amount:'',note:''});
  };
  const remove = function(id){if(!window.confirm('Delete?'))return;setExpenses(function(prev){return prev.filter(function(e){return e.id!==id;});});};
  const total    = expenses.reduce(function(s,e){return s+Number(e.amount||0);},0);
  const thisWeek = getWeekStart(TODAY());
  const weekTotal= expenses.filter(function(e){return getWeekStart(e.date||TODAY())===thisWeek;}).reduce(function(s,e){return s+Number(e.amount||0);},0);
  return (
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Variable Expenses</div>
      <div className="mini-grid" style={{marginBottom:14}}>
        <div className="mini-box"><strong>{money(weekTotal)}</strong><span>This Week</span></div>
        <div className="mini-box"><strong>{money(total)}</strong><span>All Time</span></div>
        <div className="mini-box"><strong>{expenses.length}</strong><span>Receipts</span></div>
        <div className="mini-box"><strong>{expenses.length?money(total/expenses.length):'—'}</strong><span>Avg</span></div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-pad">

function Payouts(props) {

  const weeks = useMemo(function(){return groupByWeek(jobs);}, [jobs]);
  if (!weeks.length) return <div className="screen"><div className="page"><EmptyState icon="💰" title="No payout history" sub="Log jobs to see weekly payout breakdowns."/></div></div>;

    <div className="screen"><div className="page">

      {weeks.map(function(entry) {

        const t  = weekSummary(weekJobs,settings);
        const ao1=settings.owner1Active!==false, ao2=settings.owner2Active!==false;
        const st =(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;

            <div className="card-row"><div className="label">Direct Costs</div><div className="value red">{money(t.directCosts)}</div></div>
            <div className="card-row"><div className="label">Gross Profit</div><div className="value">{money(t.grossProfit)}</div></div>
            <div className="card-row"><div className="label">Weekly Fixed</div><div className="value red">{money(t.fixed)}</div></div>
            {[{name:settings.owner1Name||'Owner 1',pct:settings.profitSplit1,amt:o1,active:ao1},{name:settings.owner2Name||'Owner 2',pct:settings.profitSplit2,amt:o2,active:ao2}].map(function(o,i) {
              return (
                <div key={i} className="card-row" style={{background:'#f9f9f9',opacity:o.active?1:0.4}}>
                  <div><div className="label">{o.name}</div><div className="sub">{o.pct+'% split'}</div></div>
                  <div className={'value '+(o.active&&o.amt>0?'green':'')}>{o.active?money(o.amt):'—'}</div>

          </div>
        );
      })}

  );
}
