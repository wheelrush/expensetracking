<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wheel Rush" />
  <meta name="theme-color" content="#111111" />
  <title>Wheel Rush — Business Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F6DE;</text></svg>">
<style>
  /* ═══════════════════════════════════════════════════════════════════
     WHEEL RUSH — PREMIUM OPERATOR DARK SYSTEM  v8
     Palette: Obsidian  Slate  Ash  Chalk  Forest  Champagne
     Feel: serious money tool, not dashboard software
     ═══════════════════════════════════════════════════════════════════ */

  :root {
    /* Surface hierarchy — dark layered system */
    --bg:      #111113;   /* canvas                     */
    --s1:      #18181c;   /* card level 1               */
    --s2:      #1f1f24;   /* card level 2               */
    --s3:      #28282f;   /* elevated / interactive     */
    --border:  rgba(255,255,255,.07);
    --border2: rgba(255,255,255,.04);

    /* Text hierarchy */
    --t1: #f4f4f6;        /* primary                    */
    --t2: #9090a0;        /* secondary / labels         */
    --t3: #50505c;        /* muted / disabled           */

    /* Accent — used sparingly */
    --gold:    #c0954a;   /* champagne — highlights only */
    --gold-bg: rgba(192,149,74,.1);

    /* Semantic — profit only */
    --green:   #22c55e;   /* positive money             */
    --green-bg:rgba(34,197,94,.1);
    --green-txt:#16a34a;

    /* Danger — critical only, not decorative */
    --red:     #ef4444;
    --red-bg:  rgba(239,68,68,.08);

    /* Amber — secondary warning, low-key */
    --amber:   #f59e0b;
    --amber-bg:rgba(245,158,11,.08);

    /* Radius */
    --r-card:  18px;
    --r-sm:    11px;
    --r-xs:    8px;
    --r-pill:  999px;

    /* Shadows */
    --sh-card: 0 1px 0 rgba(255,255,255,.04) inset, 0 2px 16px rgba(0,0,0,.4);
    --sh-float:0 8px 40px rgba(0,0,0,.6);
    --sh-nav:  0 -1px 0 rgba(255,255,255,.05);
  }

  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  html, body, #root {
    height: 100%;
    font-family: "IBM Plex Sans", sans-serif;
    background: var(--bg);
    overflow: hidden;
    color: var(--t1);
  }
  input, select, textarea, button { font-family: "IBM Plex Sans", sans-serif; }
  input, select, textarea { font-size: 16px !important; color: var(--t1); }
  button { cursor: pointer; }

  /* ── Shell ── */
  .app    { height: 100%; display: flex; flex-direction: column; }
  .screen { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; background: var(--bg); }
  .page   { padding: 20px 16px calc(120px + env(safe-area-inset-bottom)); }

  /* ── Header ── */
  .header-compact {
    background: var(--s1);
    padding: 12px 18px;
    padding-top: calc(12px + env(safe-area-inset-top));
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-shrink: 0;
    border-bottom: 1px solid var(--border2);
  }
  .header-compact h1 { font-size: 16px; font-weight: 700; letter-spacing: -.4px; color: var(--t1); }
  .header-compact p  { font-size: 10px; color: var(--t3); margin-top: 2px; }

  /* ── Section labels ── */
  .section-label {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.8px; color: var(--t2);
    margin: 28px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── Card system ── */
  .card {
    background: var(--s1);
    border-radius: var(--r-card);
    overflow: hidden;
    box-shadow: var(--sh-card);
    border: 1px solid var(--border2);
    margin-bottom: 12px;
  }
  .card-pad  { padding: 18px 20px; }
  .card-row  {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 15px 20px;
    border-bottom: 1px solid var(--border2);
  }
  .card-row:last-child { border-bottom: none; }
  .dark-card {
    background: var(--s2); border-radius: var(--r-card); padding: 20px;
    box-shadow: var(--sh-card); border: 1px solid var(--border2); margin-bottom: 12px;
  }

  /* ── KPI grids ── */
  .kpi-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--border);
    border-radius: var(--r-card); overflow: hidden;
    margin-bottom: 12px;
  }
  .kpi-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .kpi            { background: var(--s1); padding: 18px 16px 16px; }
  .kpi-label      {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.1px; color: var(--t2); margin-bottom: 8px;
  }
  .kpi-value      {
    font-family: "IBM Plex Mono", monospace;
    font-size: 22px; font-weight: 700; line-height: 1;
    letter-spacing: -.8px; color: var(--t1);
  }
  .kpi-value.green  { color: var(--green); }
  .kpi-value.red    { color: var(--red); }
  .kpi-sub          { font-size: 10px; color: var(--t2); margin-top: 6px; font-weight: 500; }

  /* ── Mini-grid (Today strip) ── */
  .mini-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 1px; background: var(--border);
    border-radius: var(--r-card); overflow: hidden; margin-bottom: 12px;
  }
  .mini-box         { background: var(--s1); padding: 16px 8px; text-align: center; }
  .mini-box strong  {
    display: block; font-family: "IBM Plex Mono", monospace;
    font-size: 16px; font-weight: 700; color: var(--t1); letter-spacing: -.3px;
  }
  .mini-box span    {
    display: block; font-size: 8px; color: var(--t2);
    text-transform: uppercase; letter-spacing: .8px; margin-top: 5px; font-weight: 700;
  }

  /* ── Goal track ── */
  .goal-track     { height: 3px; background: var(--s3); border-radius: 999px; overflow: hidden; margin: 14px 0 8px; }
  .goal-fill      { height: 100%; border-radius: 999px; transition: width .7s cubic-bezier(.4,0,.2,1); }
  .goal-fill.full { background: var(--green); }
  .goal-fill.mid  { background: var(--t2); }
  .goal-fill.low  { background: var(--amber); }

  /* ── Stack ── */
  .stack { display: grid; gap: 10px; }

  /* ── Job rows ── */
  .job-row {
    background: var(--s1); border-radius: 16px;
    padding: 15px 17px; display: flex; align-items: flex-start; gap: 13px;
    box-shadow: var(--sh-card); border: 1px solid var(--border2);
  }
  .job-icon   {
    width: 42px; height: 42px; border-radius: 12px; background: var(--s3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 20px;
  }
  .job-main   { flex: 1; min-width: 0; }
  .job-title  { font-size: 14px; font-weight: 700; color: var(--t1); letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .job-meta   { font-size: 11px; color: var(--t2); margin-top: 3px; line-height: 1.6; }
  .job-right  { text-align: right; flex-shrink: 0; }

  /* ── Typography ── */
  .label         { font-size: 11px; color: var(--t2); font-weight: 500; }
  .sub           { font-size: 11px; color: var(--t3); font-weight: 500; }
  .mono          { font-family: "IBM Plex Mono", monospace; }
  .value         { font-family: "IBM Plex Mono", monospace; font-size: 14px; font-weight: 700; color: var(--t1); }
  .value.big     { font-size: 22px; }
  .value.green   { color: var(--green); }
  .value.red     { color: var(--red); }
  .value.orange  { color: var(--amber); }
  .sub.green     { color: var(--green);  font-weight: 700; }
  .sub.red       { color: var(--red);    font-weight: 700; }
  .sub.orange    { color: var(--amber);  font-weight: 700; }

  /* ── Pills / badges ── */
  .pill          { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 800; line-height: 1.5; letter-spacing: .2px; }
  .pill.green    { background: var(--green-bg); color: var(--green); }
  .pill.red      { background: var(--red-bg);   color: var(--red); }
  .pill.orange   { background: var(--amber-bg); color: var(--amber); }
  .pill.gray     { background: var(--s3);       color: var(--t2); }
  .pill.blue     { background: rgba(59,130,246,.12); color: #60a5fa; }
  .pill.gold     { background: var(--gold-bg);  color: var(--gold); }

  /* ── Pending payment ── */
  .pending-banner {
    background: var(--gold-bg); border: 1px solid rgba(192,149,74,.25);
    border-radius: var(--r-card); padding: 15px 18px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pending-banner-title { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: -.1px; }
  .pending-banner-sub   { font-size: 11px; color: rgba(192,149,74,.7); margin-top: 3px; font-weight: 600; }

  /* ── Source bars ── */
  .source-bar         { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border2); }
  .source-bar:last-child { border-bottom: none; }
  .source-bar-track   { flex: 1; height: 2px; background: var(--s3); border-radius: 999px; overflow: hidden; }
  .source-bar-fill    { height: 100%; background: var(--t2); border-radius: 999px; }

  /* ── Fields ── */
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.2px; color: var(--t2); margin-bottom: 8px;
  }
  .field input, .field select, .field textarea {
    width: 100%; border: 1px solid var(--border);
    background: var(--s3); border-radius: var(--r-sm);
    padding: 13px 15px; outline: none; transition: border-color .15s;
    color: var(--t1);
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--t2); }
  .field textarea { min-height: 72px; resize: vertical; }
  .field-row      { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  /* Ensure select options are dark themed */
  .field select option { background: var(--s2, #1f1f24); color: #f4f4f6; }

  /* ── Chips ── */
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
  .chip {
    border: 1px solid var(--border); background: var(--s2);
    border-radius: 999px; padding: 8px 14px;
    font-size: 12px; font-weight: 700; color: var(--t2);
    transition: all .12s;
  }
  .chip.active { background: var(--t1); color: var(--bg); border-color: var(--t1); }
  .chip.sm     { padding: 6px 12px; font-size: 11px; }
  .chip.city   { background: var(--s2); border-color: var(--border); color: var(--t2); }
  .chip.city.active { background: var(--t1); color: var(--bg); }

  /* ── City dropdown ── */
  .city-input-wrap   { position: relative; }
  .city-dropdown     {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--s2); border: 1px solid var(--border);
    border-radius: 16px; box-shadow: var(--sh-float);
    z-index: 200; max-height: 240px; overflow-y: auto;
  }
  .city-option       { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid var(--border2); cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--t1); }
  .city-option:last-child  { border-bottom: none; }
  .city-option:active      { background: var(--s3); }
  .city-section-head { padding: 8px 16px 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--t3); background: var(--s3); }

  /* ── Quick quote ── */
  .quote-box         {
    background: var(--s2); border-radius: var(--r-card); padding: 18px;
    margin-bottom: 14px; border: 1px solid var(--border); box-shadow: var(--sh-card);
  }
  .qq-suggested      { text-align: center; padding: 14px 10px 12px; border-bottom: 1px solid var(--border2); }
  .qq-suggested-label{ font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.4px; color: var(--t3); margin-bottom: 6px; }
  .qq-suggested-price{ font-family: "IBM Plex Mono", monospace; font-size: 40px; font-weight: 700; color: var(--t1); line-height: 1; letter-spacing: -2px; }
  .qq-dec-badge      { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 999px; font-size: 11px; font-weight: 800; margin-top: 10px; }
  .qq-dec-badge.take { background: var(--green-bg); color: var(--green); }
  .qq-dec-badge.raise{ background: var(--amber-bg); color: var(--amber); }
  .qq-dec-badge.low  { background: var(--red-bg);   color: var(--red); }
  .qq-apply-row      { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px; }
  .qq-apply-btn      {
    border: none; border-radius: var(--r-sm); padding: 10px 4px;
    font-size: 11px; font-weight: 800; font-family: "IBM Plex Sans", sans-serif;
    cursor: pointer; line-height: 1.3;
  }
  .qq-apply-btn:active { opacity: .8; }
  .qq-apply-btn.suggested { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
  .qq-apply-btn.premium   { background: var(--gold-bg);  color: var(--gold);  border: 1px solid rgba(192,149,74,.2); }
  .qq-apply-btn.custom    { background: var(--s3); color: var(--t2); border: 1px solid var(--border); }
  .qq-apply-btn.active-sel{ outline: 1px solid currentColor; outline-offset: 2px; }

  /* ── Source buttons ── */
  .src-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
  .src-btn  {
    border: 1px solid var(--border); background: var(--s2);
    border-radius: var(--r-sm); padding: 9px 12px;
    font-size: 12px; font-weight: 700; color: var(--t2); transition: all .12s;
    display: flex; align-items: center; gap: 5px;
  }
  .src-btn.active { background: var(--t1); color: var(--bg); border-color: var(--t1); }

  /* ── Payment grid ── */
  .pay-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 4px; }
  .pay-btn  {
    border: 1px solid var(--border); border-radius: 13px; padding: 11px 4px;
    background: var(--s2); display: flex; flex-direction: column;
    align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: var(--t2);
    transition: all .12s;
  }
  .pay-btn.active  { background: var(--t1); color: var(--bg); border-color: var(--t1); }
  .pay-btn .pay-icon { font-size: 18px; }

  /* ── Sticky save ── */
  .sticky-save {
    position: sticky; bottom: 0; left: 0; right: 0;
    background: var(--s1); border-top: 1px solid var(--border2);
    padding: 13px 18px; padding-bottom: calc(13px + env(safe-area-inset-bottom));
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    z-index: 50; box-shadow: 0 -8px 32px rgba(0,0,0,.5);
  }

  /* ── Buttons ── */
  .btn { border: none; border-radius: var(--r-sm); padding: 15px 18px; font-weight: 700; font-size: 14px; transition: opacity .1s; letter-spacing: -.1px; }
  .btn:active     { opacity: .75; }
  .btn.primary    { background: var(--t1); color: var(--bg); }
  .btn.secondary  { background: var(--s3); color: var(--t2); border: 1px solid var(--border); }
  .btn.sm  { padding: 9px 14px; font-size: 12px; border-radius: var(--r-xs); }
  .btn.xs  { padding: 6px 10px; font-size: 11px; border-radius: 7px; font-weight: 700; }
  .btn.danger  { background: var(--red-bg);   color: var(--red); }
  .btn.success { background: var(--green-bg); color: var(--green); }
  .btn.blue    { background: rgba(59,130,246,.12); color: #60a5fa; }
  .btn.orange  { background: var(--amber-bg); color: var(--amber); }
  .btn.gold    { background: var(--gold-bg);  color: var(--gold); }

  /* ── Form groups ── */
  .form-group {
    background: var(--s1); border-radius: var(--r-card); padding: 16px 18px;
    margin-bottom: 10px; box-shadow: var(--sh-card); border: 1px solid var(--border2);
  }
  .form-group-title {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.4px; color: var(--t2); margin-bottom: 14px;
  }

  /* ── Success strip ── */
  .success-strip {
    background: var(--green-bg); border: 1px solid rgba(34,197,94,.2);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .success-strip-title { font-size: 12px; font-weight: 700; color: var(--green); width: 100%; margin-bottom: 4px; }

  /* ── Bottom nav ── */
  .bottom-nav {
    display: flex; background: var(--s1);
    border-top: 1px solid var(--border2);
    padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
    box-shadow: var(--sh-nav);
  }
  .nav-btn {
    flex: 1; border: none; background: none; padding: 10px 2px 9px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; color: var(--t3); font-size: 7.5px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .6px; position: relative;
    transition: color .1s;
  }
  .nav-btn.active { color: var(--t1); }
  .nav-btn.active::after {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 20px; height: 2px;
    background: var(--t1); border-radius: 0 0 3px 3px;
  }
  .nav-btn .ico { font-size: 19px; line-height: 1; }

  /* ── Settings ── */
  .settings-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border2);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-inp {
    border: 1px solid var(--border); border-radius: var(--r-xs); padding: 10px 13px;
    font-size: 15px; outline: none; background: var(--s2); color: var(--t1);
  }
  .settings-inp:focus { border-color: var(--t2); }

  /* ── Expenses ── */
  .expense-row {
    display: grid; grid-template-columns: 1fr 90px auto auto;
    gap: 8px; align-items: center; padding: 11px 20px; border-bottom: 1px solid var(--border2);
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-row input {
    border: 1px solid var(--border); border-radius: var(--r-xs);
    padding: 9px 12px; font-size: 15px; outline: none; background: var(--s2); color: var(--t1);
  }

  /* ── Empty state ── */
  .empty        { padding: 60px 20px; text-align: center; }
  .empty-icon   { font-size: 40px; margin-bottom: 14px; }
  .empty-title  { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--t1); }
  .empty-sub    { font-size: 13px; color: var(--t3); line-height: 1.6; }

  /* ── Tax box ── */
  .tax-box      { background: var(--gold-bg); border: 1px solid rgba(192,149,74,.2); border-radius: 12px; padding: 13px 16px; margin-top: 12px; }
  .tax-box .tax-lbl  { color: var(--gold); font-weight: 800; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .tax-box .tax-amt  { font-family: "IBM Plex Mono", monospace; font-size: 18px; font-weight: 700; color: var(--gold); }
  .tax-box .tax-hint { font-size: 11px; color: rgba(192,149,74,.7); margin-top: 4px; }

  /* ── Inline note ── */
  .inline-note { font-size: 11px; color: var(--t2); line-height: 1.6; margin-bottom: 14px; }

  /* ── Auth screen ── */
  .auth-field { margin-bottom: 14px; }
  .auth-label { display: block; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--t3); margin-bottom: 8px; }
  .auth-inp2 {
    width: 100%; background: var(--s2); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px; color: var(--t1); font-size: 17px;
    outline: none; transition: border-color .15s;
  }
  .auth-inp2::placeholder { color: var(--t3); }
  .auth-inp2:focus { border-color: var(--t2); }
  .auth-btn-main {
    width: 100%; background: var(--t1); color: var(--bg); border: none;
    border-radius: 14px; padding: 17px; font-size: 16px; font-weight: 700; margin-bottom: 10px;
  }
  .auth-btn-main:active { opacity: .85; }
  .auth-btn-google {
    width: 100%; background: var(--s2); color: var(--t1); border: 1px solid var(--border);
    border-radius: 14px; padding: 15px; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 18px;
  }

  /* ── Animations ── */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .syncing { animation: pulse 1.4s infinite; }

  /* ── Responsive ── */
  @media(min-width:600px){
    .app{max-width:480px;margin:0 auto;box-shadow:0 0 80px rgba(0,0,0,.8)}
    html,body,#root{background:#08080a}
  }

  if (!col) return;
  const clean = {};

}

  if (!col) return;

async function fbBatch(ops) {
  if (!_db) return;

    const b = _db.batch();
    ops.forEach(op => {
      if (op.type === "set")    b.set(op.ref, op.data);

// ── Business logic ───────────────────────────────────────────────────────────
const jobDirectCost  = (j,s) => r2(Number(j.miles||0)*Number(s.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.miscCost||0));
const jobGrossProfit = (j,s) => r2(Number(j.revenue||0)-jobDirectCost(j,s));
const weeklyFixed    = s => r2((s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0)*12/52);
const monthlyFixed   = s => (s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0);

function premiums(j) {
  let p = 0;
  if (j.emergency) p+=20; if (j.lateNight) p+=20;
  if (j.highway)   p+=15; if (j.weekend)   p+=10;
  if (Number(j.miles||0)>25) p+=20;
  return p;
}
function suggestedPrice(j,s) {
  const direct = jobDirectCost(j,s);
  const isRepl = /replacement|installation/i.test(j.service||"");
  const target = isRepl ? Number(s.replacementTarget||110) : Number(s.repairTarget||90);
  return Math.ceil((direct+target+premiums(j))/5)*5;
}
function getWeekStart(d) {
  const dt = new Date(d+"T12:00:00"), day = dt.getDay();
  dt.setDate(dt.getDate()-(day>=5?day-5:day+2));
  return dt.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function weekLabel(s) {
  const d = new Date(s+"T12:00:00"), e = new Date(d);
  e.setDate(e.getDate()+6);
  const f = dt => dt.toLocaleDateString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric"});
  return f(d)+" – "+f(e)+", "+e.toLocaleDateString("en-US",{timeZone:"America/New_York",year:"numeric"}).split("/")[2];
}
function nextFriday() {
  const now = new Date();
  const dayStr = now.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short"});
  const dm = {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
  const day = dm[dayStr.slice(0,3)];
  const fri = new Date(now); fri.setDate(fri.getDate()+(day===5?7:(5-day+7)%7));
  return fri.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
}
function groupByWeek(jobs) {
  const map = {};
  [...(jobs||[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
    .forEach(j => { const k=getWeekStart(j.date); if(!map[k]) map[k]=[]; map[k].push(j); });
  return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
}
function weekSummary(weekJobs,s) {
  const jobs = Array.isArray(weekJobs)?weekJobs:[];
  const revenue     = r2(jobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const directCosts = r2(jobs.reduce((t,j)=>t+jobDirectCost(j,s),0));
  const grossProfit = r2(revenue-directCosts);
  const fixed       = weeklyFixed(s);
  const net         = r2(grossProfit-fixed);
  return {revenue,directCosts,grossProfit,fixed,net};
}

// ── Deduplicate inventory by size ────────────────────────────────────────────
function dedupeInventory(items) {
  const seen = {};
  (items||[]).filter(i=>(i.size||"").trim()).forEach(i => {
    const key = i.size.toLowerCase().replace(/\s+/g,"");
    if (!seen[key]) { seen[key]={...i}; }
    else {
      seen[key].qty  = Math.max(seen[key].qty, Number(i.qty||0));
      if (!seen[key].cost && i.cost) seen[key].cost = i.cost;
    }
  });
  return Object.values(seen);
}

const SVC_PHRASES = {
  "Tire Repair":"flat tire repair","Tire Replacement":"tire replacement",
  "Tire Installation":"tire installation","Lug Nut Removal":"lug nut removal",
  "Valve Stem Service":"valve stem service","Roadside Assistance":"roadside assistance",
};
function buildReviewMsg(url,customerName,service,city) {
  const name    = (customerName||"").trim();
  const greet   = name ? "Hi "+name+"," : "Hi,";
  const svc     = SVC_PHRASES[service]||(service?service.toLowerCase():"tire service");
  const cityStr = (city||"").trim()||"your area";
  return greet+" thanks again for choosing Wheel Rush. If you have a minute, please leave a review here:\n\n"+url+"\n\nPlease mention the "+svc+" we did and that we helped you in "+cityStr+".";
}
function openReviewSMS(phone,url,customerName,service,city) {
  if (!url) { alert("Set your Google Review URL in Settings first."); return; }
  const msg = encodeURIComponent(buildReviewMsg(url,customerName,service,city));
  window.open((phone?"sms:"+phone:"sms:")+"?body="+msg);
}

// ── Invoice PDF ──────────────────────────────────────────────────────────────
function generateInvoicePDF(job,settings) {
  const jsPDF = (window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
  if (!jsPDF) { alert("PDF library not loaded. Try again in a moment."); return null; }
  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210, M=18, col2=130;
  const NAVY=[0,20,60], ORANGE=[240,120,0], OFFWHITE=[240,240,220], NEAR_BLK=[20,20,20], GRAY=[120,120,130], LGRAY=[220,220,225], WHITE=[255,255,255];

  // Header
  doc.setFillColor(...NAVY); doc.rect(0,0,W,42,"F");
  doc.setFillColor(...ORANGE); doc.rect(0,42,W,3,"F");
  try { doc.addImage(LOGO_SRC,"PNG",M,7,24,24); } catch {}
  doc.setFont("helvetica","bold"); doc.setFontSize(18); doc.setTextColor(...WHITE);
  doc.text("Wheel Rush",M+30,19);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(180,200,220);

  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(...ORANGE);
  doc.text("INVOICE",W-M,19,{align:"right"});
  const invNum="WR-"+(job.date||"").replace(/-/g,"")+"-"+(job.id||"").slice(-4).toUpperCase();
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(180,200,220);
  doc.text("#"+invNum,W-M,27,{align:"right"});

  let y=52;
  // Bill To
  doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(...ORANGE);
  doc.text("BILL TO",M,y);
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.setTextColor(...NEAR_BLK);
  doc.text((job.customerName||"Valued Customer").trim(),M,y+7);
  if (job.customerPhone) { doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(...GRAY); doc.text(job.customerPhone,M,y+14); }

  // Detail box
  const dbX=128,dbW=66;
  doc.setFillColor(...OFFWHITE); doc.roundedRect(dbX,y-5,dbW,34,3,3,"F");
  const details=[["Date",job.date||""],["Location",(job.area||"—")],["Payment",(job.payment||"—")],["Status",job.status==="Pending"?"PENDING":"PAID"]];
  let dy=y+1;
  details.forEach(([lbl,val]) => {
    doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(...GRAY); doc.text(lbl,dbX+6,dy);
    doc.setFont("helvetica","bold"); doc.setFontSize(8);
    doc.setTextColor(...(lbl==="Status"?(val==="PAID"?[0,120,60]:[200,30,30]):NAVY));
    doc.text(val,dbX+dbW-4,dy,{align:"right"}); dy+=7.5;
  });
  y+=38;

  doc.setDrawColor(...LGRAY); doc.setLineWidth(0.3); doc.line(M,y,W-M,y); y+=8;

  // Table header
  doc.setFillColor(...NAVY); doc.roundedRect(M,y-4,W-M*2,11,2,2,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(...WHITE);
  doc.text("SERVICE DESCRIPTION",M+4,y+3);
  doc.text("QTY",148,y+3,{align:"center"});
  doc.text("AMOUNT",W-M-2,y+3,{align:"right"}); y+=14;

  // Line item
  doc.setFillColor(...OFFWHITE); doc.rect(M,y-4,W-M*2,job.tireSize?20:14,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(...NEAR_BLK);
  doc.text(job.service||"Tire Service",M+4,y+2);
  if (job.tireSize) { doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(...GRAY); doc.text("Tire Size: "+job.tireSize,M+4,y+9); }
  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(...NAVY);
  doc.text(String(Number(job.qty||1)),148,y+2,{align:"center"});
  doc.text(money(Number(job.revenue||0)),W-M-2,y+2,{align:"right"});
  y+=(job.tireSize?24:18);

  if ((job.note||"").trim()) {
    doc.setFont("helvetica","italic"); doc.setFontSize(9); doc.setTextColor(...GRAY);
    const nl=doc.splitTextToSize("Note: "+job.note,W-M*2-8);
    doc.text(nl,M+4,y); y+=nl.length*5+4;
  }

  y+=4; doc.setDrawColor(...LGRAY); doc.line(M,y,W-M,y); y+=10;

  // Total block
  const tx=W-M-72,tw=72;
  doc.setFillColor(...NAVY); doc.roundedRect(tx,y-4,tw,20,3,3,"F");
  doc.setFillColor(...ORANGE); doc.roundedRect(tx,y-4,4,20,2,2,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(180,200,220);
  doc.text("TOTAL DUE",tx+10,y+4);
  doc.setFontSize(16); doc.setTextColor(...WHITE);
  doc.text(money(Number(job.revenue||0)),W-M-4,y+9,{align:"right"});

  // Footer
  const fy=272;
  doc.setFillColor(...NAVY); doc.rect(0,fy,W,25,"F");
  doc.setFillColor(...ORANGE); doc.rect(0,fy,W,2,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...WHITE);
  doc.text("Thank you for choosing Wheel Rush!",W/2,fy+10,{align:"center"});
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(180,200,220);
  doc.text("Mobile Tire Repair  ·  We Come to You  ·  305-897-7030",W/2,fy+17,{align:"center"});

  return doc;
}
function sendInvoice(job,settings) {
  const doc = generateInvoicePDF(job,settings);

  const name=(job.customerName||"Job").replace(/\s+/g,"-");

}

// ── Migrate old jobs ─────────────────────────────────────────────────────────
function migrateOldJobs() {
  const OLD=["wr-jobs-v5","wr-upgraded-jobs-v1","wr2-jobs-v1","wheelrush_jobs"];
  const cur=load(KEYS.jobs,[]); const ids=new Set(cur.map(j=>String(j.id)));
  let mg=[...cur],cnt=0;
  OLD.forEach(k=>{ try{const o=load(k,[]); if(Array.isArray(o)) o.forEach(j=>{ if(!ids.has(String(j.id))){ mg.push({...j,id:String(j.id||Date.now()),source:j.source||"Google Search",tireCost:j.tireCost||j.cost||0,miscCost:j.miscCost||0}); ids.add(String(j.id)); cnt++; }}); }catch{} });
  if(cnt>0) persist(KEYS.jobs,mg);
  return mg;
}

  const weekJobs=useMemo(()=>safeJobs.filter(j=>getWeekStart(j.date)===thisWeek),[safeJobs,thisWeek]);
  const todayJobs=useMemo(()=>safeJobs.filter(j=>j.date===today),[safeJobs,today]);
  const totals=useMemo(()=>weekSummary(weekJobs,settings),[weekJobs,settings]);
  const avgProfit=weekJobs.length?r2(totals.grossProfit/weekJobs.length):0;
  const goalPct=clamp((totals.grossProfit/(settings.weeklyGoal||1))*100,0,100);
  const jobsNeeded=avgProfit>0?Math.max(0,Math.ceil(((settings.weeklyGoal||0)-totals.grossProfit)/avgProfit)):"—";
  const fixed=weeklyFixed(settings);

  const sources=useMemo(()=>{const m={};safeJobs.forEach(j=>{const s=j.source||"Other";m[s]=(m[s]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[safeJobs]);
  const maxSrc=sources.length?sources[0][1]:1;
  const recent=useMemo(()=>[...safeJobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,5),[safeJobs]);
  const barColor=goalPct>=100?"full":goalPct>=50?"mid":"low";
  // Top 5 tires by stock qty
  const top5Tires=useMemo(()=>{
    const inv=Array.isArray(inventory)?inventory:[];
    return dedupeInventory(inv).filter(i=>Number(i.qty||0)>0).sort((a,b)=>b.qty-a.qty).slice(0,5);
  },[inventory]);
  // Pending payments
  const pendingJobs=useMemo(()=>safeJobs.filter(j=>j.status==="Pending"),[safeJobs]);
  const pendingTotal=pendingJobs.reduce((s,j)=>s+Number(j.revenue||0),0);

  return html`<div class="screen"><div class="page">

    ${todayJobs.length>0&&html`<div>
      <div class="section-label" style=${{marginTop:0}}>Today</div>
      <div class="mini-grid">
        <div class="mini-box"><strong>${todayJobs.length}</strong><span>Jobs</span></div>
        <div class="mini-box"><strong>${money(todayJobs.reduce((s,j)=>s+Number(j.revenue||0),0))}</strong><span>Revenue</span></div>
        <div class="mini-box"><strong style=${{color:"var(--green)"}}>${money(todayJobs.reduce((s,j)=>s+jobGrossProfit(j,settings),0))}</strong><span>Profit</span></div>
        <div class="mini-box"><strong>${todayJobs.filter(j=>j.status==="Completed").length}</strong><span>Done</span></div>
      </div>
    </div>`}

    ${pendingJobs.length>0&&html`<div class="pending-banner">
      <div>
        <div class="pending-banner-title">${pendingJobs.length} Pending Payment${pendingJobs.length!==1?"s":""}</div>
        <div class="pending-banner-sub">${money(pendingTotal)} outstanding</div>
      </div>
      <button class="btn gold sm" onClick=${()=>setTab("history")}>Collect →</button>
    </div>`}

    <div class="section-label" style=${{marginTop:todayJobs.length?undefined:0}}>
      This Week <span style=${{fontWeight:500,textTransform:"none",letterSpacing:0,color:"var(--t3)",fontSize:9,marginLeft:6}}>${weekLabel(thisWeek)}</span>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Revenue</div><div class="kpi-value">${money(totals.revenue)}</div><div class="kpi-sub">${weekJobs.length} job${weekJobs.length!==1?"s":""}</div></div>
      <div class="kpi"><div class="kpi-label">Gross Profit</div><div class="kpi-value">${money(totals.grossProfit)}</div><div class="kpi-sub">before fixed</div></div>
      <div class="kpi"><div class="kpi-label">Fixed Costs</div><div class="kpi-value">${money(fixed)}</div><div class="kpi-sub">weekly</div></div>
      <div class="kpi"><div class="kpi-label">Net Profit</div><div class=${"kpi-value "+(totals.net>=0?"green":"red")}>${money(totals.net)}</div><div class="kpi-sub">take-home</div></div>
    </div>
    <div class="kpi-grid three">
      <div class="kpi"><div class="kpi-label">Direct</div><div class="kpi-value" style=${{fontSize:16}}>${money(totals.directCosts)}</div><div class="kpi-sub">parts+travel</div></div>
      <div class="kpi"><div class="kpi-label">Avg/Job</div><div class="kpi-value" style=${{fontSize:16}}>${money(avgProfit)}</div><div class="kpi-sub">gross profit</div></div>
      <div class="kpi"><div class="kpi-label">To Goal</div><div class="kpi-value" style=${{fontSize:16}}>${typeof jobsNeeded==="number"?jobsNeeded:"—"}</div><div class="kpi-sub">more jobs</div></div>
    </div>

    <div class="card">
      <div class="card-pad">
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div class="kpi-label">Weekly Goal</div>
            <div style=${{display:"flex",alignItems:"baseline",gap:8,marginTop:6}}>
              <span style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:24,fontWeight:700,letterSpacing:"-1px",color:"var(--t1)"}}>${money(totals.grossProfit)}</span>
              <span style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:13,color:"var(--t3)",fontWeight:500}}>/ ${money(settings.weeklyGoal)}</span>
            </div>
          </div>
          ${goalPct>=100
            ? html`<span class="pill green" style=${{padding:"5px 13px",fontSize:11}}>Goal Hit ✓</span>`
            : html`<span style=${{background:"var(--s3)",color:"var(--t2)",padding:"5px 13px",borderRadius:999,fontSize:11,fontWeight:800}}>${goalPct.toFixed(0)}%</span>`}
        </div>
        <div class="goal-track"><div class=${"goal-fill "+barColor} style=${{width:goalPct+"%"}}/></div>
        <div style=${{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--t3)",marginTop:6}}>
          <span>Next payout ${nextFriday()}</span>
          ${typeof jobsNeeded==="number"&&jobsNeeded>0&&html`<span style=${{color:"var(--t2)",fontWeight:700}}>${jobsNeeded} job${jobsNeeded!==1?"s":""} to go</span>`}
        </div>
      </div>
    </div>

    ${top5Tires.length>0&&html`<div>
      <div class="section-label">Top 5 in Stock</div>
      <div class="card">
        ${top5Tires.map((t,i)=>html`<div key=${t.id} class="card-row">
          <div style=${{display:"flex",alignItems:"center",gap:12}}>
            <div style=${{
              width:26,height:26,borderRadius:8,flexShrink:0,
              background:i===0?"var(--t1)":"var(--s3)",
              color:i===0?"var(--bg)":"var(--t2)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:10,fontWeight:800
            }}>${i+1}</div>
            <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:14,color:"var(--t1)",letterSpacing:"-.3px"}}>${t.size}</div>
          </div>
          <div>
            ${t.qty===0
              ? html`<span style=${{fontSize:10,fontWeight:800,color:"var(--t3)",background:"var(--s3)",padding:"3px 12px",borderRadius:999}}>OUT</span>`
              : t.qty<=LOW_STOCK
                ? html`<span style=${{fontSize:10,fontWeight:800,color:"var(--amber)",background:"var(--amber-bg)",padding:"3px 12px",borderRadius:999}}>LOW · ${t.qty}</span>`
                : html`<span style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:12,color:"var(--t2)",fontWeight:700}}>${t.qty}</span>`}
          </div>
        </div>`)}
      </div>
    </div>`}

    ${sources.length>0&&html`<div>
      <div class="section-label">Lead Sources</div>
      <div class="card"><div class="card-pad">
        ${sources.slice(0,6).map(([srcName,count])=>html`<div class="source-bar" key=${srcName}>
          <div style=${{fontSize:12,fontWeight:600,color:"var(--t2)",width:130,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${srcName}</div>
          <div class="source-bar-track"><div class="source-bar-fill" style=${{width:((count/maxSrc)*100)+"%"}}/></div>
          <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:11,color:"var(--t3)",width:20,textAlign:"right",flexShrink:0,fontWeight:700}}>${count}</div>
        </div>`)}
      </div></div>
    </div>`}

    <div class="section-label">Recent Jobs</div>
    ${recent.length>0?html`<div class="stack">${recent.map(job=>{
      const profit=jobGrossProfit(job,settings);
      const pg=profit>=70,po=profit>=40&&profit<70;
      return html`<div class="job-row" key=${job.id} style=${{cursor:"pointer"}} onClick=${()=>onRepeat(job)}>
        <div class="job-icon">🛞</div>
        <div class="job-main">
          <div class="job-title">${job.service}</div>
          <div class="job-meta">${job.area} · ${job.date}${job.tireSize?" · "+job.tireSize:""}</div>
          <div style=${{marginTop:7,display:"flex",gap:6}}>
            <span class=${"pill "+(pg?"green":po?"orange":"red")}>${money(profit)}</span>
            ${job.status==="Pending"&&html`<span class="pill gold">Pending</span>`}
          </div>
        </div>
        <div class="job-right">
          <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:18,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(job.revenue)}</div>
          <div style=${{fontSize:10,color:"var(--t3)",marginTop:3}}>${job.payment}</div>
        </div>
      </div>`;
    })}</div>`:html`<${EmptyState} icon="🛞" title="No jobs yet" sub="Add your first job." action=${html`<button class="btn primary" onClick=${()=>setTab("add")}>Add First Job</button>`}/>`}

  </div></div>`;
}


function AddJob({onSave,settings,jobs,prefill,onClearPrefill,editJob,onClearEdit,saving}) {
  const [form,setForm]=useState(EMPTY_JOB());
  const [error,setError]=useState("");
  const [saved,setSaved]=useState(null);
  const [tick,setTick]=useState(0);
  const [editingId,setEditingId]=useState(null);
  const [priceMode,setPriceMode]=useState("suggested");
  const isEditing=!!editingId;
  const recentSizes=useMemo(()=>[...new Set([...load(KEYS.sizes,[]),...DEFAULT_TIRE_SIZES])].slice(0,8),[tick]);
  const weekGross=useMemo(()=>{ const tw=getWeekStart(TODAY()); return (jobs||[]).filter(j=>getWeekStart(j.date)===tw&&j.id!==editingId).reduce((s,j)=>s+jobGrossProfit(j,settings),0); },[jobs,settings,editingId]);
  const lastJob=useMemo(()=>[...(jobs||[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).find(j=>j.id!==editingId)||null,[jobs,editingId]);

  useEffect(()=>{
    if(editJob&&editJob.id){
      setForm({...EMPTY_JOB(),...editJob,revenue:String(editJob.revenue||""),tireCost:String(editJob.tireCost||""),miscCost:String(editJob.miscCost||""),miles:String(editJob.miles||"")});
      setEditingId(editJob.id); setSaved(null); setError(""); setPriceMode("suggested");
      if(onClearEdit) onClearEdit();
      return;
    }
    if(prefill){
      setForm({...EMPTY_JOB(),service:prefill.service||"Tire Repair",area:prefill.area||"Miami",payment:prefill.payment||"Cash",source:prefill.source||"Google Search",tireSize:prefill.tireSize||"",qty:prefill.qty||1,tireCost:String(prefill.tireCost||""),miscCost:String(prefill.miscCost||""),miles:String(prefill.miles||""),emergency:!!prefill.emergency,lateNight:!!prefill.lateNight,highway:!!prefill.highway,weekend:!!prefill.weekend,customerName:prefill.customerName||"",customerPhone:prefill.customerPhone||""});
      setPriceMode("suggested");
      if(onClearPrefill) onClearPrefill();
    }
  },[prefill,editJob]);

  const setF=(k,v)=>{setForm(p=>({...p,[k]:v}));setError("");};
  const useLastJob=()=>{ if(!lastJob) return; setForm({...EMPTY_JOB(),service:lastJob.service,area:lastJob.area,payment:lastJob.payment,source:lastJob.source,tireSize:lastJob.tireSize,tireCost:String(lastJob.tireCost||""),miscCost:String(lastJob.miscCost||""),miles:String(lastJob.miles||""),emergency:lastJob.emergency,lateNight:lastJob.lateNight,highway:lastJob.highway,weekend:lastJob.weekend}); };
  const doSave=async(andAdd=false)=>{
    const rev=Number(form.revenue||0);
    if(!rev){setError("Enter the job price.");return;}
    if(form.tireSize){try{const p=load(KEYS.sizes,[]); persist(KEYS.sizes,[form.tireSize,...p.filter(s=>s!==form.tireSize)].slice(0,10));}catch{}}
    const entry=sanitizeJob({...form,id:editingId||uid(),qty:Number(form.qty||1),revenue:r2(rev),tireCost:r2(form.tireCost),miscCost:r2(form.miscCost),miles:r2(form.miles)});
    await onSave(entry,isEditing?false:andAdd);
    setTick(t=>t+1);
    if(isEditing){setEditingId(null);setForm(EMPTY_JOB());setError("");setPriceMode("suggested");}
    else{setSaved(entry);if(andAdd){setForm(EMPTY_JOB());setError("");setSaved(null);setPriceMode("suggested");}}
  };
  const cancelEdit=()=>{setEditingId(null);setPriceMode("suggested");setForm(EMPTY_JOB());setError("");setSaved(null);};
  const requestReview=()=>openReviewSMS(form.customerPhone,(settings.googleReviewUrl||"").trim(),form.customerName,form.service,form.area);

  return html`<div class="screen" style=${{paddingBottom:0}}>
    <div style=${{padding:"14px 14px 0"}}>
      ${isEditing&&html`<div style=${{background:"var(--gold-bg)",border:"1px solid rgba(192,149,74,.3)",borderRadius:12,padding:"12px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style=${{fontSize:13,fontWeight:700,color:"var(--gold)"}}>✏️ Editing — ${form.date}</span>
        <button class="btn secondary sm" onClick=${cancelEdit}>Cancel Edit</button>
      </div>`}
      <div style=${{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        ${lastJob&&!isEditing&&html`<button type="button" class="btn secondary sm" onClick=${useLastJob}>↩ Use Last Job</button>`}
        ${prefill&&!isEditing&&html`<button type="button" class="btn orange sm">🔁 Repeating Job</button>`}
        ${!isEditing&&html`<button type="button" class="btn secondary sm" onClick=${()=>{setForm(EMPTY_JOB());setSaved(null);setError("");setPriceMode("suggested");}}>✕ Clear</button>`}
      </div>
      ${error&&html`<div style=${{background:"var(--red-bg)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"var(--red)",marginBottom:14,fontWeight:600}}>${error}</div>`}
      ${saved&&!isEditing&&html`<div class="success-strip">
        <div class="success-strip-title">✅ ${money(saved.revenue)} · ${money(jobGrossProfit(saved,settings))} profit</div>
        <button class="btn primary sm" onClick=${()=>sendInvoice(saved,settings)}>${saved.customerPhone?"🧾 Send Invoice":"🧾 Copy Invoice"}</button>
        ${saved.status==="Completed"&&html`<button class="btn success sm" onClick=${requestReview}>⭐ Send Review</button>`}
        ${saved.customerPhone&&html`<button class="btn success sm" onClick=${()=>window.open("tel:"+saved.customerPhone)}>📞 Call</button>`}
        <button class="btn secondary sm" onClick=${()=>{setForm({...saved,id:"",revenue:String(saved.revenue)});setSaved(null);}}>🔁 Dup</button>
      </div>`}
      <${QuickQuote} form=${form} settings=${settings} weekGross=${weekGross} onApply=${v=>setF("revenue",v)} onFormChange=${setF} priceMode=${priceMode} setPriceMode=${setPriceMode}/>
      <div class="form-group">
        <div class="form-group-title">Pricing &amp; Costs</div>
        <div class="field-row">
          <div class="field"><label>Job Price ($)</label><input type="number" min="0" inputMode="decimal" value=${form.revenue} onChange=${e=>setF("revenue",e.target.value)} placeholder=${String(suggestedPrice(form,settings))} style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700,fontSize:18,padding:"14px"}}/></div>
          <div class="field"><label>Tire Cost ($)</label><input type="number" min="0" inputMode="decimal" value=${form.tireCost} onChange=${e=>setF("tireCost",e.target.value)} placeholder="0" style=${{fontFamily:"\"IBM Plex Mono\",monospace"}}/></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Misc Cost ($)</label><input type="number" min="0" inputMode="decimal" value=${form.miscCost} onChange=${e=>setF("miscCost",e.target.value)} placeholder="plugs, stems…"/></div>
          <div class="field"><label>Qty</label><input type="number" min="1" value=${form.qty} onChange=${e=>setF("qty",e.target.value)}/></div>
        </div>
        <div class="field"><label>Conditions — adds premium</label>
          <div class="chip-row">${FLAGS.map(([key,label,amt])=>html`<button type="button" key=${key} class=${"chip"+(form[key]?" active":"")} onClick=${()=>setF(key,!form[key])}>${label+(form[key]?" +$"+amt:"")}</button>`)}</div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-group-title">Job Details</div>
        <div class="field"><label>Service</label>
          <select value=${form.service} onChange=${e=>setF("service",e.target.value)} style=${{width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r-sm)",padding:"13px 15px",outline:"none",fontSize:16}}>
            ${SERVICE_OPTIONS.map(s=>html`<option key=${s}>${s}</option>`)}
          </select>
        </div>
        <div class="field-row">
          <div class="field"><label>Date</label><input type="date" value=${form.date} onChange=${e=>setF("date",e.target.value)}/></div>
          <div class="field"><label>Status</label><select value=${form.status} onChange=${e=>setF("status",e.target.value)}><option>Completed</option><option>Pending</option></select></div>
        </div>
        <div class="field"><label>Lead Source</label>
          <div class="src-grid">${SOURCE_QUICK.map(s=>html`<button key=${s.label} type="button" class=${"src-btn"+(form.source===s.label?" active":"")} onClick=${()=>setF("source",s.label)}>${s.icon+" "+s.label}</button>`)}</div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-group-title">Location &amp; Travel</div>
        <div class="field"><label>City / Area</label><${CityInput} value=${form.area} onChange=${v=>setF("area",v)}/></div>
        <div class="field"><label>Miles Driven</label><input type="number" min="0" inputMode="decimal" value=${form.miles} onChange=${e=>setF("miles",e.target.value)} placeholder="0" style=${{fontFamily:"\"IBM Plex Mono\",monospace"}}/></div>
      </div>
      <div class="form-group">
        <div class="form-group-title">Tire Size &amp; Payment</div>
        <div class="field"><label>Tire Size</label>
          <input value=${form.tireSize} onChange=${e=>setF("tireSize",e.target.value)} placeholder="225/55R17"/>
          <div class="chip-row" style=${{marginTop:8}}>${recentSizes.map(sz=>html`<button type="button" key=${sz} class=${"chip sm"+(form.tireSize===sz?" active":"")} onClick=${()=>setF("tireSize",sz)}>${sz}</button>`)}</div>
        </div>
        <div class="field"><label>Payment Method</label>
          <div class="pay-grid">${PAYMENT_OPTIONS.map(p=>html`<button key=${p.label} type="button" class=${"pay-btn"+(form.payment===p.label?" active":"")} onClick=${()=>setF("payment",p.label)}><span class="pay-icon">${p.icon}</span>${p.label}</button>`)}</div>
        </div>
      </div>
      <div class="form-group">
        <div class="form-group-title">Customer (optional)</div>
        <div class="field-row">
          <div class="field"><label>Name</label><input value=${form.customerName} onChange=${e=>setF("customerName",e.target.value)} placeholder="Customer name"/></div>
          <div class="field"><label>Phone</label><input type="tel" value=${form.customerPhone} onChange=${e=>setF("customerPhone",e.target.value)} placeholder="(305)…"/></div>
        </div>
      </div>
      <div class="field"><label>Notes</label><textarea value=${form.note} onChange=${e=>setF("note",e.target.value)} placeholder="Parking garage, roadside, no spare, etc."/></div>
      <div class="inline-note">Direct cost = travel + tire + misc. Weekly fixed deducted at payout only.</div>
      ${form.status==="Completed"&&html`<button class="btn blue" style=${{width:"100%",marginBottom:10}} onClick=${requestReview}>${"⭐ Send Review"+(form.customerPhone?" via SMS":" (no phone)")}</button>`}
      <div style=${{height:90}}/>
    </div>
    <div class="sticky-save">
      ${isEditing?html`<><button class="btn secondary" onClick=${cancelEdit}>Cancel Edit</button><button class="btn primary" onClick=${()=>doSave(false)} disabled=${saving}>${saving?"Saving…":"Update Job ✓"}</button></>`:html`<><button class="btn secondary" onClick=${()=>doSave(true)} disabled=${saving}>Save + Add Another</button><button class="btn primary" onClick=${()=>doSave(false)} disabled=${saving}>${saving?"Saving…":"Save Job →"}</button></>`}
    </div>
  </div>`;
}

function History({jobs,settings,onRepeat,onDelete,onEdit}) {
  const safeJobs=Array.isArray(jobs)?jobs:[];
