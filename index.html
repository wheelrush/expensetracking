<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wheel Rush" />
  <meta name="theme-color" content="#111111" />
  <title>Wheel Rush — Business Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;font-family:"IBM Plex Sans",sans-serif;background:#f4f4f4;overflow:hidden;color:#111}
    input,select,textarea,button{font-family:"IBM Plex Sans",sans-serif}
    input,select,textarea{font-size:16px!important}
    button{cursor:pointer}
    .app{height:100%;display:flex;flex-direction:column}
    .header{background:#111;color:#fff;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
    .header h1{font-size:18px;line-height:1.1;font-weight:700}
    .header p{font-size:11px;color:#666;margin-top:3px}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}
    .badge.dark{background:rgba(255,255,255,0.07);color:#888}
    .badge.green{background:rgba(74,222,128,0.15);color:#4ade80}
    .badge.orange{background:rgba(234,88,12,0.2);color:#fb923c}
    .screen{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
    .page{padding:14px 14px calc(100px + env(safe-area-inset-bottom))}
    .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:#999;margin:18px 0 8px}
    .section-label:first-child{margin-top:0}
    .label{font-size:12px;color:#777}
    .sub{font-size:11px;color:#999}
    .value{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:700}
    .value.big{font-size:22px}
    .value.green{color:#16a34a}.value.red{color:#dc2626}.value.orange{color:#ea580c}
    .mono{font-family:"IBM Plex Mono",monospace}
    .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:10px}
    .card-pad{padding:14px 16px}
    .card-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid #f0f0f0}
    .card-row:last-child{border-bottom:none}
    .dark-card{background:#111;color:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.15);margin-bottom:10px}
    .dark-card .muted{color:#555}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#ececec;border-radius:14px;overflow:hidden;margin-bottom:10px}
    .kpi-grid.three{grid-template-columns:1fr 1fr 1fr}
    .kpi{background:#fff;padding:14px}
    .kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#999;margin-bottom:5px}
    .kpi-value{font-family:"IBM Plex Mono",monospace;font-size:19px;font-weight:700;line-height:1.1}
    .kpi-sub{font-size:11px;color:#999;margin-top:4px}
    .goal-track{height:8px;background:#f0f0f0;border-radius:999px;overflow:hidden;margin:10px 0 6px}
    .goal-fill{height:100%;border-radius:999px;transition:width .4s ease}
    .goal-fill.full{background:#16a34a}
    .goal-fill.mid{background:#111}
    .goal-fill.low{background:#ea580c}
    .mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#ececec;border-radius:14px;overflow:hidden;margin-bottom:10px}
    .mini-box{background:#fff;padding:10px;text-align:center}
    .mini-box strong{display:block;font-family:"IBM Plex Mono",monospace;font-size:14px;line-height:1.2}
    .mini-box span{display:block;font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .stack{display:grid;gap:8px}
    .job-row{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .job-icon{width:38px;height:38px;border-radius:10px;background:#f4f4f4;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .job-main{flex:1;min-width:0}
    .job-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .job-meta{font-size:11px;color:#999;margin-top:3px;line-height:1.5}
    .job-right{text-align:right;flex-shrink:0}
    .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;line-height:1.4}
    .pill.green{background:#dcfce7;color:#166534}
    .pill.red{background:#fee2e2;color:#b91c1c}
    .pill.orange{background:#ffedd5;color:#c2410c}
    .pill.gray{background:#f3f4f6;color:#6b7280}
    .pill.blue{background:#dbeafe;color:#1d4ed8}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#888;margin-bottom:7px}
    .field input,.field select,.field textarea{width:100%;border:1.5px solid #e3e3e3;background:#fff;border-radius:12px;padding:12px 14px;outline:none;transition:border-color .15s;min-width:0;box-sizing:border-box}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:#111}
    .field textarea{min-height:72px;resize:vertical}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-width:0}
    .chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
    .chip{border:1.5px solid #ddd;background:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;color:#666;transition:all .12s}
    .chip.active{background:#111;color:#fff;border-color:#111}
    .chip.sm{padding:5px 10px;font-size:11px}
    .chip.city{background:#f0f9ff;border-color:#bae6fd;color:#0369a1}
    .chip.city.active{background:#111;color:#fff;border-color:#111}
    /* City search */
    .city-input-wrap{position:relative}
    .city-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #e3e3e3;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;max-height:240px;overflow-y:auto}
    .city-option{padding:12px 14px;font-size:14px;border-bottom:1px solid #f5f5f5;cursor:pointer;display:flex;align-items:center;gap:8px}
    .city-option:last-child{border-bottom:none}
    .city-option:active{background:#f4f4f4}
    .city-section-head{padding:6px 14px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#bbb;background:#fafafa}
    /* Quick quote */
    .quote-box{background:#111;border-radius:14px;padding:16px;margin-bottom:14px;color:#fff}
    .quote-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
    .quote-row:last-child{border-bottom:none;padding-top:10px;font-weight:700;font-size:15px}
    .dec-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;margin-top:10px}
    .dec-badge.strong{background:#dcfce7;color:#166534}
    .dec-badge.okay{background:#fef9c3;color:#854d0e}
    .dec-badge.low{background:#fee2e2;color:#b91c1c}
    /* Source quick buttons */
    .src-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
    .src-btn{border:1.5px solid #e3e3e3;background:#fff;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;color:#555;transition:all .12s;display:flex;align-items:center;gap:5px}
    .src-btn.active{background:#111;color:#fff;border-color:#111}
    /* Sticky save bar */
    .sticky-save{position:sticky;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ececec;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:50}
    .preview-row:last-child{border-bottom:none;padding-top:10px;font-weight:700;font-size:14px}
    .btn{border:none;border-radius:12px;padding:14px 16px;font-weight:700;font-size:14px;transition:opacity .1s}
    .btn:active{opacity:.8}
    .btn.primary{background:#111;color:#fff}
    .btn.secondary{background:#fff;color:#111;border:1.5px solid #ddd}
    .btn.sm{padding:9px 13px;font-size:12px;border-radius:10px}
    .btn.xs{padding:6px 10px;font-size:11px;border-radius:8px}
    .btn.danger{background:#fee2e2;color:#b91c1c}
    .btn.success{background:#dcfce7;color:#166534}
    .btn.blue{background:#dbeafe;color:#1d4ed8}
    .btn.orange{background:#ffedd5;color:#c2410c}
    .pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
    .pay-btn{border:1.5px solid #e3e3e3;border-radius:12px;padding:10px 4px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#666;transition:all .12s}
    .pay-btn.active{border-color:#111;background:#111;color:#fff}
    .pay-btn .pay-icon{font-size:18px}
    .bottom-nav{display:flex;background:#fff;border-top:1px solid #ececec;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
    .nav-btn{flex:1;border:none;background:none;padding:7px 2px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#bbb;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .nav-btn.active{color:#111}
    .nav-btn .ico{font-size:16px;line-height:1}
    .settings-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f1f1f1}
    .settings-row:last-child{border-bottom:none}
    .settings-inp{border:1.5px solid #e3e3e3;border-radius:10px;padding:10px 12px;font-family:"IBM Plex Sans",sans-serif;font-size:15px;outline:none}
    .settings-inp:focus{border-color:#111}
    .expense-row{display:grid;grid-template-columns:1fr 90px auto auto;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid #f2f2f2}
    .expense-row:last-child{border-bottom:none}
    .expense-row input{border:1.5px solid #e3e3e3;border-radius:10px;padding:9px 12px;width:100%;font-family:"IBM Plex Sans",sans-serif;font-size:15px;outline:none}
    .empty{padding:50px 20px;text-align:center}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty-title{font-size:15px;font-weight:700;margin-bottom:6px}
    .empty-sub{font-size:13px;color:#999;line-height:1.5}
    .tax-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-top:10px}
    .tax-box .tax-lbl{color:#92400e;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .tax-box .tax-amt{font-family:"IBM Plex Mono",monospace;font-size:18px;font-weight:700;color:#b45309}
    .tax-box .tax-hint{font-size:11px;color:#92400e;margin-top:4px}
    .inline-note{font-size:11px;color:#999;line-height:1.6;margin-bottom:14px}
    .source-bar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}
    .source-bar:last-child{border-bottom:none}
    .source-bar-track{flex:1;height:6px;background:#f0f0f0;border-radius:999px;overflow:hidden}
    .source-bar-fill{height:100%;background:#111;border-radius:999px}
    .auth-screen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;padding:32px 24px}
    .auth-title{color:#fff;font-size:24px;font-weight:700;margin-bottom:6px}
    .auth-sub{color:#555;font-size:13px;margin-bottom:32px;text-align:center}
    .auth-inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:16px;outline:none;margin-bottom:12px;font-family:"IBM Plex Sans",sans-serif}
    .auth-inp::placeholder{color:#444}
    .auth-inp:focus{border-color:rgba(255,255,255,.3)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .syncing{animation:pulse 1.2s infinite}
    /* Success actions */
    .success-strip{background:#dcfce7;border:1px solid #86efac;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .success-strip-title{font-size:12px;font-weight:700;color:#166534;width:100%;margin-bottom:4px}
    /* Form group divider */
    .form-group{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .form-group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#bbb;margin-bottom:12px}

    /* Compact header */
    .header-compact{background:#111;color:#fff;padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
    .header-compact h1{font-size:16px;font-weight:700;line-height:1}
    .header-compact p{font-size:10px;color:#555;margin-top:1px}
    /* Auth premium */
    .auth-field{margin-bottom:14px}
    .auth-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#444;margin-bottom:8px}
    .auth-inp2{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 18px;color:#fff;font-size:17px;outline:none;font-family:"IBM Plex Sans",sans-serif;transition:border-color .15s}
    .auth-inp2::placeholder{color:#333}
    .auth-inp2:focus{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.09)}
    .auth-btn-main{width:100%;background:#fff;color:#111;border:none;border-radius:14px;padding:17px;font-size:16px;font-weight:700;font-family:"IBM Plex Sans",sans-serif;margin-bottom:10px}
    .auth-btn-main:active{opacity:.85}
    .auth-btn-google{width:100%;background:rgba(255,255,255,.07);color:#fff;border:1.5px solid rgba(255,255,255,.12);border-radius:14px;padding:15px;font-size:15px;font-weight:600;font-family:"IBM Plex Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px}
    .auth-btn-google:active{opacity:.8}
    /* QuickQuote v2 */
    .qq-suggested{text-align:center;padding:14px 10px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
    .qq-suggested-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#555;margin-bottom:4px}
    .qq-suggested-price{font-family:"IBM Plex Mono",monospace;font-size:34px;font-weight:700;color:#fff;line-height:1}
    .qq-dec-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:700;margin-top:8px}
    .qq-dec-badge.take{background:#dcfce7;color:#166534}
    .qq-dec-badge.raise{background:#fef9c3;color:#854d0e}
    .qq-dec-badge.low{background:#fee2e2;color:#b91c1c}
    .qq-apply-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px}
    .qq-apply-btn{border:none;border-radius:10px;padding:9px 4px;font-size:11px;font-weight:700;font-family:"IBM Plex Sans",sans-serif;cursor:pointer;line-height:1.3}
    .qq-apply-btn:active{opacity:.8}
    .qq-apply-btn.suggested{background:#4ade80;color:#14532d}
    .qq-apply-btn.premium{background:#fb923c;color:#431407}
    .qq-apply-btn.custom{background:rgba(255,255,255,.1);color:#fff}
    .qq-breakdown{padding:0 12px 10px;display:flex;gap:8px;justify-content:space-between}
    .qq-stat{text-align:center;flex:1}
    .qq-stat-val{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:700;color:#aaa}
    .qq-stat-lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    /* More Details toggle */
    .more-toggle{width:100%;background:none;border:1.5px dashed #e3e3e3;border-radius:12px;padding:12px;font-size:13px;font-weight:700;color:#888;font-family:"IBM Plex Sans",sans-serif;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
    .more-toggle:active{background:#f9f9f9}
    /* Tighter pay buttons */
    .pay-btn-tight{border:1.5px solid #e3e3e3;border-radius:10px;padding:7px 4px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;color:#666;transition:all .12s}
    .pay-btn-tight.active{border-color:#111;background:#111;color:#fff}
    .pay-btn-tight .pay-icon{font-size:16px}
    /* Better sticky save */
    .sticky-save2{position:sticky;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #111;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:50;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
    /* Edit banner */
    .edit-banner{background:#fef9c3;border:1.5px solid #fde047;border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .edit-banner-text{font-size:13px;font-weight:700;color:#854d0e}
    /* Customer cards */
    .customer-card{background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:8px}
    .customer-avatar{width:44px;height:44px;border-radius:12px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;font-family:"IBM Plex Mono",monospace}
    .customer-main{flex:1;min-width:0}
    .customer-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .customer-meta{font-size:11px;color:#999;margin-top:2px}
    .customer-right{text-align:right;flex-shrink:0}

    @media(max-width:375px){
      .field-row{grid-template-columns:1fr}
      .mini-grid{grid-template-columns:repeat(2,1fr)}
      .pay-grid{grid-template-columns:repeat(2,1fr)}
    }


    /* QuickQuote active price selection */
    .qq-apply-btn.active-sel{outline:2px solid #fff;outline-offset:1px;}
    .qq-apply-btn.suggested.active-sel{background:#4ade80;color:#14532d;}
    .qq-apply-btn.premium.active-sel{background:#fb923c;color:#431407;}
    .qq-apply-btn.custom.active-sel{background:rgba(255,255,255,.25);color:#fff;}
    /* ── Responsive / device fit ── */
    @media(min-width:600px){
      .app{max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.15)}
      html,body,#root{background:#e8e8e8}
    }
    @media(max-width:360px){
      .pay-grid{grid-template-columns:repeat(2,1fr)!important}
      .field-row{grid-template-columns:1fr!important}
      .kpi-grid{grid-template-columns:1fr 1fr!important}
      .mini-grid{grid-template-columns:1fr 1fr!important}
      .page{padding:10px 10px calc(100px + env(safe-area-inset-bottom))}
      .form-group{padding:10px}
      .section-label{margin:14px 0 6px}
    }
    @media(min-height:812px){
      /* Tall phones (iPhone X+) — a bit more breathing room */
      .page{padding:16px 14px calc(110px + env(safe-area-inset-bottom))}
    }
  </style>

  const cur = load(KEYS.jobs, []); const ids = new Set(cur.map(j=>String(j.id))); let mg=[...cur],cnt=0;

function migrateOldInventory() {

}

// ── Business logic ─────────────────────────────────────────────────────────────
const jobDirectCost  = (j,s)=>r2(Number(j.miles||0)*Number(s.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.miscCost||0));
const jobGrossProfit = (j,s)=>r2(Number(j.revenue||0)-jobDirectCost(j,s));
const weeklyFixed    = s=>r2((s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0)*12/52);
const monthlyFixed   = s=>(s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0);
function premiums(j){let p=0;if(j.emergency)p+=20;if(j.lateNight)p+=20;if(j.highway)p+=15;if(j.weekend)p+=10;if(Number(j.miles||0)>25)p+=20;return p;}
function suggestedPrice(j,s){const direct=jobDirectCost(j,s);const isRepl=/replacement|installation/i.test(j.service||'');const target=isRepl?Number(s.replacementTarget||110):Number(s.repairTarget||90);return Math.ceil((direct+target+premiums(j))/5)*5;}

// CHANGE #4 — labels: Too Low / Take It / Strong Margin
function jobDecision(j,s,weekGP=0){
  const rev=Number(j.revenue||0)||suggestedPrice(j,s);
  const profit=r2(rev-jobDirectCost(j,s));
  const skip=Number(s.skipThreshold||70);
  const miles=Number(j.miles||0);
  const goal=Number(s.weeklyGoal||1200);
  const goalPct=goal>0?weekGP/goal:0;
  if(profit<skip)return{label:'Too Low',cls:'low',dec:'low',reason:`Profit ${money(profit)} below min ${money(skip)}`};
  if(goalPct>=1.0&&miles>Number(s.riskyMiles||25))return{label:'Too Low',cls:'low',dec:'low',reason:`Goal hit — skip the drive`};
  if(miles>Number(s.riskyMiles||25)){const adj=goalPct<0.5?skip-15:skip;if(profit<adj+30)return{label:'Take It',cls:'okay',dec:'okay',reason:`${miles} mi — watch margin`};}
  if(profit>=skip+40)return{label:'Strong Margin',cls:'strong',dec:'strong',reason:`${money(profit)} profit`};
  return{label:'Take It',cls:'okay',dec:'okay',reason:`${money(profit)} profit`};
}

function weekSummary(weekJobs,s){
  const safeJobs=Array.isArray(weekJobs)?weekJobs:[];
  const revenue=r2(safeJobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const directCosts=r2(safeJobs.reduce((t,j)=>t+jobDirectCost(j,s),0));
  const grossProfit=r2(revenue-directCosts);
  const fixed=weeklyFixed(s);
  const net=r2(grossProfit-fixed);
  return{revenue,directCosts,grossProfit,fixed,net,jobCount:safeJobs.length};
}
function getWeekStart(d){const dt=new Date(d+'T00:00:00'),day=dt.getDay();dt.setDate(dt.getDate()-(day>=5?day-5:day+2));return dt.toISOString().slice(0,10);}
function weekLabel(s){const d=new Date(s+'T00:00:00'),e=new Date(d);e.setDate(e.getDate()+6);const f=dt=>dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});const yr=e.getFullYear();return`${f(d)} – ${f(e)}, ${yr}`;}
function nextFriday(){const d=new Date(),diff=d.getDay()===5?7:(5-d.getDay()+7)%7;d.setDate(d.getDate()+diff);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function groupByWeek(jobs){const map={};[...(Array.isArray(jobs)?jobs:[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).forEach(j=>{const k=getWeekStart(j.date);if(!map[k])map[k]=[];map[k].push(j);});return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));}

  const csv=[headers.join(','),...rows].join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`wheel-rush-${TODAY()}.csv`;a.click();URL.revokeObjectURL(url);

  const activePrice = priceMode==='custom'
    ? Number(form.revenue||0)
    : priceMode==='premium' ? premiumPrice : suggested;

  const decBadge = profit<skip
    ? {label:'Too Low',cls:'low'}

            value={form.tireCost||''} onChange={e=>onFormChange('tireCost',e.target.value)} style={inpStyle}/></div>

        </div>
      ) : (
        <>
          {/* Price + cost breakdown */}
          <div className="qq-suggested">
            <div className="qq-suggested-label">

              </div>
              <div style={{width:1,background:'#222',flexShrink:0}}/>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,color:'#555',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:2}}>Profit</div>

      <div className="kpi-grid" style={{marginBottom:8}}>

        <div className="kpi"><div className="kpi-label">Gross Profit</div><div className="kpi-value">{money(totals.grossProfit)}</div><div className="kpi-sub">before fixed</div></div>

      <div className="section-label">Job Mix</div>
      <div className="mini-grid" style={{marginBottom:10}}>

      ):(

// ── INVOICE GENERATOR ─────────────────────────────────────────────────────────
function generateInvoiceText(job, bizName) {
  const biz  = bizName || 'Wheel Rush Mobile Tire Repair';
  const sep  = '─────────────────────────────';
  const line = (label, val) => val ? `${label.padEnd(16)}${val}` : '';
  const lines = [
    `📋 INVOICE`,
    sep,
    biz,
    `📞 305-897-7030`,
    sep,
    line('Date:', job.date),
    job.customerName ? line('Customer:', job.customerName) : '',
    job.customerPhone ? line('Phone:', job.customerPhone) : '',
    sep,
    line('Service:', job.service),
    job.tireSize ? line('Tire Size:', `${job.tireSize}${job.qty>1?' x'+job.qty:''}`) : '',
    job.area ? line('Location:', job.area) : '',
    sep,
    line('Total:', new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(job.revenue||0))),
    line('Payment:', job.payment),
    job.note ? `\nNotes: ${job.note}` : '',
    sep,
    'Thank you for choosing Wheel Rush!',
    'Fast · Reliable · Mobile Tire Service',
  ].filter(Boolean).join('\n');
  return lines;
}

function sendInvoice(job, settings) {
  const text = generateInvoiceText(job, settings.businessName);
  if (job.customerPhone) {
    window.open('sms:'+job.customerPhone+'?body='+encodeURIComponent(text));
  } else {
    // Copy to clipboard fallback
    try {
      navigator.clipboard.writeText(text).then(()=>alert('Invoice copied to clipboard!\nPaste it to send manually.'));
    } catch(e) {
      // Older fallback
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      alert('Invoice copied to clipboard!\nPaste it to send manually.');
    }
  }
}

// ── ADD JOB ────────────────────────────────────────────────────────────────────
function AddJob({onSave,settings,jobs,prefill,onClearPrefill,editJob,onClearEdit}){
  const [form,setForm]=useState(EMPTY_JOB);
  const [error,setError]=useState('');
  const [saved,setSaved]=useState(null);
  const [tick,setTick]=useState(0);
  const [editingId,setEditingId]=useState(null);
  const [priceMode,setPriceMode]=useState('suggested');
  const isEditing=!!editingId;
  const recentSizes=useMemo(()=>[...new Set([...load(KEYS.sizes,[]),...DEFAULT_TIRE_SIZES])].slice(0,8),[tick]);
  const weekGross=useMemo(()=>{const tw=getWeekStart(TODAY());return (Array.isArray(jobs)?jobs:[]).filter(j=>getWeekStart(j.date)===tw&&(!isEditing||j.id!==editingId)).reduce((s,j)=>s+jobGrossProfit(j,settings),0);},[jobs,settings,isEditing,editingId]);
  const lastJob=useMemo(()=>[...(Array.isArray(jobs)?jobs:[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).find(j=>j.id!==editingId)||null,[jobs,editingId]);

  // Load editJob into form — store ID locally, do NOT call onClearEdit here
  useEffect(()=>{
    if(editJob&&editJob.id){
      setForm({...EMPTY_JOB(),...editJob,revenue:String(editJob.revenue||''),tireCost:String(editJob.tireCost||''),miscCost:String(editJob.miscCost||''),miles:String(editJob.miles||'')});
      setEditingId(editJob.id);
      setSaved(null);setError('');setPriceMode('suggested');
      // Clear the parent ref so App doesn't keep triggering this effect
      if(onClearEdit)onClearEdit();
      return;
    }
    if(prefill){
      setForm({...EMPTY_JOB(),service:prefill.service||'Tire Repair',area:prefill.area||'Miami',payment:prefill.payment||'Cash',source:prefill.source||'Google Search',tireSize:prefill.tireSize||'',qty:prefill.qty||1,tireCost:String(prefill.tireCost||''),miscCost:String(prefill.miscCost||''),miles:String(prefill.miles||''),emergency:!!prefill.emergency,lateNight:!!prefill.lateNight,highway:!!prefill.highway,weekend:!!prefill.weekend,customerName:prefill.customerName||'',customerPhone:prefill.customerPhone||''});
      setPriceMode('suggested');
      if(onClearPrefill)onClearPrefill();
    }
  },[prefill,editJob]);

  const setF=(k,v)=>{setForm(p=>({...p,[k]:v}));setError('');};

  const useLastJob=()=>{
    if(!lastJob)return;
    setForm({...EMPTY_JOB(),service:lastJob.service,area:lastJob.area,payment:lastJob.payment,source:lastJob.source,tireSize:lastJob.tireSize,tireCost:String(lastJob.tireCost||''),miscCost:String(lastJob.miscCost||''),miles:String(lastJob.miles||''),emergency:lastJob.emergency,lateNight:lastJob.lateNight,highway:lastJob.highway,weekend:lastJob.weekend});
  };

  const saveJob=(andAdd=false)=>{
    const rev=Number(form.revenue||0);
    if(!rev){setError('Enter the job price.');return;}
    if(form.tireSize){try{const p=load(KEYS.sizes,[]);persist(KEYS.sizes,[form.tireSize,...p.filter(s=>s!==form.tireSize)].slice(0,10));}catch{}}
    // FIX: use local editingId — always correct regardless of parent prop timing
    const entry={...form,id:editingId||uid(),qty:Number(form.qty||1),revenue:r2(rev),tireCost:r2(form.tireCost),miscCost:r2(form.miscCost),miles:r2(form.miles)};
    onSave(entry, isEditing ? false : andAdd); // edit never "adds another"
    setTick(t=>t+1);setSaved(entry);
    if(isEditing){
      // After updating, exit edit mode and go back to History
      setEditingId(null);
      setForm(EMPTY_JOB());setError('');
    } else if(andAdd){
      setForm(EMPTY_JOB());setError('');setSaved(null);
    }
  };

  const cancelEdit=()=>{
    setEditingId(null);setPriceMode('suggested');
    setForm(EMPTY_JOB());setError('');setSaved(null);
  };

  const requestReview=()=>{
    const url=(settings.googleReviewUrl||'').trim();
    if(!url){alert('Set your Google Review URL in Settings.');return;}
    const msg=encodeURIComponent('Hi'+(form.customerName?' '+form.customerName:'')+'! Thanks for choosing Wheel Rush today! We'd really appreciate a quick Google review — it helps us grow! '+url);
    window.open(form.customerPhone?'sms:'+form.customerPhone+'?body='+msg:'sms:?body='+msg);
  };

  const FLAGS=[['emergency','🚨 Emergency',20],['lateNight','🌙 Late Night',20],['highway','🛣 Highway',15],['weekend','📅 Weekend',10]];

  return(
    <div className="screen" style={{paddingBottom:0}}>
      <div style={{padding:'14px 14px 0'}}>

        {/* Edit mode banner */}
        {isEditing&&(
          <div style={{background:'#fef9c3',border:'1.5px solid #fde047',borderRadius:10,padding:'10px 14px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:700,color:'#854d0e'}}>✏️ Editing Job — {form.date}</span>
            <button className="btn secondary sm" onClick={cancelEdit}>Cancel Edit</button>
          </div>
        )}

        {/* Quick actions row */}
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          {lastJob&&!isEditing&&<button type="button" className="btn secondary sm" onClick={useLastJob}>↩ Use Last Job</button>}
          {prefill&&!isEditing&&<button type="button" className="btn orange sm">🔁 Repeating Job</button>}
          {!isEditing&&<button type="button" className="btn secondary sm" onClick={()=>{setForm(EMPTY_JOB());setSaved(null);setError('');}}>✕ Clear</button>}
        </div>

        {error&&<div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#b91c1c',marginBottom:14,fontWeight:600}}>{error}</div>}

        {/* Success strip — shown after new job save, NOT after edit (edit returns to history) */}
        {saved&&!isEditing&&(
          <div className="success-strip">
            <div className="success-strip-title">✅ {money(saved.revenue)} · {money(jobGrossProfit(saved,settings))} profit</div>
            {/* Send Invoice */}
            <button className="btn primary sm" onClick={()=>sendInvoice(saved,settings)}>
              🧾 {saved.customerPhone?'Send Invoice':'Copy Invoice'}
            </button>
            {/* Send Review */}
            {saved.status==='Completed'&&<button className="btn success sm" onClick={requestReview}>⭐ Review</button>}
            {/* Call */}
            {saved.customerPhone&&<button className="btn success sm" onClick={()=>window.open('tel:'+saved.customerPhone)}>📞 Call</button>}
            {/* Duplicate */}
            <button className="btn secondary sm" onClick={()=>{setForm({...saved,id:'',revenue:String(saved.revenue)});setSaved(null);}}>🔁 Dup</button>
          </div>
        )}

        {/* CHANGE #3 — onApply sets revenue, onFormChange updates form fields */}
        <QuickQuote
          form={form}
          settings={settings}
          weekGross={weekGross}
          onApply={v=>setF('revenue',v)}
          onFormChange={setF}
          priceMode={priceMode}
          setPriceMode={setPriceMode}
        />

        {/* GROUP 1: Pricing */}
        <div className="form-group">
          <div className="form-group-title">Pricing & Costs</div>
          <div className="field-row">
            <div className="field"><label>Job Price ($)</label>

            <div className="src-grid">

            <div className="field"><label>Phone</label><input type="tel" value={form.customerPhone} onChange={e=>setF('customerPhone',e.target.value)} placeholder="(305)…"/></div>

            <button className="btn secondary" onClick={()=>saveJob(true)}>Save + Add Another</button>
            <button className="btn primary" onClick={()=>saveJob(false)}>Save Job →</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── HISTORY ────────────────────────────────────────────────────────────────────
// CHANGE #6: delete removes from state + localStorage + Firebase
// CHANGE #7: onEdit callback to load job into AddJob form
function History({jobs,settings,onRepeat,onDelete,onEdit}){
  const safeJobs=Array.isArray(jobs)?jobs:[];
  const [filter,setFilter]=useState('All');
  const [search,setSearch]=useState('');
  const [view,setView]=useState('weeks');
  const cities=useMemo(()=>Array.from(new Set(safeJobs.map(j=>j.area))),[safeJobs]);
  const filtered=useMemo(()=>{
    let j=safeJobs;
    if(filter==='Repair')j=j.filter(x=>/repair/i.test(x.service));
    else if(filter==='Replacement')j=j.filter(x=>/replacement|installation/i.test(x.service));
    else if(filter==='Pending')j=j.filter(x=>x.status==='Pending');
    else if(filter!=='All')j=j.filter(x=>x.area===filter);
    if(search.trim()){const q=search.toLowerCase();j=j.filter(x=>(x.customerName||'').toLowerCase().includes(q)||(x.customerPhone||'').includes(q)||(x.tireSize||'').toLowerCase().includes(q)||(x.area||'').toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));}
    return [...j].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },[safeJobs,filter,search]);
  const weekGroups=useMemo(()=>groupByWeek(filtered),[filtered]);
  const thisWeekGross=useMemo(()=>{const tw=getWeekStart(TODAY());return safeJobs.filter(j=>getWeekStart(j.date)===tw).reduce((s,j)=>s+jobGrossProfit(j,settings),0);},[safeJobs,settings]);

  // CHANGE #6 — delete: caller (App) handles state + localStorage + Firebase
  const handleDelete=id=>{
    if(!window.confirm('Delete this job?'))return;
    onDelete(id);
  };

  // CHANGE #7 — mark paid (needs setJobs — handled via onDelete pattern, use a separate prop)
  // Keep markPaid local for now — it calls onDelete-like but updates
  // We'll pass a setJobs prop for mark-paid
  const markPaid=(job)=>{
    // We can't update directly — pass through onEdit with modified job
    if(onEdit) onEdit({...job, status:'Completed', _markPaidOnly:true});
  };

  const JobRow=({job})=>{
    const profit=jobGrossProfit(job,settings);
    const dec=jobDecision(job,settings,thisWeekGross);
    const sendReview=()=>{const u=(settings.googleReviewUrl||'').trim();if(!u){alert('Set Google Review URL in Settings.');return;}const msg=encodeURIComponent('Hi'+(job.customerName?' '+job.customerName:'')+'! Thanks for choosing Wheel Rush. We\'d love a quick Google review! '+u);window.open(job.customerPhone?'sms:'+job.customerPhone+'?body='+msg:'sms:?body='+msg);};
    const decCls=dec.dec==='strong'?'green':dec.dec==='okay'?'yellow':'red';
    return(
      <div className="job-row" key={job.id}>
        <div className="job-icon">🛞</div>
        <div className="job-main">
          <div className="job-title">{job.service} · {job.area}</div>
          <div className="job-meta">{job.date} · {job.tireSize||'No size'} · {job.payment}{job.source?` · ${job.source}`:''}</div>
          {(job.customerName||job.customerPhone)&&<div className="job-meta" style={{marginTop:2}}>👤 {job.customerName||''}{job.customerPhone?` · ${job.customerPhone}`:''}</div>}
          <div style={{marginTop:5,display:'flex',gap:6,flexWrap:'wrap'}}>
            <span className={`pill ${decCls}`}>{dec.label}</span>
            {job.emergency&&<span className="pill orange">🚨 Emergency</span>}
            {job.lateNight&&<span className="pill gray">🌙 Late Night</span>}
            {job.status==='Pending'&&<span className="pill orange">⏳ Pending</span>}
          </div>
        </div>
        <div className="job-right">
          <div className="value">{money(job.revenue)}</div>
          <div className={`sub ${profit>=0?'green':'red'}`} style={{fontWeight:700}}>{money(profit)}</div>
          <div style={{display:'flex',gap:5,marginTop:8,justifyContent:'flex-end',flexWrap:'wrap'}}>
            {/* CHANGE #7 — Edit button */}
            {onEdit&&<button className="btn blue xs" onClick={()=>onEdit(job)} title="Edit">✏️</button>}
            <button className="btn success xs" onClick={()=>onRepeat(job)} title="Repeat">🔁</button>
            <button className="btn blue xs" onClick={sendReview} title="Review">⭐</button>
            {job.status==='Pending'&&<button className="btn success xs" onClick={()=>markPaid(job)}>✓ Paid</button>}
            {job.customerPhone&&<button className="btn secondary xs" onClick={()=>window.open('tel:'+job.customerPhone)}>📞</button>}
            {/* CHANGE #6 — delete via onDelete */}
            <button className="btn danger xs" onClick={()=>handleDelete(job.id)}>×</button>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div className="screen"><div className="page">
      <div className="field" style={{marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search name, phone, city, tire size…" style={{width:'100%',border:'1.5px solid #e3e3e3',borderRadius:12,padding:'12px 14px',outline:'none',fontSize:15}}/>
      </div>
      <div className="chip-row" style={{marginBottom:10}}>
        {['All','Repair','Replacement','Pending',...cities].slice(0,9).map(c=>(
          <button key={c} className={`chip ${filter===c?'active':''}`} onClick={()=>setFilter(c)}>{c}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className={`chip ${view==='weeks'?'active':''}`} onClick={()=>setView('weeks')}>By Week</button>
        <button className={`chip ${view==='list'?'active':''}`} onClick={()=>setView('list')}>All Jobs</button>
        <span style={{marginLeft:'auto',fontFamily:'"IBM Plex Mono",monospace',fontSize:12,color:'#999',alignSelf:'center'}}>{filtered.length} job{filtered.length!==1?'s':''}</span>
      </div>
      {filtered.length===0?(<EmptyState icon="📋" title="No jobs found" sub={search?'Try a different search.':'No jobs match this filter.'}/>):
      view==='weeks'?(
        weekGroups.map(([wk,wkJobs])=>{const t=weekSummary(wkJobs,settings);return(<div key={wk} style={{marginBottom:20}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}}><div><div style={{fontWeight:700,fontSize:13}}>{weekLabel(wk)}</div><div className="sub">{wkJobs.length} jobs · {money(t.revenue)} rev · {money(t.grossProfit)} gross</div></div><div style={{textAlign:'right'}}><div className={`value ${t.net>=0?'green':'red'}`}>{money(t.net)}</div><div className="sub">net</div></div></div><div className="stack">{wkJobs.map(job=><JobRow key={job.id} job={job}/>)}</div></div>);})
      ):(
        <div className="stack">{filtered.map(job=><JobRow key={job.id} job={job}/>)}</div>
      )}
    </div></div>
  );
}

// ── EXPENSES ───────────────────────────────────────────────────────────────────
// CHANGE #8 — fix JSX bug (missing braces around .map), add safety guards
function Expenses({expenses,setExpenses}){

  const add=()=>{const amt=Number(form.amount||0);if(!amt){alert('Enter an amount.');return;}setExpenses(prev=>[{...form,id:uid(),amount:amt},...prev]);setForm({date:TODAY(),category:'Fuel',amount:'',note:''});};
  const remove=id=>{if(!window.confirm('Delete?'))return;setExpenses(prev=>prev.filter(e=>e.id!==id));};
  const total=safeExp.reduce((s,e)=>s+Number(e.amount||0),0);
  const thisWeek=getWeekStart(TODAY());

        <div className="mini-box"><strong>{safeExp.length}</strong><span>Receipts</span></div>
        <div className="mini-box"><strong>{safeExp.length?money(total/safeExp.length):'—'}</strong><span>Avg</span></div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-pad">
          <div className="field-row"><div className="field" style={{marginBottom:8}}><label>Date</label><input type="date" value={form.date} onChange={e=>setF('date',e.target.value)}/></div><div className="field" style={{marginBottom:8}}><label>Amount ($)</label><input type="number" min="0" inputMode="decimal" value={form.amount} onChange={e=>setF('amount',e.target.value)} placeholder="0.00" style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700}}/></div></div>
          <div className="field" style={{marginBottom:8}}><label>Category</label><select value={form.category} onChange={e=>setF('category',e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="field" style={{marginBottom:10}}><label>Note (optional)</label><input value={form.note} onChange={e=>setF('note',e.target.value)} placeholder="BP station, etc."/></div>
          <button className="btn primary" style={{width:'100%'}} onClick={add}>+ Log Expense</button>
        </div>
      </div>
      {/* CHANGE #8 — fixed missing braces around map expression */}
      {safeExp.length===0?<EmptyState icon="🧾" title="No expenses logged" sub="Track fuel, supplies, repairs."/>:(
        <div className="stack">
          {[...safeExp].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(exp=>(
            <div className="job-row" key={exp.id}>
              <div className="job-icon" style={{fontSize:16}}>🧾</div>
              <div className="job-main">
                <div className="job-title">{exp.category}</div>
                <div className="job-meta">{exp.date}{exp.note?' · '+exp.note:''}</div>
              </div>
              <div className="job-right">
                <div className="value red">{money(exp.amount)}</div>
                <button className="btn danger sm" style={{marginTop:8}} onClick={()=>remove(exp.id)}>×</button>

          ))}
        </div>
      )}

  );
}

// ── PAYOUTS ────────────────────────────────────────────────────────────────────
// CHANGE #8 — safety guards for undefined jobs/settings
function Payouts({jobs,settings}){
  const safeJobs=Array.isArray(jobs)?jobs:[];
  const safeSettings=settings||DEFAULT_SETTINGS;
  const weeks=useMemo(()=>groupByWeek(safeJobs),[safeJobs]);
  if(!weeks.length)return<div className="screen"><div className="page"><EmptyState icon="💰" title="No payout history" sub="Log jobs to see weekly payout breakdowns."/></div></div>;
  return(
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Weekly Payouts</div>
      {weeks.map(([wk,weekJobs])=>{
        const safeWeekJobs=Array.isArray(weekJobs)?weekJobs:[];
        const t=weekSummary(safeWeekJobs,safeSettings);
        const ao1=safeSettings.owner1Active!==false,ao2=safeSettings.owner2Active!==false;
        const st=(ao1?Number(safeSettings.profitSplit1||50):0)+(ao2?Number(safeSettings.profitSplit2||50):0)||100;
        const o1=t.net>0&&ao1?r2(t.net*(Number(safeSettings.profitSplit1||50)/st)):0;
        const o2=t.net>0&&ao2?r2(t.net*(Number(safeSettings.profitSplit2||50)/st)):0;
        const tax=t.net>0&&safeSettings.taxRate>0?r2(t.net*(Number(safeSettings.taxRate)/100)):0;
        return(
          <div className="card" key={wk} style={{marginBottom:14}}>
            <div className="card-pad" style={{borderBottom:'1px solid #f0f0f0'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:700,fontSize:14}}>{weekLabel(wk)}</div><div className="sub">{safeWeekJobs.length} jobs</div></div><div className={`value big ${t.net>=0?'green':'red'}`}>{money(t.net)}</div></div></div>
            <div className="card-row"><div className="label">Revenue</div><div className="value">{money(t.revenue)}</div></div>
            <div className="card-row"><div className="label">Direct Costs</div><div className="value red">{money(t.directCosts)}</div></div>
            <div className="card-row"><div className="label">Gross Profit</div><div className="value">{money(t.grossProfit)}</div></div>
            <div className="card-row"><div className="label">Weekly Fixed</div><div className="value red">{money(t.fixed)}</div></div>
            {[{name:safeSettings.owner1Name||'Owner 1',pct:safeSettings.profitSplit1,amt:o1,active:ao1},{name:safeSettings.owner2Name||'Owner 2',pct:safeSettings.profitSplit2,amt:o2,active:ao2}].map((o,i)=>(
              <div key={i} className="card-row" style={{background:'#f9f9f9',opacity:o.active?1:0.4}}>
                <div><div style={{display:'flex',gap:6,alignItems:'center'}}><div className="label">{o.name}</div>{!o.active&&<span style={{fontSize:10,background:'#eee',color:'#999',borderRadius:4,padding:'1px 5px',fontWeight:700}}>OFF</span>}</div><div className="sub">{o.pct}% split</div></div>
                <div className={`value ${o.active&&o.amt>0?'green':''}`}>{o.active?money(o.amt):'—'}</div>
              </div>
            ))}
            {tax>0&&<div className="card-pad"><div className="tax-box" style={{marginTop:0}}><div className="tax-lbl">💰 Tax Reserve ({safeSettings.taxRate}%)</div><div className="tax-amt">{money(tax)}</div><div className="tax-hint">~{money(tax/2)} per owner</div></div></div>}
          </div>
        );
      })}
    </div></div>
  );
}

// ── INVENTORY ──────────────────────────────────────────────────────────────────
const LOW_STOCK=2;
function Inventory({inventory,setInventory}){
  const safeInv=Array.isArray(inventory)?inventory:[];
  const [search,setSearch]=useState('');
  const [editId,setEditId]=useState(null);
  const update=(id,patch)=>setInventory(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));
  const add=()=>{const id=uid();setInventory(prev=>[{id,size:'',qty:0,cost:0,notes:''},...prev]);setEditId(id);};
  const remove=id=>{if(!window.confirm('Remove?'))return;setInventory(prev=>prev.filter(i=>i.id!==id));setEditId(null);};
  const step=(id,delta)=>setInventory(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(0,(Number(i.qty)||0)+delta)}:i));
  const totalQty=safeInv.reduce((s,i)=>s+Number(i.qty||0),0);
  const totalValue=safeInv.reduce((s,i)=>s+Number(i.qty||0)*Number(i.cost||0),0);
  const lowStock=safeInv.filter(i=>Number(i.qty||0)>0&&Number(i.qty||0)<=LOW_STOCK);
  const outOfStock=safeInv.filter(i=>Number(i.qty||0)===0);
  const filtered=search.trim()?safeInv.filter(i=>(i.size||'').toLowerCase().includes(search.toLowerCase())):safeInv;
  const sorted=[...filtered].sort((a,b)=>(a.size||'').localeCompare(b.size||''));
  return(
    <div className="screen"><div className="page">
      <div className="kpi-grid three" style={{marginBottom:10}}>
        <div className="kpi"><div className="kpi-label">Total Tires</div><div className="kpi-value">{totalQty}</div><div className="kpi-sub">{safeInv.length} sizes</div></div>
        <div className="kpi"><div className="kpi-label">Stock Value</div><div className="kpi-value">{money(totalValue)}</div><div className="kpi-sub">at cost</div></div>
        <div className="kpi"><div className="kpi-label">Low Stock</div><div className={`kpi-value ${lowStock.length+outOfStock.length>0?'red':'green'}`}>{lowStock.length+outOfStock.length}</div><div className="kpi-sub">need reorder</div></div>
      </div>
      {outOfStock.length>0&&<div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:8}}><div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>🚫 Out of Stock ({outOfStock.length})</div><div style={{fontSize:12,color:'#b91c1c',lineHeight:1.8}}>{outOfStock.map(i=>i.size||'Unnamed').join(' · ')}</div></div>}
      {lowStock.length>0&&<div style={{background:'#fff8f8',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:8}}><div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>⚠️ Low Stock ({lowStock.length})</div><div style={{fontSize:12,color:'#b91c1c',lineHeight:1.8}}>{lowStock.map(i=>`${i.size} — ${i.qty}`).join(' · ')}</div></div>}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search tire size…" style={{flex:1,border:'1.5px solid #e3e3e3',borderRadius:12,padding:'11px 14px',fontSize:15,outline:'none',background:'#fff'}}/>
        <button className="btn primary" style={{flexShrink:0,padding:'11px 16px',fontSize:13}} onClick={add}>+ Add</button>
      </div>
      <div style={{fontSize:11,color:'#999',marginBottom:8,fontFamily:'"IBM Plex Mono",monospace'}}>{search?`${sorted.length} of ${safeInv.length} sizes`:`${safeInv.length} sizes · ${totalQty} tires`}</div>
      {sorted.length===0?(search?<EmptyState icon="🔍" title="No match" sub={`No sizes matching "${search}"`}/>:<EmptyState icon="🛞" title="No inventory" sub="Tap + Add to add a tire size."/>):(
        <div className="card">
          {sorted.map((item,idx)=>{
            const isEditing=editId===item.id;const qty=Number(item.qty||0);const isLow=qty>0&&qty<=LOW_STOCK;const isOut=qty===0;
            return(
              <div key={item.id} style={{borderBottom:idx<sorted.length-1?'1px solid #f2f2f2':'none'}}>
                <div style={{display:'flex',alignItems:'center',padding:'11px 14px',gap:10,cursor:'pointer'}} onClick={()=>setEditId(isEditing?null:item.id)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:'#111'}}>{item.size||<span style={{color:'#ccc'}}>No size</span>}</div>
                    {item.notes&&<div style={{fontSize:11,color:'#999',marginTop:1}}>{item.notes}</div>}
                    {item.cost>0&&<div style={{fontSize:11,color:'#aaa',marginTop:1}}>Cost: {money(item.cost)} · Value: {money(qty*item.cost)}</div>}
                  </div>
                  {isOut&&<span style={{fontSize:10,fontWeight:700,background:'#fee2e2',color:'#b91c1c',borderRadius:6,padding:'2px 7px'}}>OUT</span>}
                  {isLow&&!isOut&&<span style={{fontSize:10,fontWeight:700,background:'#ffedd5',color:'#c2410c',borderRadius:6,padding:'2px 7px'}}>LOW</span>}
                  <div style={{display:'flex',alignItems:'center',border:'1.5px solid #e3e3e3',borderRadius:10,overflow:'hidden',flexShrink:0}} onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>step(item.id,-1)} style={{background:'#f4f4f4',border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:'#555'}}>−</button>
                    <div style={{width:42,textAlign:'center',fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:isOut?'#dc2626':isLow?'#ea580c':'#111'}}>{qty}</div>
                    <button onClick={()=>step(item.id,1)} style={{background:'#f4f4f4',border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:'#555'}}>+</button>
                  </div>
                  <div style={{color:'#ccc',fontSize:12,flexShrink:0}}>{isEditing?'▲':'▼'}</div>
                </div>
                {isEditing&&(
                  <div style={{padding:'0 14px 14px',display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:8,alignItems:'center',background:'#fafafa'}}>
                    <input value={item.size} onChange={e=>update(item.id,{size:e.target.value})} placeholder="225/55R17" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:15,fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,outline:'none',width:'100%'}}/>
                    <input value={item.cost||''} type="number" min="0" onChange={e=>update(item.id,{cost:Number(e.target.value||0)})} placeholder="Cost $" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:14,outline:'none',width:'100%'}}/>
                    <button className="btn danger sm" onClick={()=>remove(item.id)}>Remove</button>
                    <input value={item.notes} onChange={e=>update(item.id,{notes:e.target.value})} placeholder="Notes" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:14,outline:'none',width:'100%',gridColumn:'1/3'}}/>
                    <button className="btn secondary sm" onClick={()=>setEditId(null)}>Done</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div></div>
  );
}

// ── SETTINGS ───────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,jobs,setJobs,inventory,expenses}){
  const upd=(k,v)=>setSettings(p=>({...p,[k]:v}));
  const updExp=(id,patch)=>setSettings(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...patch}:e)}));
  const addExp=()=>setSettings(p=>({...p,expenses:[...p.expenses,{id:uid(),name:'New Expense',amount:0,active:true}]}));
  const delExp=id=>setSettings(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
  const exportData=()=>{const d={jobs,settings,inventory,expenses,exportedAt:new Date().toISOString(),version:'3'};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`wheel-rush-backup-${TODAY()}.json`;a.click();URL.revokeObjectURL(url);};
  const importData=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const data=JSON.parse(await file.text());if(Array.isArray(data.jobs))setJobs(data.jobs);if(data.settings&&typeof data.settings==='object')setSettings({...DEFAULT_SETTINGS,...data.settings});alert('Import complete.');}catch{alert('Could not import — must be a Wheel Rush backup.');}};inp.click();};
  const clearAll=()=>{if(!window.confirm('Clear ALL data? Cannot be undone.'))return;Object.values(KEYS).forEach(k=>localStorage.removeItem(k));window.location.reload();};
  const monthly=monthlyFixed(settings),weekly=weeklyFixed(settings);
  const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
  const splitTotal=(ao1?Number(settings.profitSplit1||0):0)+(ao2?Number(settings.profitSplit2||0):0);
  return(
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Owners & Split</div>
      <div className="card">
        {[{nk:'owner1Name',pk:'profitSplit1',ak:'owner1Active',lbl:'Owner 1'},{nk:'owner2Name',pk:'profitSplit2',ak:'owner2Active',lbl:'Owner 2'}].map(({nk,pk,ak,lbl})=>{
          const active=settings[ak]!==false;
          return(<div key={nk} style={{opacity:active?1:0.55}}>
            <div className="settings-row" style={{alignItems:'flex-start'}}>
              <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><div className="label">{lbl}</div><button onClick={()=>upd(ak,!active)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700,cursor:'pointer',background:active?'#111':'#e5e7eb',color:active?'#fff':'#9ca3af'}}>{active?'● ON':'○ OFF'}</button></div><input className="settings-inp" style={{width:'100%'}} value={settings[nk]} onChange={e=>upd(nk,e.target.value)} disabled={!active}/></div>
              <div style={{flexShrink:0,marginLeft:12}}><div className="label" style={{marginBottom:6}}>Split %</div><input type="number" className="settings-inp" style={{width:80}} value={settings[pk]} onChange={e=>upd(pk,Number(e.target.value||0))} disabled={!active}/></div>
            </div>
          </div>);
        })}
        {ao1&&ao2&&splitTotal!==100&&<div className="card-pad" style={{color:'#dc2626',fontSize:12,fontWeight:600}}>⚠️ Splits must add to 100% (currently {splitTotal}%)</div>}
      </div>
      <div className="section-label">Goals & Tax</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Weekly Goal (Gross Profit)</div></div><input type="number" className="settings-inp" style={{width:110}} value={settings.weeklyGoal||''} onChange={e=>upd('weeklyGoal',e.target.value===''?'':Number(e.target.value))}/></div>
        <div className="settings-row"><div><div className="label">Tax Rate (%)</div></div><input type="number" className="settings-inp" style={{width:80}} value={settings.taxRate||''} onChange={e=>upd('taxRate',e.target.value===''?'':Number(e.target.value))}/></div>
      </div>
      <div className="section-label">Pricing & Decision</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Repair Target Profit ($)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.repairTarget||''} onChange={e=>upd('repairTarget',e.target.value===''?'':Number(e.target.value))}/></div>
        <div className="settings-row"><div><div className="label">Replacement Target Profit ($)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.replacementTarget||''} onChange={e=>upd('replacementTarget',e.target.value===''?'':Number(e.target.value))}/></div>
        <div className="settings-row"><div><div className="label">Too Low Below ($)</div><div className="sub">Profit below this = Too Low</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.skipThreshold||''} onChange={e=>upd('skipThreshold',e.target.value===''?'':Number(e.target.value))}/></div>
        <div className="settings-row"><div><div className="label">Risky Beyond (miles)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.riskyMiles||''} onChange={e=>upd('riskyMiles',e.target.value===''?'':Number(e.target.value))}/></div>
        <div className="settings-row"><div><div className="label">Cost Per Mile ($)</div></div><input type="number" step="0.01" className="settings-inp" style={{width:90}} value={settings.costPerMile||''} onChange={e=>upd('costPerMile',e.target.value===''?'':Number(e.target.value))}/></div>
      </div>
      <div className="section-label">Google Review Link</div>
      <div className="card"><div className="card-pad">
        <div className="label" style={{marginBottom:6}}>Your Google Review URL</div>
        <input className="settings-inp" style={{width:'100%'}} value={settings.googleReviewUrl||''} onChange={e=>upd('googleReviewUrl',e.target.value)} placeholder="https://g.page/r/…/review"/>
        <div className="sub" style={{marginTop:6,lineHeight:1.7}}>Google Business Profile → Get more reviews → Copy link</div>
        {(settings.googleReviewUrl||'').trim()&&<button className="btn success sm" style={{marginTop:10,width:'100%'}} onClick={()=>window.open(settings.googleReviewUrl,'_blank')}>✓ Test Link</button>}
      </div></div>
      <div className="section-label">Monthly Fixed Expenses</div>
      <div className="card">
        {(settings.expenses||[]).map(exp=>(<div className="expense-row" key={exp.id}><input value={exp.name} onChange={e=>updExp(exp.id,{name:e.target.value})} placeholder="Expense name"/><input type="number" value={exp.amount} onChange={e=>updExp(exp.id,{amount:Number(e.target.value||0)})} placeholder="0"/><button className={`btn sm ${exp.active?'success':'secondary'}`} onClick={()=>updExp(exp.id,{active:!exp.active})}>{exp.active?'On':'Off'}</button><button className="btn danger sm" onClick={()=>delExp(exp.id)}>×</button></div>))}
        <div className="card-row"><button className="btn secondary sm" onClick={addExp}>+ Add</button><div style={{textAlign:'right'}}><div className="value">{money(monthly)}/mo</div><div className="sub">{money(weekly)}/wk</div></div></div>
      </div>
      <div className="section-label">Data & Export</div>
      <div className="card">
        <div className="card-row"><div><div className="label">Export CSV</div><div className="sub">For QuickBooks / Excel</div></div><button className="btn secondary sm" onClick={()=>exportCSV(jobs,settings)}>CSV</button></div>
        <div className="card-row"><div><div className="label">Export Full Backup</div></div><button className="btn secondary sm" onClick={exportData}>JSON</button></div>
        <div className="card-row"><div><div className="label">Import Backup</div></div><button className="btn secondary sm" onClick={importData}>Import</button></div>
        <div className="card-row"><div><div className="label">Reset Everything</div><div className="sub" style={{color:'#dc2626'}}>Cannot be undone</div></div><button className="btn danger sm" onClick={clearAll}>Reset</button></div>
      </div>
      <div style={{padding:'8px 0 4px',textAlign:'center',fontSize:11,color:'#ccc'}}>Wheel Rush Business Tracker · v4 Enhanced · Firebase Sync</div>
    </div></div>
  );
}

// ── APP ROOT ───────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);const [authReady,setAuthReady]=useState(false);
  const [tab,setTab]=useState('dashboard');
  const [jobs,setJobs]=useState(()=>migrateOldJobs());
  const [settings,setSettings]=useState(()=>({...DEFAULT_SETTINGS,...load(KEYS.settings,{})}));
  const [inventory,setInventory]=useState(()=>migrateOldInventory()||DEFAULT_INVENTORY);
  const [expenses,setExpenses]=useState(()=>load(KEYS.expenses,[]));
  const [prefill,setPrefill]=useState(null);
  // CHANGE #7 — editJob state
  const [editJob,setEditJob]=useState(null);
  const [sync,setSync]=useState('local');

  // Single init effect — polls until _auth AND _db both ready
  useEffect(()=>{
    let authUnsub=null,cancelled=false;
    const giveUp=setTimeout(()=>{ if(cancelled)return; setAuthReady(true); },12000);
    const attachFirestore=u=>{
      if(!u||!_db)return;
      setSync('syncing');
      const u1=fbListen(jobCol(),docs=>{
        if(docs.length>0){
          const fbIds=new Set(docs.map(d=>String(d.id)));
          const localQueue=load('wr2-upload-queue',[]);
          const toUpload=localQueue.filter(j=>!fbIds.has(String(j.id)));
          if(toUpload.length>0){toUpload.forEach(j=>fbSet(jobCol(),j.id,j));persist('wr2-upload-queue',[]);}
          setJobs(docs);
        } else {
          const local=load(KEYS.jobs,[]);
          if(local.length>0){fbSetAll(jobCol(),local);persist('wr2-upload-queue',[]);}
          setJobs(local);
        }
        setSync('connected');
      });
      const u2=fbListen(invCol(),docs=>{
        if(docs.length>0){ setInventory(docs); }
        else{ const l=load(KEYS.inventory,[]); if(l.length>0)fbSetAll(invCol(),l); }
      });
      const u3=fbListen(expCol(),docs=>setExpenses(docs));
      const sDoc=settingDoc();
      if(sDoc){
        sDoc.get().then(snap=>{
          if(snap.exists){
            const saved=snap.data();
            setSettings(()=>({...DEFAULT_SETTINGS,...saved}));
            setTimeout(()=>{ settingsLoadedRef.current=true; },100);
          } else {
            const local=load(KEYS.settings,{});
            const toSave={...DEFAULT_SETTINGS,...local};
            sDoc.set(toSave).catch(()=>{});
            settingsLoadedRef.current=true;
          }
        }).catch(()=>{});
      }
    };
    const init=()=>{
      if(cancelled)return;
      if(!_auth||!_db){setTimeout(init,100);return;}
      clearTimeout(giveUp);
      authUnsub=_auth.onAuthStateChanged(u=>{
        if(cancelled)return;
        setUser(u||null);setAuthReady(true);
        attachFirestore(u);
        if(!u){ setSync('local'); settingsLoadedRef.current=true; }
      });
    };
    init();
    return()=>{ cancelled=true;clearTimeout(giveUp);if(authUnsub)authUnsub(); };
  },[]);

  const settingsLoadedRef=useRef(false);
  useEffect(()=>{
    persist(KEYS.settings,settings);
    if(!settingsLoadedRef.current)return;
    const t=setTimeout(()=>{const doc=settingDoc();if(user&&doc)doc.set(settings).catch(()=>{});},1000);
    return()=>clearTimeout(t);
  },[settings,user]);
  useEffect(()=>{ if(user&&_db)fbSetAll(invCol(),inventory); },[inventory,user]);

  // CHANGE #6 — deleteJob: removes from state, localStorage, AND Firebase
  const deleteJob=useCallback((id)=>{
    setJobs(prev=>{
      const next=prev.filter(j=>j.id!==id);
      persist(KEYS.jobs,next);
      return next;
    });
    if(user) fbDel(jobCol(),id);
    // Also remove from upload queue if it was queued
    const q=load('wr2-upload-queue',[]);
    if(q.some(j=>j.id===id)) persist('wr2-upload-queue',q.filter(j=>j.id!==id));
  },[user]);

  const saveJob=useCallback(async(job,andAdd)=>{
    const isRepl=/replacement|installation/i.test(job.service||'');
    if(isRepl&&job.tireSize){
      setInventory(prev=>prev.map(item=>{
        if(item.size.toLowerCase()===job.tireSize.toLowerCase()&&Number(item.qty||0)>0)
          return{...item,qty:Math.max(0,Number(item.qty||0)-Number(job.qty||1))};
        return item;
      }));
    }
    const entry={...job,id:job.id||uid()};
    setJobs(prev=>{const next=[entry,...prev.filter(j=>j.id!==entry.id)];persist(KEYS.jobs,next);return next;});
    if(user){ fbSet(jobCol(),entry.id,entry); }
    else{
      const q=load('wr2-upload-queue',[]);
      persist('wr2-upload-queue',[entry,...q.filter(j=>j.id!==entry.id)]);
    }
    // CHANGE #7 — clear edit state after saving
    setEditJob(null);
    if(!andAdd)setTab('dashboard');
  },[user]);

  // CHANGE #7 — handleEdit: for edit or mark-paid-only from History
  const handleEdit=useCallback((job)=>{
    if(job._markPaidOnly){
      // mark paid without entering edit form
      const updated={...job,status:'Completed'};
      delete updated._markPaidOnly;
      saveJob(updated,true);
      return;
    }
    setEditJob(job);
    setTab('add');
  },[saveJob]);

  const signOut=async()=>{try{await _auth.signOut();setUser(null);setSync('local');}catch{}};

  const NAV=[{id:'dashboard',ico:'📊',label:'Home'},{id:'add',ico:'＋',label:'Add'},{id:'history',ico:'📋',label:'History'},{id:'payouts',ico:'💰',label:'Payouts'},{id:'expenses',ico:'🧾',label:'Expenses'},{id:'inventory',ico:'🛞',label:'Stock'},{id:'settings',ico:'⚙️',label:'Settings'}];

  if(!authReady)return(<div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#111',flexDirection:'column',gap:14}}><div style={{fontSize:48}}>🛞</div><div style={{color:'#444',fontSize:13,fontFamily:'"IBM Plex Sans",sans-serif'}}>Loading…</div></div>);
  if(!user)return<AuthScreen onAuth={u=>setUser(u)}/>;

  return(
    <div className="app">
      <Header settings={settings} syncStatus={sync} onSignOut={signOut}/>
      {tab==='dashboard'&&<Dashboard jobs={jobs} varExpenses={expenses} settings={settings} setTab={setTab} onRepeat={j=>{setPrefill(j);setTab('add');}}/>}
      {tab==='add'&&<AddJob
        onSave={saveJob}
        settings={settings}
        jobs={jobs}
        prefill={prefill}
        onClearPrefill={()=>setPrefill(null)}
        editJob={editJob}
        onClearEdit={()=>setEditJob(null)}
      />}
      {tab==='history'&&<History
        jobs={jobs}
        settings={settings}
        onRepeat={j=>{setPrefill(j);setTab('add');}}
        onDelete={deleteJob}
        onEdit={handleEdit}
      />}
      {tab==='payouts'&&<Payouts jobs={jobs} settings={settings}/>}
      {tab==='expenses'&&<Expenses expenses={expenses} setExpenses={e=>{setExpenses(e);if(user)e.forEach(x=>fbSet(expCol(),x.id,x));}}/>}
      {tab==='inventory'&&<Inventory inventory={inventory} setInventory={setInventory}/>}
      {tab==='settings'&&<Settings settings={settings} setSettings={setSettings} jobs={jobs} setJobs={setJobs} inventory={inventory} expenses={expenses}/>}
      <nav className="bottom-nav">
        {NAV.map(({id,ico,label})=>(<button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>setTab(id)}><span className="ico">{ico}</span>{label}</button>))}
      </nav>
    </div>
  );
}


class AppErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:32,background:'#111',minHeight:'100vh',color:'#fff',fontFamily:'"IBM Plex Sans",sans-serif'}}>
          <div style={{fontSize:20,fontWeight:700,marginBottom:8,color:'#ef4444'}}>⚠️ App Error</div>
          <div style={{fontSize:13,color:'#888',marginBottom:16}}>Please screenshot this and report it:</div>
          <pre style={{fontSize:11,background:'#1a1a1a',padding:14,borderRadius:8,overflow:'auto',color:'#f87171',lineHeight:1.6}}>
            {this.state.error.toString()}
          </pre>
          <button onClick={()=>window.location.reload()} style={{marginTop:20,background:'#fff',color:'#111',border:'none',borderRadius:8,padding:'12px 20px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
            Reload App
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>

</body>
</html>
