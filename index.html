  const [search,setSearch]=useState('');const [editId,setEditId]=useState(null);
  const pendingRef=useRef([]);
  const top5=useMemo(()=>{const stats={};jobsArr.forEach(j=>{const s=(j.tireSize||'').trim();if(!s)return;if(!stats[s])stats[s]={size:s,jobs:0,qtySold:0,profit:0};stats[s].jobs+=1;stats[s].qtySold+=Number(j.qty||1);stats[s].profit+=jobGrossProfit(j,{costPerMile:0.65});});return Object.values(stats).sort((a,b)=>b.jobs!==a.jobs?b.jobs-a.jobs:b.profit-a.profit).slice(0,5);},[jobsArr]);
  const bestSellers=top5.map(t=>t.size);
  const fbWrite=(item)=>{if(!_db||!item.size.trim())return;fbSet(invCol(),item.id,{id:item.id,size:item.size,qty:item.qty,cost:item.cost,notes:item.notes});};
  const saveLocal=(next)=>{persist(KEYS.inventory,next);};
  const saveInv=(next,changedId,deleted)=>{saveLocal(next);if(!_db)return;if(deleted){fbDel(invCol(),deleted);pendingRef.current=pendingRef.current.filter(r=>r.id!==deleted);}else if(changedId){const item=next.find(i=>i.id===changedId);if(item&&item.size.trim()){fbWrite(item);pendingRef.current=pendingRef.current.filter(r=>r.id!==changedId);}}};
  const update=(id,patch)=>{setInventory(prev=>{const next=prev.map(i=>i.id===id?sanitizeInvItem({...i,...patch}):i);saveInv(next,id);const item=next.find(i=>i.id===id);if(item&&item.size.trim())pendingRef.current=pendingRef.current.filter(r=>r.id!==id);else pendingRef.current=pendingRef.current.map(r=>r.id===id?{...r,...patch}:r);return next;});};
  const add=()=>{const id=uid();const newItem={id,size:'',qty:0,cost:0,notes:''};pendingRef.current=[newItem,...pendingRef.current];setInventory(prev=>{const next=[newItem,...prev];saveLocal(next);return next;});setEditId(id);};
  const remove=id=>{if(!window.confirm('Remove?'))return;pendingRef.current=pendingRef.current.filter(r=>r.id!==id);setInventory(prev=>{const next=prev.filter(i=>i.id!==id);saveInv(next,null,id);return next;});setEditId(null);};
  const step=(id,delta)=>{setInventory(prev=>{const next=prev.map(i=>i.id===id?sanitizeInvItem({...i,qty:Math.max(0,(Number(i.qty)||0)+delta)}):i);saveInv(next,id);return next;});};
  const deduped=useMemo(()=>dedupeInventory(inv.filter(i=>i.size.trim())),[inv]);
  const totalQty=deduped.reduce((s,i)=>s+Number(i.qty||0),0);
  const totalValue=deduped.reduce((s,i)=>s+Number(i.qty||0)*Number(i.cost||0),0);
  const lowStock=deduped.filter(i=>Number(i.qty||0)>0&&Number(i.qty||0)<=LOW_STOCK);
  const outOfStock=deduped.filter(i=>Number(i.qty||0)===0);
  const filtered=search.trim()?inv.filter(i=>(i.size||'').toLowerCase().includes(search.toLowerCase())):inv;
  const sorted=[...filtered].sort((a,b)=>{const aBlank=!(a.size||'').trim(),bBlank=!(b.size||'').trim();if(aBlank&&!bBlank)return -1;if(!aBlank&&bBlank)return 1;const aBest=bestSellers.indexOf(a.size||''),bBest=bestSellers.indexOf(b.size||'');if(aBest!==-1&&bBest===-1)return -1;if(aBest===-1&&bBest!==-1)return 1;if(aBest!==-1&&bBest!==-1)return aBest-bBest;return(a.size||'').localeCompare(b.size||'');});
  return html`<div class="screen"><div class="page page-enter">
    <div class="kpi-grid three card-anim">
      <div class="kpi"><div class="kpi-label">Total Tires</div><div class="kpi-value">${totalQty}</div><div class="kpi-sub">${deduped.length} sizes</div></div>
      <div class="kpi"><div class="kpi-label">Stock Value</div><div class="kpi-value" style=${{fontSize:16}}>${money(totalValue)}</div><div class="kpi-sub">at cost</div></div>
      <div class="kpi"><div class="kpi-label">Attention</div><div class="kpi-value" style=${{fontSize:20,color:outOfStock.length>0?"var(--amber)":"var(--t3)"}}>${outOfStock.length+lowStock.length}</div><div class="kpi-sub">need reorder</div></div>
    </div>
    <div style=${{display:"flex",gap:8,marginBottom:12}}>
      <input value=${search} onChange=${e=>setSearch(e.target.value)} placeholder="Search by tire size…" style=${{flex:1,background:"var(--s2)",border:"1px solid var(--border)",borderRadius:12,padding:"13px 16px",fontSize:15,outline:"none",color:"var(--t1)"}}/>
      <button class="btn primary press-scale" style=${{flexShrink:0,padding:"13px 20px",fontSize:14,borderRadius:12}} onClick=${add}>+ Add</button>
    </div>
    ${sorted.length===0?html`<${EmptyState} icon="🛞" title="No inventory" sub="Tap + Add to add a tire size."/>`:html`<div class="card card-anim">
      ${sorted.map((item,idx)=>{const isEditing=editId===item.id;const qty=Number(item.qty||0);const isLow=qty>0&&qty<=LOW_STOCK,isOut=qty===0;const isPending=!(item.size||'').trim();
        return html`<div key=${item.id} style=${{borderBottom:idx<sorted.length-1?"1px solid var(--border2)":"none"}}>
          <div style=${{display:"flex",alignItems:"center",padding:"14px 18px",gap:12,cursor:"pointer"}} onClick=${()=>setEditId(isEditing?null:item.id)}>
            <div style=${{flex:1,minWidth:0}}><div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700,fontSize:15,color:isPending?"var(--gold)":"var(--t1)",letterSpacing:"-.3px"}}>${isPending?html`<span style=${{fontSize:13,fontWeight:600}}>Enter size →</span>`:item.size}</div>${item.cost>0&&html`<div style=${{fontSize:11,color:"var(--t3)",marginTop:2}}>Cost ${money(item.cost)}</div>`}</div>
            ${bestSellers.includes(item.size||'')&&!isPending&&html`<span style=${{fontSize:9,fontWeight:800,background:"var(--gold-dim)",color:"var(--gold)",borderRadius:999,padding:"3px 10px"}}>BEST</span>`}
            ${isOut&&!isPending&&html`<span style=${{fontSize:9,fontWeight:800,color:"var(--t3)",background:"var(--s3)",borderRadius:999,padding:"3px 10px"}}>OUT</span>`}
            ${isLow&&!isOut&&html`<span style=${{fontSize:9,fontWeight:800,color:"var(--amber)",background:"var(--amber-dim)",borderRadius:999,padding:"3px 10px"}}>LOW</span>`}
            <div style=${{display:"flex",alignItems:"center",gap:0,background:"var(--s3)",borderRadius:10,overflow:"hidden",flexShrink:0}} onClick=${e=>e.stopPropagation()}>
              <button onClick=${()=>step(item.id,-1)} style=${{background:"none",border:"none",width:36,height:36,fontSize:18,fontWeight:700,color:"var(--t2)",lineHeight:1}}>−</button>
              <div style=${{width:32,textAlign:"center",fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700,fontSize:15,color:isOut?"var(--t3)":isLow?"var(--amber)":"var(--t1)"}}>${qty}</div>
              <button onClick=${()=>step(item.id,1)} style=${{background:"none",border:"none",width:36,height:36,fontSize:18,fontWeight:700,color:"var(--t2)",lineHeight:1}}>+</button>
            </div>
          </div>
          ${isEditing&&html`<div style=${{padding:"0 18px 16px",display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:10,alignItems:"end",background:"var(--s2)",borderTop:"1px solid var(--border2)",animation:"fadeSlideUp .2s ease"}}>
            <div><div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1px",color:"var(--t3)",marginBottom:6}}>Size</div><input autoFocus=${isPending} value=${item.size} onChange=${e=>update(item.id,{size:e.target.value})} placeholder="225/55R17" style=${{border:"1px solid var(--border)",borderRadius:10,padding:"11px 13px",fontSize:15,fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700,outline:"none",width:"100%",background:"var(--s1)",color:"var(--t1)"}}/></div>
            <div><div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1px",color:"var(--t3)",marginBottom:6}}>Cost ($)</div><input value=${item.cost||""} type="number" min="0" onChange=${e=>update(item.id,{cost:Number(e.target.value||0)})} placeholder="0" style=${{border:"1px solid var(--border)",borderRadius:10,padding:"11px 13px",fontSize:14,outline:"none",width:"100%",background:"var(--s1)",color:"var(--t1)"}}/></div>
            <button class="btn danger sm" style=${{alignSelf:"end",height:44}} onClick=${()=>remove(item.id)}>×</button>
          </div>`}
        </div>`;})}
    </div>`}
  </div></div>`;
}

// ── Settings (compact) ────────────────────────────────────────────────────────
function Settings({settings,setSettings,jobs,setJobs,inventory,setInventory,expenses,onResetInventory}) {
  const upd=(k,v)=>setSettings(p=>({...p,[k]:v}));
  const updExp=(id,patch)=>setSettings(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...patch}:e)}));
  const addExp=()=>setSettings(p=>({...p,expenses:[...p.expenses,{id:uid(),name:"New Expense",amount:0,active:true}]}));
  const delExp=id=>setSettings(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
  const exportCSV=()=>{const headers=["Date","Service","Area","Source","Revenue","Tire Cost","Misc Cost","Miles","Direct Cost","Gross Profit","Payment","Tire Size","Qty","Customer","Phone","Notes"];const rows=[...(jobs||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(j=>{const dc=jobDirectCost(j,settings),gp=jobGrossProfit(j,settings);return[j.date,j.service,j.area,j.source||"",Number(j.revenue||0).toFixed(2),Number(j.tireCost||0).toFixed(2),Number(j.miscCost||0).toFixed(2),Number(j.miles||0).toFixed(1),dc.toFixed(2),gp.toFixed(2),j.payment,j.tireSize||"",j.qty||1,j.customerName||"",j.customerPhone||"",(j.note||"").replace(/,/g," ")].map(v=>'"'+v+'"').join(",");});const csv=[headers.join(",")].concat(rows).join("\n");const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="wheel-rush-"+TODAY()+".csv";a.click();URL.revokeObjectURL(url);};
  const exportData=()=>{const d={jobs,settings,inventory,expenses,exportedAt:new Date().toISOString(),version:"6"};const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="wheel-rush-backup-"+TODAY()+".json";a.click();URL.revokeObjectURL(url);};
  const importData=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const data=JSON.parse(await file.text());if(Array.isArray(data.jobs))setJobs(data.jobs);if(data.settings&&typeof data.settings==="object")setSettings({...DEFAULT_SETTINGS,...data.settings});alert("Import complete.");}catch{alert("Could not import.");}};inp.click();};
  const resetInventory=()=>{if(!window.confirm("Reset inventory to 52-size list?"))return;const fresh=DEFAULT_INVENTORY.map(i=>({...i}));setInventory(fresh);persist(KEYS.inventory,fresh);if(onResetInventory)onResetInventory(fresh);alert("✅ Done!");};
  const clearAll=()=>{if(!window.confirm("Clear ALL data? Cannot be undone."))return;Object.values(KEYS).forEach(k=>localStorage.removeItem(k));window.location.reload();};
  const monthly=monthlyFixed(settings),weekly=weeklyFixed(settings);
  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label" style=${{marginTop:0}}>Owners & Split</div>
    <div class="card card-anim">
      ${[{nk:"owner1Name",pk:"profitSplit1",ak:"owner1Active",lbl:"Owner 1"},{nk:"owner2Name",pk:"profitSplit2",ak:"owner2Active",lbl:"Owner 2"}].map(({nk,pk,ak,lbl})=>{const active=settings[ak]!==false;return html`<div key=${nk} class="settings-row" style=${{opacity:active?1:0.55}}><div style=${{flex:1}}><div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div class="label">${lbl}</div><button onClick=${()=>upd(ak,!active)} style=${{border:"none",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",background:active?"var(--t1)":"var(--s3)",color:active?"var(--bg)":"var(--t3)"}}>${active?"ON":"OFF"}</button></div><input class="settings-inp" style=${{width:"100%"}} value=${settings[nk]} onChange=${e=>upd(nk,e.target.value)} disabled=${!active}/></div><div style=${{flexShrink:0,marginLeft:12}}><div class="label" style=${{marginBottom:6}}>Split %</div><input type="number" class="settings-inp" style=${{width:80}} value=${settings[pk]} onChange=${e=>upd(pk,Number(e.target.value||0))} disabled=${!active}/></div></div>`;})}
    </div>
    <div class="section-label">Goals & Pricing</div>
    <div class="card card-anim">
      <div class="settings-row"><div class="label">Weekly Goal</div><input type="number" class="settings-inp" style=${{width:110}} value=${settings.weeklyGoal||""} onChange=${e=>upd("weeklyGoal",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Tax Rate %</div><input type="number" class="settings-inp" style=${{width:80}} value=${settings.taxRate||""} onChange=${e=>upd("taxRate",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Repair Target $</div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.repairTarget||""} onChange=${e=>upd("repairTarget",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Replacement Target $</div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.replacementTarget||""} onChange=${e=>upd("replacementTarget",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Cost Per Mile $</div><input type="number" step="0.01" class="settings-inp" style=${{width:90}} value=${settings.costPerMile||""} onChange=${e=>upd("costPerMile",Number(e.target.value||0))}/></div>
    </div>
    <div class="section-label">Google Review Link</div>
    <div class="card card-anim"><div class="card-pad"><input class="settings-inp" style=${{width:"100%"}} value=${settings.googleReviewUrl||""} onChange=${e=>upd("googleReviewUrl",e.target.value)} placeholder="https://g.page/r/…/review"/></div></div>
    <div class="section-label">Monthly Fixed Expenses</div>
    <div class="card card-anim">
      ${(settings.expenses||[]).map(exp=>html`<div class="expense-row" key=${exp.id}><input value=${exp.name} onChange=${e=>updExp(exp.id,{name:e.target.value})}/><input type="number" value=${exp.amount} onChange=${e=>updExp(exp.id,{amount:Number(e.target.value||0)})}/><button class=${"btn sm "+(exp.active?"success":"secondary")} onClick=${()=>updExp(exp.id,{active:!exp.active})}>${exp.active?"On":"Off"}</button><button class="btn danger sm" onClick=${()=>delExp(exp.id)}>×</button></div>`)}
      <div class="card-row"><button class="btn secondary sm press-scale" onClick=${addExp}>+ Add</button><div style=${{textAlign:"right"}}><div class="value">${money(monthly)}/mo</div><div class="sub">${money(weekly)}/wk</div></div></div>
    </div>
    <div class="section-label">Data</div>
    <div class="card card-anim">
      <div class="card-row"><div class="label">Export CSV</div><button class="btn secondary sm press-scale" onClick=${exportCSV}>CSV</button></div>
      <div class="card-row"><div class="label">Full Backup</div><button class="btn secondary sm press-scale" onClick=${exportData}>JSON</button></div>
      <div class="card-row"><div class="label">Import</div><button class="btn secondary sm press-scale" onClick=${importData}>Import</button></div>
      <div class="card-row"><div class="label">Reset Inventory</div><button class="btn orange sm press-scale" onClick=${resetInventory}>Reset</button></div>
      <div class="card-row"><div class="label" style=${{color:"var(--red)"}}>Reset Everything</div><button class="btn danger sm" onClick=${clearAll}>Reset</button></div>
    </div>
    <div style=${{padding:"8px 0 4px",textAlign:"center",fontSize:11,color:"var(--t3)"}}>Wheel Rush Pro v10 · Firebase Sync</div>
  </div></div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// ═══ ROOT APP COMPONENT ═════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  // ── Auth state ───────────────────────────────────────────────────────────
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [syncStatus,setSyncStatus]=useState("local");

  // ── Core data state ──────────────────────────────────────────────────────
  const [jobs,setJobs]=useState(()=>load(KEYS.jobs,[]));
  const [settings,setSettings]=useState(()=>({...DEFAULT_SETTINGS,...load(KEYS.settings,{})}));
  const [inventory,setInventory]=useState(()=>load(KEYS.inventory,DEFAULT_INVENTORY.map(i=>({...i}))));
  const [expenses,setExpenses]=useState(()=>load(KEYS.expenses,[]));

  // ── UI state ─────────────────────────────────────────────────────────────
  const [tab,setTab]=useState("dashboard");
  const [saving,setSaving]=useState(false);
  const [prefill,setPrefill]=useState(null);
  const [editJob,setEditJob]=useState(null);

  // ── Refs for Firebase listeners ──────────────────────────────────────────
  const unsubJobs=useRef(null);
  const unsubInv=useRef(null);
  const unsubExp=useRef(null);
  const unsubSettings=useRef(null);
  const pendingRef=useRef([]);

  // ── Auth listener ────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!_auth)return setAuthReady(true);
    const unsub=_auth.onAuthStateChanged(u=>{setUser(u||null);setAuthReady(true);});
    return ()=>unsub();
  },[]);

  // ── Firebase listeners (when user is logged in) ──────────────────────────
  useEffect(()=>{
    if(!user){
      setSyncStatus("local");
      [unsubJobs,unsubInv,unsubExp,unsubSettings].forEach(r=>{if(r.current){r.current();r.current=null;}});
      return;
    }
    setSyncStatus("syncing");

    // Jobs listener
    unsubJobs.current=fbListen(jobCol(),docs=>{
      setJobs(docs);persist(KEYS.jobs,docs);setSyncStatus("connected");
    });

    // Inventory listener
    unsubInv.current=fbListen(invCol(),docs=>{
      if(docs.length>0){
        const pending=pendingRef.current||[];
        const merged=[...docs];
        pending.forEach(p=>{if(!merged.find(m=>m.id===p.id))merged.push(p);});
        const deduped=dedupeInventory(merged);
        setInventory(deduped);persist(KEYS.inventory,deduped);
      }
    });

    // Expenses listener
    unsubExp.current=fbListen(expCol(),docs=>{
      setExpenses(docs);persist(KEYS.expenses,docs);
    });

    // Settings listener
    if(settingDoc()){
      unsubSettings.current=settingDoc().onSnapshot(snap=>{
        if(snap.exists){
          const d=snap.data();
          setSettings(prev=>{const merged={...DEFAULT_SETTINGS,...prev,...d};persist(KEYS.settings,merged);return merged;});
        }
      },()=>{});
    }

    return ()=>{
      [unsubJobs,unsubInv,unsubExp,unsubSettings].forEach(r=>{if(r.current){r.current();r.current=null;}});
    };
  },[user]);

  // ── Persist settings on change ───────────────────────────────────────────
  useEffect(()=>{
    persist(KEYS.settings,settings);
    if(user&&settingDoc()){
      const t=setTimeout(()=>{
        const clean={};Object.keys(settings).forEach(k=>{const v=settings[k];if(Array.isArray(v))clean[k]=JSON.stringify(v);else if(v!==null&&v!==undefined)clean[k]=v;});
        settingDoc().set(clean).catch(()=>{});
      },1000);
      return ()=>clearTimeout(t);
    }
  },[settings,user]);

  // ── Persist jobs locally (offline fallback) ──────────────────────────────
  useEffect(()=>{persist(KEYS.jobs,jobs);},[jobs]);
  useEffect(()=>{persist(KEYS.inventory,inventory);},[inventory]);

  // ── Save job handler ─────────────────────────────────────────────────────
  const saveJob=useCallback(async(job,addAnother)=>{
    setSaving(true);
    try{
      const id=job.id||uid();
      const full={...job,id};
      // Update recent sizes
      if(full.tireSize){const sizes=load(KEYS.sizes,[]);const updated=[full.tireSize,...sizes.filter(s=>s!==full.tireSize)].slice(0,12);persist(KEYS.sizes,updated);}
      // Update recent cities
      if(full.area){const cities=load(KEYS.cities,[]);const updated=[full.area,...cities.filter(c=>c!==full.area)].slice(0,12);persist(KEYS.cities,updated);}
      // Deduct inventory
      if(/replacement|installation/i.test(full.service)&&full.tireSize){
        const qty=Number(full.qty||1);
        setInventory(prev=>{
          const next=prev.map(i=>i.size===full.tireSize?{...i,qty:Math.max(0,(Number(i.qty)||0)-qty)}:i);
          persist(KEYS.inventory,next);
          if(user)next.forEach(x=>fbSet(invCol(),x.id,{id:x.id,size:x.size||"",qty:Number(x.qty||0),cost:Number(x.cost||0),notes:x.notes||""}));
          return next;
        });
      }
      // Save to state + Firebase
      setJobs(prev=>{
        const exists=prev.find(j=>j.id===id);
        const next=exists?prev.map(j=>j.id===id?full:j):[full,...prev];
        persist(KEYS.jobs,next);
        return next;
      });
      if(user){
        await fbSet(jobCol(),id,{
          id,date:String(full.date||""),service:String(full.service||""),area:String(full.area||""),
          source:String(full.source||""),payment:String(full.payment||""),status:String(full.status||"Completed"),
          customerName:String(full.customerName||""),customerPhone:String(full.customerPhone||""),
          tireSize:String(full.tireSize||""),qty:Number(full.qty||1),
          revenue:Number(full.revenue||0),tireCost:Number(full.tireCost||0),
          miscCost:Number(full.miscCost||0),miles:Number(full.miles||0),
          note:String(full.note||""),
          emergency:!!full.emergency,lateNight:!!full.lateNight,
          highway:!!full.highway,weekend:!!full.weekend
        });
      }
      if(!addAnother){setTab("dashboard");setEditJob(null);}
    }catch(e){console.warn("saveJob:",e);}
    finally{setSaving(false);}
  },[user]);

  // ── Expense wrapper (BUG 3+5+6 FIX) ─────────────────────────────────────
  const handleSetExpenses=useCallback(updater=>{
    setExpenses(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      persist(KEYS.expenses,next);
      if(user){
        const nextIds=new Set(next.map(x=>x.id));
        // Delete removed expenses from Firebase
        prev.forEach(x=>{if(!nextIds.has(x.id))fbDel(expCol(),x.id);});
        // Upsert current expenses
        next.forEach(x=>fbSet(expCol(),x.id,{
          id:String(x.id||""),date:String(x.date||""),
          category:String(x.category||""),amount:Number(x.amount||0),
          note:String(x.note||"")
        }));
      }
      return next;
    });
  },[user]);

  // ── Inventory save handler ───────────────────────────────────────────────
  const handleSetInventory=useCallback(updater=>{
    setInventory(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      persist(KEYS.inventory,next);
      if(user)next.forEach(x=>fbSet(invCol(),x.id,{id:x.id,size:x.size||"",qty:Number(x.qty||0),cost:Number(x.cost||0),notes:x.notes||""}));
      return next;
    });
  },[user]);

  // ── Reset inventory (for Settings) ───────────────────────────────────────
  const resetInventoryFb=useCallback(fresh=>{
    pendingRef.current=[];
    if(user&&invCol()){fresh.forEach(x=>fbSet(invCol(),x.id,{id:x.id,size:x.size||"",qty:Number(x.qty||0),cost:Number(x.cost||0),notes:x.notes||""}));}
  },[user]);

  // ── Repeat / edit job helper ─────────────────────────────────────────────
  const handleRepeat=useCallback(job=>{setPrefill(job);setTab("add");},[]);
  const handleEdit=useCallback(job=>{setEditJob(job);setTab("add");},[]);
  const handleStartJob=useCallback(qqForm=>{setPrefill({...EMPTY_JOB(),...qqForm});setTab("add");},[]);

  // ── Sign out ─────────────────────────────────────────────────────────────
  const signOut=useCallback(()=>{if(_auth)_auth.signOut().then(()=>{setUser(null);setSyncStatus("local");}).catch(()=>{});},[]);

  // ── Delete job ───────────────────────────────────────────────────────────
  const deleteJob=useCallback(id=>{
    setJobs(prev=>{const next=prev.filter(j=>j.id!==id);persist(KEYS.jobs,next);return next;});
    if(user)fbDel(jobCol(),id);
  },[user]);

  // ── Mark job status ──────────────────────────────────────────────────────
  const markJob=useCallback((id,status)=>{
    setJobs(prev=>{
      const next=prev.map(j=>j.id===id?{...j,status}:j);
      persist(KEYS.jobs,next);
      const job=next.find(j=>j.id===id);
      if(user&&job)fbSet(jobCol(),id,{...job,status});
      return next;
    });
  },[user]);

  // ── Loading state ────────────────────────────────────────────────────────
  if(!authReady)return html`<div style=${{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
    <div class="shimmer-text" style=${{fontSize:24,fontWeight:700}}>Wheel Rush</div>
  </div>`;

  // ── Auth screen ──────────────────────────────────────────────────────────
  if(!user)return html`<${AuthScreen} onAuth=${u=>setUser(u)}/>`;

  // ── Tab routing ──────────────────────────────────────────────────────────
  const TABS=[
    {id:"dashboard",icon:"⚡",label:"Home"},
    {id:"add",icon:"＋",label:"Add"},
    {id:"history",icon:"📋",label:"Jobs"},
    {id:"payouts",icon:"💰",label:"Pay"},
    {id:"expenses",icon:"📊",label:"Costs"},
    {id:"inventory",icon:"🛞",label:"Stock"},
    {id:"settings",icon:"⚙️",label:"Setup"},
  ];

  let content=null;
  switch(tab){
    case "dashboard":
      content=html`<${Dashboard} jobs=${jobs} settings=${settings} setTab=${setTab} onRepeat=${handleRepeat} inventory=${inventory} onStartJob=${handleStartJob}/>`;
      break;
    case "add":
      content=html`<${AddJob} onSave=${saveJob} settings=${settings} jobs=${jobs} prefill=${prefill} onClearPrefill=${()=>setPrefill(null)} editJob=${editJob} onClearEdit=${()=>setEditJob(null)} saving=${saving}/>`;
      break;
    case "history":
      content=html`<${History} jobs=${jobs} settings=${settings} onEdit=${handleEdit} onDelete=${deleteJob} onRepeat=${handleRepeat}/>`;
      break;
    case "payouts":
      content=html`<${Payouts} jobs=${jobs} settings=${settings}/>`;
      break;
    case "expenses":
      content=html`<${Expenses} expenses=${expenses} setExpenses=${handleSetExpenses}/>`;
      break;
    case "inventory":
      content=html`<${Inventory} inventory=${inventory} setInventory=${handleSetInventory} jobs=${jobs}/>`;
      break;
    case "settings":
      content=html`<${Settings} settings=${settings} setSettings=${setSettings} jobs=${jobs} setJobs=${setJobs} inventory=${inventory} setInventory=${handleSetInventory} expenses=${expenses} onResetInventory=${resetInventoryFb}/>`;
      break;
  }

  return html`<div style=${{display:"flex",flexDirection:"column",height:"100vh",background:"var(--bg)",overflow:"hidden"}}>
    <${Header} syncStatus=${syncStatus} onSignOut=${signOut}/>
    <div style=${{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch"}}>${content}</div>
    <nav class="bottom-nav">
      ${TABS.map(t=>html`<button key=${t.id} class=${"nav-btn"+(tab===t.id?" active":"")} data-id=${t.id} onClick=${()=>setTab(t.id)}>
        ${t.id==="dashboard"?html`<img src=${LOGO_SRC} alt="" class="nav-logo-ico" style=${{width:22,height:22,objectFit:"contain",borderRadius:5,opacity:tab==="dashboard"?1:0.5,transition:"opacity .15s"}} onError=${e=>{e.target.style.display="none"}}/>`:html`<span class="ico">${t.icon}</span>`}
        <span>${t.label}</span>
      </button>`)}
    </nav>
  </div>`;
}

// ── Mount ────────────────────────────────────────────────────────────────────
ReactDOM.render(html`<${App}/>`, document.getElementById("root"));
</script>
</body>
</html>
