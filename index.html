<script type="text/babel">

const load    = (k, fb) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; } };
const persist = (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

function migrateOldJobs() {
  const OLD = ['wr-jobs-v5','wr-upgraded-jobs-v1','wr2-jobs-v1','wheelrush_jobs'];
  const cur = load(KEYS.jobs, []); const ids = new Set(cur.map(j=>String(j.id))); let mg=[...cur],cnt=0;
  OLD.forEach(k=>{ try{ const o=load(k,[]); if(Array.isArray(o)) o.forEach(j=>{ if(!ids.has(String(j.id))){ mg.push({...j,id:String(j.id||Date.now()),source:j.source||'Google Search',tireCost:j.tireCost||j.cost||0,miscCost:j.miscCost||0}); ids.add(String(j.id)); cnt++; }}); }catch{} });
  if(cnt>0){persist(KEYS.jobs,mg);} return mg;
}
function migrateOldInventory() {
  const OLD=['wr-tires-v1','wr-upgraded-inventory-v1','wr2-inventory-v1'];

// ── Business logic ─────────────────────────────────────────────────────────────
const jobDirectCost  = (j,s)=>r2(Number(j.miles||0)*Number(s.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.miscCost||0));
const jobGrossProfit = (j,s)=>r2(Number(j.revenue||0)-jobDirectCost(j,s));
const weeklyFixed    = s=>r2((s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0)*12/52);
const monthlyFixed   = s=>(s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0);
function premiums(j){let p=0;if(j.emergency)p+=20;if(j.lateNight)p+=20;if(j.highway)p+=15;if(j.weekend)p+=10;if(Number(j.miles||0)>25)p+=20;return p;}
function suggestedPrice(j,s){const direct=jobDirectCost(j,s);const isRepl=/replacement|installation/i.test(j.service||'');const target=isRepl?Number(s.replacementTarget||110):Number(s.repairTarget||90);return Math.ceil((direct+target+premiums(j))/5)*5;}
function jobDecision(j,s,weekGP=0){
  const rev=Number(j.revenue||0)||suggestedPrice(j,s);
  const profit=r2(rev-jobDirectCost(j,s));
  const skip=Number(s.skipThreshold||70);
  const miles=Number(j.miles||0);
  const goal=Number(s.weeklyGoal||1200);
  const goalPct=goal>0?weekGP/goal:0;
  if(profit<skip)return{label:'Skip — Too Low',cls:'low',reason:`Profit ${money(profit)} below min ${money(skip)}`};
  if(goalPct>=1.0&&miles>Number(s.riskyMiles||25))return{label:'Skip — Goal Hit',cls:'low',reason:`Already at goal — skip the distance`};
  if(miles>Number(s.riskyMiles||25)){const adj=goalPct<0.5?skip-15:skip;if(profit<adj+30)return{label:'Risky',cls:'okay',reason:`${miles} mi + thin margin`};}
  if(profit>=skip+40)return{label:'Strong — Take It',cls:'strong',reason:`${money(profit)} profit`};
  return{label:'Okay — Take It',cls:'okay',reason:`Profit ${money(profit)}`};
}
function weekSummary(weekJobs,s){const revenue=r2(weekJobs.reduce((t,j)=>t+Number(j.revenue||0),0));const directCosts=r2(weekJobs.reduce((t,j)=>t+jobDirectCost(j,s),0));const grossProfit=r2(revenue-directCosts);const fixed=weeklyFixed(s);const net=r2(grossProfit-fixed);return{revenue,directCosts,grossProfit,fixed,net,jobCount:weekJobs.length};}
function getWeekStart(d){const dt=new Date(d+'T00:00:00'),day=dt.getDay();dt.setDate(dt.getDate()-(day>=5?day-5:day+2));return dt.toISOString().slice(0,10);}
function weekLabel(s){const d=new Date(s+'T00:00:00'),e=new Date(d);e.setDate(e.getDate()+6);const f=dt=>dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});return`${f(d)} – ${f(e)}`;}
function nextFriday(){const d=new Date(),diff=d.getDay()===5?7:(5-d.getDay()+7)%7;d.setDate(d.getDate()+diff);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function groupByWeek(jobs){const map={};[...jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).forEach(j=>{const k=getWeekStart(j.date);if(!map[k])map[k]=[];map[k].push(j);});return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));}

function exportCSV(jobs,settings){
  const headers=['Date','Service','Area','Source','Revenue','Tire Cost','Misc Cost','Miles','Direct Cost','Gross Profit','Payment','Tire Size','Qty','Customer','Phone','Notes'];
  const rows=[...jobs].sort((a,b)=>a.date.localeCompare(b.date)).map(j=>{const dc=jobDirectCost(j,settings);const gp=jobGrossProfit(j,settings);return[j.date,j.service,j.area,j.source||'',Number(j.revenue||0).toFixed(2),Number(j.tireCost||0).toFixed(2),Number(j.miscCost||0).toFixed(2),Number(j.miles||0).toFixed(1),dc.toFixed(2),gp.toFixed(2),j.payment,j.tireSize||'',j.qty||1,j.customerName||'',j.customerPhone||'',(j.note||'').replace(/,/g,' ')].map(v=>`"${v}"`).join(',');});
  const csv=[headers.join(','),...rows].join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`wheel-rush-${TODAY()}.csv`;a.click();URL.revokeObjectURL(url);
}

// ── QUICK QUOTE ENGINE ─────────────────────────────────────────────────────────
function QuickQuote({form, settings, weekGross}) {
  const directCost = jobDirectCost(form, settings);
  const suggested  = suggestedPrice(form, settings);
  const entered    = Number(form.revenue||0);
  const priceToUse = entered || suggested;
  const profit     = r2(priceToUse - directCost);
  const dec        = jobDecision({...form, revenue:priceToUse}, settings, weekGross);
  const isRepl     = /replacement|installation/i.test(form.service||'');
  const minPrice   = Math.ceil((directCost + (isRepl?95:80) + premiums(form))/5)*5;
  const maxPrice   = Math.ceil((directCost + (isRepl?130:105) + premiums(form))/5)*5;
  const prem       = premiums(form);

  return (
    <div className="quote-box">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.7px',color:'#555',marginBottom:3}}>Quick Quote</div>
          <div style={{fontSize:11,color:'#444'}}>{isRepl?'Replacement':'Repair'} · target ${isRepl?'100–120':'85–100'} profit</div>
        </div>
        <div className={`dec-badge ${dec.cls}`}>{dec.label}</div>
      </div>

      {/* Price range */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
        {[['Min',minPrice,'#555'],['Suggested',suggested,'#4ade80'],['Premium',maxPrice,'#fb923c']].map(([l,v,c])=>(
          <div key={l} style={{background:'rgba(255,255,255,.06)',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#666',marginBottom:4}}>{l}</div>
            <div style={{fontFamily:'"IBM Plex Mono",monospace',fontSize:17,fontWeight:700,color:c}}>{money(v)}</div>
          </div>
        ))}
      </div>

      {/* Breakdown */}
      <div className="quote-row"><span style={{color:'#666'}}>Direct Cost</span><span style={{color:'#888',fontFamily:'"IBM Plex Mono",monospace'}}>{money(directCost)}</span></div>
      {prem>0 && <div className="quote-row"><span style={{color:'#666'}}>Surcharges</span><span style={{color:'#fb923c',fontFamily:'"IBM Plex Mono",monospace'}}>+{money(prem)}</span></div>}
      <div className="quote-row">
        <span style={{color:profit>=60?'#4ade80':'#ef4444',fontWeight:700}}>Est. Profit {entered?'(entered)':'(suggested)'}</span>
        <span style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,color:profit>=60?'#4ade80':'#ef4444'}}>{money(profit)}</span>
      </div>
      <div style={{fontSize:10,color:'#333',marginTop:6,lineHeight:1.7}}>{dec.reason}</div>
    </div>
  );
}

        <div className="mini-box"><strong>{replaces.length}</strong><span>Replacements</span></div>
        <div className="mini-box"><strong>{money(repairs.length?repairs.reduce((s,j)=>s+jobGrossProfit(j,settings),0)/repairs.length:0)}</strong><span>Avg Repair</span></div>
        <div className="mini-box"><strong>{money(replaces.length?replaces.reduce((s,j)=>s+jobGrossProfit(j,settings),0)/replaces.length:0)}</strong><span>Avg Replace</span></div>
      </div>
      {topCities.length>0&&(<><div className="section-label">Top Areas</div><div className="card">{topCities.map(([city,profit])=>(<div className="card-row" key={city}><div className="label">{city}</div><div className="value">{money(profit)}</div></div>))}</div></>)}
      <div className="section-label">Recent Jobs</div>
      {recent.length>0?(
        <div className="stack">{recent.map(job=>{const profit=jobGrossProfit(job,settings);return(<div className="job-row" key={job.id} style={{cursor:'pointer'}} onClick={()=>onRepeat(job)}><div className="job-icon">🛞</div><div className="job-main"><div className="job-title">{job.service} · {job.area}</div><div className="job-meta">{job.date} · {job.tireSize||'No size'} · {job.source||'—'}</div></div><div className="job-right"><div className="value">{money(job.revenue)}</div><div className={`sub ${profit>=0?'green':'red'}`} style={{fontWeight:700}}>{money(profit)}</div></div></div>);})}</div>
      ):(
        <EmptyState icon="🛞" title="No jobs yet" sub="Add your first job." action={<button className="btn primary" onClick={()=>setTab('add')}>Add First Job</button>}/>
      )}
    </div></div>
  );
}

// ── ADD JOB ────────────────────────────────────────────────────────────────────
function AddJob({onSave,settings,jobs,prefill,onClearPrefill}){
  const [form,setForm]=useState(EMPTY_JOB);
  const [error,setError]=useState('');
  const [saved,setSaved]=useState(null);
  const [tick,setTick]=useState(0);
  const recentSizes=useMemo(()=>[...new Set([...load(KEYS.sizes,[]),...DEFAULT_TIRE_SIZES])].slice(0,8),[tick]);
  const weekGross=useMemo(()=>{const tw=getWeekStart(TODAY());return jobs.filter(j=>getWeekStart(j.date)===tw).reduce((s,j)=>s+jobGrossProfit(j,settings),0);},[jobs,settings]);
  const lastJob=useMemo(()=>[...jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))[0]||null,[jobs]);

  useEffect(()=>{
    if(prefill){
      setForm({...EMPTY_JOB(),service:prefill.service||'Tire Repair',area:prefill.area||'Miami',payment:prefill.payment||'Cash',source:prefill.source||'Google Search',tireSize:prefill.tireSize||'',qty:prefill.qty||1,tireCost:prefill.tireCost||'',miscCost:prefill.miscCost||'',miles:prefill.miles||'',emergency:!!prefill.emergency,lateNight:!!prefill.lateNight,highway:!!prefill.highway,weekend:!!prefill.weekend,customerName:prefill.customerName||'',customerPhone:prefill.customerPhone||''});
      if(onClearPrefill)onClearPrefill();
    }
  },[prefill]);

  const setF=(k,v)=>{setForm(p=>({...p,[k]:v}));setError('');};

  const useLastJob=()=>{
    if(!lastJob)return;
    setForm({...EMPTY_JOB(),service:lastJob.service,area:lastJob.area,payment:lastJob.payment,source:lastJob.source,tireSize:lastJob.tireSize,tireCost:lastJob.tireCost,miscCost:lastJob.miscCost,miles:lastJob.miles,emergency:lastJob.emergency,lateNight:lastJob.lateNight,highway:lastJob.highway,weekend:lastJob.weekend});
  };

  const saveJob=(andAdd=false)=>{
    const rev=Number(form.revenue||0);
    if(!rev){setError('Enter the job price.');return;}
    if(form.tireSize){try{const p=load(KEYS.sizes,[]);persist(KEYS.sizes,[form.tireSize,...p.filter(s=>s!==form.tireSize)].slice(0,10));}catch{}}
    const entry={...form,id:uid(),qty:Number(form.qty||1),revenue:r2(rev),tireCost:r2(form.tireCost),miscCost:r2(form.miscCost),miles:r2(form.miles)};
    onSave(entry,andAdd);
    setTick(t=>t+1);
    setSaved(entry);
    if(andAdd){setForm(EMPTY_JOB());setError('');setSaved(null);}
  };

  const requestReview=()=>{
    const url=(settings.googleReviewUrl||'').trim();
    if(!url){alert('Set your Google Review URL in Settings.');return;}
    const msg=encodeURIComponent('Hi'+(form.customerName?' '+form.customerName:'')+'! Thanks for choosing Wheel Rush today! We\'d really appreciate a quick Google review — it helps us grow! '+url);
    window.open(form.customerPhone?'sms:'+form.customerPhone+'?body='+msg:'sms:?body='+msg);
  };

  const FLAGS=[['emergency','🚨 Emergency',20],['lateNight','🌙 Late Night',20],['highway','🛣 Highway',15],['weekend','📅 Weekend',10]];

  return(
    <div className="screen" style={{paddingBottom:0}}>
      <div style={{padding:'14px 14px 0'}}>
        {/* Quick actions row */}
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          {lastJob&&<button type="button" className="btn secondary sm" onClick={useLastJob}>↩ Use Last Job</button>}
          {prefill&&<button type="button" className="btn orange sm">🔁 Repeating Job</button>}
          <button type="button" className="btn secondary sm" onClick={()=>setForm(EMPTY_JOB())}>✕ Clear</button>
        </div>

        {error&&<div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#b91c1c',marginBottom:14,fontWeight:600}}>{error}</div>}

        {/* Success strip */}
        {saved&&(
          <div className="success-strip">
            <div className="success-strip-title">✅ Job saved — {money(saved.revenue)} · {money(jobGrossProfit(saved,settings))} profit</div>
            {saved.customerPhone&&<button className="btn success sm" onClick={()=>window.open('tel:'+saved.customerPhone)}>📞 Call {saved.customerName||'Customer'}</button>}
            {saved.status==='Completed'&&<button className="btn success sm" onClick={requestReview}>⭐ Send Review</button>}
            <button className="btn secondary sm" onClick={()=>{setForm({...saved,id:''});setSaved(null);}}>🔁 Duplicate</button>
          </div>
        )}

        {/* Quick Quote Engine — always visible */}
        <QuickQuote form={form} settings={settings} weekGross={weekGross}/>

        {/* GROUP 1: Job basics */}
        <div className="form-group">
          <div className="form-group-title">Job Details</div>
          <div className="field"><label>Service</label>
            <select value={form.service} onChange={e=>setF('service',e.target.value)} style={{width:'100%',border:'1.5px solid #e3e3e3',background:'#fff',borderRadius:12,padding:'12px 14px',outline:'none',fontSize:16}}>
              {SERVICE_OPTIONS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="field-row">
            <div className="field"><label>Date</label><input type="date" value={form.date} onChange={e=>setF('date',e.target.value)}/></div>
            <div className="field"><label>Status</label><select value={form.status} onChange={e=>setF('status',e.target.value)}><option>Completed</option><option>Pending</option></select></div>
          </div>
          <div className="field"><label>Lead Source</label>
            <div className="src-grid">
              {SOURCE_QUICK.map(({label,icon})=>(
                <button key={label} type="button" className={`src-btn ${form.source===label?'active':''}`} onClick={()=>setF('source',label)}>
                  {icon} {label}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* GROUP 2: Location */}
        <div className="form-group">
          <div className="form-group-title">Location & Travel</div>
          <div className="field">
            <label>City / Area</label>
            <CityInput value={form.area} onChange={v=>setF('area',v)}/>
          </div>
          <div className="field"><label>Miles Driven</label>
            <input type="number" min="0" inputMode="decimal" value={form.miles} onChange={e=>setF('miles',e.target.value)} placeholder="0" style={{fontFamily:'"IBM Plex Mono",monospace'}}/>
          </div>
        </div>

        {/* GROUP 3: Pricing */}
        <div className="form-group">
          <div className="form-group-title">Pricing & Costs</div>
          <div className="field-row">
            <div className="field"><label>Job Price ($)</label>
              <input type="number" min="0" inputMode="decimal" value={form.revenue} onChange={e=>setF('revenue',e.target.value)} placeholder={String(suggestedPrice(form,settings))} style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:18,padding:'14px'}}/>
            </div>
            <div className="field"><label>Tire Cost ($)</label>
              <input type="number" min="0" inputMode="decimal" value={form.tireCost} onChange={e=>setF('tireCost',e.target.value)} placeholder="0" style={{fontFamily:'"IBM Plex Mono",monospace'}}/>
            </div>
          </div>
          <div className="field-row">
            <div className="field"><label>Misc Cost ($)</label>
              <input type="number" min="0" inputMode="decimal" value={form.miscCost} onChange={e=>setF('miscCost',e.target.value)} placeholder="plugs, stems…"/>
            </div>
            <div className="field"><label>Qty</label>
              <input type="number" min="1" value={form.qty} onChange={e=>setF('qty',e.target.value)}/>
            </div>
          </div>
          <div className="field">
            <label>Conditions <span style={{textTransform:'none',fontWeight:400,color:'#bbb'}}>— adds premium</span></label>
            <div className="chip-row">
              {FLAGS.map(([key,label,amt])=>(
                <button type="button" key={key} className={`chip ${form[key]?'active':''}`} onClick={()=>setF(key,!form[key])}>{label}{form[key]?` +$${amt}`:''}</button>
              ))}
            </div>
          </div>
        </div>

        {/* GROUP 4: Tire + payment */}
        <div className="form-group">
          <div className="form-group-title">Tire Size & Payment</div>
          <div className="field">
            <label>Tire Size</label>
            <input value={form.tireSize} onChange={e=>setF('tireSize',e.target.value)} placeholder="225/55R17"/>
            <div className="chip-row" style={{marginTop:8}}>
              {recentSizes.map(sz=><button type="button" key={sz} className={`chip sm ${form.tireSize===sz?'active':''}`} onClick={()=>setF('tireSize',sz)}>{sz}</button>)}
            </div>
          </div>
          <div className="field">
            <label>Payment Method</label>
            <div className="pay-grid">
              {PAYMENT_OPTIONS.map(({label,icon})=>(
                <button key={label} type="button" className={`pay-btn ${form.payment===label?'active':''}`} onClick={()=>setF('payment',label)}>
                  <span className="pay-icon">{icon}</span>{label}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* GROUP 5: Customer */}
        <div className="form-group">
          <div className="form-group-title">Customer (optional)</div>
          <div className="field-row">
            <div className="field"><label>Name</label><input value={form.customerName} onChange={e=>setF('customerName',e.target.value)} placeholder="Customer name"/></div>
            <div className="field"><label>Phone</label><input type="tel" value={form.customerPhone} onChange={e=>setF('customerPhone',e.target.value)} placeholder="(305)…"/></div>
          </div>
        </div>

        {/* Notes */}
        <div className="field"><label>Notes</label><textarea value={form.note} onChange={e=>setF('note',e.target.value)} placeholder="Parking garage, roadside, no spare, etc."/></div>
        <div className="inline-note">Direct cost = travel + tire + misc. Weekly fixed deducted at payout only.</div>
        {form.status==='Completed'&&<button className="btn blue" style={{width:'100%',marginBottom:10}} onClick={requestReview}>⭐ Send Review Request{form.customerPhone?' via SMS':' (no phone)'}</button>}
        <div style={{height:90}}/>
      </div>

      {/* Sticky save bar */}
      <div className="sticky-save">
        <button className="btn secondary" onClick={()=>saveJob(true)}>Save + Add Another</button>
        <button className="btn primary" onClick={()=>saveJob(false)}>Save Job →</button>
      </div>
    </div>
  );
}

// ── HISTORY ────────────────────────────────────────────────────────────────────
function History({jobs,settings,setJobs,onRepeat}){
  const [filter,setFilter]=useState('All');
  const [search,setSearch]=useState('');
  const [view,setView]=useState('weeks');
  const cities=useMemo(()=>Array.from(new Set(jobs.map(j=>j.area))),[jobs]);
  const filtered=useMemo(()=>{
    let j=jobs;
    if(filter==='Repair')j=j.filter(x=>/repair/i.test(x.service));
    else if(filter==='Replacement')j=j.filter(x=>/replacement|installation/i.test(x.service));
    else if(filter==='Pending')j=j.filter(x=>x.status==='Pending');
    else if(!['All'].includes(filter))j=j.filter(x=>x.area===filter);
    if(search.trim()){const q=search.toLowerCase();j=j.filter(x=>(x.customerName||'').toLowerCase().includes(q)||(x.customerPhone||'').includes(q)||(x.tireSize||'').toLowerCase().includes(q)||(x.area||'').toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));}
    return [...j].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },[jobs,filter,search]);
  const weekGroups=useMemo(()=>groupByWeek(filtered),[filtered]);
  const remove=id=>{if(!window.confirm('Delete this job?'))return;setJobs(prev=>prev.filter(j=>j.id!==id));};
  const markPaid=job=>{setJobs(prev=>prev.map(j=>j.id===job.id?{...j,status:'Completed'}:j));};
  const thisWeekGross=useMemo(()=>{const tw=getWeekStart(TODAY());return jobs.filter(j=>getWeekStart(j.date)===tw).reduce((s,j)=>s+jobGrossProfit(j,settings),0);},[jobs,settings]);

  const JobRow=({job})=>{
    const profit=jobGrossProfit(job,settings);
    const dec=jobDecision(job,settings,thisWeekGross);
    const sendReview=()=>{const u=(settings.googleReviewUrl||'').trim();if(!u){alert('Set Google Review URL in Settings.');return;}const msg=encodeURIComponent('Hi'+(job.customerName?' '+job.customerName:'')+'! Thanks for choosing Wheel Rush. We\'d love a quick Google review! '+u);window.open(job.customerPhone?'sms:'+job.customerPhone+'?body='+msg:'sms:?body='+msg);};
    return(
      <div className="job-row" key={job.id}>
        <div className="job-icon">🛞</div>
        <div className="job-main">
          <div className="job-title">{job.service} · {job.area}</div>
          <div className="job-meta">{job.date} · {job.tireSize||'No size'} · {job.payment}{job.source?` · ${job.source}`:''}</div>
          {(job.customerName||job.customerPhone)&&<div className="job-meta" style={{marginTop:2}}>👤 {job.customerName||''}{job.customerPhone?` · ${job.customerPhone}`:''}</div>}
          <div style={{marginTop:5,display:'flex',gap:6,flexWrap:'wrap'}}>
            <span className={`pill ${dec.cls==='strong'?'green':dec.cls==='okay'?'yellow':'red'}`}>{dec.label}</span>
            {job.emergency&&<span className="pill orange">🚨 Emergency</span>}
            {job.lateNight&&<span className="pill gray">🌙 Late Night</span>}
            {job.status==='Pending'&&<span className="pill orange">⏳ Pending</span>}
          </div>
        </div>
        <div className="job-right">
          <div className="value">{money(job.revenue)}</div>
          <div className={`sub ${profit>=0?'green':'red'}`} style={{fontWeight:700}}>{money(profit)}</div>
          <div style={{display:'flex',gap:5,marginTop:8,justifyContent:'flex-end',flexWrap:'wrap'}}>
            <button className="btn success xs" onClick={()=>onRepeat(job)} title="Repeat">🔁</button>
            <button className="btn blue xs" onClick={sendReview} title="Review">⭐</button>
            {job.status==='Pending'&&<button className="btn success xs" onClick={()=>markPaid(job)}>✓ Paid</button>}
            {job.customerPhone&&<button className="btn secondary xs" onClick={()=>window.open('tel:'+job.customerPhone)}>📞</button>}
            <button className="btn danger xs" onClick={()=>remove(job.id)}>×</button>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div className="screen"><div className="page">
      <div className="field" style={{marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search name, phone, city, tire size…" style={{width:'100%',border:'1.5px solid #e3e3e3',borderRadius:12,padding:'12px 14px',outline:'none',fontSize:15}}/>
      </div>
      <div className="chip-row" style={{marginBottom:10}}>
        {['All','Repair','Replacement','Pending',...cities].slice(0,9).map(c=>(
          <button key={c} className={`chip ${filter===c?'active':''}`} onClick={()=>setFilter(c)}>{c}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className={`chip ${view==='weeks'?'active':''}`} onClick={()=>setView('weeks')}>By Week</button>
        <button className={`chip ${view==='list'?'active':''}`} onClick={()=>setView('list')}>All Jobs</button>
        <span style={{marginLeft:'auto',fontFamily:'"IBM Plex Mono",monospace',fontSize:12,color:'#999',alignSelf:'center'}}>{filtered.length} job{filtered.length!==1?'s':''}</span>
      </div>
      {filtered.length===0?(<EmptyState icon="📋" title="No jobs found" sub={search?'Try a different search.':'No jobs match this filter.'}/>):
      view==='weeks'?(
        weekGroups.map(([wk,wkJobs])=>{const t=weekSummary(wkJobs,settings);return(<div key={wk} style={{marginBottom:20}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}}><div><div style={{fontWeight:700,fontSize:13}}>{weekLabel(wk)}</div><div className="sub">{wkJobs.length} jobs · {money(t.revenue)} rev · {money(t.grossProfit)} gross</div></div><div style={{textAlign:'right'}}><div className={`value ${t.net>=0?'green':'red'}`}>{money(t.net)}</div><div className="sub">net</div></div></div><div className="stack">{wkJobs.map(job=><JobRow key={job.id} job={job}/>)}</div></div>);})
      ):(
        <div className="stack">{filtered.map(job=><JobRow key={job.id} job={job}/>)}</div>
      )}
    </div></div>
  );
}

// ── EXPENSES ───────────────────────────────────────────────────────────────────
function Expenses({expenses,setExpenses}){
  const [form,setForm]=useState({date:TODAY(),category:'Fuel',amount:'',note:''});
  const CATS=['Fuel','Oil/Fluids','Equipment Repair','Supplies','Food','Tolls/Parking','Other'];
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const add=()=>{const amt=Number(form.amount||0);if(!amt){alert('Enter an amount.');return;}setExpenses(prev=>[{...form,id:uid(),amount:amt},...prev]);setForm({date:TODAY(),category:'Fuel',amount:'',note:''});};
  const remove=id=>{if(!window.confirm('Delete?'))return;setExpenses(prev=>prev.filter(e=>e.id!==id));};
  const total=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const thisWeek=getWeekStart(TODAY());
  const weekTotal=expenses.filter(e=>getWeekStart(e.date)===thisWeek).reduce((s,e)=>s+Number(e.amount||0),0);
  return(
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Variable Expenses</div>
      <div className="mini-grid" style={{marginBottom:14}}>
        <div className="mini-box"><strong>{money(weekTotal)}</strong><span>This Week</span></div>
        <div className="mini-box"><strong>{money(total)}</strong><span>All Time</span></div>
        <div className="mini-box"><strong>{expenses.length}</strong><span>Receipts</span></div>
        <div className="mini-box"><strong>{expenses.length?money(total/expenses.length):'—'}</strong><span>Avg</span></div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-pad">
          <div className="field-row"><div className="field" style={{marginBottom:8}}><label>Date</label><input type="date" value={form.date} onChange={e=>setF('date',e.target.value)}/></div><div className="field" style={{marginBottom:8}}><label>Amount ($)</label><input type="number" min="0" inputMode="decimal" value={form.amount} onChange={e=>setF('amount',e.target.value)} placeholder="0.00" style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700}}/></div></div>
          <div className="field" style={{marginBottom:8}}><label>Category</label><select value={form.category} onChange={e=>setF('category',e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="field" style={{marginBottom:10}}><label>Note (optional)</label><input value={form.note} onChange={e=>setF('note',e.target.value)} placeholder="BP station, etc."/></div>
          <button className="btn primary" style={{width:'100%'}} onClick={add}>+ Log Expense</button>
        </div>
      </div>
      {expenses.length===0?<EmptyState icon="🧾" title="No expenses logged" sub="Track fuel, supplies, repairs."/>:(
        <div className="stack">[...expenses].sort((a,b)=>b.date.localeCompare(a.date)).map(exp=>(
          <div className="job-row" key={exp.id}><div className="job-icon" style={{fontSize:16}}>🧾</div><div className="job-main"><div className="job-title">{exp.category}</div><div className="job-meta">{exp.date}{exp.note?' · '+exp.note:''}</div></div><div className="job-right"><div className="value red">{money(exp.amount)}</div><button className="btn danger sm" style={{marginTop:8}} onClick={()=>remove(exp.id)}>×</button></div></div>
        ))
      </div>)}
    </div></div>
  );
}

// ── PAYOUTS ────────────────────────────────────────────────────────────────────
function Payouts({jobs,settings}){
  const weeks=useMemo(()=>groupByWeek(jobs),[jobs]);
  if(!weeks.length)return<div className="screen"><div className="page"><EmptyState icon="💰" title="No payout history" sub="Log jobs to see weekly payout breakdowns."/></div></div>;
  return(
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Weekly Payouts</div>
      {weeks.map(([wk,weekJobs])=>{
        const t=weekSummary(weekJobs,settings);
        const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
        const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
        const o1=t.net>0&&ao1?r2(t.net*(Number(settings.profitSplit1||50)/st)):0;
        const o2=t.net>0&&ao2?r2(t.net*(Number(settings.profitSplit2||50)/st)):0;
        const tax=t.net>0&&settings.taxRate>0?r2(t.net*(Number(settings.taxRate)/100)):0;
        return(
          <div className="card" key={wk} style={{marginBottom:14}}>
            <div className="card-pad" style={{borderBottom:'1px solid #f0f0f0'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:700,fontSize:14}}>{weekLabel(wk)}</div><div className="sub">{weekJobs.length} jobs</div></div><div className={`value big ${t.net>=0?'green':'red'}`}>{money(t.net)}</div></div></div>
            <div className="card-row"><div className="label">Revenue</div><div className="value">{money(t.revenue)}</div></div>
            <div className="card-row"><div className="label">Direct Costs</div><div className="value red">{money(t.directCosts)}</div></div>
            <div className="card-row"><div className="label">Gross Profit</div><div className="value">{money(t.grossProfit)}</div></div>
            <div className="card-row"><div className="label">Weekly Fixed</div><div className="value red">{money(t.fixed)}</div></div>
            {[{name:settings.owner1Name,pct:settings.profitSplit1,amt:o1,active:ao1},{name:settings.owner2Name,pct:settings.profitSplit2,amt:o2,active:ao2}].map((o,i)=>(
              <div key={i} className="card-row" style={{background:'#f9f9f9',opacity:o.active?1:0.4}}>
                <div><div style={{display:'flex',gap:6,alignItems:'center'}}><div className="label">{o.name}</div>{!o.active&&<span style={{fontSize:10,background:'#eee',color:'#999',borderRadius:4,padding:'1px 5px',fontWeight:700}}>OFF</span>}</div><div className="sub">{o.pct}% split</div></div>
                <div className={`value ${o.active&&o.amt>0?'green':''}`}>{o.active?money(o.amt):'—'}</div>
              </div>
            ))}
            {tax>0&&<div className="card-pad"><div className="tax-box" style={{marginTop:0}}><div className="tax-lbl">💰 Tax Reserve ({settings.taxRate}%)</div><div className="tax-amt">{money(tax)}</div><div className="tax-hint">~{money(tax/2)} per owner</div></div></div>}
          </div>
        );
      })}
    </div></div>
  );
}

// ── INVENTORY ──────────────────────────────────────────────────────────────────
const LOW_STOCK=2;
function Inventory({inventory,setInventory}){
  const [search,setSearch]=useState('');
  const [editId,setEditId]=useState(null);
  const update=(id,patch)=>setInventory(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));
  const add=()=>{const id=uid();setInventory(prev=>[{id,size:'',qty:0,cost:0,notes:''},...prev]);setEditId(id);};
  const remove=id=>{if(!window.confirm('Remove?'))return;setInventory(prev=>prev.filter(i=>i.id!==id));setEditId(null);};
  const step=(id,delta)=>setInventory(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(0,(Number(i.qty)||0)+delta)}:i));
  const totalQty=inventory.reduce((s,i)=>s+Number(i.qty||0),0);
  const totalValue=inventory.reduce((s,i)=>s+Number(i.qty||0)*Number(i.cost||0),0);
  const lowStock=inventory.filter(i=>Number(i.qty||0)>0&&Number(i.qty||0)<=LOW_STOCK);
  const outOfStock=inventory.filter(i=>Number(i.qty||0)===0);
  const filtered=search.trim()?inventory.filter(i=>(i.size||'').toLowerCase().includes(search.toLowerCase())):inventory;
  const sorted=[...filtered].sort((a,b)=>(a.size||'').localeCompare(b.size||''));
  return(
    <div className="screen"><div className="page">
      <div className="kpi-grid three" style={{marginBottom:10}}>
        <div className="kpi"><div className="kpi-label">Total Tires</div><div className="kpi-value">{totalQty}</div><div className="kpi-sub">{inventory.length} sizes</div></div>
        <div className="kpi"><div className="kpi-label">Stock Value</div><div className="kpi-value">{money(totalValue)}</div><div className="kpi-sub">at cost</div></div>
        <div className="kpi"><div className="kpi-label">Low Stock</div><div className={`kpi-value ${lowStock.length+outOfStock.length>0?'red':'green'}`}>{lowStock.length+outOfStock.length}</div><div className="kpi-sub">need reorder</div></div>
      </div>
      {outOfStock.length>0&&<div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:8}}><div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>🚫 Out of Stock ({outOfStock.length})</div><div style={{fontSize:12,color:'#b91c1c',lineHeight:1.8}}>{outOfStock.map(i=>i.size||'Unnamed').join(' · ')}</div></div>}
      {lowStock.length>0&&<div style={{background:'#fff8f8',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:8}}><div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>⚠️ Low Stock ({lowStock.length})</div><div style={{fontSize:12,color:'#b91c1c',lineHeight:1.8}}>{lowStock.map(i=>`${i.size} — ${i.qty}`).join(' · ')}</div></div>}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search tire size…" style={{flex:1,border:'1.5px solid #e3e3e3',borderRadius:12,padding:'11px 14px',fontSize:15,outline:'none',background:'#fff'}}/>
        <button className="btn primary" style={{flexShrink:0,padding:'11px 16px',fontSize:13}} onClick={add}>+ Add</button>
      </div>
      <div style={{fontSize:11,color:'#999',marginBottom:8,fontFamily:'"IBM Plex Mono",monospace'}}>{search?`${sorted.length} of ${inventory.length} sizes`:`${inventory.length} sizes · ${totalQty} tires`}</div>
      {sorted.length===0?(search?<EmptyState icon="🔍" title="No match" sub={`No sizes matching "${search}"`}/>:<EmptyState icon="🛞" title="No inventory" sub="Tap + Add to add a tire size."/>):(
        <div className="card">
          {sorted.map((item,idx)=>{
            const isEditing=editId===item.id;const qty=Number(item.qty||0);const isLow=qty>0&&qty<=LOW_STOCK;const isOut=qty===0;
            return(
              <div key={item.id} style={{borderBottom:idx<sorted.length-1?'1px solid #f2f2f2':'none'}}>
                <div style={{display:'flex',alignItems:'center',padding:'11px 14px',gap:10,cursor:'pointer'}} onClick={()=>setEditId(isEditing?null:item.id)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:'#111'}}>{item.size||<span style={{color:'#ccc'}}>No size</span>}</div>
                    {item.notes&&<div style={{fontSize:11,color:'#999',marginTop:1}}>{item.notes}</div>}
                    {item.cost>0&&<div style={{fontSize:11,color:'#aaa',marginTop:1}}>Cost: {money(item.cost)} · Value: {money(qty*item.cost)}</div>}
                  </div>
                  {isOut&&<span style={{fontSize:10,fontWeight:700,background:'#fee2e2',color:'#b91c1c',borderRadius:6,padding:'2px 7px'}}>OUT</span>}
                  {isLow&&!isOut&&<span style={{fontSize:10,fontWeight:700,background:'#ffedd5',color:'#c2410c',borderRadius:6,padding:'2px 7px'}}>LOW</span>}
                  <div style={{display:'flex',alignItems:'center',border:'1.5px solid #e3e3e3',borderRadius:10,overflow:'hidden',flexShrink:0}} onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>step(item.id,-1)} style={{background:'#f4f4f4',border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:'#555'}}>−</button>
                    <div style={{width:42,textAlign:'center',fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:isOut?'#dc2626':isLow?'#ea580c':'#111'}}>{qty}</div>
                    <button onClick={()=>step(item.id,1)} style={{background:'#f4f4f4',border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:'#555'}}>+</button>
                  </div>
                  <div style={{color:'#ccc',fontSize:12,flexShrink:0}}>{isEditing?'▲':'▼'}</div>
                </div>
                {isEditing&&(
                  <div style={{padding:'0 14px 14px',display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:8,alignItems:'center',background:'#fafafa'}}>
                    <input value={item.size} onChange={e=>update(item.id,{size:e.target.value})} placeholder="225/55R17" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:15,fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,outline:'none',width:'100%'}}/>
                    <input value={item.cost||''} type="number" min="0" onChange={e=>update(item.id,{cost:Number(e.target.value||0)})} placeholder="Cost $" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:14,outline:'none',width:'100%'}}/>
                    <button className="btn danger sm" onClick={()=>remove(item.id)}>Remove</button>
                    <input value={item.notes} onChange={e=>update(item.id,{notes:e.target.value})} placeholder="Notes" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:14,outline:'none',width:'100%',gridColumn:'1/3'}}/>
                    <button className="btn secondary sm" onClick={()=>setEditId(null)}>Done</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div></div>
  );
}

// ── SETTINGS ───────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,jobs,setJobs,inventory,expenses}){
  const upd=(k,v)=>setSettings(p=>({...p,[k]:v}));
  const updExp=(id,patch)=>setSettings(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...patch}:e)}));
  const addExp=()=>setSettings(p=>({...p,expenses:[...p.expenses,{id:uid(),name:'New Expense',amount:0,active:true}]}));
  const delExp=id=>setSettings(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
  const exportData=()=>{const d={jobs,settings,inventory,expenses,exportedAt:new Date().toISOString(),version:'3'};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`wheel-rush-backup-${TODAY()}.json`;a.click();URL.revokeObjectURL(url);};
  const importData=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const data=JSON.parse(await file.text());if(Array.isArray(data.jobs))setJobs(data.jobs);if(data.settings&&typeof data.settings==='object')setSettings({...DEFAULT_SETTINGS,...data.settings});alert('Import complete.');}catch{alert('Could not import — must be a Wheel Rush backup.');}};inp.click();};
  const clearAll=()=>{if(!window.confirm('Clear ALL data? Cannot be undone.'))return;Object.values(KEYS).forEach(k=>localStorage.removeItem(k));window.location.reload();};
  const monthly=monthlyFixed(settings),weekly=weeklyFixed(settings);
  const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
  const splitTotal=(ao1?Number(settings.profitSplit1||0):0)+(ao2?Number(settings.profitSplit2||0):0);
  return(
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Owners & Split</div>
      <div className="card">
        {[{nk:'owner1Name',pk:'profitSplit1',ak:'owner1Active',lbl:'Owner 1'},{nk:'owner2Name',pk:'profitSplit2',ak:'owner2Active',lbl:'Owner 2'}].map(({nk,pk,ak,lbl})=>{
          const active=settings[ak]!==false;
          return(<div key={nk} style={{opacity:active?1:0.55}}>
            <div className="settings-row" style={{alignItems:'flex-start'}}>
              <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><div className="label">{lbl}</div><button onClick={()=>upd(ak,!active)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700,cursor:'pointer',background:active?'#111':'#e5e7eb',color:active?'#fff':'#9ca3af'}}>{active?'● ON':'○ OFF'}</button></div><input className="settings-inp" style={{width:'100%'}} value={settings[nk]} onChange={e=>upd(nk,e.target.value)} disabled={!active}/></div>
              <div style={{flexShrink:0,marginLeft:12}}><div className="label" style={{marginBottom:6}}>Split %</div><input type="number" className="settings-inp" style={{width:80}} value={settings[pk]} onChange={e=>upd(pk,Number(e.target.value||0))} disabled={!active}/></div>
            </div>
          </div>);
        })}
        {ao1&&ao2&&splitTotal!==100&&<div className="card-pad" style={{color:'#dc2626',fontSize:12,fontWeight:600}}>⚠️ Splits must add to 100% (currently {splitTotal}%)</div>}
      </div>
      <div className="section-label">Goals & Tax</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Weekly Goal (Gross Profit)</div></div><input type="number" className="settings-inp" style={{width:110}} value={settings.weeklyGoal} onChange={e=>upd('weeklyGoal',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Tax Rate (%)</div></div><input type="number" className="settings-inp" style={{width:80}} value={settings.taxRate} onChange={e=>upd('taxRate',Number(e.target.value||0))}/></div>
      </div>
      <div className="section-label">Pricing & Decision</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Repair Target Profit ($)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.repairTarget} onChange={e=>upd('repairTarget',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Replacement Target Profit ($)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.replacementTarget} onChange={e=>upd('replacementTarget',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Skip Below ($)</div><div className="sub">Profit below this = Skip</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.skipThreshold} onChange={e=>upd('skipThreshold',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Risky Beyond (miles)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.riskyMiles} onChange={e=>upd('riskyMiles',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Cost Per Mile ($)</div></div><input type="number" step="0.01" className="settings-inp" style={{width:90}} value={settings.costPerMile} onChange={e=>upd('costPerMile',Number(e.target.value||0))}/></div>
      </div>
      <div className="section-label">Google Review Link</div>
      <div className="card"><div className="card-pad">
        <div className="label" style={{marginBottom:6}}>Your Google Review URL</div>
        <input className="settings-inp" style={{width:'100%'}} value={settings.googleReviewUrl||''} onChange={e=>upd('googleReviewUrl',e.target.value)} placeholder="https://g.page/r/…/review"/>
        <div className="sub" style={{marginTop:6,lineHeight:1.7}}>Google Business Profile → Get more reviews → Copy link</div>
        {(settings.googleReviewUrl||'').trim()&&<button className="btn success sm" style={{marginTop:10,width:'100%'}} onClick={()=>window.open(settings.googleReviewUrl,'_blank')}>✓ Test Link</button>}
      </div></div>
      <div className="section-label">Monthly Fixed Expenses</div>
      <div className="card">
        {(settings.expenses||[]).map(exp=>(<div className="expense-row" key={exp.id}><input value={exp.name} onChange={e=>updExp(exp.id,{name:e.target.value})} placeholder="Expense name"/><input type="number" value={exp.amount} onChange={e=>updExp(exp.id,{amount:Number(e.target.value||0)})} placeholder="0"/><button className={`btn sm ${exp.active?'success':'secondary'}`} onClick={()=>updExp(exp.id,{active:!exp.active})}>{exp.active?'On':'Off'}</button><button className="btn danger sm" onClick={()=>delExp(exp.id)}>×</button></div>))}
        <div className="card-row"><button className="btn secondary sm" onClick={addExp}>+ Add</button><div style={{textAlign:'right'}}><div className="value">{money(monthly)}/mo</div><div className="sub">{money(weekly)}/wk</div></div></div>
      </div>
      <div className="section-label">Data & Export</div>
      <div className="card">
        <div className="card-row"><div><div className="label">Export CSV</div><div className="sub">For QuickBooks / Excel</div></div><button className="btn secondary sm" onClick={()=>exportCSV(jobs,settings)}>CSV</button></div>
        <div className="card-row"><div><div className="label">Export Full Backup</div></div><button className="btn secondary sm" onClick={exportData}>JSON</button></div>
        <div className="card-row"><div><div className="label">Import Backup</div></div><button className="btn secondary sm" onClick={importData}>Import</button></div>
        <div className="card-row"><div><div className="label">Reset Everything</div><div className="sub" style={{color:'#dc2626'}}>Cannot be undone</div></div><button className="btn danger sm" onClick={clearAll}>Reset</button></div>
      </div>
      <div style={{padding:'8px 0 4px',textAlign:'center',fontSize:11,color:'#ccc'}}>Wheel Rush Business Tracker · v4 Enhanced · Firebase Sync</div>
    </div></div>
  );
}

// ── APP ROOT ───────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);const [authReady,setAuthReady]=useState(false);
  const [tab,setTab]=useState('dashboard');
  const [jobs,setJobs]=useState(()=>migrateOldJobs());
  const [settings,setSettings]=useState(()=>({...DEFAULT_SETTINGS,...load(KEYS.settings,{})}));
  const [inventory,setInventory]=useState(()=>migrateOldInventory()||DEFAULT_INVENTORY);
  const [expenses,setExpenses]=useState(()=>load(KEYS.expenses,[]));
  const [prefill,setPrefill]=useState(null);
  const [sync,setSync]=useState('local');

  // Single init effect — polls until _auth AND _db both ready
  useEffect(()=>{
    let authUnsub=null,cancelled=false;
    const giveUp=setTimeout(()=>{ if(cancelled)return; setAuthReady(true); },12000);
    const teardown=()=>{ };
    const attachFirestore=u=>{
      if(!u||!_db)return;
      setSync('syncing');
      const u1=fbListen(jobCol(),docs=>{
        if(docs.length>0){
          const local=load(KEYS.jobs,[]);const fbIds=new Set(docs.map(d=>String(d.id)));
          const localOnly=local.filter(j=>!fbIds.has(String(j.id)));
          const merged=[...docs,...localOnly];
          setJobs(merged);persist(KEYS.jobs,merged);
          localOnly.forEach(j=>fbSet(jobCol(),j.id,j));
        } else {
          const local=load(KEYS.jobs,[]);
          if(local.length>0){fbSetAll(jobCol(),local);setJobs(local);}
        }
        setSync('connected');
      });
      const u2=fbListen(invCol(),docs=>{ if(docs.length>0){setInventory(docs);persist(KEYS.inventory,docs);}else{const l=load(KEYS.inventory,[]);if(l.length>0)fbSetAll(invCol(),l);} });
      const u3=fbListen(expCol(),docs=>{setExpenses(docs);persist(KEYS.expenses,docs);});
    };
    const init=()=>{
      if(cancelled)return;
      if(!_auth||!_db){setTimeout(init,100);return;}
      clearTimeout(giveUp);
      authUnsub=_auth.onAuthStateChanged(u=>{
        if(cancelled)return;
        setUser(u||null);setAuthReady(true);
        attachFirestore(u);
        if(!u)setSync('local');
      });
    };
    init();
    return()=>{ cancelled=true;clearTimeout(giveUp);if(authUnsub)authUnsub(); };
  },[]);

  useEffect(()=>persist(KEYS.settings,settings),[settings]);
  useEffect(()=>{ if(!user)persist(KEYS.jobs,jobs); },[jobs,user]);
  useEffect(()=>{ if(!user)persist(KEYS.inventory,inventory); },[inventory,user]);
  useEffect(()=>{ if(user&&_db)fbSetAll(invCol(),inventory); },[inventory,user]);

  const saveJob=useCallback(async(job,andAdd)=>{
    const isRepl=/replacement|installation/i.test(job.service||'');
    if(isRepl&&job.tireSize){
      setInventory(prev=>prev.map(item=>{
        if(item.size.toLowerCase()===job.tireSize.toLowerCase()&&Number(item.qty||0)>0)
          return{...item,qty:Math.max(0,Number(item.qty||0)-Number(job.qty||1))};
        return item;
      }));
    }
    const entry={...job,id:job.id||uid()};
    setJobs(prev=>{const next=[entry,...prev.filter(j=>j.id!==entry.id)];if(!user)persist(KEYS.jobs,next);return next;});
    if(user)fbSet(jobCol(),entry.id,entry);
    if(!andAdd)setTab('dashboard');
  },[user]);

  const signOut=async()=>{try{await _auth.signOut();setUser(null);setSync('local');}catch{}};

  const NAV=[{id:'dashboard',ico:'📊',label:'Home'},{id:'add',ico:'＋',label:'Add'},{id:'history',ico:'📋',label:'History'},{id:'payouts',ico:'💰',label:'Payouts'},{id:'expenses',ico:'🧾',label:'Expenses'},{id:'inventory',ico:'🛞',label:'Stock'},{id:'settings',ico:'⚙️',label:'Settings'}];

  if(!authReady)return(<div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#111',flexDirection:'column',gap:14}}><div style={{fontSize:48}}>🛞</div><div style={{color:'#444',fontSize:13,fontFamily:'"IBM Plex Sans",sans-serif'}}>Loading…</div></div>);
  if(!user)return<AuthScreen onAuth={u=>setUser(u)}/>;

  return(
    <div className="app">
      <Header settings={settings} syncStatus={sync} onSignOut={signOut}/>
      {tab==='dashboard'&&<Dashboard jobs={jobs} varExpenses={expenses} settings={settings} setTab={setTab} onRepeat={j=>{setPrefill(j);setTab('add');}}/>}
      {tab==='add'&&<AddJob onSave={saveJob} settings={settings} jobs={jobs} prefill={prefill} onClearPrefill={()=>setPrefill(null)}/>}
      {tab==='history'&&<History jobs={jobs} settings={settings} setJobs={j=>setJobs(j)} onRepeat={j=>{setPrefill(j);setTab('add');}}/>}
      {tab==='payouts'&&<Payouts jobs={jobs} settings={settings}/>}
      {tab==='expenses'&&<Expenses expenses={expenses} setExpenses={e=>{setExpenses(e);if(user)e.forEach(x=>fbSet(expCol(),x.id,x));}}/>}
      {tab==='inventory'&&<Inventory inventory={inventory} setInventory={setInventory}/>}
      {tab==='settings'&&<Settings settings={settings} setSettings={setSettings} jobs={jobs} setJobs={setJobs} inventory={inventory} expenses={expenses}/>}
      <nav className="bottom-nav">
        {NAV.map(({id,ico,label})=>(<button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>setTab(id)}><span className="ico">{ico}</span>{label}</button>))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
