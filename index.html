<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>Wheel Rush</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden;background:#09090E}
body{font-family:'DM Sans',sans-serif;color:#F0F0F8;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input,select,textarea{font-size:16px!important}
::-webkit-scrollbar{display:none}
select option{background:#171724;color:#F0F0F8}
::placeholder{color:#383855}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{padding:16px 16px 100px}
.card{background:#171724;border:1px solid #242438;border-radius:16px;margin-bottom:12px}
.cp{padding:16px}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #1E1E2E}
.row:last-child{border-bottom:none}
.sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#383855;margin:20px 0 8px}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;gap:4px}
.pill-orange{background:#F0720018;color:#F07200;border:1px solid #F0720030}
.pill-green{background:#1E9E6E18;color:#1E9E6E;border:1px solid #1E9E6E30}
.pill-red{background:#D9404018;color:#D94040;border:1px solid #D9404030}
.pill-amber{background:#E8A02018;color:#E8A020;border:1px solid #E8A02030}
.pill-navy{background:#193A5030;color:#4A8AB0;border:1px solid #4A8AB030}
.pill-gray{background:#242438;color:#7A7A9A}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:12px;font-weight:700;cursor:pointer;border:none;transition:opacity .1s,transform .08s;font-family:'DM Sans',sans-serif}
.btn:active{opacity:.8;transform:scale(.97)}
.btn-primary{background:#F07200;color:#fff;font-size:15px;padding:14px 24px}
.btn-ghost{background:#171724;border:1px solid #242438;color:#F0F0F8;font-size:14px;padding:11px 18px}
.btn-danger{background:#2A1212;border:1px solid #D9404044;color:#D94040;font-size:14px;padding:11px 18px}
.btn-success{background:#0F2A1E;border:1px solid #1E9E6E44;color:#1E9E6E;font-size:14px;padding:11px 18px}
.btn-navy{background:#193A50;color:#4A8AB0;border:1px solid #4A8AB030;font-size:14px;padding:11px 18px}
.btn-sm{font-size:12px;padding:7px 14px;border-radius:9px}
.btn-xs{font-size:11px;padding:5px 10px;border-radius:7px}
.btn-full{width:100%}
.finp{width:100%;background:#10101A;border:1px solid #242438;border-radius:11px;padding:12px 14px;color:#F0F0F8;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.finp:focus{border-color:#F07200}
textarea.finp{resize:none;min-height:70px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.chip{padding:7px 14px;background:#10101A;border:1px solid #242438;border-radius:999px;font-size:12px;font-weight:600;color:#7A7A9A;cursor:pointer;transition:all .12s;user-select:none;font-family:'DM Sans',sans-serif}
.chip.on{background:#F07200;border-color:#F07200;color:#fff}
.nav{display:flex;background:#10101A;border-top:1px solid #1E1E2E;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);position:relative;z-index:50}
.nbtn{flex:1;padding:10px 4px 6px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nbtn span{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));right:20px;width:54px;height:54px;border-radius:50%;background:#F07200;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px #F0720066;z-index:100}
.fab:active{transform:scale(.93)}
.sheet-bg{position:fixed;inset:0;background:#000B;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#10101A;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:94vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.sheet-title{font-size:18px;font-weight:800}
.xbtn{background:#1E1E2E;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:#7A7A9A;font-size:15px;display:flex;align-items:center;justify-content:center}
.field{margin-bottom:14px}
.flabel{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#7A7A9A;margin-bottom:6px}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mono{font-family:'JetBrains Mono',monospace;font-weight:500}
.hero{background:linear-gradient(135deg,#171724 0%,#0D1A24 100%);border:1px solid #242438;border-radius:20px;padding:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:#F0720008;border-radius:50%}
.empty{text-align:center;padding:60px 20px;color:#7A7A9A}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.4;display:block}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px;color:#F0F0F8}
.jrow{background:#171724;border:1px solid #242438;border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer}
.jrow:active{border-color:#F07200}
.kgrid{display:grid;gap:8px;margin-bottom:12px}
.k2{grid-template-columns:1fr 1fr}
.k3{grid-template-columns:1fr 1fr 1fr}
.kcard{background:#171724;border:1px solid #242438;border-radius:14px;padding:14px}
.kl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#383855;margin-bottom:4px}
.kv{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500}
.kv-lg{font-size:28px}
.klist{background:#171724;border:1px solid #242438;border-radius:14px;overflow:hidden;margin-bottom:8px;cursor:pointer}
.klist:active{border-color:#F07200}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.syncing{animation:pulse 1.4s infinite}
@media(max-width:360px){.fgrid2{grid-template-columns:1fr}.k3{grid-template-columns:1fr 1fr}}
</style>
</head>

let _app, _db, _auth;
function initFB() {
  try {
    if (typeof firebase === 'undefined' || !firebase.auth) { setTimeout(initFB, 100); return; }
    _app  = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(FB_CFG);
    _db   = firebase.firestore();
    _auth = firebase.auth();
  } catch(e) { setTimeout(initFB, 200); }
}
initFB();

// ── Firestore helpers ────────────────────────────────────────────────────────
const db = name => _db ? _db.collection(name) : null;
const COL = {
  customers: () => db('wr4_customers'),
  vehicles:  () => db('wr4_vehicles'),
  jobs:      () => db('wr4_jobs'),
  invoices:  () => db('wr4_invoices'),
  expenses:  () => db('wr4_expenses'),
  payouts:   () => db('wr4_payouts'),
  settings:  () => _db ? _db.collection('wr4_settings').doc('main') : null,
};

function listen(col, cb) {
  if (!col) { cb([]); return () => {}; }
  return col.orderBy('createdAt','desc')
    .onSnapshot(s => cb(s.docs.map(d => ({...d.data(), id: d.id}))), () => cb([]));
}
function listenDoc(ref, cb) {
  if (!ref) { cb(null); return () => {}; }
  return ref.onSnapshot(s => cb(s.exists ? s.data() : null), () => cb(null));
}
async function save(col, data) {
  if (!col) return;
  const id = data.id || (_db.collection('_').doc().id);
  await col.doc(id).set({...data, id, updatedAt: new Date().toISOString()});
  return id;
}
async function remove(col, id) {
  if (!col) return;
  await col.doc(id).delete();
}
</script>

// ── Job display logic ─────────────────────────────────────────────────────────
function jobDisplayStatus(job) {
  const ws = job.workStatus || 'scheduled';
  const ps = job.payStatus  || 'unpaid';
  if (ws === 'done' && ps === 'paid')    return { l:'Completed',       c:C.success, bg:C.successDim };
  if (ws === 'done' && ps !== 'paid')    return { l:'Pending Payment', c:C.warn,    bg:C.warnDim };
  if (ws === 'cancelled')                return { l:'Cancelled',       c:C.danger,  bg:C.dangerDim };
  const ws_obj = WORK_STATUSES.find(s=>s.v===ws);
  return { l: ws_obj?.l || ws, c: ws_obj?.c || C.muted, bg: (ws_obj?.c || C.muted)+'18' };
}
function isPaid(job)       { return job.payStatus === 'paid'; }
function isCompleted(job)  { return job.workStatus === 'done' && job.payStatus === 'paid'; }
function isPending(job)    { return job.workStatus === 'done' && job.payStatus !== 'paid'; }
function isActive(job)     { return job.workStatus !== 'done' && job.workStatus !== 'cancelled'; }

function jobProfit(job) {
  const rev  = Number(job.revenue || 0);
  const cost = Number(job.tireCost||0) + Number(job.materialCost||0) +
               Number(job.miscCost||0) + Number(job.labor||0) + gasCost(job);
  return r2(rev - cost);
}
function gasCost(job) {
  return r2((Number(job.miles||0) / 18) * 3.45);
}

// ── PRICING ENGINE ────────────────────────────────────────────────────────────
// Inputs: tireCost, materialCost, labor, miles, emergency, afterHours, highway,
//         difficulty. Targets: repair $85-100 GP, replacement $100-120 GP.
const PRICING_DEFAULTS = {
  mpg: 18, gasPrice: 3.45,
  emergencyFee: 35, afterHoursFee: 30, highwayFee: 25, difficultyFee: 20,
  repairMinGP: 85, repairMaxGP: 100,
  replaceMinGP: 100, replaceMaxGP: 120,
};

function isReplacement(service='') {
  return /replacement|install|mount|balance|rotation/i.test(service);
}

function calcPricing({service, tireCost=0, materialCost=0, labor=0, miles=0,
    emergency=false, afterHours=false, highway=false, difficulty=false,
    cfg=PRICING_DEFAULTS}) {

  const gasCostAmt = r2((Number(miles)||0) / cfg.mpg * cfg.gasPrice);
  const directCost = r2(Number(tireCost) + Number(materialCost) + gasCostAmt);

  // Surcharges (added on top of target profit)
  const surcharge = r2(
    (emergency  ? cfg.emergencyFee  : 0) +
    (afterHours ? cfg.afterHoursFee : 0) +
    (highway    ? cfg.highwayFee    : 0) +
    (difficulty ? cfg.difficultyFee : 0) +
    Number(labor||0)
  );

  const repl    = isReplacement(service);
  const minGP   = repl ? cfg.replaceMinGP   : cfg.repairMinGP;
  const maxGP   = repl ? cfg.replaceMaxGP   : cfg.repairMaxGP;
  const midGP   = r2((minGP + maxGP) / 2);

  const minPrice  = r2(Math.ceil((directCost + minGP + surcharge) / 5) * 5);
  const suggested = r2(Math.ceil((directCost + midGP + surcharge) / 5) * 5);
  const premium   = r2(Math.ceil((directCost + maxGP + surcharge) / 5) * 5);

  return {
    directCost, gasCostAmt, surcharge,
    minPrice, suggested, premium,
    minGP, maxGP,
  };
}

function PricingEngine({service, form, onSelectPrice, onClose}) {
  const [tireCost,    setTireCost]    = useState(String(form.tireCost||''));
  const [materialCost,setMaterialCost]= useState(String(form.materialCost||''));

  const [highway,     setHighway]     = useState(!!form.highway);
  const [difficulty,  setDifficulty]  = useState(false);

  const p = useMemo(()=>calcPricing({
    service, tireCost:Number(tireCost)||0, materialCost:Number(materialCost)||0,
    labor:Number(labor)||0, miles:Number(miles)||0,
    emergency, afterHours, highway, difficulty,

  return (
    <Sheet title="Pricing Engine" onClose={onClose}>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
        {isReplacement(service)?'Replacement':'Repair'} target: {money(p.minGP)}–{money(p.maxGP)} profit

      {/* Cost inputs */}
      <div className="fgrid2" style={{gap:10,marginBottom:14}}>

          <label className="flabel">Tire Cost $</label>

          ))}

      </div>

      {/* Cost breakdown */}
      <div style={{background:'#10101A',borderRadius:12,padding:'12px 14px',marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',
            color:C.subtle,marginBottom:8}}>Cost Breakdown</div>
        {[
          ['Direct Cost', p.directCost],
          ['Gas Est.', p.gasCostAmt],
          ['Surcharges', p.surcharge],
        ].map(([l,v])=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',
              borderBottom:`1px solid ${C.border}`}}>

        ))}

          color:C.muted,marginBottom:10}}>Select a Price</div>

        gp={r2(p.minPrice - p.directCost - p.surcharge)} highlight={false}/>

        gp={r2(p.suggested - p.directCost - p.surcharge)} highlight={true}/>
      <PriceCard label="Premium" price={p.premium}
        gp={r2(p.premium - p.directCost - p.surcharge)} highlight={false}/>
    </Sheet>
  );
}

const PAYMENT_METHODS = ['Cash','Zelle','Card','Cash App','Venmo','Check','Other'];

function buildInvoiceNumber() {
  const d = new Date();
  return `WR-${d.getFullYear().toString().slice(2)}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${Math.floor(Math.random()*900+100)}`;
}

function buildInvoice(job, customer, vehicle) {
  const tireCost  = Number(job.tireCost||0);
  const matCost   = Number(job.materialCost||0);
  const miscCost  = Number(job.miscCost||0);
  const labor     = Number(job.labor||0);
  const gasCostAmt= gasCost(job);
  const revenue   = Number(job.revenue||0);
  const subtotal  = r2(tireCost + matCost + miscCost + labor);
  const total     = revenue;
  const paid      = job.payStatus==='paid' ? revenue : Number(job.amountPaid||0);
  const balance   = r2(total - paid);

  const lineItems = [
    tireCost>0  && {desc:'Tire/Parts',    amt:tireCost},
    matCost>0   && {desc:'Materials',     amt:matCost},
    labor>0     && {desc:'Labor',         amt:labor},
    miscCost>0  && {desc:'Other Costs',   amt:miscCost},
    job.emergency   && {desc:'Emergency Service', amt:PRICING_DEFAULTS.emergencyFee},
    job.afterHours  && {desc:'After Hours',        amt:PRICING_DEFAULTS.afterHoursFee},
    job.highway     && {desc:'Highway/Roadside',   amt:PRICING_DEFAULTS.highwayFee},
  ].filter(Boolean);

  if(!lineItems.length) lineItems.push({desc:job.service, amt:revenue});

  return {
    invoiceNumber: buildInvoiceNumber(),
    date:    job.date || TODAY(),
    service: job.service,
    address: job.address,
    city:    job.city,
    lineItems,
    subtotal,
    total,
    paid,
    balance,
    paymentMethod: job.paymentMethod || '',
    customerName:  customer?.name  || job.customerName || '',
    customerPhone: customer?.phone || job.customerPhone || '',
    vehicle: vehicle ? `${vehicle.year||''} ${vehicle.make||''} ${vehicle.model||''}`.trim() : '',
    tireSize: vehicle?.tireSize || job.tireSize || '',
    notes: job.notes || '',
    jobId: job.id,
    status: job.payStatus==='paid' ? 'paid' : 'balance_due',
    createdAt: new Date().toISOString(),
  };
}

function InvoiceForm({job, customer, vehicle, existingInvoice, onSave, onClose}) {
  const [payMethod, setPayMethod] = useState(existingInvoice?.paymentMethod || job.paymentMethod || 'Cash');
  const [amtPaid,   setAmtPaid]   = useState(String(existingInvoice?.paid ?? (job.payStatus==='paid'?job.revenue:'')));
  const [saving,    setSaving]    = useState(false);

  const total = Number(job.revenue||0);
  const paid  = Number(amtPaid)||0;
  const bal   = r2(total - paid);

  const handleSave = async () => {
    setSaving(true);
    const inv = buildInvoice(
      {...job, paymentMethod:payMethod, amountPaid:paid},
      customer, vehicle
    );
    const merged = existingInvoice ? {...existingInvoice,...inv} : inv;
    await save(COL.invoices(), merged);

    // Update job with payment info
    await save(COL.jobs(), {
      ...job,
      paymentMethod: payMethod,
      amountPaid:    paid,
      payStatus:     bal<=0 ? 'paid' : paid>0 ? 'partial' : 'unpaid',
    });
    onSave(merged);
    setSaving(false);
  };

  return (
    <Sheet title="Generate Invoice" onClose={onClose}>
      <div style={{background:'#10101A',borderRadius:12,padding:'12px 14px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:13,color:C.muted}}>Service</span>
          <span style={{fontSize:13,fontWeight:600}}>{job.service}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:13,color:C.muted}}>Total</span>
          <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:18,fontWeight:500,color:C.orange}}>
            {money(total)}
          </span>
        </div>
      </div>

      <div className="field">
        <label className="flabel">Payment Method</label>
        <div className="chips">
          {PAYMENT_METHODS.map(m=>(
            <button key={m} className={`chip ${payMethod===m?'on':''}`}
              onClick={()=>setPayMethod(m)}>{m}</button>
          ))}
        </div>
      </div>

      <div className="field">
        <label className="flabel">Amount Paid $</label>
        <input className="finp mono" type="number" inputMode="decimal"
          value={amtPaid} onChange={e=>setAmtPaid(e.target.value)}
          placeholder={String(total)}
          style={{fontSize:22,fontWeight:500,padding:'14px'}}/>
        <div style={{fontSize:11,color:C.muted,marginTop:6,display:'flex',gap:16}}>
          <span>Total: {money(total)}</span>
          <span style={{color:bal<=0?C.success:C.warn}}>
            {bal<=0?'✓ Paid in Full':`Balance: ${money(bal)}`}
          </span>
        </div>
      </div>

      <button style={{width:'100%',background:'none',border:`1px solid ${C.border}`,
          borderRadius:10,padding:'9px',color:C.orange,fontWeight:700,fontSize:12,
          cursor:'pointer',marginBottom:14,fontFamily:'DM Sans,sans-serif'}}
        onClick={()=>setAmtPaid(String(total))}>
        Mark as Paid in Full ({money(total)})
      </button>

      <button className="btn btn-primary btn-full" onClick={handleSave} disabled={saving}>
        {saving ? '…' : 'Generate Invoice →'}
      </button>
    </Sheet>
  );
}

// ── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({onAuth}) {
  const [mode,setMode] = useState('login');
  const [email,setEmail] = useState('');
  const [pass,setPass]   = useState('');
  const [err,setErr]     = useState('');
  const [busy,setBusy]   = useState(false);

  const submit = async () => {
    if(!_auth) { setErr('Firebase not ready — try again.'); return; }
    if(!email.trim()||!pass) { setErr('Fill in all fields.'); return; }
    setBusy(true); setErr('');
    try {
      const c = mode==='login'
        ? await _auth.signInWithEmailAndPassword(email.trim(), pass)
        : await _auth.createUserWithEmailAndPassword(email.trim(), pass);
      onAuth(c.user);
    } catch(e) { setErr(e.message); }
    setBusy(false);
  };

  const google = async () => {
    if(!_auth) { setErr('Firebase not ready.'); return; }
    try {
      const c = await _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      onAuth(c.user);
    } catch(e) { setErr(e.message); }
  };

  return (
    <div style={{height:'100%',background:C.bg,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',padding:'32px 24px',
        paddingBottom:'calc(32px + env(safe-area-inset-bottom))'}}>
      <img src={LOGO_SRC} alt="Wheel Rush" style={{width:64,height:64,borderRadius:16,objectFit:'contain',marginBottom:16}}/>
      <div style={{fontSize:26,fontWeight:900,letterSpacing:'-.02em',marginBottom:4}}>
        Wheel <span style={{color:C.orange}}>Rush</span>
      </div>
      <div style={{fontSize:13,color:C.muted,marginBottom:36}}>Mobile Tire Repair · Miami, FL</div>

      <div style={{width:'100%',maxWidth:360}}>
        {err && (
          <div style={{background:C.dangerDim,border:`1px solid ${C.danger}44`,borderRadius:11,
              padding:'10px 14px',marginBottom:12,fontSize:13,color:C.danger,fontWeight:600}}>
            {err}
          </div>
        )}
        <input className="finp" type="email" placeholder="Email" value={email}
          onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&submit()}
          style={{marginBottom:10}}/>
        <input className="finp" type="password" placeholder="Password" value={pass}
          onChange={e=>setPass(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&submit()}
          style={{marginBottom:12}}/>
        <button className="btn btn-primary btn-full" onClick={submit}
          disabled={busy} style={{marginBottom:10,opacity:busy?.6:1}}>
          {busy ? '…' : mode==='login' ? 'Sign In →' : 'Create Account →'}
        </button>
        <button onClick={google}
          style={{width:'100%',background:'rgba(25,58,80,.35)',border:`1px solid ${C.navy}66`,
            borderRadius:12,padding:'13px',color:C.text,fontWeight:700,fontSize:14,
            cursor:'pointer',marginBottom:16,fontFamily:'DM Sans,sans-serif'}}>
          Continue with Google
        </button>
        <div style={{textAlign:'center'}}>
          <button onClick={()=>{setMode(m=>m==='login'?'signup':'login');setErr('');}}
            style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13,
              fontFamily:'DM Sans,sans-serif'}}>
            {mode==='login'?'Create account':'Sign in instead'}
          </button>
        </div>
      </div>
    </div>
  );
}

function CityInput({value, onChange}) {
  const [q,    setQ]    = useState(value||'');

  const suggestions = useMemo(()=>{
    if(!q||q.length<2) return [];
    return AREAS.filter(a=>a.toLowerCase().startsWith(q.toLowerCase())).slice(0,6);
  },[q]);

  const pick = city => { setQ(city); onChange(city); setOpen(false); };

  return (
    <div style={{position:'relative'}}>
      <input
        className="finp"
        value={q}
        onChange={e=>{ setQ(e.target.value); onChange(e.target.value); setOpen(true); }}

        onFocus={()=>setOpen(true)}
        placeholder="Type a city…"
        autoComplete="off"

            <div key={s} onMouseDown={()=>pick(s)}

          ))}
        </div>
      )}
    </div>
  );
}

function JobForm({initial={}, customers, vehicles, onSave, onClose}) {
  const EMPTY = {
    date: TODAY(), service:'Flat Tire Repair', leadSource:'Google',
    customerId:'', vehicleId:'',
    customerName:'', customerPhone:'',
    address:'', city:'Miami', miles:'',
    revenue:'', tireCost:'', materialCost:'', miscCost:'', labor:'',
    emergency:false, highway:false, afterHours:false,
    workStatus:'scheduled', payStatus:'unpaid',
    paymentMethod:'Cash', notes:'',
  };
  const [form,   setForm]   = useState({...EMPTY,...initial});
  const [err,    setErr]    = useState('');
  const [saving, setSaving] = useState(false);
  const sf = (k,v) => setForm(p=>({...p,[k]:v}));

  const custVehicles = useMemo(()=>vehicles.filter(v=>v.customerId===form.customerId),[vehicles,form.customerId]);

  // ── Live pricing ────────────────────────────────────────────────────────────
  const pricing = useMemo(()=>calcPricing({
    service:      form.service,
    tireCost:     Number(form.tireCost)||0,
    materialCost: Number(form.materialCost)||0,
    labor:        Number(form.labor)||0,
    miles:        Number(form.miles)||0,
    emergency:    form.emergency,
    afterHours:   form.afterHours,
    highway:      form.highway,
  }), [form.service, form.tireCost, form.materialCost, form.labor,
       form.miles, form.emergency, form.afterHours, form.highway]);

  const enteredRev = Number(form.revenue)||0;
  const grossProfit = enteredRev ? r2(enteredRev - pricing.directCost - pricing.surcharge) : null;

  const handleSave = async () => {
    if(!form.service){ setErr('Select a service.'); return; }
    setSaving(true);
    try {
      const entry = {
        ...form,
        revenue:      r2(form.revenue),
        tireCost:     r2(form.tireCost),
        materialCost: r2(form.materialCost),
        miscCost:     r2(form.miscCost),
        labor:        r2(form.labor),
        miles:        Number(form.miles)||0,
        createdAt:    form.createdAt || new Date().toISOString(),
      };
      await save(COL.jobs(), entry);
      onSave && onSave();
      onClose();
    } catch(e){ setErr(e.message); }
    setSaving(false);
  };

  return (
    <Sheet title={initial.id ? 'Edit Job' : 'New Job'} onClose={onClose}>
      {err && (
        <div style={{background:C.dangerDim,border:`1px solid ${C.danger}44`,borderRadius:10,
            padding:'9px 13px',marginBottom:12,fontSize:13,color:C.danger}}>{err}</div>
      )}

      {/* ── SECTION 1: Core job info ─────────────────────────────────────── */}
      <Field label="Service">
        <Sel value={form.service} onChange={v=>sf('service',v)} options={SERVICES}/>
      </Field>

      {/* Customer */}
      <Field label="Customer">
        <Sel value={form.customerId} onChange={v=>{
          sf('customerId',v);
          const c=customers.find(c=>c.id===v);
          if(c){sf('customerName',c.name);sf('customerPhone',c.phone||'');}
        }} options={[{v:'',l:'— Walk-in / No customer —'},...customers.map(c=>({v:c.id,l:c.name}))]}/>
      </Field>

      {custVehicles.length>0 && (
        <Field label="Vehicle">
          <Sel value={form.vehicleId} onChange={v=>sf('vehicleId',v)}
            options={[{v:'',l:'— Select vehicle —'},...custVehicles.map(v=>({
              v:v.id,
              l:[v.year,v.make,v.model,v.tireSize?`(${v.tireSize})`:''].filter(Boolean).join(' ')
            }))]}/>
        </Field>
      )}

      <Field label="Address">
        <Inp value={form.address} onChange={v=>sf('address',v)} placeholder="Street address"/>
      </Field>

      <div className="fgrid2" style={{gap:10,marginBottom:14}}>
        <Field label="City">
          <CityInput value={form.city} onChange={v=>sf('city',v)}/>
        </Field>
        <Field label="Miles to Job">
          <Inp type="number" value={form.miles} onChange={v=>sf('miles',v)} placeholder="0" className="mono"/>
        </Field>
      </div>

      {/* ── SECTION 2: Conditions ────────────────────────────────────────── */}
      <Field label="Conditions">
        <div className="chips">
          {[
            ['emergency','🚨 Emergency', PRICING_DEFAULTS.emergencyFee],
            ['highway',  '🛣 Highway',   PRICING_DEFAULTS.highwayFee],
            ['afterHours','🌙 After Hours', PRICING_DEFAULTS.afterHoursFee],
          ].map(([k,l,fee])=>(
            <button key={k} className={`chip ${form[k]?'on':''}`}
              onClick={()=>sf(k,!form[k])}>
              {l}{form[k]?` +$${fee}`:''}
            </button>
          ))}
        </div>
      </Field>

      {/* ── SECTION 3: Costs (affect pricing) ───────────────────────────── */}
      <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',
          color:C.muted,marginBottom:8,marginTop:4}}>Cost Inputs</div>
      <div className="fgrid2" style={{gap:10,marginBottom:6}}>
        <Field label="Tire Cost $">
          <Inp type="number" value={form.tireCost} onChange={v=>sf('tireCost',v)} placeholder="0" className="mono"/>
        </Field>
        <Field label="Materials $">
          <Inp type="number" value={form.materialCost} onChange={v=>sf('materialCost',v)} placeholder="0" className="mono"/>
        </Field>
        <Field label="Labor $">
          <Inp type="number" value={form.labor} onChange={v=>sf('labor',v)} placeholder="0" className="mono"/>
        </Field>
        <Field label="Other Cost $">
          <Inp type="number" value={form.miscCost} onChange={v=>sf('miscCost',v)} placeholder="0" className="mono"/>
        </Field>
      </div>

      {/* ── SECTION 4: Pricing engine output (always visible, live) ──────── */}
      <div style={{background:'#0E0E18',border:`1px solid ${C.border}`,borderRadius:14,
          padding:14,marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',
            color:C.muted,marginBottom:10}}>
          Live Pricing · {isReplacement(form.service)?'Replacement':'Repair'} Target {money(pricing.minGP)}–{money(pricing.maxGP)} GP
        </div>

        {/* Cost breakdown row */}
        <div style={{display:'flex',gap:16,marginBottom:12,flexWrap:'wrap'}}>
          <div style={{fontSize:11,color:C.subtle}}>
            Direct cost <span style={{fontFamily:'JetBrains Mono,monospace',color:C.text,fontSize:12}}>{money(pricing.directCost)}</span>
          </div>
          {pricing.gasCostAmt>0 && (
            <div style={{fontSize:11,color:C.subtle}}>
              Gas <span style={{fontFamily:'JetBrains Mono,monospace',color:C.text,fontSize:12}}>{money(pricing.gasCostAmt)}</span>
            </div>
          )}
          {pricing.surcharge>0 && (
            <div style={{fontSize:11,color:C.subtle}}>
              Surcharges <span style={{fontFamily:'JetBrains Mono,monospace',color:C.orange,fontSize:12}}>{money(pricing.surcharge)}</span>
            </div>
          )}
        </div>

        {/* Three price tiers */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          {[
            {label:'Minimum', price:pricing.minPrice, active:false},
            {label:'Suggested',price:pricing.suggested,active:true},
            {label:'Premium', price:pricing.premium,  active:false},
          ].map(({label,price,active})=>(
            <button key={label}
              onClick={()=>sf('revenue',String(price))}
              style={{
                background: String(form.revenue)===String(price)
                  ? C.orange
                  : active ? '#193A50' : '#10101A',
                border: `1.5px solid ${String(form.revenue)===String(price) ? C.orange : active ? '#4A8AB0' : C.border}`,
                borderRadius:11, padding:'10px 4px', cursor:'pointer',
                fontFamily:'DM Sans,sans-serif', transition:'all .12s',
              }}>
              <div style={{
                fontSize:9, fontWeight:700, letterSpacing:'.06em', textTransform:'uppercase',
                color: String(form.revenue)===String(price) ? 'rgba(255,255,255,.7)' : active ? '#4A8AB0' : C.muted,
                marginBottom:4,
              }}>{label}</div>
              <div style={{
                fontFamily:'JetBrains Mono,monospace', fontSize:16, fontWeight:500,
                color: String(form.revenue)===String(price) ? '#fff' : active ? C.text : C.muted,
              }}>{money(price)}</div>
            </button>
          ))}
        </div>
      </div>

      {/* ── SECTION 5: Final price + profit ─────────────────────────────── */}
      <div className="fgrid2" style={{gap:10,marginBottom:14}}>
        <Field label="Price Charged $">
          <Inp type="number" value={form.revenue} onChange={v=>sf('revenue',v)}
            placeholder={String(pricing.suggested)} className="mono"
            style={{fontSize:20,fontWeight:500,padding:'14px'}}/>
        </Field>
        <div style={{display:'flex',flexDirection:'column',justifyContent:'flex-end',paddingBottom:0}}>
          {enteredRev>0 && (
            <div style={{
              background:grossProfit>=0?C.successDim:C.dangerDim,
              border:`1px solid ${grossProfit>=0?C.success:C.danger}33`,
              borderRadius:11,padding:'14px',textAlign:'center',height:'100%',
              display:'flex',flexDirection:'column',justifyContent:'center',
            }}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',
                  color:grossProfit>=0?C.success:C.danger,marginBottom:3}}>Gross Profit</div>
              <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:20,fontWeight:500,
                  color:grossProfit>=0?C.success:C.danger}}>{money(grossProfit)}</div>
            </div>
          )}
        </div>
      </div>

      {/* ── SECTION 6: Status + payment ─────────────────────────────────── */}
      <div className="fgrid2" style={{gap:10,marginBottom:14}}>
        <Field label="Work Status">
          <Sel value={form.workStatus} onChange={v=>sf('workStatus',v)}
            options={WORK_STATUSES.map(s=>({v:s.v,l:s.l}))}/>
        </Field>
        <Field label="Payment Status">
          <Sel value={form.payStatus} onChange={v=>sf('payStatus',v)}
            options={PAY_STATUSES.map(s=>({v:s.v,l:s.l}))}/>
        </Field>
      </div>

      <Field label="Payment Method">
        <div className="chips">
          {PAYMENT_METHODS.map(m=>(
            <button key={m} className={`chip ${form.paymentMethod===m?'on':''}`}
              onClick={()=>sf('paymentMethod',m)}>{m}</button>
          ))}
        </div>
      </Field>

      {/* ── SECTION 7: Secondary fields ─────────────────────────────────── */}
      <div className="fgrid2" style={{gap:10,marginBottom:14}}>
        <Field label="Date">
          <Inp type="date" value={form.date} onChange={v=>sf('date',v)}/>
        </Field>
        <Field label="Lead Source">
          <Sel value={form.leadSource} onChange={v=>sf('leadSource',v)} options={LEAD_SOURCES}/>
        </Field>
      </div>

      <Field label="Notes">
        <textarea className="finp" value={form.notes||''} onChange={e=>sf('notes',e.target.value)}
          placeholder="Any details…"/>
      </Field>

      <button className="btn btn-primary btn-full" onClick={handleSave} disabled={saving}
        style={{fontSize:16,padding:'15px'}}>
        {saving ? '…' : initial.id ? 'Save Changes' : 'Log Job →'}
      </button>
    </Sheet>
  );
}


// ── JOB DETAIL ────────────────────────────────────────────────────────────────
function JobDetail({job, customers, vehicles, invoices, onEdit, onDelete, onClose}) {
  const cust    = customers.find(c=>c.id===job.customerId);
  const veh     = vehicles.find(v=>v.id===job.vehicleId);
  const profit  = jobProfit(job);
  const disp    = jobDisplayStatus(job);
  const existingInv = invoices.find(inv=>inv.jobId===job.id);

  const [showInvForm, setShowInvForm] = useState(false);
  const [viewInv,     setViewInv]     = useState(null);

  const quickStatus = async (field, val) => {
    await save(COL.jobs(), {...job,[field]:val});
  };

  const sendInvoice = (inv, method) => {
    const text = invoiceText(inv);
    if(method==='sms') {
      const ph = cust?.phone || job.customerPhone || '';
      window.open(`sms:${ph}?body=${encodeURIComponent(text)}`, '_blank');
    } else {
      if(navigator.clipboard) {
        navigator.clipboard.writeText(text).then(()=>alert('Invoice copied to clipboard!'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Invoice copied!');
      }
    }
  };

  return (
    <Sheet title="Job Detail" onClose={onClose}>
      {/* Status bar */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <span className="pill" style={{background:disp.bg,color:disp.c,border:`1px solid ${disp.c}30`}}>
          {disp.l}
        </span>
        {job.emergency && <span className="pill pill-red">🚨 Emergency</span>}
        {job.highway   && <span className="pill pill-navy">🛣 Highway</span>}
        {job.afterHours&& <span className="pill pill-amber">🌙 After Hours</span>}
      </div>

      {/* Hero */}
      <div className="hero" style={{marginBottom:16}}>
        <div style={{fontSize:11,color:C.subtle,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>
          {job.date} · {job.city}
        </div>
        <div style={{fontSize:18,fontWeight:800,marginBottom:12}}>{job.service}</div>
        <div style={{display:'flex',gap:20,alignItems:'baseline'}}>
          <div>
            <div className="mono" style={{fontSize:34,fontWeight:500,color:C.orange,lineHeight:1}}>{money(job.revenue||0)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>revenue</div>
          </div>
          <div>
            <div className="mono" style={{fontSize:22,fontWeight:500,color:profit>=0?C.success:C.danger,lineHeight:1}}>{money(profit)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>gross profit</div>
          </div>
        </div>
      </div>

      {/* Quick status update */}
      <div className="sec">Update Status</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
        <div>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:6}}>Work</div>
          <Sel value={job.workStatus||'scheduled'} onChange={v=>quickStatus('workStatus',v)}
            options={WORK_STATUSES.map(s=>({v:s.v,l:s.l}))}/>
        </div>
        <div>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:6}}>Payment</div>
          <Sel value={job.payStatus||'unpaid'} onChange={v=>quickStatus('payStatus',v)}
            options={PAY_STATUSES.map(s=>({v:s.v,l:s.l}))}/>
        </div>
      </div>

      {/* Details */}
      {(cust || veh || job.address) && (
        <>
          <div className="sec">Details</div>
          <div className="card">
            {cust && <div className="row"><span style={{fontSize:13,color:C.muted}}>Customer</span><span style={{fontSize:13,fontWeight:600}}>{cust.name}</span></div>}
            {cust?.phone && <div className="row"><span style={{fontSize:13,color:C.muted}}>Phone</span>
              <a href={`tel:${cust.phone}`} style={{fontSize:13,color:C.orange,textDecoration:'none'}}>{cust.phone}</a>
            </div>}
            {veh && <div className="row"><span style={{fontSize:13,color:C.muted}}>Vehicle</span><span style={{fontSize:13}}>{[veh.year,veh.make,veh.model].filter(Boolean).join(' ')}</span></div>}
            {veh?.tireSize && <div className="row"><span style={{fontSize:13,color:C.muted}}>Tire Size</span><span className="mono" style={{fontSize:13}}>{veh.tireSize}</span></div>}
            {job.address && <div className="row"><span style={{fontSize:13,color:C.muted}}>Address</span><span style={{fontSize:13,textAlign:'right',maxWidth:'60%'}}>{job.address}</span></div>}
          </div>
        </>
      )}

      {/* Costs */}
      <div className="sec">Costs</div>
      <div className="card">
        {[
          ['Revenue',  money(job.revenue||0)],
          ['Tire Cost', money(job.tireCost||0)],
          ['Other Cost',money(job.miscCost||0)],
          ['Gas Est.',  money(gasCost(job))],
          ['Profit',    money(profit)],
        ].map(([l,v],i)=>(
          <div className="row" key={l} style={i===4?{background:'#1A1A2E'}:{}}>
            <span style={{fontSize:13,color:i===4?C.text:C.muted,fontWeight:i===4?700:400}}>{l}</span>
            <span className="mono" style={{fontSize:13,color:i===4?(profit>=0?C.success:C.danger):C.text,fontWeight:i===4?700:400}}>{v}</span>
          </div>
        ))}
      </div>

      {job.leadSource && (
        <><div className="sec">Source</div>
        <div className="card"><div className="row"><span style={{fontSize:13,color:C.muted}}>Lead</span><span style={{fontSize:13}}>{job.leadSource}</span></div></div></>
      )}
      {job.notes && (
        <><div className="sec">Notes</div>
        <div className="card cp"><div style={{fontSize:13,lineHeight:1.6}}>{job.notes}</div></div></>
      )}

      {/* Actions */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:8,marginBottom:8}}>
        <button className="btn btn-navy btn-full" onClick={onEdit}><Icon name="edit" size={14}/>Edit</button>
        <button className="btn btn-danger btn-full" onClick={onDelete}><Icon name="trash" size={14}/>Delete</button>
      </div>

      {/* Invoice row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <button className="btn btn-success btn-full" onClick={()=>setShowInvForm(true)}>
          <Icon name="invoice" size={14}/>
          {existingInv ? 'Update Invoice' : 'Invoice'}
        </button>
        {existingInv && (
          <button className="btn btn-ghost btn-full" onClick={()=>setViewInv(existingInv)}>
            <Icon name="share" size={14}/>Send Receipt
          </button>
        )}
      </div>

      {showInvForm && (
        <InvoiceForm
          job={job} customer={cust} vehicle={veh}
          existingInvoice={existingInv}
          onSave={inv=>{ setShowInvForm(false); setViewInv(inv); }}
          onClose={()=>setShowInvForm(false)}
        />
      )}
      {viewInv && (
        <InvoiceView
          invoice={viewInv}
          onClose={()=>setViewInv(null)}
          onSend={method=>sendInvoice(viewInv, method)}
        />
      )}
    </Sheet>
  );
}

// ── JOBS SCREEN ───────────────────────────────────────────────────────────────
function JobsScreen({jobs, customers, vehicles, invoices, onNewJob}) {
  const [filter, setFilter]   = useState('all');
  const [search, setSearch]   = useState('');
  const [selJob, setSelJob]   = useState(null);
  const [editJob,setEditJob]  = useState(null);

  const FILTERS = [
    {v:'all',    l:'All'},
    {v:'active', l:'Active'},
    {v:'pending',l:'Pending'},
    {v:'done',   l:'Done'},
  ];

  const filtered = useMemo(()=>{
    let list = [...jobs].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    if(filter==='active')  list=list.filter(isActive);
    if(filter==='pending') list=list.filter(isPending);
    if(filter==='done')    list=list.filter(isCompleted);
    if(search) {
      const q=search.toLowerCase();
      list=list.filter(j=>j.service?.toLowerCase().includes(q)||j.city?.toLowerCase().includes(q)||
        customers.find(c=>c.id===j.customerId)?.name?.toLowerCase().includes(q));
    }
    return list;
  },[jobs,customers,filter,search]);

  const handleDelete = async (job) => {
    if(!window.confirm('Delete this job?')) return;
    await remove(COL.jobs(), job.id);
    setSelJob(null);
  };

  return (
    <div className="screen"><div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:20,fontWeight:900}}>Jobs</div>
        <span className="mono" style={{fontSize:12,color:C.muted}}>{filtered.length} jobs</span>
      </div>

      {/* Filter chips */}
      <div style={{display:'flex',gap:7,marginBottom:12,overflowX:'auto',paddingBottom:2}}>
        {FILTERS.map(f=>(
          <button key={f.v} className={`chip ${filter===f.v?'on':''}`}
            style={{flexShrink:0}} onClick={()=>setFilter(f.v)}>{f.l}</button>
        ))}
      </div>

      {jobs.length > 6 && (
        <div style={{position:'relative',marginBottom:12}}>
          <input className="finp" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search service, city, customer…" style={{paddingLeft:38}}/>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}>
            <Icon name="search" size={16} color={C.subtle}/>
          </div>
        </div>
      )}

      {filtered.length === 0 && (
        <div className="empty">
          <span className="empty-ico">🛞</span>
          <div className="empty-title">{search||filter!=='all' ? 'No results' : 'No jobs yet'}</div>
          <div style={{fontSize:13}}>Tap + to log a job</div>
        </div>
      )}

      {filtered.map(j=>{
        const cust   = customers.find(c=>c.id===j.customerId);
        const profit = jobProfit(j);
        return (
          <div className="jrow" key={j.id} onClick={()=>setSelJob(j)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700}}>{j.service}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                  {j.date && j.date.slice(5)} · {j.city}{cust?` · ${cust.name}`:''}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
                <div className="mono" style={{fontSize:15,fontWeight:500}}>{money(j.revenue||0)}</div>
                <div className="mono" style={{fontSize:11,color:profit>=0?C.success:C.danger}}>{money(profit)} GP</div>
              </div>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <StatusPill job={j}/>
              {j.leadSource && <span className="pill pill-gray">{j.leadSource}</span>}
              {j.emergency  && <span className="pill pill-red">🚨</span>}
              {j.afterHours && <span className="pill pill-amber">🌙</span>}
            </div>
          </div>
        );
      })}

      {selJob && (
        <JobDetail
          job={selJob} customers={customers} vehicles={vehicles} invoices={invoices}
          onEdit={()=>{setEditJob(selJob);setSelJob(null);}}
          onDelete={()=>handleDelete(selJob)}
          onClose={()=>setSelJob(null)}
        />
      )}
      {editJob && (
        <JobForm
          initial={editJob} customers={customers} vehicles={vehicles}
          onClose={()=>setEditJob(null)}
        />
      )}
    </div></div>
  );
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({jobs, expenses, customers, settings, user, sync, onSignOut, onNewJob}) {
  const today    = TODAY();
  const nowDate  = new Date();
  const dayName  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][nowDate.getDay()];
  const dateStr  = nowDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const weekStart= getWeekStart(today);

  const todayJobs   = useMemo(()=>jobs.filter(j=>j.date===today),[jobs,today]);
  const weekJobs    = useMemo(()=>jobs.filter(j=>j.date>=weekStart&&j.date<=today),[jobs,weekStart,today]);
  const paidToday   = todayJobs.filter(isPaid);
  const paidWeek    = weekJobs.filter(isPaid);
  const pendingAll  = jobs.filter(isPending);

  const todayRev    = r2(paidToday.reduce((s,j)=>s+Number(j.revenue||0),0));
  const todayProfit = r2(paidToday.reduce((s,j)=>s+jobProfit(j),0));
  const weekRev     = r2(paidWeek.reduce((s,j)=>s+Number(j.revenue||0),0));
  const weekProfit  = r2(paidWeek.reduce((s,j)=>s+jobProfit(j),0));
  const weekExpAmt  = useMemo(()=>expenses.filter(e=>getWeekStart(e.date||today)===weekStart).reduce((s,e)=>s+Number(e.amount||0),0),[expenses,weekStart,today]);
  const pendRev     = r2(pendingAll.reduce((s,j)=>s+Number(j.revenue||0),0));
  const activeJobs  = jobs.filter(isActive).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,4);

  const syncLabel = sync==='online'?'● Live':sync==='syncing'?'● Sync…':'○ Offline';
  const syncColor = sync==='online'?C.success:sync==='syncing'?C.warn:C.subtle;

  return (
    <div className="screen"><div className="page">

      {/* ── Header ─────────────────────────────────────────────────────── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>

const EXP_CATS = [
  'Tire Inventory','Gas','Ads / Marketing','Tools',
  'Patches & Plugs','Valve Stems','Balancing Supplies',
  'Software','Phone','Insurance','Repairs & Maintenance','Misc',
];
const EMPTY_EXP = () => ({
  date:TODAY(), category:'Gas', amount:'', description:'', jobId:'', recurring:false,
});

function ExpenseForm({initial={}, jobs, onClose}) {
  const [form,setForm] = useState({...EMPTY_EXP(),...initial});
  const [saving,setSaving] = useState(false);
  const sf=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleSave=async()=>{
    if(!form.amount||!Number(form.amount)){return;}
    setSaving(true);
    await save(COL.expenses(),{...form,amount:r2(form.amount),createdAt:form.createdAt||new Date().toISOString()});
    setSaving(false);
    onClose();
  };
  return(
    <Sheet title={initial.id?'Edit Expense':'Log Expense'} onClose={onClose}>
      <div className="fgrid2" style={{gap:10,marginBottom:14}}>
        <Field label="Date"><Inp type="date" value={form.date} onChange={v=>sf('date',v)}/></Field>
        <Field label="Amount $"><Inp type="number" value={form.amount} onChange={v=>sf('amount',v)} placeholder="0" className="mono"/></Field>
      </div>
      <Field label="Category"><Sel value={form.category} onChange={v=>sf('category',v)} options={EXP_CATS}/></Field>
      <Field label="Description"><Inp value={form.description} onChange={v=>sf('description',v)} placeholder="What was this for?"/></Field>
      <Field label="Linked to Job (optional)">
        <Sel value={form.jobId} onChange={v=>sf('jobId',v)}
          options={[{v:'',l:'— No job —'},...jobs.map(j=>({v:j.id,l:`${j.date} · ${j.service} · ${money(j.revenue||0)}`}))]}/>
      </Field>
      <Toggle label="Recurring monthly" sub="Mark this as a fixed monthly expense"
        on={form.recurring} onToggle={()=>sf('recurring',!form.recurring)}/>
      <div style={{height:14}}/>
      <button className="btn btn-primary btn-full" onClick={handleSave} disabled={saving}>
        {saving?'…':initial.id?'Save Changes':'Log Expense'}
      </button>
    </Sheet>
  );
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
function ReportsScreen({jobs, expenses, customers}) {
  const [view, setView] = useState('overview');

  // Helpers
  const paidJobs = useMemo(()=>jobs.filter(isPaid),[jobs]);
  const pendJobs = useMemo(()=>jobs.filter(isPending),[jobs]);

  // Revenue by day (last 30 days)
  const byDay = useMemo(()=>{
    const m={};
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-29);
    paidJobs.forEach(j=>{
      if(!j.date||new Date(j.date+'T12:00:00')<cutoff)return;
      if(!m[j.date])m[j.date]={date:j.date,rev:0,profit:0,count:0};
      m[j.date].rev+=Number(j.revenue||0);
      m[j.date].profit+=jobProfit(j);
      m[j.date].count++;
    });
    return Object.values(m).sort((a,b)=>a.date.localeCompare(b.date));
  },[paidJobs]);

  // By city
  const byCity = useMemo(()=>{
    const m={};
    paidJobs.forEach(j=>{
      const c=j.city||'Unknown';
      if(!m[c])m[c]={city:c,rev:0,profit:0,count:0};
      m[c].rev+=Number(j.revenue||0);m[c].profit+=jobProfit(j);m[c].count++;
    });
    return Object.values(m).sort((a,b)=>b.rev-a.rev);
  },[paidJobs]);

  // By service
  const byService = useMemo(()=>{
    const m={};
    paidJobs.forEach(j=>{
      const s=j.service||'Other';
      if(!m[s])m[s]={service:s,rev:0,profit:0,count:0};
      m[s].rev+=Number(j.revenue||0);m[s].profit+=jobProfit(j);m[s].count++;
    });
    return Object.values(m).sort((a,b)=>b.profit-a.profit);
  },[paidJobs]);

  // Lead source ROI
  const bySource = useMemo(()=>{
    const m={};
    paidJobs.forEach(j=>{
      const s=j.leadSource||'Unknown';
      if(!m[s])m[s]={source:s,rev:0,profit:0,count:0};
      m[s].rev+=Number(j.revenue||0);m[s].profit+=jobProfit(j);m[s].count++;
    });
    // Calculate ad spend per source
    const adExp=expenses.filter(e=>e.category==='Ads / Marketing').reduce((s,e)=>s+Number(e.amount||0),0);
    const googleJobs=m['Google']||m['Google Maps']||{count:0,profit:0};
    return Object.values(m).sort((a,b)=>b.rev-a.rev).map(s=>({
      ...s,
      avgRev:s.count?r2(s.rev/s.count):0,
      avgProfit:s.count?r2(s.profit/s.count):0,
    }));
  },[paidJobs,expenses]);

  const totalRev    = paidJobs.reduce((s,j)=>s+Number(j.revenue||0),0);
  const totalProfit = paidJobs.reduce((s,j)=>s+jobProfit(j),0);
  const totalExp    = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const adjProfit   = r2(totalProfit - totalExp);
  const pendTotal   = pendJobs.reduce((s,j)=>s+Number(j.revenue||0),0);

  const BAR_MAX = Math.max(...byDay.map(d=>d.rev), 1);

  const VIEWS = [
    {v:'overview',l:'Overview'},
    {v:'daily',   l:'Daily'},
    {v:'city',    l:'By City'},
    {v:'service', l:'By Service'},
    {v:'source',  l:'Lead ROI'},
    {v:'pending', l:'Pending'},
  ];

  return(
    <div className="screen"><div className="page">
      <div style={{fontSize:20,fontWeight:900,marginBottom:14}}>Reports</div>

      {/* View tabs */}
      <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:4,marginBottom:16}}>
        {VIEWS.map(v=>(
          <button key={v.v} className={`chip ${view===v.v?'on':''}`}
            style={{flexShrink:0,fontSize:11}} onClick={()=>setView(v.v)}>{v.l}</button>
        ))}
      </div>

      {/* OVERVIEW */}
      {view==='overview'&&(<>
        <div className="kgrid k2" style={{marginBottom:12}}>
          {[
            [money(totalRev),'Total Revenue',C.orange],
            [money(totalProfit),'Gross Profit',C.success],
            [money(totalExp),'Total Expenses',C.danger],
            [money(adjProfit),'Adjusted Profit',adjProfit>=0?C.success:C.danger],
          ].map(([v,l,c])=>(
            <div className="kcard" key={l}>
              <div className="kl">{l}</div>
              <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:20,fontWeight:500,color:c}}>{v}</div>
            </div>
          ))}
        </div>
        <div className="kgrid k3">
          {[
            [paidJobs.length,'Paid Jobs',C.text],
            [pendJobs.length,'Pending',C.warn],
            [paidJobs.length?Math.round(totalProfit/totalRev*100):0,'% Margin',C.muted],
          ].map(([v,l,c])=>(
            <div className="kcard" key={l}>
              <div className="kl">{l}</div>
              <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:18,fontWeight:500,color:c}}>{typeof v==='number'&&l.includes('%')?`${v}%`:v}</div>
            </div>
          ))}
        </div>
        {/* Expense breakdown */}
        {totalExp>0&&(<>
          <div className="sec">Expense Breakdown</div>
          {EXP_CATS.map(cat=>{
            const amt=expenses.filter(e=>e.category===cat).reduce((s,e)=>s+Number(e.amount||0),0);
            if(!amt)return null;
            return(
              <div key={cat} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.muted}}>{cat}</span>
                <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,color:C.danger}}>{money(amt)}</span>
              </div>
            );
          })}
        </>)}
      </>)}

      {/* DAILY */}
      {view==='daily'&&(<>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Last 30 days · {byDay.length} active days</div>
        {byDay.length===0&&<div className="empty"><span className="empty-ico">📊</span><div className="empty-title">No data yet</div></div>}
        {byDay.slice().reverse().map(d=>(
          <div key={d.date} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted}}>{d.date} <span style={{color:C.subtle}}>· {d.count} jobs</span></div>
              <div style={{display:'flex',gap:14}}>
                <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:12,color:C.orange}}>{money(d.rev)}</span>
                <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:12,color:d.profit>=0?C.success:C.danger}}>{money(d.profit)}</span>
              </div>
            </div>
            <div style={{height:5,background:C.border,borderRadius:999,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${(d.rev/BAR_MAX)*100}%`,background:C.orange,borderRadius:999}}/>
            </div>
          </div>
        ))}
      </>)}

      {/* BY CITY */}
      {view==='city'&&(<>
        {byCity.map(c=>(
          <div key={c.city} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 14px',marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <div style={{fontSize:14,fontWeight:700}}>{c.city}</div>
              <span style={{fontSize:11,color:C.muted}}>{c.count} jobs</span>
            </div>
            <div style={{display:'flex',gap:20}}>
              <div><div style={{fontSize:10,color:C.muted}}>Revenue</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:14,color:C.orange}}>{money(c.rev)}</div></div>
              <div><div style={{fontSize:10,color:C.muted}}>Profit</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:14,color:C.success}}>{money(c.profit)}</div></div>
              <div><div style={{fontSize:10,color:C.muted}}>Avg/Job</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:14}}>{money(c.count?c.profit/c.count:0)}</div></div>
            </div>
          </div>
        ))}
        {byCity.length===0&&<div className="empty"><span className="empty-ico">🗺</span><div className="empty-title">No data yet</div></div>}
      </>)}

      {/* BY SERVICE */}
      {view==='service'&&(<>
        {byService.map(s=>(
          <div key={s.service} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 14px',marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.service}</div>
              <span style={{fontSize:11,color:C.muted,flexShrink:0,marginLeft:8}}>{s.count} jobs</span>
            </div>
            <div style={{display:'flex',gap:20}}>
              <div><div style={{fontSize:10,color:C.muted}}>Revenue</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,color:C.orange}}>{money(s.rev)}</div></div>
              <div><div style={{fontSize:10,color:C.muted}}>Profit</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,color:C.success}}>{money(s.profit)}</div></div>
              <div><div style={{fontSize:10,color:C.muted}}>Margin</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:13}}>{s.rev?Math.round(s.profit/s.rev*100):0}%</div></div>
            </div>
          </div>
        ))}
        {byService.length===0&&<div className="empty"><span className="empty-ico">🛞</span><div className="empty-title">No data yet</div></div>}
      </>)}

      {/* LEAD SOURCE ROI */}
      {view==='source'&&(<>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Revenue and profit per lead channel</div>
        {bySource.map(s=>(
          <div key={s.source} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 14px',marginBottom:8}}>

            <div style={{display:'flex',gap:16}}>
              <div><div style={{fontSize:10,color:C.muted}}>Total Rev</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,color:C.orange}}>{money(s.rev)}</div></div>
              <div><div style={{fontSize:10,color:C.muted}}>Avg Rev</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:13}}>{money(s.avgRev)}</div></div>
              <div><div style={{fontSize:10,color:C.muted}}>Avg Profit</div><div style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,color:C.success}}>{money(s.avgProfit)}</div></div>
            </div>
          </div>
        ))}
        {bySource.length===0&&<div className="empty"><span className="empty-ico">📡</span><div className="empty-title">No data yet</div></div>}
      </>)}

      {/* PENDING */}
      {view==='pending'&&(<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:13,color:C.muted}}>{pendJobs.length} jobs outstanding</div>
          <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:16,fontWeight:500,color:C.warn}}>{money(pendTotal)}</div>
        </div>
        {pendJobs.length===0&&<div className="empty"><span className="empty-ico">✅</span><div className="empty-title">All caught up!</div><div style={{fontSize:13}}>No pending payments</div></div>}

          <div key={j.id} className="jrow" style={{borderColor:C.warn+'55'}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:13,fontWeight:700}}>{j.service}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{j.date} · {j.city}</div>

              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:14,color:C.warn}}>{money(j.revenue||0)}</div>
                <span className="pill pill-amber" style={{fontSize:10}}>Pending</span>
              </div>
            </div>
          </div>
        ))}

}

// ── PAYOUTS ───────────────────────────────────────────────────────────────────
const PAY_STATUS = [{v:'unpaid',l:'Unpaid',c:C.danger},{v:'scheduled',l:'Scheduled',c:C.warn},{v:'paid',l:'Paid',c:C.success}];
const DEFAULT_OWNERS = [{name:'Owner 1',pct:50},{name:'Owner 2',pct:50}];

function weekRange(ws) {
  const d=new Date(ws+'T12:00:00'),e=new Date(d);e.setDate(d.getDate()+6);
  const f=x=>x.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${f(d)} – ${f(e)}`;
}
function getWeekStart(date) {
  const d=new Date(date+'T12:00:00'),day=d.getDay();
  d.setDate(d.getDate()-((day+6)%7)); // Monday start
  return d.toISOString().slice(0,10);
}

function PayoutsScreen({jobs, expenses, payouts, settings, user}) {
  const [showSettings,setShowSettings]=useState(false);
  const owners = settings.owners || DEFAULT_OWNERS;

  // Group paid jobs by week
  const weeklyData = useMemo(()=>{
    const m={};
    jobs.filter(isPaid).forEach(j=>{
      const ws=getWeekStart(j.date||TODAY());
      if(!m[ws])m[ws]={ws,jobs:[],rev:0,grossProfit:0};
      m[ws].jobs.push(j);
      m[ws].rev+=Number(j.revenue||0);
      m[ws].grossProfit+=jobProfit(j);
    });
    // Subtract weekly expenses per week
    expenses.filter(e=>!e.recurring).forEach(e=>{
      const ws=getWeekStart(e.date||TODAY());
      if(m[ws]) m[ws].grossProfit-=Number(e.amount||0);
    });
    const monthlyExp=expenses.filter(e=>e.recurring).reduce((s,e)=>s+Number(e.amount||0),0);
    const weeklyFixed=r2(monthlyExp*12/52);
    return Object.values(m)
      .sort((a,b)=>b.ws.localeCompare(a.ws))
      .map(w=>({
        ...w,
        adjustedProfit:r2(w.grossProfit-weeklyFixed),
        weeklyFixed,
        payout:payouts.find(p=>p.weekStart===w.ws),
      }));
  },[jobs,expenses,payouts,settings]);

  const markPayout=async(week,status)=>{
    const existing=week.payout;
    const splits=owners.map(o=>({name:o.name,pct:Number(o.pct),amt:r2(week.adjustedProfit*(Number(o.pct)/100))}));
    const doc={
      id:existing?.id||undefined,
      weekStart:week.ws,
      weekRange:weekRange(week.ws),
      status,
      grossProfit:week.grossProfit,
      weeklyFixed:week.weeklyFixed,
      adjustedProfit:week.adjustedProfit,
      splits,
      updatedAt:new Date().toISOString(),
      createdAt:existing?.createdAt||new Date().toISOString(),
    };
    await save(COL.payouts(),doc);
  };

  const saveOwners=async(newOwners)=>{
    const ref=COL.settings();
    if(ref)await ref.set({...(settings||{}),owners:newOwners},{merge:true});
  };

  return(
    <div className="screen"><div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:20,fontWeight:900}}>Payouts</div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowSettings(true)}>
          <Icon name="settings" size={13}/>Owners
        </button>
      </div>

      {/* Owner splits display */}
      <div className="card" style={{marginBottom:16}}>
        {owners.map((o,i)=>(
          <div className="row" key={i}>
            <span style={{fontSize:13,fontWeight:600}}>{o.name}</span>
            <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,color:C.orange}}>{o.pct}%</span>
          </div>
        ))}
      </div>

      {weeklyData.length===0&&(
        <div className="empty">
          <span className="empty-ico">💰</span>
          <div className="empty-title">No paid jobs yet</div>
          <div style={{fontSize:13}}>Mark jobs as paid to see weekly payouts</div>
        </div>
      )}

      {weeklyData.map(week=>{
        const ps=week.payout?.status||'unpaid';
        const psObj=PAY_STATUS.find(s=>s.v===ps)||PAY_STATUS[0];
        const adjP=week.adjustedProfit;
        return(
          <div key={week.ws} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:16,marginBottom:12}}>
            {/* Week header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:C.muted}}>{weekRange(week.ws)}</div>
                <div style={{fontSize:11,color:C.subtle,marginTop:2}}>{week.jobs.length} paid jobs</div>
              </div>
              <span className="pill" style={{background:psObj.c+'18',color:psObj.c,border:`1px solid ${psObj.c}30`}}>
                {psObj.l}
              </span>
            </div>

            {/* P&L */}
            <div style={{background:'#10101A',borderRadius:10,padding:'10px 12px',marginBottom:12}}>
              {[
                ['Revenue',       money(week.rev),         C.text],
                ['Gross Profit',  money(week.grossProfit),  C.orange],
                ['Fixed (est.)',  '– '+money(week.weeklyFixed), C.subtle],
                ['Net Profit',    money(adjP),              adjP>=0?C.success:C.danger],
              ].map(([l,v,c])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:12,color:l==='Net Profit'?C.text:C.muted,fontWeight:l==='Net Profit'?700:400}}>{l}</span>
                  <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:12,color:c,fontWeight:l==='Net Profit'?700:400}}>{v}</span>
                </div>
              ))}
            </div>

            {/* Owner splits */}
            {owners.map((o,i)=>{
              const ownerAmt=r2(adjP*(Number(o.pct)/100));
              return(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:i<owners.length-1?6:12}}>
                  <span style={{fontSize:13,color:C.muted}}>{o.name} ({o.pct}%)</span>
                  <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:16,fontWeight:500,color:ownerAmt>=0?C.orange:C.danger}}>{money(ownerAmt)}</span>
                </div>
              );
            })}

            {/* Status actions */}
            <div style={{display:'flex',gap:8}}>
              {PAY_STATUS.map(s=>(
                <button key={s.v} onClick={()=>markPayout(week,s.v)}
                  style={{flex:1,background:ps===s.v?s.c+'22':'#10101A',
                    border:`1.5px solid ${ps===s.v?s.c:C.border}`,borderRadius:9,
                    padding:'8px 4px',cursor:'pointer',fontSize:11,fontWeight:700,
                    color:ps===s.v?s.c:C.muted,fontFamily:'DM Sans,sans-serif'}}>
                  {s.l}
                </button>
              ))}
            </div>
          </div>
        );
      })}

      {/* Owner settings sheet */}
      {showSettings&&(
        <OwnerSettingsSheet owners={owners} onSave={saveOwners} onClose={()=>setShowSettings(false)}/>
      )}
    </div></div>
  );
}

function OwnerSettingsSheet({owners, onSave, onClose}) {
  const [local,setLocal]=useState(owners.map(o=>({...o})));
  const total=local.reduce((s,o)=>s+Number(o.pct||0),0);

  return(
    <Sheet title="Owner Split" onClose={onClose}>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Split must equal 100%. Currently: {total}%</div>
      {local.map((o,i)=>(
        <div key={i} style={{background:'#10101A',borderRadius:12,padding:14,marginBottom:10}}>
          <div className="fgrid2" style={{gap:10}}>
            <Field label={`Owner ${i+1} Name`}>
              <Inp value={o.name} onChange={v=>setLocal(p=>{const n=[...p];n[i]={...n[i],name:v};return n;})} placeholder="Name"/>
            </Field>
            <Field label="Split %">
              <Inp type="number" value={String(o.pct)} onChange={v=>setLocal(p=>{const n=[...p];n[i]={...n[i],pct:Number(v)||0};return n;})} placeholder="50" className="mono"/>
            </Field>
          </div>
        </div>
      ))}
      <div style={{fontSize:11,color:total===100?C.success:C.danger,fontWeight:700,marginBottom:16,textAlign:'center'}}>
        {total===100?'✓ Splits add up to 100%':`Total: ${total}% — must equal 100`}
      </div>
      <button className="btn btn-primary btn-full" onClick={()=>{if(total===100){onSave(local);onClose();}}}
        disabled={total!==100}>Save Owners</button>
    </Sheet>
  );
}

// ── MORE SCREEN (replaces old stub) ────────────────────────────────────────────

  const [subTab,setSubTab]=useState('expenses');
  const SUB=[{v:'expenses',l:'Expenses'},{v:'reports',l:'Reports'},{v:'payouts',l:'Payouts'},{v:'account',l:'Account'}];

        {SUB.map(s=>(

            <div className="row"><span style={{fontSize:13,color:C.muted}}>Sync</span><span style={{fontSize:13,color:sync==='online'?C.success:sync==='syncing'?C.warn:C.muted}}>{sync==='online'?'✓ Live':sync==='syncing'?'Syncing…':'Offline'}</span></div>
          </div>

// ── BOTTOM NAV ─────────────────────────────────────────────────────────────────
const TABS = [
  {id:'dashboard', label:'Home',    icon:'home'},
  {id:'jobs',      label:'Jobs',    icon:'jobs'},
  {id:'customers', label:'Clients', icon:'clients'},
  {id:'more',      label:'More',    icon:'more'},
];

function BottomNav({active, setActive}) {
  return (
    <div className="nav">
      {TABS.map(t=>{
        const on = active===t.id;
        return (
          <button key={t.id} className="nbtn" onClick={()=>setActive(t.id)}>
            <Icon name={t.icon} size={21} color={on?C.orange:C.subtle} sw={on?2:1.8}/>
            <span style={{color:on?C.orange:C.subtle}}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function FABBtn({onClick}) {
  return (
    <button className="fab" onClick={onClick}>
      <Icon name="plus" size={24} color="#fff" sw={2.5}/>
    </button>
  );
}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [user,     setUser]     = useState(null);
  const [ready,    setReady]    = useState(false);
  const [authErr,  setAuthErr]  = useState('');
  const [tab,      setTab]      = useState('dashboard');
  const [sync,     setSync]     = useState('offline');
  const [showJob,  setShowJob]  = useState(false);
  const [jobInit,  setJobInit]  = useState({});

  // Data state
  const [jobs,      setJobs]      = useState([]);
  const [customers, setCustomers] = useState([]);
  const [vehicles,  setVehicles]  = useState([]);
  const [invoices,  setInvoices]  = useState([]);
  const [expenses,  setExpenses]  = useState([]);
  const [payouts,   setPayouts]   = useState([]);
  const [settings,  setSettings]  = useState({});

  const authRef  = useRef(false);
  const unsubRef = useRef([]);

  // ── Auth ─────────────────────────────────────────────────────────────────
  useEffect(()=>{
    let cancelled = false;
    const timer = setTimeout(()=>{
      if(cancelled) return;
      setAuthErr('Firebase unavailable. Open at your deployed URL.');
      setReady(true);
    }, 10000);

    const attach = () => {
      if(!_auth){ setTimeout(attach, 100); return; }
      const unsub = _auth.onAuthStateChanged(u => {
        if(cancelled) return;
        clearTimeout(timer);
        authRef.current = !!u;
        setUser(u || null);
        setSync(u ? 'syncing' : 'offline');
        setReady(true);
      });
      unsubRef.current.push(unsub);
    };
    attach();
    return () => { cancelled=true; clearTimeout(timer); };
  }, []);

  // ── Firestore listeners ───────────────────────────────────────────────────
  useEffect(()=>{
    unsubRef.current.forEach(fn=>{ try{fn();}catch{} });
    unsubRef.current = [];
    if(!user||!_db) return;
    setSync('syncing');

    const u1 = listen(COL.jobs(), docs=>{ setJobs(docs); setSync('online'); });
    const u2 = listen(COL.customers(), docs=>setCustomers(docs));
    const u3 = listen(COL.vehicles(),  docs=>setVehicles(docs));
    const u5 = listen(COL.invoices(),  docs=>setInvoices(docs));
    const u6 = listen(COL.expenses(),  docs=>setExpenses(docs));
    const u7 = listen(COL.payouts(),   docs=>setPayouts(docs));
    const settingsRef = COL.settings();
    const u4 = settingsRef ? settingsRef.onSnapshot(snap=>{
      if(snap.exists) setSettings(snap.data());
      else settingsRef.set({createdAt:new Date().toISOString()}).catch(()=>{});
    }, ()=>{}) : null;

    unsubRef.current = [u1,u2,u3,u5,u6,u7,u4].filter(Boolean);
    return () => { unsubRef.current.forEach(fn=>{ try{fn();}catch{} }); unsubRef.current=[]; };
  }, [user]);

  const signOut = useCallback(async ()=>{
    try{ await _auth?.signOut(); }catch{}
    authRef.current=false;
    setUser(null); setSync('offline');
    setJobs([]); setCustomers([]); setVehicles([]); setInvoices([]);
    setExpenses([]); setPayouts([]); setSettings({});
  }, []);

  const openNewJob = useCallback((init={})=>{
    setJobInit(init);
    setShowJob(true);
  },[]);

  // ── Loading ───────────────────────────────────────────────────────────────
  if(!ready) return (
    <div style={{height:'100%',background:C.bg,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:14}}>
      <img src={LOGO_SRC} alt="Wheel Rush" style={{width:64,height:64,borderRadius:16,objectFit:'contain'}}/>
      <div style={{color:C.orange,fontSize:17,fontWeight:800}}>Wheel Rush</div>
      <div style={{color:C.muted,fontSize:13}}>Connecting…</div>
    </div>
  );

  if(authErr) return (
    <div style={{height:'100%',background:C.bg,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:14,padding:32,textAlign:'center'}}>
      <img src={LOGO_SRC} alt="Wheel Rush" style={{width:64,height:64,borderRadius:16,objectFit:'contain'}}/>
      <div style={{color:C.orange,fontSize:17,fontWeight:800}}>Wheel Rush</div>
      <div style={{color:C.text,fontSize:14,fontWeight:600,marginBottom:4}}>Firebase unavailable</div>
      <div style={{color:C.muted,fontSize:12,lineHeight:1.8,maxWidth:300}}>{authErr}</div>
      <button className="btn btn-primary" style={{marginTop:12}}
        onClick={()=>window.location.reload()}>Retry</button>
    </div>
  );

  if(!user) return <AuthScreen onAuth={u=>{setUser(u);authRef.current=true;}}/>;

  // ── Main app ──────────────────────────────────────────────────────────────
  return (
    <div style={{background:C.bg,height:'100%',maxWidth:430,margin:'0 auto',
        display:'flex',flexDirection:'column',position:'relative',
        fontFamily:"'DM Sans',sans-serif",color:C.text}}>
      <div className="screen">
        {tab==='dashboard' && (
          <Dashboard jobs={jobs} customers={customers} settings={settings}
            expenses={expenses} user={user} sync={sync} onSignOut={signOut}
            onNewJob={openNewJob}/>
        )}
        {tab==='jobs' && (
          <JobsScreen jobs={jobs} customers={customers} vehicles={vehicles}
            invoices={invoices} onNewJob={openNewJob}/>
        )}
        {tab==='customers' && (
          <CustomersScreen jobs={jobs} customers={customers} vehicles={vehicles}
            onNewJob={openNewJob}/>
        )}
        {tab==='more' && (
          <MoreScreen user={user} sync={sync} onSignOut={signOut}
            jobs={jobs} expenses={expenses} payouts={payouts}
            settings={settings} customers={customers}/>
        )}
      </div>

      {(tab==='dashboard'||tab==='jobs') && (
        <FABBtn onClick={openNewJob}/>
      )}
      <BottomNav active={tab} setActive={setTab}/>

      {showJob && (
        <JobForm
          initial={jobInit}
          customers={customers}
          vehicles={vehicles}
          onClose={()=>{setShowJob(false);setJobInit({});}}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
