function fbListen(col,cb){
  if(!col){cb([]);return ()=>{};}
  return col.onSnapshot(snap=>cb(snap.docs.map(d=>({...d.data(),id:d.id}))),()=>cb([]));
}
async function fbSet(col,id,data){ try{if(col)await col.doc(String(id)).set({...data,id:String(id)});}catch{} }
async function fbDel(col,id)     { try{if(col)await col.doc(String(id)).delete();}catch{} }
async function fbBatch(col,items){
  if(!col||!items.length) return;
  const b=_db.batch();
  items.forEach(i=>b.set(col.doc(String(i.id)),{...i,id:String(i.id)}));
  try{await b.commit();}catch{}
}

// ── BUSINESS LOGIC ────────────────────────────────────────────────────────────
const jobDirectCost  = (j,s) => r2(Number(j.miles||0)*Number(s.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.miscCost||0));
const jobGrossProfit = (j,s) => r2(Number(j.revenue||0)-jobDirectCost(j,s));
const weeklyFixed    = s => r2((s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0)*12/52);

function suggestedPrice(j,s){
  const direct=jobDirectCost(j,s);
  const isRepl=/replacement|installation/i.test(j.service||'');
  const target=isRepl?Number(s.replacementTarget||110):Number(s.repairTarget||90);
  let prem=0;
  if(j.emergency)prem+=20;if(j.lateNight)prem+=20;if(j.highway)prem+=15;if(j.weekend)prem+=10;
  if(Number(j.miles||0)>25)prem+=20;
  return Math.ceil((direct+target+prem)/5)*5;
}
function jobDecision(j,s,weekGross=0){
  const rev=Number(j.revenue||0)||suggestedPrice(j,s);
  const profit=r2(rev-jobDirectCost(j,s));
  const skip=Number(s.skipThreshold||70),miles=Number(j.miles||0);
  const goal=Number(s.weeklyGoal||1200),pct=goal>0?weekGross/goal:0;
  if(profit<skip) return {label:'Skip',color:C.danger,bg:C.dangerDim};
  if(pct>=1&&miles>Number(s.riskyMiles||25)) return {label:'Skip',color:C.danger,bg:C.dangerDim};
  if(miles>Number(s.riskyMiles||25)&&profit<skip+30) return {label:'Risky',color:C.warn,bg:C.warnDim};
  return {label:'Take',color:C.success,bg:C.successDim};
}
function weekSummary(wjobs,s){
  const revenue=r2(wjobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const directCosts=r2(wjobs.reduce((t,j)=>t+jobDirectCost(j,s),0));
  const gross=r2(revenue-directCosts);
  const fixed=weeklyFixed(s);
  const net=r2(gross-fixed);
  return {revenue,directCosts,gross,fixed,net,count:wjobs.length};
}

function getWeekStart(d){
  const dt=new Date(d+'T00:00:00'),day=dt.getDay();
  dt.setDate(dt.getDate()-(day>=5?day-5:day+2));
  return dt.toISOString().slice(0,10);
}
function weekLabel(s){
  const d=new Date(s+'T00:00:00'),e=new Date(d);e.setDate(e.getDate()+6);
  const f=dt=>dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${f(d)} – ${f(e)}`;
}
function nextFriday(){
  const d=new Date(),diff=d.getDay()===5?7:(5-d.getDay()+7)%7;
  d.setDate(d.getDate()+diff);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function groupByWeek(jobs){
  const m={};
  [...jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
    .forEach(j=>{const k=getWeekStart(j.date);if(!m[k])m[k]=[];m[k].push(j);});
  return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
}

// ── MIGRATION (preserves existing data) ──────────────────────────────────────
function migrateOldJobs(){
  const OLD=['wr-jobs-v5','wr-upgraded-jobs-v1','wr2-jobs-v1'];
  const cur=ls(KEYS.jobs,[]);
  const ids=new Set(cur.map(j=>String(j.id)));
  let mig=[...cur],count=0;
  OLD.forEach(k=>{try{const old=ls(k,[]);if(Array.isArray(old))old.forEach(j=>{if(!ids.has(String(j.id))){mig.push({...j,id:String(j.id),tireCost:j.tireCost||j.cost||0,miscCost:j.miscCost||0});ids.add(String(j.id));count++;}});}catch{}});
  if(count>0)lss(KEYS.jobs,mig);
  return mig;
}
function migrateOldInventory(){
  const OLD=['wr-tires-v1','wr-upgraded-inventory-v1','wr2-inventory-v1'];
  const cur=ls(KEYS.inventory,[]);
  let best=cur;
  OLD.forEach(k=>{try{const old=ls(k,[]);if(Array.isArray(old)&&old.length>best.length)best=old;}catch{}});
  if(best!==cur){
    const norm=best.map(item=>({id:item.id?String(item.id):('i'+Math.random().toString(36).slice(2,8)),size:item.size||'',qty:Number(item.qty||item.quantity||0),cost:Number(item.cost||item.price||0),notes:item.notes||''}));
    lss(KEYS.inventory,norm);return norm;
  }
  return best;
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────────
function exportCSV(jobs,settings){
  const h=['Date','Service','Area','Source','Revenue','Tire Cost','Misc Cost','Miles','Travel Cost','Direct Cost','Gross Profit','Payment','Tire Size','Qty','Emergency','Late Night','Notes'];
  const rows=[...jobs].sort((a,b)=>a.date.localeCompare(b.date)).map(j=>{
    const dc=jobDirectCost(j,settings),gp=jobGrossProfit(j,settings);
    return[j.date,j.service,j.area,j.source||'',Number(j.revenue||0).toFixed(2),Number(j.tireCost||0).toFixed(2),Number(j.miscCost||0).toFixed(2),Number(j.miles||0).toFixed(1),(Number(j.miles||0)*Number(settings.costPerMile||0.65)).toFixed(2),dc.toFixed(2),gp.toFixed(2),j.payment,j.tireSize||'',j.qty||1,j.emergency?'Yes':'No',j.lateNight?'Yes':'No',(j.note||'').replace(/,/g,' ')].map(v=>`"${v}"`).join(',');
  });
  const csv=[h.join(','),...rows].join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const a=document.createElement('a');a.href=url;a.download=`wheel-rush-${TODAY()}.csv`;a.click();
  URL.revokeObjectURL(url);
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [showP,setShowP]=useState(false);
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);

  const inpStyle={width:'100%',background:'rgba(255,255,255,.07)',border:'1.5px solid rgba(255,255,255,.12)',borderRadius:12,padding:'14px 16px',color:'#fff',fontSize:16,outline:'none',marginBottom:12,fontFamily:'inherit',boxSizing:'border-box'};

  const submit=async()=>{
    if(!email||!pass){setErr('Enter email and password.');return;}
    if(!_auth){setErr('App still loading — try again in a second.');return;}
    setBusy(true);setErr('');
    try{
      const c=mode==='login'
        ?await _auth.signInWithEmailAndPassword(email.trim(),pass)
        :await _auth.createUserWithEmailAndPassword(email.trim(),pass);
      onAuth(c.user);
    }catch(e){setErr(e.message||'Auth failed. Check your email and password.');}
    setBusy(false);
  };
  const google=async()=>{
    if(!_auth){setErr('App still loading — try again.');return;}
    try{const c=await _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());onAuth(c.user);}
    catch(e){setErr(e.message);}
  };
  const reset=async()=>{
    if(!email){setErr('Enter your email first.');return;}
    if(!_auth){setErr('App still loading — try again.');return;}
    try{await _auth.sendPasswordResetEmail(email.trim());setErr('✓ Reset link sent — check your email.');}
    catch(e){setErr(e.message);}
  };

  return(
    <div style={{height:'100%',background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',paddingBottom:'calc(32px + env(safe-area-inset-bottom))'}}>
      <img src={LOGO_SRC} alt="Wheel Rush" style={{width:80,height:80,borderRadius:18,marginBottom:20,objectFit:'contain'}}/>
      <div style={{fontSize:28,fontWeight:900,letterSpacing:'-0.03em',marginBottom:4}}>Wheel <span style={{color:C.orange}}>Rush</span></div>
      <div style={{fontSize:13,color:C.muted,marginBottom:32}}>Mobile Tire Repair · Miami, FL</div>
      {err&&<div style={{width:'100%',maxWidth:360,padding:'10px 14px',background:err.includes('sent')?C.successDim:C.dangerDim,border:`1px solid ${err.includes('sent')?C.success+'44':C.danger+'44'}`,borderRadius:10,fontSize:13,color:err.includes('sent')?C.success:C.danger,fontWeight:600,marginBottom:14}}>{err}</div>}
      <div style={{width:'100%',maxWidth:360}}>
        <input style={inpStyle} type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)}/>
        <div style={{position:'relative',marginBottom:12}}>
          <input style={{...inpStyle,marginBottom:0,paddingRight:48}} type={showP?'text':'password'} placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
          <button onClick={()=>setShowP(p=>!p)} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:16}}>{showP?'🙈':'👁'}</button>
        </div>
        <button onClick={submit} disabled={busy} style={{width:'100%',background:`linear-gradient(135deg,${C.orange},#CC4400)`,border:'none',borderRadius:12,padding:'14px',color:'#fff',fontWeight:800,fontSize:15,cursor:'pointer',marginBottom:10,opacity:busy?.6:1}}>
          {busy?'Working…':mode==='login'?'Sign In →':'Create Account →'}
        </button>
        <button onClick={google} style={{width:'100%',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:12,padding:'14px',color:C.text,fontWeight:700,fontSize:14,cursor:'pointer',marginBottom:16}}>
          Continue with Google
        </button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <button onClick={()=>{setMode(m=>m==='login'?'signup':'login');setErr('');}} style={{background:'none',border:'none',color:C.muted,fontSize:13,cursor:'pointer'}}>
            {mode==='login'?'Create account':'Sign in instead'}
          </button>
          {mode==='login'&&<button onClick={reset} style={{background:'none',border:'none',color:C.muted,fontSize:13,cursor:'pointer'}}>Forgot password?</button>}
        </div>
      </div>
    </div>
  );
}

  const dc   =useMemo(()=>jobDirectCost(form,settings),[form,settings]);
  const sugg =useMemo(()=>suggestedPrice(form,settings),[form,settings]);

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({jobs,varExpenses,settings,user,sync,onSignOut}){
  const today=TODAY(),thisWk=getWeekStart(today);
  const wjobs=useMemo(()=>jobs.filter(j=>getWeekStart(j.date)===thisWk),[jobs,thisWk]);
  const tjobs=useMemo(()=>jobs.filter(j=>j.date===today),[jobs,today]);
  const tot=useMemo(()=>weekSum(wjobs,settings),[wjobs,settings]);

  function weekSum(wj,s){
    const revenue=r2(wj.reduce((t,j)=>t+Number(j.revenue||0),0));
    const directCosts=r2(wj.reduce((t,j)=>t+jobDirectCost(j,s),0));
    const gross=r2(revenue-directCosts);
    const fixed=weeklyFixed(s);
    const net=r2(gross-fixed);
    return {revenue,directCosts,gross,fixed,net,count:wj.length};
  }

  const avg=wjobs.length?r2(tot.gross/wjobs.length):0;
  const goalPct=clamp((tot.net/(settings.weeklyGoal||1))*100,0,100);
  const jobsNeeded=avg>0?Math.max(0,Math.ceil(((settings.weeklyGoal||0)-tot.net)/avg)):0;
  const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
  const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
  const o1=tot.net>0&&ao1?r2(tot.net*(Number(settings.profitSplit1||50)/st)):0;
  const o2=tot.net>0&&ao2?r2(tot.net*(Number(settings.profitSplit2||50)/st)):0;
  const tax=tot.net>0&&settings.taxRate>0?r2(tot.net*(Number(settings.taxRate)/100)):0;

  const bySvc={};wjobs.forEach(j=>{if(!bySvc[j.service])bySvc[j.service]={gp:0,count:0};bySvc[j.service].gp+=jobGrossProfit(j,settings);bySvc[j.service].count++;});
  const bestSvc=Object.entries(bySvc).sort((a,b)=>b[1].gp-a[1].gp)[0];
  const byCity={};wjobs.forEach(j=>{if(!byCity[j.area])byCity[j.area]=0;byCity[j.area]+=jobGrossProfit(j,settings);});
  const bestCity=Object.entries(byCity).sort((a,b)=>b[1]-a[1])[0];

  const syncDot=sync==='connected'?'🟢':sync==='syncing'?'🟡':'⚫';
  const now=new Date();
  const wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];

  return(
    <div className="screen"><div className="page">
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <img src={LOGO_SRC} alt="Wheel Rush" style={{width:48,height:48,borderRadius:14,objectFit:'contain'}}/>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:'-0.02em',lineHeight:1.1}}>Wheel <span style={{color:C.orange}}>Rush</span></div>
            <div style={{fontSize:11,color:C.muted}}>Mobile Tire Repair · 305-897-7030</div>
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text}}>{wd} · {now.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>
            {syncDot} {sync==='connected'?'Synced':sync==='syncing'?'Sync…':'Local only'}
          </div>
        </div>
      </div>

      {/* Hero card */}
      <div style={{background:`linear-gradient(135deg,${C.card} 0%,#1A1000 100%)`,border:`1px solid ${C.border}`,borderRadius:20,padding:20,marginBottom:12,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,right:-20,width:100,height:100,borderRadius:'50%',background:C.orange+'08'}}/>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.1em',color:C.muted,textTransform:'uppercase',marginBottom:8}}>Net Profit This Week</div>
        <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:48,fontWeight:900,color:tot.net>=0?C.success:C.danger,letterSpacing:'-0.03em',lineHeight:1}}>{fmt(tot.net)}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:6}}>After direct costs and fixed expenses</div>
        <div style={{marginTop:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:12,color:C.muted}}>Weekly Goal Progress</span>
            <span style={{fontSize:12,fontWeight:700,color:goalPct>=100?C.success:C.orange}}>{goalPct.toFixed(0)}%</span>
          </div>
          <ProgressBar value={tot.net} max={settings.weeklyGoal} color={goalPct>=100?C.success:C.orange}/>
          <div style={{fontSize:11,color:C.subtle,marginTop:6}}>Goal: {fmt(settings.weeklyGoal)} · {wjobs.length} jobs · next payout: {nextFriday()}</div>
        </div>
      </div>

      {/* Today */}
      {tjobs.length>0&&(
        <>
          <SectionLabel>Today</SectionLabel>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
            {[[tjobs.length,'Jobs',C.text],[fmt(tjobs.reduce((s,j)=>s+Number(j.revenue||0),0)),'Revenue',C.orange],[fmt(tjobs.reduce((s,j)=>s+jobGrossProfit(j,settings),0)),'Gross Profit',C.success]].map(([v,l,co])=>(
              <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:20,fontWeight:800,color:co}}>{v}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>

      )}

      <SectionLabel>This Week</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        {[[fmt(tot.revenue),'Revenue',C.text],[fmt(tot.gross),'Gross Profit',C.orange],[fmt(tot.directCosts),'Direct Costs',C.muted],[fmt(tot.fixed),'Weekly Fixed',C.muted]].map(([v,l,co])=>(
          <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:20,fontWeight:800,color:co}}>{v}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Insights */}
      <SectionLabel>Insights</SectionLabel>
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:26,fontWeight:800}}>{fmt(avg)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>Avg Gross Profit per Job</div>
          </div>
          {jobsNeeded>0?<div style={{textAlign:'right'}}><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:26,fontWeight:800,color:C.orange}}>{jobsNeeded}</div><div style={{fontSize:11,color:C.muted}}>Jobs to Hit Goal</div></div>:<Badge label="🎉 Goal Reached!" color={C.success}/>}
        </div>
      </Card>
      {bestSvc&&<Card style={{borderColor:C.orange+'33'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.orangeDim,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="star" size={16} color={C.orange}/></div>
          <div><div style={{fontSize:12,color:C.muted,fontWeight:600}}>Most Profitable Service</div><div style={{fontSize:15,fontWeight:800}}>{bestSvc[0]}</div><div style={{fontSize:11,color:C.muted}}>{fmt(bestSvc[1].gp)} gross · {bestSvc[1].count} jobs</div></div>
        </div>
      </Card>}
      {bestCity&&<Card>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.successDim,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="trend" size={16} color={C.success}/></div>

          {fmt(tot.revenue)} rev − {fmt(tot.directCosts)} costs = {fmt(tot.gross)} gross<br/>
          {fmt(tot.gross)} gross − {fmt(tot.fixed)} fixed = {fmt(tot.net)} net
        </div>
      </Card>
    </div></div>
  );
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function History({jobs,settings,setJobs,delJob,onOpenJob}){
  const [search,setSearch]=useState('');
  const [filterSvc,setFilterSvc]=useState('All');
  const filtered=useMemo(()=>{
    return jobs.filter(j=>{
      const q=search.toLowerCase();
      const mQ=!q||j.area?.toLowerCase().includes(q)||j.service?.toLowerCase().includes(q)||(j.tireSize||'').toLowerCase().includes(q)||(j.customerName||'').toLowerCase().includes(q);
      const mS=filterSvc==='All'||j.service===filterSvc;
      return mQ&&mS;
    });
  },[jobs,search,filterSvc]);
  const grouped=useMemo(()=>groupByWeek(filtered),[filtered]);
  const weekGross=useMemo(()=>{const tw=getWeekStart(TODAY());return jobs.filter(j=>getWeekStart(j.date)===tw).reduce((s,j)=>s+jobGrossProfit(j,settings),0);},[jobs,settings]);

  return(
    <div className="screen"><div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:20,fontWeight:900}}>Job History</div>
        <button onClick={()=>onOpenJob(null)} style={{background:C.orange,border:'none',borderRadius:10,padding:'8px 14px',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}><Icon name="plus" size={14} color="#fff"/>Log Job</button>
      </div>
      <div style={{position:'relative',marginBottom:12}}>
        <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><Icon name="search" size={16} color={C.subtle}/></div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search city, service, tire size..."
          style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'11px 12px 11px 36px',color:C.text,fontSize:14,outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
      </div>
      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4,marginBottom:14}}>
        {['All',...SERVICE_OPTIONS.slice(0,4)].map(s=>(
          <button key={s} onClick={()=>setFilterSvc(s)} style={{padding:'6px 13px',borderRadius:20,border:'none',whiteSpace:'nowrap',cursor:'pointer',fontSize:12,fontWeight:600,background:filterSvc===s?C.orange:C.card,color:filterSvc===s?'#fff':C.muted,flexShrink:0}}>{s}</button>
        ))}
      </div>
      {grouped.map(([ws,wjobs])=>{
        const wGP=wjobs.reduce((s,j)=>s+jobGrossProfit(j,settings),0);
        return(
          <div key={ws} style={{marginBottom:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted}}>{weekLabel(ws)}</div>
              <div style={{fontSize:12,color:C.muted}}>{wjobs.length} jobs · <span style={{color:C.orange,fontWeight:700}}>{fmt(wGP)} GP</span></div>
            </div>
            {wjobs.map(j=>{
              const gp=jobGrossProfit(j,settings);
              const dec=jobDecision(j,settings,weekGross);
              return(
                <div key={j.id} onClick={()=>onOpenJob(j)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:8,cursor:'pointer'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:800}}>{j.service}</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:2}}>{j.area}{j.tireSize?' · '+j.tireSize:''}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:15,fontWeight:800}}>{fmt(j.revenue)}</div>
                      <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,fontWeight:700,color:gp>=0?C.success:C.danger}}>{fmt(gp)} GP</div>
                    </div>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginTop:10}}>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <Badge label={j.source||'—'} color={C.muted} bg={C.border}/>
                      <Badge label={j.payment} color={C.muted} bg={C.border}/>
                      <Badge label={dec.label} color={dec.color} bg={dec.bg}/>
                      {j.tireSize&&<Badge label={j.tireSize} color={C.muted} bg={C.border}/>}
                    </div>
                    <button onClick={e=>{e.stopPropagation();if(window.confirm('Delete this job?'))delJob(j.id);}} style={{background:'transparent',border:'none',cursor:'pointer',padding:'4px',flexShrink:0}}>
                      <Icon name="trash" size={14} color={C.subtle}/>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {filtered.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:C.muted}}><div style={{fontSize:32,marginBottom:12}}>🔍</div><div style={{fontWeight:700}}>No jobs found</div></div>}
    </div></div>
  );
}

// ── PAYOUTS ───────────────────────────────────────────────────────────────────
function Payouts({jobs,settings}){
  const grouped=useMemo(()=>groupByWeek(jobs),[jobs]);
  return(
    <div className="screen"><div className="page">
      <div style={{fontSize:20,fontWeight:900,marginBottom:4}}>Payouts</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Weekly breakdown and take-home projections</div>
      {grouped.length===0&&<div style={{textAlign:'center',padding:'60px 0',color:C.muted}}><div style={{fontSize:36,marginBottom:12}}>💰</div><div style={{fontWeight:700}}>No jobs logged yet</div></div>}
      {grouped.map(([ws,wjobs])=>{
        const rev=r2(wjobs.reduce((s,j)=>s+Number(j.revenue||0),0));
        const dc=r2(wjobs.reduce((s,j)=>s+jobDirectCost(j,settings),0));
        const gross=r2(rev-dc);
        const fixed=weeklyFixed(settings);
        const net=r2(gross-fixed);
        const tax=net>0&&settings.taxRate>0?r2(net*(Number(settings.taxRate)/100)):0;
        const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
        const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
        const o1=net>0&&ao1?r2(net*(Number(settings.profitSplit1||50)/st)):0;
        const o2=net>0&&ao2?r2(net*(Number(settings.profitSplit2||50)/st)):0;
        return(
          <Card key={ws} style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div><div style={{fontSize:13,fontWeight:700}}>{weekLabel(ws)}</div><div style={{fontSize:11,color:C.muted}}>{wjobs.length} jobs</div></div>
              <div style={{textAlign:'right'}}><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:24,fontWeight:900,color:net>=0?C.orange:C.danger}}>{fmt(Math.max(o1,o2))}</div><div style={{fontSize:11,color:C.muted}}>take-home</div></div>
            </div>
            <Divider/>
            {[['Revenue',fmt(rev),C.text],['Direct Costs','– '+fmt(dc),C.muted],['Gross Profit',fmt(gross),C.orange],['Weekly Fixed Exp.','– '+fmt(fixed),C.muted],['Net Profit',fmt(net),net>=0?C.success:C.danger]].map(([l,v,co])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:13,color:C.muted}}>{l}</span>
                <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:13,fontWeight:700,color:co}}>{v}</span>
              </div>
            ))}
            <Divider/>
            {[{n:settings.owner1Name||'Owner 1',a:o1,p:settings.profitSplit1||50,active:ao1},{n:settings.owner2Name||'Owner 2',a:o2,p:settings.profitSplit2||50,active:ao2}].filter(o=>o.active).map((o,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:C.orangeDim,borderRadius:10,marginBottom:6}}>
                <div><div style={{fontSize:12,fontWeight:700,color:C.orange}}>{o.n}</div><div style={{fontSize:11,color:C.muted}}>{o.p}% split</div></div>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:18,fontWeight:900,color:C.orange}}>{fmt(o.a)}</div>
              </div>
            ))}
            {tax>0&&<div style={{padding:'10px 12px',background:C.warnDim,borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.warn}}>Tax Reserve ({settings.taxRate}%)</div><div style={{fontSize:11,color:C.muted}}>Set this aside</div></div>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:16,fontWeight:800,color:C.warn}}>{fmt(tax)}</div>
            </div>}
          </Card>
        );
      })}
    </div></div>
  );
}

// ── STOCK (INVENTORY) ─────────────────────────────────────────────────────────
function Stock({inventory,setInventory}){
  const [search,setSearch]=useState('');
  const [editId,setEditId]=useState(null);

  const totalQty=inventory.reduce((s,i)=>s+Number(i.qty||0),0);
  const totalVal=inventory.reduce((s,i)=>s+Number(i.qty||0)*Number(i.cost||0),0);
  const lowStock=inventory.filter(i=>Number(i.qty||0)>0&&Number(i.qty||0)<=LOW_STOCK);
  const outOfStock=inventory.filter(i=>Number(i.qty||0)===0);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return [...inventory].filter(i=>!q||i.size.toLowerCase().includes(q)||(i.notes||'').toLowerCase().includes(q)).sort((a,b)=>a.size.localeCompare(b.size));
  },[inventory,search]);

  const update=(id,patch)=>setInventory(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));
  const step=(id,delta)=>setInventory(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(0,(Number(i.qty)||0)+delta)}:i));
  const remove=id=>{if(!window.confirm('Remove this tire?'))return;setInventory(prev=>prev.filter(i=>i.id!==id));};
  const add=()=>setInventory(prev=>[{id:uid(),size:'',qty:0,cost:0,notes:''},...prev]);

  return(
    <div className="screen"><div className="page">
      <div style={{fontSize:20,fontWeight:900,marginBottom:16}}>Inventory</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        {[[totalQty,'Total Tires',C.text],[fmt(totalVal),'Stock Value',C.orange],[lowStock.length,'Low Stock',C.warn],[outOfStock.length,'Out of Stock',C.danger]].map(([v,l,co])=>(
          <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:22,fontWeight:800,color:co}}>{v}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>

      {outOfStock.length>0&&(
        <div style={{background:C.dangerDim,border:`1px solid ${C.danger}44`,borderRadius:12,padding:'10px 14px',marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:C.danger,marginBottom:4}}>🚫 Out of Stock</div>
          {outOfStock.map(i=><div key={i.id} style={{fontSize:12,color:C.danger}}>{i.size||'Unnamed'}</div>)}
        </div>
      )}
      {lowStock.length>0&&(
        <div style={{background:C.warnDim,border:`1px solid ${C.warn}44`,borderRadius:12,padding:'10px 14px',marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:C.warn,marginBottom:4}}>⚠️ Low Stock (≤{LOW_STOCK})</div>
          {lowStock.map(i=><div key={i.id} style={{fontSize:12,color:C.warn}}>{i.size} — {i.qty} left</div>)}
        </div>
      )}

      <div style={{display:'flex',gap:10,marginBottom:12}}>
        <div style={{position:'relative',flex:1}}>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}><Icon name="search" size={16} color={C.subtle}/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tire size..."
            style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'10px 12px 10px 36px',color:C.text,fontSize:14,outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
        </div>
        <button onClick={add} style={{background:C.orange,border:'none',borderRadius:12,padding:'10px 16px',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',flexShrink:0}}>+ Add</button>
      </div>

      {filtered.map((item,idx)=>{
        const qty=Number(item.qty||0);
        const isLow=qty>0&&qty<=LOW_STOCK;
        const isOut=qty===0;
        const isEditing=editId===item.id;
        return(
          <div key={item.id} style={{background:isOut?C.dangerDim:isLow?C.warnDim:C.card,border:`1px solid ${isOut?C.danger+'44':isLow?C.warn+'44':C.border}`,borderRadius:14,marginBottom:8,overflow:'hidden'}}>
            {/* Main row */}
            <div style={{display:'flex',alignItems:'center',padding:'12px 14px',gap:10,cursor:'pointer'}} onClick={()=>setEditId(isEditing?null:item.id)}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontWeight:700,fontSize:15,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.size||<span style={{color:C.muted}}>No size set</span>}</div>
                {item.notes&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{item.notes}</div>}
              </div>
              {isOut&&<Badge label="OUT" color={C.danger}/>}
              {isLow&&!isOut&&<Badge label="LOW" color={C.warn}/>}
              {/* Stepper */}
              <div style={{display:'flex',alignItems:'center',gap:0,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden',flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>step(item.id,-1)} style={{background:C.surface,border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:C.text,cursor:'pointer'}}>−</button>
                <div style={{width:40,textAlign:'center',fontFamily:'"JetBrains Mono",monospace',fontWeight:700,fontSize:15,color:isOut?C.danger:isLow?C.warn:C.text}}>{qty}</div>
                <button onClick={()=>step(item.id,1)} style={{background:C.surface,border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:C.text,cursor:'pointer'}}>+</button>
              </div>
              <div style={{color:C.subtle,fontSize:11}}>{isEditing?'▲':'▼'}</div>
            </div>
            {/* Edit panel */}
            {isEditing&&(
              <div style={{padding:'0 14px 14px',background:'rgba(0,0,0,.2)',display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:8,alignItems:'center'}}>
                <input value={item.size} onChange={e=>update(item.id,{size:e.target.value})} placeholder="225/55R17"
                  style={{border:`1px solid ${C.border}`,borderRadius:9,padding:'9px 12px',fontSize:15,fontFamily:'"JetBrains Mono",monospace',fontWeight:700,outline:'none',width:'100%',background:C.surface,color:C.text}}/>
                <input type="number" value={item.cost||''} onChange={e=>update(item.id,{cost:Number(e.target.value||0)})} placeholder="Cost $"
                  style={{border:`1px solid ${C.border}`,borderRadius:9,padding:'9px 12px',fontSize:14,outline:'none',width:'100%',background:C.surface,color:C.text,fontFamily:'inherit'}}/>
                <button onClick={()=>remove(item.id)} style={{background:C.dangerDim,border:`1px solid ${C.danger}44`,borderRadius:9,padding:'8px 12px',color:C.danger,fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>Remove</button>
              </div>
            )}
          </div>
        );
      })}
    </div></div>
  );
}

// ── EXPENSES ──────────────────────────────────────────────────────────────────
function Expenses({varExpenses,setVarExpenses}){
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({date:TODAY(),category:'Fuel',amount:'',note:''});
  const total=varExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const thisWkTotal=varExpenses.filter(e=>getWeekStart(e.date)===getWeekStart(TODAY())).reduce((s,e)=>s+Number(e.amount||0),0);
  const save=()=>{if(!form.amount)return;setVarExpenses(p=>[{...form,id:uid(),amount:parseFloat(form.amount)},...p]);setForm({date:TODAY(),category:'Fuel',amount:'',note:''});setShowModal(false);};
  const del=id=>{if(!window.confirm('Delete?'))return;setVarExpenses(p=>p.filter(e=>e.id!==id));};

  return(
    <div className="screen"><div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <div style={{fontSize:20,fontWeight:900}}>Expenses</div>
        <button onClick={()=>setShowModal(true)} style={{background:C.orange,border:'none',borderRadius:10,padding:'8px 14px',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}><Icon name="plus" size={14} color="#fff"/>Add</button>
      </div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Track fuel, supplies, tools and field costs</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        {[[fmt(thisWkTotal),'This Week',C.danger],[fmt(total),'All Time',C.muted]].map(([v,l,co])=>(
          <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:22,fontWeight:800,color:co}}>{v}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {['Fuel','Tolls','Supplies'].map(cat=>(
          <button key={cat} onClick={()=>{setForm(f=>({...f,category:cat}));setShowModal(true);}} style={{padding:'8px 14px',background:C.card,border:`1px solid ${C.border}`,borderRadius:20,color:C.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>+ {cat}</button>
        ))}
      </div>
      {varExpenses.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:C.muted}}><div style={{fontSize:36,marginBottom:12}}>📋</div><div style={{fontWeight:700,marginBottom:4}}>No expenses logged yet</div><div style={{fontSize:12}}>Track fuel and supplies daily</div></div>}
      {[...varExpenses].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>(
        <div key={e.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontSize:14,fontWeight:700}}>{e.category}</div>{e.note&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{e.note}</div>}<div style={{fontSize:11,color:C.subtle,marginTop:2}}>{e.date}</div></div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:16,fontWeight:800,color:C.danger}}>– {fmt(e.amount)}</div>
            <button onClick={()=>del(e.id)} style={{background:'transparent',border:'none',cursor:'pointer'}}><Icon name="trash" size={16} color={C.subtle}/></button>
          </div>
        </div>
      ))}
      {showModal&&(
        <div style={{position:'fixed',inset:0,background:'#000C',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
          <div style={{background:C.surface,borderRadius:'20px 20px 0 0',width:'100%',maxWidth:430,padding:'20px 16px 40px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontSize:17,fontWeight:800}}>Log Expense</div>
              <button onClick={()=>setShowModal(false)} style={{background:C.card,border:'none',borderRadius:20,width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="x" size={16} color={C.muted}/></button>
            </div>
            <FInput label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
            <FSelect label="Category" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={EXP_CATS}/>
            <FInput label="Amount ($)" type="number" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} placeholder="0.00" autoFocus/>
            <FInput label="Note (optional)" value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} placeholder="What was this for?"/>
            <button onClick={save} style={{width:'100%',background:`linear-gradient(135deg,${C.orange},#CC4400)`,border:'none',borderRadius:12,padding:'14px',color:'#fff',fontWeight:800,fontSize:15,cursor:'pointer'}}>Save Expense</button>
          </div>
        </div>
      )}
    </div></div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,jobs,inventory,varExpenses,user,sync,onSignOut}){
  const [s,setS]=useState({...DEFAULT_SETTINGS,...settings});
  const [newExp,setNewExp]=useState({name:'',monthly:''});
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setS(p=>({...p,[k]:v}));
  const addFixed=()=>{if(!newExp.name||!newExp.monthly)return;setS(p=>({...p,expenses:[...p.expenses,{id:uid(),name:newExp.name,amount:parseFloat(newExp.monthly),active:true}]}));setNewExp({name:'',monthly:''});};
  const delFixed=id=>setS(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
  const updFixed=(id,patch)=>setS(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...patch}:e)}));
  const wFixed=r2((s.expenses||[]).filter(e=>e.active).reduce((sum,e)=>sum+Number(e.amount||0),0)*12/52);

  const saveSettings=()=>{setSettings(s);setSaved(true);setTimeout(()=>setSaved(false),2000);};

  const exportCSVClick=()=>exportCSV(jobs,s);
  const exportJSON=()=>{
    const d={jobs,inventory,settings:s,varExpenses,exportedAt:new Date().toISOString(),version:'3'};
    const url=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));
    const a=document.createElement('a');a.href=url;a.download=`wheel-rush-backup-${TODAY()}.json`;a.click();URL.revokeObjectURL(url);
  };
  const importJSON=()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.settings)setS({...DEFAULT_SETTINGS,...d.settings});alert('Import complete. Save settings to apply.');}catch{alert('Invalid backup file.');}};inp.click();
  };

  return(
    <div className="screen"><div className="page">
      <div style={{fontSize:20,fontWeight:900,marginBottom:20}}>Settings</div>
      {saved&&<div style={{background:C.successDim,border:`1px solid ${C.success}44`,borderRadius:12,padding:'10px 14px',marginBottom:14,fontSize:13,fontWeight:700,color:C.success}}>✓ Settings saved</div>}

      <SectionLabel>Business</SectionLabel>
      <Card>
        <FInput label="Business Name" value={s.businessName||''} onChange={v=>set('businessName',v)}/>
        <FInput label="Google Review URL" value={s.googleReviewUrl||''} onChange={v=>set('googleReviewUrl',v)}/>
        {(s.googleReviewUrl||'').trim()&&<button onClick={()=>window.open(s.googleReviewUrl,'_blank')} style={{width:'100%',background:C.successDim,border:`1px solid ${C.success}44`,borderRadius:10,padding:'10px',color:C.success,fontWeight:700,fontSize:13,cursor:'pointer',marginBottom:0}}>✓ Test Review Link</button>}
      </Card>

      <SectionLabel>Owners & Payout</SectionLabel>
      <Card>
        {[{nk:'owner1Name',pk:'profitSplit1',ak:'owner1Active',label:'Owner 1'},{nk:'owner2Name',pk:'profitSplit2',ak:'owner2Active',label:'Owner 2'}].map(({nk,pk,ak,label})=>{
          const isOn=s[ak]!==false;
          return(
            <div key={nk} style={{padding:'12px 0',borderBottom:`1px solid ${C.border}`,opacity:isOn?1:0.45,lastChild:{borderBottom:'none'}}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:isOn?10:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>{label}</div>
                {/* Toggle on/off */}
                <button onClick={()=>set(ak,!isOn)} style={{
                  width:44,height:26,borderRadius:13,border:'none',cursor:'pointer',
                  background:isOn?C.orange:C.subtle,position:'relative',flexShrink:0,
                  transition:'background .2s'
                }}>
                  <div style={{position:'absolute',top:3,left:isOn?21:3,width:20,height:20,borderRadius:10,background:'#fff',transition:'left .2s',boxShadow:'0 1px 3px #0004'}}/>
                </button>
              </div>
              {isOn&&(
                <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,alignItems:'center'}}>
                  <input value={s[nk]||''} onChange={e=>set(nk,e.target.value)} placeholder={label+' name'}
                    style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 12px',color:C.text,fontSize:14,outline:'none',fontFamily:'inherit',width:'100%'}}/>
                  <div>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4,textAlign:'center'}}>Split %</div>
                    <input type="number" min="0" max="100" value={s[pk]||0} onChange={e=>set(pk,Number(e.target.value||0))}
                      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 0',color:C.text,fontSize:14,fontFamily:'"JetBrains Mono",monospace',fontWeight:700,outline:'none',width:72,textAlign:'center'}}/>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {(s.owner1Active!==false&&s.owner2Active!==false)&&(Number(s.profitSplit1||0)+Number(s.profitSplit2||0))!==100&&(
          <div style={{fontSize:12,color:C.warn,fontWeight:600,paddingTop:10}}>⚠️ Splits must add to 100% (currently {Number(s.profitSplit1||0)+Number(s.profitSplit2||0)}%)</div>
        )}
      </Card>

      <SectionLabel>Goals & Tax</SectionLabel>
      <Card>
        <FInput label="Weekly Net Profit Goal ($)" type="number" value={s.weeklyGoal} onChange={v=>set('weeklyGoal',parseFloat(v)||0)}/>
        <div style={{marginBottom:0}}>
          <div style={{fontSize:12,color:C.muted,fontWeight:600,marginBottom:6}}>Tax Reserve Rate ({s.taxRate}%)</div>
          <input type="range" min={10} max={40} value={s.taxRate} onChange={e=>set('taxRate',parseInt(e.target.value))} style={{width:'100%',accentColor:C.orange}}/>
          <div style={{fontSize:11,color:C.muted,marginTop:4}}>Reserve {s.taxRate}% of net profit — <span style={{color:C.warn}}>don't spend this</span></div>
        </div>
      </Card>

      <SectionLabel>Pricing Targets</SectionLabel>
      <Card>
        <FInput label={`Repair / Service — Min Gross ($${s.repairTarget})`} type="number" value={s.repairTarget} onChange={v=>set('repairTarget',parseFloat(v)||0)}/>
        <FInput label={`Replacement / Install — Min Gross ($${s.replacementTarget})`} type="number" value={s.replacementTarget} onChange={v=>set('replacementTarget',parseFloat(v)||0)} style={{marginBottom:0}}/>
      </Card>

      <SectionLabel>Travel & Mileage</SectionLabel>
      <Card>
        <FInput label="Cost Per Mile ($)" type="number" value={s.costPerMile||0.65} onChange={v=>set('costPerMile',parseFloat(v)||0)} placeholder="0.65"/>
        <div style={{marginBottom:0}}>
          <div style={{fontSize:12,color:C.muted,fontWeight:600,marginBottom:6}}>Skip threshold: ${s.skipThreshold} gross profit</div>
          <input type="range" min={30} max={150} value={s.skipThreshold} onChange={e=>set('skipThreshold',parseInt(e.target.value))} style={{width:'100%',accentColor:C.orange}}/>
          <div style={{fontSize:11,color:C.muted,marginTop:4}}>Jobs below ${s.skipThreshold} gross = "Skip" decision</div>
        </div>
      </Card>

      <SectionLabel>Monthly Fixed Expenses</SectionLabel>
      <Card>
        <div style={{fontSize:11,color:C.muted,marginBottom:12}}>÷ 4.33 weeks → currently {money(wFixed)}/week deducted from gross</div>
        {(s.expenses||[]).map(e=>(
          <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{flex:1,marginRight:8}}>
              <input value={e.name} onChange={x=>updFixed(e.id,{name:x.target.value})} style={{background:'transparent',border:'none',color:C.text,fontSize:13,fontWeight:600,fontFamily:'inherit',width:'100%',outline:'none'}}/>
              <div style={{fontSize:12,color:C.muted}}>{money(e.amount)}/mo</div>
            </div>
            <input type="number" value={e.amount||''} onChange={x=>updFixed(e.id,{amount:Number(x.target.value||0)})} style={{width:80,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 8px',color:C.text,fontSize:13,outline:'none',fontFamily:'"JetBrains Mono",monospace',marginRight:8}}/>
            <button onClick={()=>delFixed(e.id)} style={{background:'transparent',border:'none',cursor:'pointer'}}><Icon name="trash" size={16} color={C.danger}/></button>
          </div>
        ))}
        <div style={{marginTop:12,display:'flex',gap:8}}>
          <input value={newExp.name} onChange={e=>setNewExp(p=>({...p,name:e.target.value}))} placeholder="Expense name" style={{flex:2,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'9px 11px',color:C.text,fontSize:13,outline:'none',fontFamily:'inherit'}}/>
          <input value={newExp.monthly} onChange={e=>setNewExp(p=>({...p,monthly:e.target.value}))} placeholder="$/mo" type="number" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'9px 11px',color:C.text,fontSize:13,outline:'none',fontFamily:'inherit'}}/>
          <button onClick={addFixed} style={{background:C.orange,border:'none',borderRadius:10,padding:'9px 13px',cursor:'pointer'}}><Icon name="plus" size={16} color="#fff"/></button>
        </div>
      </Card>

      <SectionLabel>Data & Export</SectionLabel>
      <Card>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <button onClick={exportCSVClick} style={{width:'100%',background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'11px',color:C.text,fontWeight:600,fontSize:13,cursor:'pointer'}}>📊 Export CSV (QuickBooks / Excel)</button>
          <button onClick={exportJSON} style={{width:'100%',background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'11px',color:C.text,fontWeight:600,fontSize:13,cursor:'pointer'}}>💾 Export Full Backup (JSON)</button>
          <button onClick={importJSON} style={{width:'100%',background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'11px',color:C.muted,fontWeight:600,fontSize:13,cursor:'pointer'}}>📥 Import Backup</button>
        </div>
      </Card>

      <button onClick={saveSettings} style={{width:'100%',background:`linear-gradient(135deg,${C.orange},#CC4400)`,border:'none',borderRadius:12,padding:'14px',color:'#fff',fontWeight:800,fontSize:15,cursor:'pointer',marginTop:4,marginBottom:16}}>Save Settings</button>

      <SectionLabel>Account</SectionLabel>
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>Signed in as</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{user?.email||'—'}</div>
          </div>
          <div style={{width:10,height:10,borderRadius:'50%',background:sync==='connected'?C.success:sync==='syncing'?C.warn:C.subtle,flexShrink:0}}/>
        </div>
        <div style={{fontSize:11,color:C.muted,marginBottom:14,lineHeight:1.6}}>
          {sync==='connected'?'✓ Data synced across all your devices':sync==='syncing'?'Syncing…':'Not synced — data saved locally only'}
        </div>
        <button onClick={()=>{
          if(!window.confirm('Sign out? Your data is saved to Firebase.')) return;
          onSignOut();
        }} style={{width:'100%',background:C.dangerDim,border:`1px solid ${C.danger}44`,borderRadius:10,padding:'12px',color:C.danger,fontWeight:700,fontSize:14,cursor:'pointer'}}>
          Sign Out
        </button>
      </Card>
    </div></div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [tab,setTab]=useState('dashboard');
  const [jobs,setJobsRaw]=useState(()=>migrateOldJobs());
  const [settings,setSettingsRaw]=useState(()=>({...DEFAULT_SETTINGS,...ls(KEYS.settings,{})}));
  const [inventory,setInventoryRaw]=useState(()=>migrateOldInventory());
  const [varExpenses,setVarExpRaw]=useState(()=>ls(KEYS.expenses,[]));
  const [showJob,setShowJob]=useState(null); // null=closed, {}=new, job=edit
  const [sync,setSync]=useState('local');
  const authInit=useRef(false);

  // Persist wrappers
  const setJobs=useCallback(v=>{const n=typeof v==='function'?v(jobs):v;setJobsRaw(n);lss(KEYS.jobs,n);},[jobs]);
  const setSettings=useCallback(v=>{const n=typeof v==='function'?v(settings):v;setSettingsRaw(n);lss(KEYS.settings,n);},[settings]);
  const setInventory=useCallback(v=>{const n=typeof v==='function'?v(inventory):v;setInventoryRaw(n);lss(KEYS.inventory,n);},[inventory]);
  const setVarExpenses=useCallback(v=>{const n=typeof v==='function'?v(varExpenses):v;setVarExpRaw(n);lss(KEYS.expenses,n);},[varExpenses]);

  // Auth — poll until _auth is ready (Firebase scripts load async on mobile)
  useEffect(()=>{
    let unsub=null;
    const tryAuth=()=>{
      if(!_auth){ setTimeout(tryAuth,150); return; }
      unsub=_auth.onAuthStateChanged(u=>{
        if(!u){setUser(null);setSync('local');authInit.current=false;setAuthReady(true);return;}
        if(authInit.current){setAuthReady(true);return;}
        authInit.current=true;
        setUser(u);setAuthReady(true);
      });
    };
    tryAuth();
    return ()=>{ if(unsub) unsub(); };
  },[]);

  // Firebase listeners
  useEffect(()=>{
    if(!user||!_db) return;
    setSync('syncing');
    // Jobs listener — Firebase is single source of truth when logged in.
    // On first sign-in, upload any local-only jobs then defer to Firebase.
    let jobsBootstrapped = false;
    const u1=fbListen(jobCol(),docs=>{
      if(docs.length>0){
        // Firebase has data — it's authoritative. Use it directly.
        // Only on very first snapshot: check for local-only jobs to upload.
        if(!jobsBootstrapped){
          jobsBootstrapped=true;
          const local=ls(KEYS.jobs,[]);
          const fbIds=new Set(docs.map(d=>String(d.id)));
          const localOnly=local.filter(j=>!fbIds.has(String(j.id)));
          if(localOnly.length){
            // Upload jobs that exist locally but not in Firebase
            fbBatch(jobCol(),localOnly);
            const merged=[...docs,...localOnly];
            setJobsRaw(merged);lss(KEYS.jobs,merged);
            return;
          }
        }
        // Normal sync — Firebase wins, period.
        setJobsRaw(docs);lss(KEYS.jobs,docs);
      } else {
        // Firebase empty — upload local jobs (first-time sync)
        const local=ls(KEYS.jobs,[]);
        if(local.length){ fbBatch(jobCol(),local); setJobsRaw(local); }
      }
      setSync('connected');
    });
    const u2=fbListen(invCol(),docs=>{
      if(docs.length>0){setInventoryRaw(docs);lss(KEYS.inventory,docs);}
      else{const l=ls(KEYS.inventory,[]);if(l.length){fbBatch(invCol(),l);}}
    });
    const u3=fbListen(expCol(),docs=>{
      if(docs.length>0){setVarExpRaw(docs);lss(KEYS.expenses,docs);}
      else{const l=ls(KEYS.expenses,[]);if(l.length){fbBatch(expCol(),l);}}
    });
    return ()=>{u1();u2();u3();};
  },[user]);

  // Sync inventory changes
  useEffect(()=>{if(user)fbBatch(invCol(),inventory);},[inventory,user]);
  // Sync var expenses
  useEffect(()=>{if(user)inventory.forEach&&fbBatch(expCol(),varExpenses);},[varExpenses,user]);

  const saveJob=useCallback((form,andAdd)=>{
    const entry={...form,id:form.id||uid()};
    const isEdit=jobs.some(j=>j.id===entry.id);
    setJobs(prev=>isEdit?prev.map(j=>j.id===entry.id?entry:j):[entry,...prev.filter(j=>j.id!==entry.id)]);
    if(user)fbSet(jobCol(),entry.id,entry);
    setShowJob(null);
  },[jobs,user]);

  const delJob=useCallback(id=>{const sid=String(id);setJobs(prev=>prev.filter(j=>String(j.id)!==sid));if(user)fbDel(jobCol(),sid);},[user]);
  const signOut=async()=>{try{await _auth?.signOut();}catch{}setUser(null);setSync('local');authInit.current=false;};

  if(!authReady) return(
    <div style={{height:'100%',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <img src={LOGO_SRC} alt="Wheel Rush" style={{width:64,height:64,borderRadius:16,objectFit:'contain',opacity:.7}}/>
      <div style={{color:C.muted,fontSize:13}}>Loading…</div>
    </div>
  );
  if(!user) return <AuthScreen onAuth={u=>{setUser(u);authInit.current=true;}}/>;

  return(
    <div style={{background:C.bg,height:'100%',maxWidth:430,margin:'0 auto',display:'flex',flexDirection:'column',position:'relative',fontFamily:"'DM Sans',sans-serif",color:C.text}}>
      <div style={{flex:1,overflowY:'auto',paddingBottom:80}}>
        {tab==='dashboard'&&<Dashboard jobs={jobs} varExpenses={varExpenses} settings={settings} user={user} sync={sync} onSignOut={signOut}/>}
        {tab==='history'&&<History jobs={jobs} settings={settings} setJobs={setJobs} delJob={delJob} onOpenJob={j=>setShowJob(j||{})}/>}
        {tab==='payouts'&&<Payouts jobs={jobs} settings={settings}/>}
        {tab==='stock'&&<Inventory inventory={inventory} setInventory={setInventory}/>}
        {tab==='expenses'&&<Expenses varExpenses={varExpenses} setVarExpenses={setVarExpenses}/>}
        {tab==='settings'&&<Settings settings={settings} setSettings={setSettings} jobs={jobs} inventory={inventory} varExpenses={varExpenses} user={user} sync={sync} onSignOut={signOut}/>}
      </div>
      {tab==='stock'&&null}{/* no FAB on stock */}
      {tab!=='stock'&&tab!=='expenses'&&<FAB onClick={()=>setShowJob({})}/>}
      <BottomNav active={tab} setActive={setTab} user={user} onSignOut={signOut} sync={sync}/>
      {showJob!==null&&(
        <JobModal
          job={showJob?.id?showJob:null}
          settings={settings}
          weekGross={jobs.filter(j=>{const tw=getWeekStart(TODAY());return getWeekStart(j.date)===tw;}).reduce((s,j)=>s+jobGrossProfit(j,settings),0)}
          onClose={()=>setShowJob(null)}
          onSave={form=>{saveJob(form);}}
        />
      )}
    </div>
  );
}

// Alias
const Inventory = Stock;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
