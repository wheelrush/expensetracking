function HistoryScreen({jobs, onDelete, onUpdate, settings, receipts}){
  const [tab,setTab]           = useState("weeks"); // weeks | jobs
  const [filter,setFilter]     = useState("all");
  const [selectedJob,setSelectedJob] = useState(null);
  const [expandedWk,setExpandedWk]   = useState(null); // which week is expanded

  // ── Weeks tab data ──
  const today      = TODAY();
  const thisWkKey  = weekStart(today);
  // Previous week = already paid out
  const prevWkDate = new Date(thisWkKey+"T00:00:00"); prevWkDate.setDate(prevWkDate.getDate()-7);
  const prevWkKey  = prevWkDate.toISOString().slice(0,10);

  const weekMap = useMemo(()=>{
    const m={};
    jobs.forEach(e=>{ const wk=weekStart(e.date); if(!m[wk])m[wk]={key:wk,jobs:[]}; m[wk].jobs.push(e); });
    return m;
  },[jobs]);

  const weekList = useMemo(()=>
    Object.values(weekMap).sort((a,b)=>b.key.localeCompare(a.key))
  ,[weekMap]);

  // ── Jobs tab data ──
  const filtered = useMemo(()=>{
    if(filter==="all") return jobs;
    if(filter==="pending") return jobs.filter(e=>e.status==="Pending Payment");
    return jobs.filter(e=>e.service===filter);
  },[jobs,filter]);

  const totalRev = filtered.reduce((s,e)=>s+e.revenue,0);
  const totalGP  = filtered.reduce((s,e)=>s+grossProfit(e),0);
  const handleDelete = (id) => { onDelete(id); setSelectedJob(null); };
  const handleUpdate = (updated) => { onUpdate(updated); setSelectedJob(updated); };

  return (
    <div className="screen">
      {selectedJob&&<JobDetailModal job={selectedJob} onClose={()=>setSelectedJob(null)} onDelete={handleDelete} onUpdate={handleUpdate} settings={settings}/>}

      {/* Tab switcher */}
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #f0f0f0",position:"sticky",top:0,zIndex:10}}>
        {[["weeks","📅 Work Weeks"],["jobs","📋 All Jobs"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"12px 8px",border:"none",background:"transparent",fontFamily:"IBM Plex Sans,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",color:tab===t?"#111":"#bbb",borderBottom:tab===t?"2px solid #111":"2px solid transparent"}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── WORK WEEKS TAB ── */}
      {tab==="weeks"&&(
        <div style={{paddingBottom:80}}>
          {weekList.length===0?(
            <div style={{padding:"60px 20px",textAlign:"center",color:"#bbb"}}>
              <div style={{fontSize:36,marginBottom:10}}>📅</div>
              <div style={{fontSize:14,fontWeight:600,color:"#888"}}>No weeks yet</div>
              <div style={{fontSize:12,marginTop:5}}>Log your first job to see weekly summaries</div>
            </div>
          ):weekList.map(w=>{
            const wkCalc    = weeklyProfit(w.jobs, settings);
            const sp        = ownerSplit(wkCalc.profit, settings);
            const isThisWk  = w.key===thisWkKey;
            const isPrevWk  = w.key===prevWkKey;
            const isPaid    = !isThisWk; // any completed week
            const isOpen    = expandedWk===w.key;
            const fridayDate = new Date(w.key+"T00:00:00"); fridayDate.setDate(fridayDate.getDate()+6);
            const fridayLabel = fridayDate.toLocaleDateString("en-US",{month:"short",day:"numeric"});
            // Revenue goal progress for this week
            const goalPct = Math.min((wkCalc.revenue/(settings.weeklyGoal||500))*100,100);
            // Receipts for this week
            const wkReceipts = (receipts||[]).filter(r=>weekStart(r.date)===w.key);
            const wkReceiptTotal = wkReceipts.reduce((s,r)=>s+r.amount,0);

            return (
              <div key={w.key} style={{borderBottom:"1px solid #f0f0f0"}}>
                {/* Week header — always visible */}
                <div onClick={()=>setExpandedWk(isOpen?null:w.key)}
                  style={{padding:"14px 16px",background:isThisWk?"#fafafa":"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:700,color:"#111"}}>{fmtWeek(w.key)}</span>
                      {isThisWk&&<span style={{background:"#111",color:"#fff",borderRadius:4,fontSize:9,padding:"2px 7px",fontWeight:700}}>NOW</span>}
                      {isPrevWk&&<span style={{background:"#dcfce7",color:"#166534",borderRadius:4,fontSize:9,padding:"2px 7px",fontWeight:700}}>PAID ✓</span>}
                      {isPaid&&!isPrevWk&&<span style={{background:"#f3f4f6",color:"#6b7280",borderRadius:4,fontSize:9,padding:"2px 7px",fontWeight:600}}>PAID</span>}
                    </div>
                    {/* Mini stats row */}
                    <div style={{display:"flex",gap:12}}>
                      <span style={{fontSize:11,color:"#888"}}>{w.jobs.length} job{w.jobs.length!==1?"s":""}</span>
                      <span style={{fontSize:11,color:"#888"}}>Rev <strong style={{color:"#111",fontFamily:"IBM Plex Mono,monospace"}}>{cur(wkCalc.revenue)}</strong></span>
                      <span style={{fontSize:11,color:wkCalc.profit>0?"#16a34a":"#dc2626"}}>Net <strong style={{fontFamily:"IBM Plex Mono,monospace"}}>{cur(wkCalc.profit)}</strong></span>
                    </div>
                    {/* Goal bar */}
                    <div style={{marginTop:6,background:"#f0f0f0",borderRadius:4,height:4,overflow:"hidden"}}>
                      <div style={{width:goalPct+"%",height:"100%",background:goalPct>=100?"#16a34a":"#111",borderRadius:4,transition:"width 0.3s"}}/>
                    </div>
                    <div style={{fontSize:9,color:"#bbb",marginTop:2}}>{goalPct.toFixed(0)}% of {cur(settings.weeklyGoal||500)} goal{goalPct>=100?" 🎉":""}</div>
                  </div>
                  <span style={{color:"#ccc",fontSize:16,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}}>›</span>
                </div>

                {/* Expanded week detail */}
                {isOpen&&(
                  <div style={{background:"#f9f9f9",borderTop:"1px solid #f0f0f0"}}>

                    {/* P&L breakdown */}
                    <div style={{margin:"10px 14px 0",background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #f0f0f0"}}>
                      <div style={{padding:"8px 14px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",borderBottom:"1px solid #f5f5f5"}}>Weekly P&L</div>
                      {[
                        ["Revenue",wkCalc.revenue,false,false],
                        ["Job Costs",wkCalc.jobCosts,true,false],
                        ["Gross Profit",wkCalc.revenue-wkCalc.jobCosts,false,true],
                        ["Accrued Fixed Expenses",wkCalc.overhead,true,false],
                        ["Variable Expenses",wkReceiptTotal,true,false],
                      ].map(([l,v,red,bold])=>(
                        <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderBottom:"1px solid #f5f5f5"}}>
                          <span style={{fontSize:12,color:bold?"#111":"#666",fontWeight:bold?700:400}}>{l}</span>
                          <span style={{fontFamily:"IBM Plex Mono,monospace",fontSize:12,fontWeight:bold?700:600,color:red?"#dc2626":bold?"#111":"#111"}}>{red?"−":""}{cur(v)}</span>
                        </div>
                      ))}
                      <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"#111"}}>
                        <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>Distributable Profit</span>
                        <span style={{fontFamily:"IBM Plex Mono,monospace",fontSize:15,fontWeight:700,color:wkCalc.profit>0?"#22c55e":"#ef4444"}}>{cur(wkCalc.profit)}</span>
                      </div>
                    </div>

                    {/* Owner payouts */}
                    <div style={{margin:"10px 14px 0",background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #f0f0f0"}}>
                      <div style={{padding:"8px 14px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",borderBottom:"1px solid #f5f5f5"}}>
                        {isThisWk?"Projected Payout (Fri "+fridayLabel+")":"Payout — Fri "+fridayLabel}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                        {[
                          [settings.owner1Name||"Owner 1",sp.owner1],
                          [settings.owner2Name||"Owner 2",sp.owner2],
                        ].map(([name,amt])=>(
                          <div key={name} style={{padding:"12px 14px",borderRight:"1px solid #f5f5f5"}}>
                            <div style={{fontSize:11,color:"#888",marginBottom:4}}>{name}</div>
                            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:18,fontWeight:700,color:amt>0?"#16a34a":"#dc2626"}}>{cur(amt)}</div>
                          </div>
                        ))}
                      </div>
                      {wkCalc.profit<=0&&<div style={{padding:"8px 14px",fontSize:11,color:"#dc2626",background:"#fff8f8"}}>⚠ Revenue didn't cover expenses — no payout</div>}
                    </div>

                    {/* Jobs list */}
                    <div style={{margin:"10px 14px 0",background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #f0f0f0"}}>
                      <div style={{padding:"8px 14px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",borderBottom:"1px solid #f5f5f5"}}>{w.jobs.length} Jobs This Week</div>
                      {[...w.jobs].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>(
                        <div key={e.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid #f5f5f5",gap:10,cursor:"pointer"}} onClick={()=>setSelectedJob(e)}>
                          <div style={{width:32,height:32,background:"#f4f4f4",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{ICONS[e.service]||"⚙️"}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:600,color:"#111",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.service}{e.tireSize?" · "+e.tireSize:""}</div>
                            <div style={{fontSize:10,color:"#bbb",marginTop:1}}>{e.date} · {e.area} · {e.status==="Pending Payment"?"⏳":"✓"}</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:13,fontWeight:700}}>{cur(e.revenue)}</div>
                            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:10,color:"#888"}}>gp {cur(grossProfit(e))}</div>
                          </div>
                          <span style={{color:"#ddd",fontSize:14}}>›</span>
                        </div>
                      ))}
                    </div>

                    {/* Receipts for this week */}
                    {wkReceipts.length>0&&(
                      <div style={{margin:"10px 14px 0",background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #f0f0f0"}}>
                        <div style={{padding:"8px 14px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",borderBottom:"1px solid #f5f5f5"}}>Variable Expenses · {cur(wkReceiptTotal)}</div>
                        {wkReceipts.map(r=>(
                          <div key={r.id} style={{display:"flex",alignItems:"center",padding:"9px 14px",borderBottom:"1px solid #f5f5f5",gap:10}}>
                            <span style={{fontSize:16}}>{"⛽🔧🛞🚗📦☕📝".split("")[[["Fuel","Tools & Equipment","Parts","Vehicle Maintenance","Supplies","Food & Drinks","Other"].indexOf(r.category)]]||"📝"}</span>
                            <div style={{flex:1}}>
                              <div style={{fontSize:12,fontWeight:600,color:"#111"}}>{r.category}</div>
                              {r.description&&<div style={{fontSize:10,color:"#aaa"}}>{r.description}</div>}
                            </div>
                            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:13,fontWeight:700,color:"#dc2626"}}>−{cur(r.amount)}</div>
                          </div>
                        ))}
                      </div>
                    )}

                    <div style={{height:14}}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── ALL JOBS TAB ── */}
      {tab==="jobs"&&(
        <div>
          <div className="filter-row">
            {["all","pending",...SERVICES.slice(0,4)].map(f=>(
              <button key={f} className={`filter-chip${filter===f?" active":""}`} onClick={()=>setFilter(f)}>
                {f==="all"?"All Jobs":f==="pending"?"⏳ Pending":f}
              </button>
            ))}
          </div>
          {filtered.length>0&&(
            <div style={{padding:"7px 14px",background:"#f9f9f9",borderBottom:"1px solid #f0f0f0",display:"flex",gap:16}}>
              <span style={{fontSize:11,color:"#888"}}><strong style={{color:"#111",fontFamily:"IBM Plex Mono,monospace"}}>{filtered.length}</strong> jobs</span>
              <span style={{fontSize:11,color:"#888"}}>Rev <strong style={{color:"#111",fontFamily:"IBM Plex Mono,monospace"}}>{cur(totalRev)}</strong></span>
              <span style={{fontSize:11,color:"#888"}}>Gross <strong style={{color:"#16a34a",fontFamily:"IBM Plex Mono,monospace"}}>{cur(totalGP)}</strong></span>
            </div>
          )}
          <div style={{paddingBottom:80}}>
            {filtered.length===0?(
              <div style={{padding:"40px 20px",textAlign:"center",color:"#bbb",fontSize:13}}>No jobs found</div>
            ):filtered.map(e=>(
              <div key={e.id} className="job-row" style={{cursor:"pointer"}} onClick={()=>setSelectedJob(e)}>
                <div className="job-icon">{ICONS[e.service]||"⚙️"}</div>
                <div className="job-info">
                  <div className="job-name">{e.service}{e.tireSize?" · "+e.tireSize:""}</div>
                  {e.customerName&&<div style={{fontSize:11,color:"#555",marginTop:1}}>{e.customerName}</div>}
                  <div className="job-meta">{e.date} · {e.area} · {e.status==="Pending Payment"?"⏳ Pending":"✓ Paid"}</div>
                </div>
                <div className="job-amounts">
                  <div className="job-rev">{cur(e.revenue)}</div>
                  <div className="job-gp">gross {cur(grossProfit(e))}</div>
                </div>
                <span style={{color:"#ddd",fontSize:16,paddingLeft:4}}>›</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ────────────────────────────────────────────────
// ── PAYOUTS SCREEN ──
// ────────────────────────────────────────────────
function PayoutsScreen({jobs, settings, receipts, setReceipts, fbEnabled}){
  const [tab,setTab] = useState("weekly");
  const [showAddReceipt, setShowAddReceipt] = useState(false);
  const [newReceipt, setNewReceipt] = useState({date:TODAY(),category:"Fuel",description:"",amount:""});
  const RECEIPT_CATS = [
    "Fuel","Oil Change","Tires (Stock)","Parts & Hardware",
    "Tools & Equipment","Vehicle Maintenance","Van Repair",
    "Plugs & Patches","Valve Stems","Tire Disposal Fee",
    "Phone Bill","Marketing","Storage","Insurance",
    "Supplies","Safety Equipment",
    "Food & Drinks","Parking","Tolls",
    "Subscriptions","Other"
  ];

  const nxtFri = nextFriday();
  const weeklyFixed = weeklyFixedExpense(settings);

  // ── Payout data ──
  const weekMap = {};
  jobs.forEach(e=>{ const wk=weekStart(e.date); if(!weekMap[wk])weekMap[wk]={key:wk,jobs:[]}; weekMap[wk].jobs.push(e); });
  const weeks = Object.values(weekMap).sort((a,b)=>b.key.localeCompare(a.key));

  // ── Receipt handlers (at component level, not inside JSX) ──
  const addReceipt = useCallback(async() => {
    if(!newReceipt.amount||isNaN(parseFloat(newReceipt.amount))) return;
    const r={id:Date.now(),date:newReceipt.date,category:newReceipt.category,description:newReceipt.description.trim(),amount:parseFloat(newReceipt.amount)};
    const updated=[r,...receipts]; setReceipts(updated); saveReceipts(updated);
    if(fbEnabled){ try{await fbSaveReceipt(r);}catch(e){console.error(e);} }
    setNewReceipt({date:TODAY(),category:"Fuel",description:"",amount:""});
    setShowAddReceipt(false);
  },[newReceipt,receipts,setReceipts,fbEnabled]);

  const delReceipt = useCallback(async(id) => {
    if(!window.confirm("Delete this receipt?")) return;
    const updated=receipts.filter(r=>r.id!==id); setReceipts(updated); saveReceipts(updated);
    if(fbEnabled){ try{await fbDelReceipt(id);}catch(e){console.error(e);} }
  },[receipts,setReceipts,fbEnabled]);

  // ── Receipt summaries ──
  const receiptThisWeek = useMemo(()=>receipts.filter(r=>weekStart(r.date)===weekStart(TODAY())).reduce((s,r)=>s+r.amount,0),[receipts]);
  const receiptAllTime  = useMemo(()=>receipts.reduce((s,r)=>s+r.amount,0),[receipts]);
  const receiptByWeek   = useMemo(()=>{
    const m={}; receipts.forEach(r=>{ const wk=weekStart(r.date); if(!m[wk])m[wk]=[]; m[wk].push(r); });
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
  },[receipts]);
  const receiptByCat = useMemo(()=>{
    const m={}; receipts.forEach(r=>{ if(!m[r.category])m[r.category]=0; m[r.category]+=r.amount; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[receipts]);

  const RECEIPT_ICONS = {
    "Fuel":"⛽","Oil Change":"🛢️","Tires (Stock)":"🛞","Parts & Hardware":"🔩",
    "Tools & Equipment":"🔧","Vehicle Maintenance":"🚗","Van Repair":"🛠️",
    "Plugs & Patches":"🪝","Valve Stems":"🔩","Tire Disposal Fee":"♻️",
    "Phone Bill":"📱","Marketing":"📣","Storage":"🏭","Insurance":"🛡️",
    "Supplies":"📦","Safety Equipment":"🦺",
    "Food & Drinks":"☕","Parking":"🅿️","Tolls":"🛣️",
    "Subscriptions":"💻","Other":"📝"
  };

  return (
    <div className="screen">
      {/* Tab switcher */}
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #f0f0f0"}}>
        {[["weekly","💰 Payouts"],["expenses","📋 Fixed"],["receipts","🧾 Receipts"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"12px 4px",border:"none",background:"transparent",fontFamily:"IBM Plex Sans,sans-serif",fontSize:12,fontWeight:700,cursor:"pointer",color:tab===t?"#111":"#bbb",borderBottom:tab===t?"2px solid #111":"2px solid transparent"}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── WEEKLY PAYOUTS TAB ── */}
      {tab==="weekly"&&(
        <div className="page">
          <div className="section-label" style={{marginTop:0}}>How It Works</div>
          <div className="card">
            <div style={{padding:"12px 16px",fontSize:12,color:"#555",lineHeight:1.8}}>
              <strong>Revenue</strong> − Job Costs = Gross Profit<br/>
              Gross Profit − <strong>{cur(weeklyFixed)} weekly fixed</strong> = Distributable Profit<br/>
              Distributable Profit ÷ 2 = <strong>Each owner's Friday payout</strong>
            </div>
          </div>

          {(()=>{
            const today = TODAY();
            const todayDate = new Date(today+"T00:00:00");
            const isFri = todayDate.getDay()===5;
            const thisWkKey = weekStart(today);
            // Previous week = 7 days before current week start
            const prevWkDate = new Date(thisWkKey+"T00:00:00");
            prevWkDate.setDate(prevWkDate.getDate()-7);
            const prevWkKey = prevWkDate.toISOString().slice(0,10);
            const prevWkEnd = new Date(prevWkDate); prevWkEnd.setDate(prevWkEnd.getDate()+6);
            const prevWkEndLabel = prevWkEnd.toLocaleDateString("en-US",{month:"short",day:"numeric"});

            // Payout = previous week's completed jobs
            const payWkKey = isFri ? thisWkKey : prevWkKey;
            // If today is Friday: paying for the week that started TODAY (new week)? No —
            // Friday is BOTH payday for last week AND start of new week.
            // So payout jobs = the week BEFORE today's new week = prevWkKey always.
            const payJobs = jobs.filter(e=>weekStart(e.date)===prevWkKey);
            const calc = weeklyProfit(payJobs,settings);
            const sp = ownerSplit(calc.profit,settings);

            // Current accumulating week (new jobs coming in)
            const curJobs = jobs.filter(e=>weekStart(e.date)===thisWkKey);
            const curCalc = weeklyProfit(curJobs,settings);

            return (<>
              <div className="section-label">{isFri?"💰 TODAY IS PAYDAY —":"Upcoming Payout —"} {nxtFri.label}</div>
              <div className="payout-card">
                <div className="payout-title">{isFri?"Paying Out Now":"Due This Friday"} · Week of {fmtWeek(prevWkKey)}</div>
                <div className="payout-row">
                  <span className="payout-name">{settings.owner1Name||"Owner 1"}</span>
                  <span className={`payout-amount ${sp.owner1>0?"green":"red"}`}>{cur(sp.owner1)}</span>
                </div>
                <div className="payout-row">
                  <span className="payout-name">{settings.owner2Name||"Owner 2"}</span>
                  <span className={`payout-amount ${sp.owner2>0?"green":"red"}`}>{cur(sp.owner2)}</span>
                </div>
                <hr className="payout-divider"/>
                <div className="payout-calc">
                  {payJobs.length} jobs · Rev {cur(calc.revenue)} · Costs {cur(calc.jobCosts)} · Fixed −{cur(calc.overhead)} · Net {cur(calc.profit)}
                </div>
                {calc.profit<=0&&<div style={{marginTop:10,background:"#1a0000",borderRadius:8,padding:"8px 12px",fontSize:11,color:"#f87171"}}>⚠ Last week's expenses exceeded revenue — no payout.</div>}
              </div>

              {curJobs.length>0&&(
                <><div className="section-label">New Week Accumulating</div>
                <div style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:8}}>Fri {new Date(thisWkKey+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})} onwards · {curJobs.length} job{curJobs.length!==1?"s":""}</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13,color:"#555"}}>Revenue so far</span>
                    <span style={{fontFamily:"IBM Plex Mono,monospace",fontSize:13,fontWeight:700}}>{cur(curCalc.revenue)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13,color:"#555"}}>Accrued costs</span>
                    <span style={{fontFamily:"IBM Plex Mono,monospace",fontSize:13,fontWeight:700,color:"#dc2626"}}>−{cur(curCalc.overhead+curCalc.jobCosts)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:"1px solid #f0f0f0"}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#111"}}>Running Net</span>
                    <span style={{fontFamily:"IBM Plex Mono,monospace",fontSize:14,fontWeight:700,color:curCalc.profit>=0?"#16a34a":"#dc2626"}}>{cur(curCalc.profit)}</span>
                  </div>
                </div></>
              )}
            </>);
          })()}

          <div className="section-label">Payout History</div>
          {weeks.length===0
            ?<div style={{color:"#bbb",fontSize:13,textAlign:"center",padding:"30px 0"}}>No history yet</div>
            :weeks.map(w=>{
              const calc=weeklyProfit(w.jobs,settings);
              const sp=ownerSplit(calc.profit,settings);
              const friday=weekEnd(w.key);
              return (
                <div key={w.key} className="payout-hist">
                  <div className="payout-hist-header">
                    <div>
                      <div className="payout-hist-week">{fmtWeek(w.key)}</div>
                      <div style={{fontSize:10,color:"#bbb",marginTop:2}}>Paid Fri {new Date(friday+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})} · {w.jobs.length} jobs</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div className="payout-hist-net" style={{color:calc.profit>=0?"#16a34a":"#dc2626"}}>{cur(calc.profit)}</div>
                      <div style={{fontSize:10,color:"#bbb"}}>distributable</div>
                    </div>
                  </div>
                  <div className="payout-hist-row"><span className="payout-hist-name">{settings.owner1Name||"Owner 1"}</span><span className="payout-hist-amount" style={{color:sp.owner1>=0?"#16a34a":"#dc2626"}}>{cur(Math.max(0,sp.owner1))}</span></div>
                  <div className="payout-hist-row"><span className="payout-hist-name">{settings.owner2Name||"Owner 2"}</span><span className="payout-hist-amount" style={{color:sp.owner2>=0?"#16a34a":"#dc2626"}}>{cur(Math.max(0,sp.owner2))}</span></div>
                  <div style={{padding:"8px 14px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderTop:"1px solid #f0f0f0"}}>
                    {[["Revenue",calc.revenue],["Job Costs",calc.jobCosts],["Fixed",calc.overhead]].map(([l,v])=>(
                      <div key={l} style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:"#bbb",textTransform:"uppercase",letterSpacing:"0.5px"}}>{l}</div>
                        <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:12,fontWeight:700,color:"#111"}}>{cur(v)}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })
          }
        </div>
      )}

      {/* ── FIXED EXPENSES TAB ── */}
      {tab==="expenses"&&(
        <div className="page">
          <div className="section-label" style={{marginTop:0}}>Monthly Fixed Costs</div>
          <div className="card">
            {(settings.expenses||[]).filter(e=>e.active).map(e=>(
              <div key={e.id} className="card-row">
                <span className="card-label">{e.name}</span>
                <div style={{textAlign:"right"}}>
                  <div className="card-val">{cur(e.amount)}<span style={{fontSize:10,color:"#bbb",fontFamily:"IBM Plex Sans,sans-serif"}}>/mo</span></div>
                  <div style={{fontSize:10,color:"#bbb",fontFamily:"IBM Plex Mono,monospace"}}>{cur(weeklyFixedExpense({expenses:[e]}))}/wk</div>
                </div>
              </div>
            ))}
            <div className="card-row" style={{background:"#f9f9f9"}}>
              <span className="card-label bold">Total Fixed</span>
              <div style={{textAlign:"right"}}>
                <div className="card-val big">{cur(calcMonthlyExpenses(settings.expenses))}<span style={{fontSize:11,color:"#bbb",fontFamily:"IBM Plex Sans,sans-serif"}}>/mo</span></div>
                <div style={{fontSize:11,fontFamily:"IBM Plex Mono,monospace",color:"#888"}}>{cur(weeklyFixed)}/week</div>
              </div>
            </div>
          </div>

          <div className="section-label">Break-Even This Week</div>
          <div className="card">
            <div className="card-row"><span className="card-label">Need per week</span><span className="card-val orange">{cur(weeklyFixedExpense(settings))}</span></div>
            <div className="card-row"><span className="card-label">Need per day</span><span className="card-val orange">{cur(Math.round(weeklyFixed/7*100)/100)}</span></div>
            <div className="card-row">
              <span className="card-label">This week vs break-even</span>
              {(()=>{
                const wk=weeklyProfit(jobs.filter(e=>weekStart(e.date)===weekStart(TODAY())),settings);
                const gross=wk.revenue-wk.jobCosts; const accrued=wk.overhead;
                return <span className={`card-val ${gross>=accrued?"green":"red"}`}>{gross>=accrued?"✓ Covered":cur(accrued-gross)+" to go"}</span>;
              })()}
            </div>
          </div>

          <div className="section-label">Daily Allocation Formula</div>
          <div className="card">
            <div style={{padding:"12px 16px",fontSize:12,color:"#555",lineHeight:1.8}}>
              Monthly total: <strong>{cur(calcMonthlyExpenses(settings.expenses))}</strong><br/>
              Daily rate: <strong>{cur(dailyExpense(settings))}/day</strong><br/>
              Accrues based on days worked. Deducted on <strong>Friday</strong> at payout.
            </div>
          </div>
        </div>
      )}

      {/* ── RECEIPTS TAB ── */}
      {tab==="receipts"&&(
        <div className="page">
          <div className="section-label" style={{marginTop:0}}>Variable Expenses This Week</div>
          <div className="card">
            <div className="card-row"><span className="card-label">Spent this week</span><span className="card-val red">{cur(receiptThisWeek)}</span></div>
            <div className="card-row"><span className="card-label">All-time total</span><span className="card-val">{cur(receiptAllTime)}</span></div>
            <div style={{padding:"8px 16px 10px",fontSize:11,color:"#aaa"}}>One-off costs (fuel, tools) — separate from {cur(weeklyFixed)}/week fixed</div>
          </div>

          {receiptByCat.length>0&&<>
            <div className="section-label">By Category</div>
            <div className="card">
              {receiptByCat.map(([cat,total])=>(
                <div key={cat} className="card-row">
                  <span className="card-label">{RECEIPT_ICONS[cat]||"📝"} {cat}</span>
                  <span className="card-val">{cur(total)}</span>
                </div>
              ))}
            </div>
          </>}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div className="section-label" style={{margin:0}}>All Receipts</div>
            <button onClick={()=>setShowAddReceipt(!showAddReceipt)} style={{background:showAddReceipt?"#f0f0f0":"#111",color:showAddReceipt?"#111":"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontFamily:"IBM Plex Sans,sans-serif",fontWeight:700,cursor:"pointer"}}>
              {showAddReceipt?"✕ Cancel":"+ Add Receipt"}
            </button>
          </div>

          {showAddReceipt&&(
            <div className="card" style={{padding:14,marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div>
                  <label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",display:"block",marginBottom:5}}>Date</label>
                  <input type="date" value={newReceipt.date} onChange={e=>setNewReceipt(p=>({...p,date:e.target.value}))} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"9px 10px",fontSize:14,fontFamily:"IBM Plex Sans,sans-serif"}}/>
                </div>
                <div>
                  <label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",display:"block",marginBottom:5}}>Category</label>
                  <select value={newReceipt.category} onChange={e=>setNewReceipt(p=>({...p,category:e.target.value}))} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"9px 10px",fontSize:14,fontFamily:"IBM Plex Sans,sans-serif",background:"#fff"}}>
                    {RECEIPT_CATS.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",display:"block",marginBottom:5}}>Description (optional)</label>
                <input type="text" placeholder="e.g. Gas fill-up, wrench set..." value={newReceipt.description} onChange={e=>setNewReceipt(p=>({...p,description:e.target.value}))} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"9px 10px",fontSize:14,fontFamily:"IBM Plex Sans,sans-serif"}}/>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"#aaa",display:"block",marginBottom:5}}>Amount ($)</label>
                <input type="number" min="0" step="0.01" placeholder="0.00" value={newReceipt.amount} onChange={e=>setNewReceipt(p=>({...p,amount:e.target.value}))} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"9px 10px",fontSize:16,fontFamily:"IBM Plex Mono,monospace"}}/>
              </div>
              <button onClick={addReceipt} style={{width:"100%",background:"#111",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:15,fontFamily:"IBM Plex Sans,sans-serif",fontWeight:700,cursor:"pointer"}}>Save Receipt</button>
            </div>
          )}

          {receipts.length===0
            ?<div style={{textAlign:"center",padding:"40px 20px",color:"#bbb"}}>
              <div style={{fontSize:36,marginBottom:10}}>🧾</div>
              <div style={{fontSize:14,fontWeight:600,color:"#888"}}>No receipts yet</div>
              <div style={{fontSize:12,marginTop:5}}>Track fuel, tools, and other variable expenses</div>
            </div>
            :receiptByWeek.map(([wk,recs])=>{
              const wkTotal=recs.reduce((s,r)=>s+r.amount,0);
              const isThisWk=wk===weekStart(TODAY());
              return (
                <div key={wk} className="card" style={{marginBottom:10}}>
                  <div style={{padding:"10px 14px",background:"#f9f9f9",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:"#111"}}>{fmtWeek(wk)}{isThisWk&&<span style={{background:"#111",color:"#fff",borderRadius:3,fontSize:9,padding:"1px 5px",marginLeft:6}}>now</span>}</div>
                      <div style={{fontSize:10,color:"#bbb",marginTop:1}}>{recs.length} receipt{recs.length!==1?"s":""}</div>
                    </div>
                    <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:14,fontWeight:700,color:"#dc2626"}}>−{cur(wkTotal)}</div>
                  </div>
                  {recs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid #f5f5f5",gap:10}}>
                      <div style={{width:36,height:36,background:"#f4f4f4",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{RECEIPT_ICONS[r.category]||"📝"}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:"#111"}}>{r.category}</div>
                        {r.description&&<div style={{fontSize:11,color:"#888",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description}</div>}
                        <div style={{fontSize:10,color:"#bbb",marginTop:1}}>{r.date}</div>
                      </div>
                      <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:14,fontWeight:700,color:"#111",flexShrink:0}}>{cur(r.amount)}</div>
                      <button onClick={()=>delReceipt(r.id)} style={{background:"none",border:"none",color:"#ddd",fontSize:18,cursor:"pointer",lineHeight:1,padding:"2px 4px"}}>×</button>
                    </div>
                  ))}
                </div>
              );
            })
          }
        </div>
      )}
    </div>
  );
}


// ────────────────────────────────────────────────
// ── INVENTORY SCREEN ──
// ────────────────────────────────────────────────
function InventoryScreen({tires, setTires, fbEnabled, tireSales, setTireSales}){
  const [invTab,setInvTab] = useState("stock");
  const [filterRim,setFilterRim] = useState("all");
  const [search,setSearch] = useState("");
  const [showAdd,setShowAdd] = useState(false);
  const [newTire,setNewTire] = useState({size:"",rim:"",qty:1,notes:""});
  const [editNote,setEditNote] = useState(null);
  const [tempNote,setTempNote] = useState("");

  const rimOptions = useMemo(()=>[...new Set(tires.map(t=>t.rim))].sort((a,b)=>a-b),[tires]);
  const totalQty   = useMemo(()=>tires.reduce((s,t)=>s+t.qty,0),[tires]);
  const flagged    = useMemo(()=>tires.filter(t=>t.notes.toLowerCase().includes("nail")),[tires]);

  const persist = useCallback(async(updated, changed, deleted)=>{
    setTires(updated); saveTires(updated);
    if(!fbEnabled) return;
    try{
      tSavingRef.current=true;
      if(deleted) await fbDelTire(deleted);
      else if(changed) await fbSaveTire(changed);
    }catch(e){console.error(e);}
    finally{setTimeout(()=>tSavingRef.current=false,500);}
  },[tires,fbEnabled]);

  const updateQty = useCallback(async(id,delta)=>{
    const tire=tires.find(t=>t.id===id); if(!tire) return;
    const newQty=Math.max(0,tire.qty+delta);
    const updated=tires.map(t=>t.id===id?{...t,qty:newQty}:t);
    await persist(updated,updated.find(x=>x.id===id),null);
    if(delta<0&&newQty<tire.qty){
      const sale={id:Date.now(),size:tire.size,rim:tire.rim,qty:1,date:TODAY()};
      const newLog=[sale,...tireSales];
      setTireSales(newLog); saveSales(newLog);
      if(fbEnabled) try{await fbLogSale(sale);}catch(e){console.error(e);}
    }
  },[tires,tireSales,fbEnabled,persist]);

  const flagTire = useCallback(async(id)=>{
    const updated=tires.map(t=>{
      if(t.id!==id) return t;
      const isNail=t.notes.toLowerCase().includes("nail");
      const notes=isNail?t.notes.replace(/Nail\s*·?\s*/gi,"").trim():("Nail"+(t.notes?` · ${t.notes}`:""));
      return{...t,notes};
    });
    await persist(updated,updated.find(x=>x.id===id),null);
  },[tires,fbEnabled,persist]);

  const saveNote = useCallback(async(id)=>{
    const updated=tires.map(t=>t.id===id?{...t,notes:tempNote}:t);
    await persist(updated,updated.find(x=>x.id===id),null);
    setEditNote(null);
  },[tires,tempNote,fbEnabled,persist]);

  const addTire = useCallback(async()=>{
    if(!newTire.size||!newTire.rim) return;
    const t={id:Date.now(),size:newTire.size.toUpperCase(),rim:parseInt(newTire.rim),qty:Number(newTire.qty)||1,notes:newTire.notes};
    await persist([...tires,t],t,null);
    setNewTire({size:"",rim:"",qty:1,notes:""}); setShowAdd(false);
  },[tires,newTire,fbEnabled,persist]);

  const removeTire = useCallback(async(id)=>{
    if(!window.confirm("Remove this tire?")) return;
    await persist(tires.filter(t=>t.id!==id),null,id);
  },[tires,fbEnabled,persist]);

  const grouped = useMemo(()=>{
    const filtered=tires.filter(t=>{
      const ms=search===""||t.size.toLowerCase().includes(search.toLowerCase())||t.notes.toLowerCase().includes(search.toLowerCase());
      const mr=filterRim==="all"||t.rim===Number(filterRim);
      return ms&&mr;
    });
    const g={};
    filtered.forEach(t=>{if(!g[t.rim])g[t.rim]=[];g[t.rim].push(t);});
    Object.keys(g).forEach(r=>g[r].sort((a,b)=>a.size.localeCompare(b.size)));
    return Object.entries(g).sort((a,b)=>Number(a[0])-Number(b[0]));
  },[tires,search,filterRim]);

  // Best sellers from sales log
  const bestSellers = useMemo(()=>{
    const m={};
    tireSales.forEach(s=>{ const k=s.size.toUpperCase(); if(!m[k])m[k]={size:k,sold:0}; m[k].sold+=s.qty||1; });
    return Object.values(m).sort((a,b)=>b.sold-a.sold);
  },[tireSales]);

  return (
    <div className="screen">
      <div className="inv-header-bar">
        <span className="inv-stat-mini">Total <span>{totalQty}</span></span>
        <span style={{color:"#e0e0e0"}}>|</span>
        <span className="inv-stat-mini">SKUs <span>{tires.length}</span></span>
        {flagged.length>0&&<><span style={{color:"#e0e0e0"}}>|</span><span className="inv-stat-mini" style={{color:"#dc2626"}}>⚑ <span>{flagged.length}</span></span></>}
        <div style={{flex:1}}/>
        <button onClick={()=>setShowAdd(!showAdd)} style={{background:showAdd?"#f0f0f0":"#111",color:showAdd?"#111":"#fff",border:"none",borderRadius:7,padding:"6px 12px",fontSize:12,fontFamily:"IBM Plex Sans,sans-serif",fontWeight:700,cursor:"pointer"}}>{showAdd?"✕":"+Add"}</button>
      </div>

      <div className="inv-tabs">
        <button className={`inv-tab${invTab==="stock"?" active":""}`} onClick={()=>setInvTab("stock")}>Stock</button>
        <button className={`inv-tab${invTab==="bestsellers"?" active":""}`} onClick={()=>setInvTab("bestsellers")}>🏆 Best Sellers</button>
      </div>

      {invTab==="stock"&&<>
        {/* Search + rim filter */}
        <div style={{background:"#fff",borderBottom:"1px solid #f0f0f0",padding:"8px 14px"}}>
          <input placeholder="Search size or note..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",border:"1.5px solid #e8e8e8",borderRadius:9,padding:"8px 12px",fontSize:14,fontFamily:"IBM Plex Sans,sans-serif",background:"#f9f9f9"}}/>
        </div>
        <div className="filter-row">
          <button className={`filter-chip${filterRim==="all"?" active":""}`} onClick={()=>setFilterRim("all")}>All</button>
          {rimOptions.map(r=><button key={r} className={`filter-chip${filterRim===String(r)?" active":""}`} onClick={()=>setFilterRim(String(r))}>R{r}"</button>)}
        </div>

        {/* Add form */}
        {showAdd&&(
          <div style={{background:"#fff",borderBottom:"1px solid #f0f0f0",padding:"12px 14px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
            {[{label:"Size",key:"size",ph:"225/45R18",w:140},{label:"Rim",key:"rim",ph:"18",w:70,type:"number"},{label:"Qty",key:"qty",ph:"1",w:60,type:"number"},{label:"Note",key:"notes",ph:"Optional",w:120}].map(f=>(
              <div key={f.key}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"#999",marginBottom:4}}>{f.label}</div>
                <input type={f.type||"text"} placeholder={f.ph} value={newTire[f.key]} onChange={e=>setNewTire(n=>({...n,[f.key]:e.target.value}))} style={{width:f.w,border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 9px",fontSize:14,fontFamily:"IBM Plex Sans,sans-serif",background:"#f9f9f9"}}/>
              </div>
            ))}
            <button onClick={addTire} style={{background:"#111",color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontSize:13,fontFamily:"IBM Plex Sans,sans-serif",fontWeight:700,cursor:"pointer"}}>Add</button>
          </div>
        )}

        {/* Inventory list */}
        {grouped.length===0?<div className="empty"><div className="empty-icon">🛞</div><div className="empty-text">No tires found</div></div>:
        grouped.map(([rim,items])=>(
          <div key={rim}>
            <div className="inv-rim-label">{rim}&quot; <span>{items.reduce((s,t)=>s+t.qty,0)} tires · {items.length} SKUs</span></div>
            {items.map((t,idx)=>{
              const isNail=t.notes.toLowerCase().includes("nail");
              return (
                <div key={t.id} className="inv-card" style={{background:isNail?"#fff8f8":idx%2===0?"#fff":"#fafafa",borderLeft:isNail?"3px solid #dc2626":"3px solid transparent"}}>
                  <div className="inv-size">{t.size}</div>
                  <div className="inv-notes-wrap">
                    {t.notes&&t.notes.split("·").map((n,i)=>{
                      const note=n.trim();
                      const nail=note.toLowerCase().includes("nail");
                      const isnew=note.toLowerCase().includes("new")||note.toLowerCase().includes("brand");
                      return <span key={i} className={`inv-chip ${nail?"inv-chip-nail":isnew?"inv-chip-new":"inv-chip-note"}`}>{note}</span>;
                    })}
                    {editNote===t.id?(
                      <div style={{display:"flex",gap:4}}>
                        <input value={tempNote} onChange={e=>setTempNote(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveNote(t.id);if(e.key==="Escape")setEditNote(null);}} style={{border:"1.5px solid #111",borderRadius:6,padding:"3px 7px",fontSize:12,width:130}} autoFocus/>
                        <button onClick={()=>saveNote(t.id)} style={{background:"#111",color:"#fff",border:"none",borderRadius:5,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>✓</button>
                        <button onClick={()=>setEditNote(null)} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:5,padding:"3px 6px",fontSize:10,cursor:"pointer",color:"#aaa"}}>✕</button>
                      </div>
                    ):(
                      <button onClick={()=>{setEditNote(t.id);setTempNote(t.notes);}} style={{fontSize:9,color:"#ccc",background:"none",border:"1px dashed #e0e0e0",borderRadius:4,padding:"2px 6px",cursor:"pointer"}}>{t.notes?"edit":"+ note"}</button>
                    )}
                  </div>
                  <div className="inv-qty-wrap">
                    <button className="inv-qty-btn" onClick={()=>updateQty(t.id,-1)}>−</button>
                    <div className={`inv-qty-num${t.qty===0?" zero":t.qty>=4?" hi":""}`}>{t.qty}</div>
                    <button className="inv-qty-btn" onClick={()=>updateQty(t.id,1)}>+</button>
                  </div>
                  <button className={`inv-flag${isNail?" on":""}`} onClick={()=>flagTire(t.id)} title="Flag nail/damaged">⚑</button>
                  <button className="inv-del" onClick={()=>removeTire(t.id)}>×</button>
                </div>
              );
            })}
          </div>
        ))}
      </>}

      {invTab==="bestsellers"&&(
        <div className="page">
          {bestSellers.length===0?(
            <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">No sales data yet</div><div className="empty-sub">Tap − on any tire to log a sale</div></div>
          ):(
            <>
              <div className="section-label" style={{marginTop:0}}>Most Sold Tires</div>
              <div className="card">
                {bestSellers.map((s,i)=>(
                  <div key={s.size} className="card-row">
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:22,height:22,background:i===0?"#111":i===1?"#555":"#e0e0e0",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<2?"#fff":"#999"}}>{i+1}</div>
                      <span className="card-label bold" style={{fontFamily:"IBM Plex Mono,monospace"}}>{s.size}</span>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div className="card-val">{s.sold} sold</div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ────────────────────────────────────────────────
// ── SETTINGS SCREEN ──
// ────────────────────────────────────────────────
function SettingsScreen({jobs, setJobs, settings, setSettings, fbEnabled, syncStatus, onSetupSync, onDisconnect}){
  const [msg,setMsg] = useState("");
  const flash = m => {setMsg(m);setTimeout(()=>setMsg(""),3000);};
  const upd = (k,v) => { const s={...settings,[k]:v}; setSettings(s); saveSettings(s); };
  const updExp = (id,field,val) => {
    const exps=(settings.expenses||[]).map(e=>e.id===id?{...e,[field]:val}:e);
    const s={...settings,expenses:exps}; setSettings(s); saveSettings(s);
  };

  const syncColor={"connected":"#22c55e","syncing":"#f59e0b","offline":"#999","error":"#dc2626"}[syncStatus]||"#999";
  const syncLabel={"connected":"● Synced","syncing":"◌ Syncing...","offline":"○ Offline","error":"✗ Error"}[syncStatus];

  const exportData = () => {
    const blob=new Blob([JSON.stringify({jobs,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url;a.download="wheelrush-backup-"+TODAY()+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    flash("✅ Backup downloaded!");
  };

  const importData = () => {
    const input=document.createElement("input");input.type="file";input.accept=".json";
    input.onchange=async e=>{
      const file=e.target.files[0]; if(!file) return;
      const text=await file.text();
      try{ const data=JSON.parse(text); const imported=data.jobs||data; if(!Array.isArray(imported)) throw new Error(); if(!window.confirm(`Import ${imported.length} jobs?`)) return; setJobs(imported); saveJobs(imported); flash("✅ "+imported.length+" jobs imported!"); }
      catch{ alert("Invalid file."); }
    };
    input.click();
  };

  const clearAll = async() => {
    if(!window.confirm("Delete ALL jobs? Cannot be undone.")) return;
    if(!window.confirm("Final confirmation?")) return;
    const col=fbJobCol();
    if(col){ try{ const s=await col.get(); const b=_db.batch(); s.docs.forEach(d=>b.delete(d.ref)); await b.commit(); }catch(e){console.error(e);} }
    setJobs([]); saveJobs([]); flash("All data cleared.");
  };

  const totalMonthly=(settings.expenses||[]).filter(e=>e.active).reduce((s,e)=>s+e.amount,0);

  return (
    <div className="screen">
      <div className="page">
        {msg&&<div className="success-box">{msg}</div>}

        {/* Cloud Sync */}
        <div className="section-label" style={{marginTop:0}}>☁️ Cloud Sync</div>
        <div className="settings-card">
          <div className="settings-row">
            <div><div className="settings-label" style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:syncColor,boxShadow:syncStatus==="connected"?`0 0 6px ${syncColor}`:""}}></div>{fbEnabled?"Firebase Connected":"Not Connected"}</div><div className="settings-sub">{{"connected":"Syncing across all devices","syncing":"Syncing...","offline":"Tap Set Up to connect","error":"Connection error — tap Reconnect"}[syncStatus]}</div></div>
            <div style={{display:"flex",gap:6}}>
              {!fbEnabled?<button className="settings-btn green" onClick={onSetupSync}>Set Up</button>:<><button className="settings-btn outline" onClick={onSetupSync} style={{fontSize:11}}>Reconnect</button><button className="settings-btn danger" onClick={onDisconnect}>Disconnect</button></>}
            </div>
          </div>
        </div>

        {/* Business Info */}
        <div className="section-label">🏢 Business Info</div>
        <div className="settings-card">
          <div className="settings-row">
            <div><div className="settings-label">Zelle Email / Phone</div><div className="settings-sub">Shown on invoices for payment</div></div>
            <input value={settings.zelleInfo||""} onChange={e=>upd("zelleInfo",e.target.value)} placeholder="email or phone" style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"IBM Plex Sans,sans-serif",width:130,textAlign:"right"}}/>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">Business Phone</div><div className="settings-sub">Shown on invoice</div></div>
            <input value={settings.bizPhone||""} onChange={e=>upd("bizPhone",e.target.value)} placeholder="305-000-0000" style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"IBM Plex Sans,sans-serif",width:130,textAlign:"right"}}/>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">City / Area</div><div className="settings-sub">Shown on invoice</div></div>
            <input value={settings.bizAddress||""} onChange={e=>upd("bizAddress",e.target.value)} placeholder="Miami, FL" style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"IBM Plex Sans,sans-serif",width:130,textAlign:"right"}}/>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">Business Email</div><div className="settings-sub">Shown on invoice</div></div>
            <input value={settings.bizEmail||""} onChange={e=>upd("bizEmail",e.target.value)} placeholder="you@email.com" style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"IBM Plex Sans,sans-serif",width:160,textAlign:"right"}}/>
          </div>
        </div>

        {/* Co-owner settings */}
        <div className="section-label">👥 Co-Owner Profit Distribution</div>
        <div style={{background:"#f9f9f9",border:"1px solid #e8e8e8",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:12,color:"#666",lineHeight:1.7}}>
          Weekly distributable profit = Revenue − Job Costs − Fixed Expenses<br/>
          Split every <strong>Friday</strong> based on ownership %.
        </div>
        <div className="settings-card">
          <div className="settings-row">
            <div><div className="settings-label">Owner 1 Name</div></div>
            <input value={settings.owner1Name||""} onChange={e=>upd("owner1Name",e.target.value)} style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 12px",fontSize:14,fontFamily:"IBM Plex Sans,sans-serif",width:140,textAlign:"right"}}/>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">Owner 2 Name</div></div>
            <input value={settings.owner2Name||""} onChange={e=>upd("owner2Name",e.target.value)} style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 12px",fontSize:14,fontFamily:"IBM Plex Sans,sans-serif",width:140,textAlign:"right"}}/>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">Owner 1 Split</div><div className="settings-sub">Owner 2 gets {settings.profitSplit2||50}%</div></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" min="0" max="100" className="num-input" value={settings.profitSplit1||50} onChange={e=>{const v=parseInt(e.target.value)||50;const s={...settings,profitSplit1:v,profitSplit2:100-v};setSettings(s);saveSettings(s);}}/><span style={{fontSize:13,color:"#888"}}>%</span></div>
          </div>
          <div className="settings-row" style={{background:"#f9f9f9"}}>
            <div><div className="settings-label">Weekly Fixed (auto-calculated)</div><div className="settings-sub">From monthly expenses below</div></div>
            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:14,fontWeight:700}}>{cur(weeklyFixedExpense(settings))}/wk</div>
          </div>
        </div>

        {/* Monthly expenses */}
        <div className="section-label">📋 Monthly Fixed Expenses</div>
        <div className="settings-card">
          {(settings.expenses||[]).map(exp=>(
            <div key={exp.id} style={{padding:"10px 14px",borderBottom:"1px solid #f2f2f2"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <input value={exp.name} onChange={e=>updExp(exp.id,"name",e.target.value)} style={{flex:1,border:"1px solid #e8e8e8",borderRadius:7,padding:"6px 9px",fontSize:13,fontFamily:"IBM Plex Sans,sans-serif"}}/>
                <button onClick={()=>{const exps=(settings.expenses||[]).filter(e=>e.id!==exp.id);const s={...settings,expenses:exps};setSettings(s);saveSettings(s);}} style={{background:"none",border:"none",color:"#ddd",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,color:"#888"}}>$</span>
                <input type="number" min="0" value={exp.amount} onChange={e=>updExp(exp.id,"amount",parseFloat(e.target.value)||0)} style={{border:"1px solid #e8e8e8",borderRadius:7,padding:"6px 9px",fontSize:13,fontFamily:"IBM Plex Mono,monospace",width:110}}/>
                <span style={{fontSize:12,color:"#bbb"}}>/month</span>
                <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:10,color:"#bbb"}}>{exp.active?"On":"Off"}</span>
                  <button onClick={()=>updExp(exp.id,"active",!exp.active)} style={{width:38,height:22,background:exp.active?"#111":"#ddd",border:"none",borderRadius:11,position:"relative",cursor:"pointer",transition:"background 0.2s"}}>
                    <div style={{position:"absolute",top:2,left:exp.active?18:2,width:18,height:18,background:"#fff",borderRadius:"50%",transition:"left 0.2s"}}/>
                  </button>
                </div>
              </div>
            </div>
          ))}
          <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={()=>{const exps=[...(settings.expenses||[]),{id:Date.now(),name:"New Expense",amount:0,active:true}];const s={...settings,expenses:exps};setSettings(s);saveSettings(s);}} style={{background:"none",border:"1px dashed #e0e0e0",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",color:"#888",fontFamily:"IBM Plex Sans,sans-serif"}}>+ Add Expense</button>
            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:13,fontWeight:700}}>{cur(totalMonthly)}/mo</div>
          </div>
        </div>

        {/* Cost per mile */}
        <div className="section-label">🚗 Travel Cost</div>
        <div className="settings-card">
          <div className="settings-row">
            <div><div className="settings-label">Cost Per Mile</div><div className="settings-sub">Used to calculate real travel cost per job</div></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:13,color:"#888"}}>$</span><input type="number" min="0" step="0.01" className="num-input" value={settings.costPerMile||0.65} onChange={e=>upd("costPerMile",parseFloat(e.target.value)||0.65)}/><span style={{fontSize:13,color:"#888"}}>/mi</span></div>
          </div>
          <div className="settings-row" style={{background:"#f9f9f9",fontSize:11,color:"#888",padding:"8px 16px",display:"block"}}>
            Daily expense rate: <strong>{cur(dailyExpense(settings))}/day</strong> · Weekly: <strong>{cur(weeklyFixedExpense(settings))}/week</strong>
          </div>
        </div>

        {/* Goals */}
        <div className="section-label">🎯 Goals & Tax</div>
        <div className="settings-card">
          <div className="settings-row">
            <div><div className="settings-label">Weekly Revenue Goal</div></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:13,color:"#888"}}>$</span><input type="number" className="num-input" value={settings.weeklyGoal||500} onChange={e=>upd("weeklyGoal",parseFloat(e.target.value)||500)}/></div>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">Tax Rate</div></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" min="0" max="50" className="num-input" value={settings.taxRate||25} onChange={e=>upd("taxRate",parseFloat(e.target.value)||25)}/><span style={{fontSize:13,color:"#888"}}>%</span></div>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">Est. Tax Owed</div><div className="settings-sub">On gross profit</div></div>
            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:14,fontWeight:700}}>{cur(jobs.reduce((s,e)=>s+grossProfit(e),0)*(settings.taxRate||25)/100)}</div>
          </div>
          <div className="settings-row">
            <div><div className="settings-label">IRS Mileage Deduction</div><div className="settings-sub">{jobs.reduce((s,e)=>s+(e.mileage||0),0)} mi × $0.67</div></div>
            <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:14,fontWeight:700}}>{cur(jobs.reduce((s,e)=>s+(e.mileage||0),0)*0.67)}</div>
          </div>
        </div>

        {/* Backup */}
        <div className="section-label">💾 Data Backup</div>
        <div className="settings-card">
          <div className="settings-row"><div><div className="settings-label">Export Backup</div><div className="settings-sub">{jobs.length} jobs</div></div><button className="settings-btn" onClick={exportData}>Export</button></div>
          <div className="settings-row"><div><div className="settings-label">Restore Backup</div></div><button className="settings-btn outline" onClick={importData}>Import</button></div>
        </div>

        {/* Danger */}
        <div className="section-label">⚠️ Danger Zone</div>
        <div className="settings-card">
          <div className="settings-row"><div><div className="settings-label" style={{color:"#dc2626"}}>Clear All Jobs</div></div><button className="settings-btn danger" onClick={clearAll}>Delete All</button></div>
        </div>
      </div>
    </div>
  );
}

function SetupScreen({onComplete, onSkip}){
  const [error,setError] = useState("");
  const [loading,setLoading] = useState(false);
  const connect = async() => {
    setLoading(true); setError("");
    const cfg={apiKey:"AIzaSyBOwfEmeSCbhCSQB2HYorkWTUbL4es_ntY",authDomain:"wheel-rush-expense.firebaseapp.com",projectId:"wheel-rush-expense",storageBucket:"wheel-rush-expense.firebasestorage.app",messagingSenderId:"400580006654",appId:"1:400580006654:web:b8e435c2807b51af244baf"};
    const ok=initFB(cfg);
    if(ok){
      try{
        await _db.collection("wheelrush_jobs").limit(1).get();
        saveFBCfg(cfg); onComplete();
      }catch(e){ setError("Connected but database access failed. Check Firestore rules — make sure 'allow read, write: if true' is published."); }
    } else { setError("Could not connect. Check your internet."); }
    setLoading(false);
  };
  return (
    <div style={{height:"100%",overflow:"auto",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <img src={`data:image/png;base64,${LOGO}`} style={{width:72,height:72,objectFit:"contain",borderRadius:14,marginBottom:18}} alt="Wheel Rush"/>
      <div style={{fontSize:22,fontWeight:700,marginBottom:6,textAlign:"center"}}>Enable Cloud Sync</div>
      <div style={{fontSize:14,color:"#888",textAlign:"center",marginBottom:24,lineHeight:1.6}}>Sync your jobs and inventory across all your devices instantly.</div>
      <div style={{background:"#f4f4f4",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#666",lineHeight:1.7,width:"100%",maxWidth:360}}>
        Project: <strong>wheel-rush-expense</strong><br/>
        Database: Cloud Firestore<br/>
        Status: Ready ✅
      </div>
      {error&&<div className="error-box" style={{maxWidth:360,width:"100%"}}>{error}</div>}
      <button className="btn-primary" style={{maxWidth:360}} onClick={connect} disabled={loading}>{loading?"Connecting...":"🔗 Connect & Sync"}</button>
      <button onClick={onSkip} style={{background:"none",border:"none",color:"#bbb",fontSize:13,cursor:"pointer",marginTop:14,fontFamily:"IBM Plex Sans,sans-serif",textDecoration:"underline"}}>Skip — use offline only</button>
    </div>
  );
}

function App(){
  const [tab,       setTab]       = useState("dashboard");
  const [jobs,      setJobs]      = useState([]);
  const [tires,     setTires]     = useState(INITIAL_TIRES);
  const [tireSales, setTireSales] = useState([]);
  const [receipts,  setReceipts]  = useState(()=>loadReceipts());
  const [settings,  setSettings]  = useState(loadSettings);
  const [loaded,    setLoaded]    = useState(false);
  const [showSetup, setShowSetup] = useState(false);
  const [fbEnabled, setFbEnabled] = useState(false);
  const [syncStatus,setSyncStatus]= useState("offline");
  const retryRef = useRef(null);

  useEffect(()=>{
    const ok=initFB(FB_CFG);
    if(ok){setFbEnabled(true);startListening();}
    else{loadLocalAll();setLoaded(true);}
  },[]);

  const loadLocalAll = () => {
    setJobs(loadJobs()); setTires(loadTires()||INITIAL_TIRES); setTireSales(loadSales()); setReceipts(loadReceipts());
  };

  const startListening = useCallback(()=>{
    setSyncStatus("syncing");
    if(_jobUnsub) _jobUnsub();
    if(_tireUnsub) _tireUnsub();
    if(retryRef.current) clearTimeout(retryRef.current);

    _jobUnsub=fbListenJobs(docs=>{ setJobs(docs); saveJobs(docs); setLoaded(true); setSyncStatus("connected"); });
    _tireUnsub=fbListenTires(docs=>{
      if(docs.length>0){const sorted=docs.sort((a,b)=>a.rim-b.rim||a.size.localeCompare(b.size));setTires(sorted);saveTires(sorted);}
      else{const local=loadTires();const data=local||INITIAL_TIRES;setTires(data);fbSaveAllTires(data);}
    });

    // Health check
    const hc=setInterval(async()=>{
      if(!_db) return;
      try{ await _db.collection("wheelrush_jobs").limit(1).get(); setSyncStatus("connected"); }
      catch{ setSyncStatus("syncing"); clearInterval(hc); retryRef.current=setTimeout(()=>startListening(),3000); }
    },45000);
  },[]);

  const handleSetupComplete = useCallback(()=>{ setFbEnabled(true); setShowSetup(false); startListening(); },[startListening]);
  const handleDisconnect    = useCallback(()=>{
    if(!window.confirm("Disconnect sync?")) return;
    if(_jobUnsub) _jobUnsub(); if(_tireUnsub) _tireUnsub();
    localStorage.removeItem("wr-firebase-cfg");
    setFbEnabled(false); setSyncStatus("offline");
    try{if(firebase.apps.length>0)firebase.apps[0].delete();}catch{} _db=null;
  },[]);

  const saveJob = useCallback(async(entry)=>{
    const next=[entry,...jobs]; setJobs(next); saveJobs(next);
    if(fbEnabled){ try{ jSavingRef.current=true; await fbSaveJob(entry); setSyncStatus("connected"); }catch{setSyncStatus("error");}finally{setTimeout(()=>jSavingRef.current=false,800);} }
    setTab("dashboard");
  },[jobs,fbEnabled]);

  const saveJobAndAdd = useCallback(async(entry)=>{
    const next=[entry,...jobs]; setJobs(next); saveJobs(next);
    if(fbEnabled){ try{ jSavingRef.current=true; await fbSaveJob(entry); setSyncStatus("connected"); }catch{setSyncStatus("error");}finally{setTimeout(()=>jSavingRef.current=false,800);} }
  },[jobs,fbEnabled]);

  const updateJob = useCallback(async(updated)=>{
    const next=jobs.map(e=>e.id===updated.id?updated:e);
    setJobs(next); saveJobs(next);
    if(fbEnabled){
      jSavingRef.current=true;
      try{
        setSyncStatus("syncing");
        await fbSaveJob(updated);
        setSyncStatus("connected");
      }catch(e){ setSyncStatus("error"); }
      finally{ setTimeout(()=>{ jSavingRef.current=false; },1500); }
    }
  },[jobs,fbEnabled]);

  const deleteJob = useCallback(async(id)=>{
    if(!window.confirm("Delete this job?")) return;
    const next=jobs.filter(e=>e.id!==id); setJobs(next); saveJobs(next);
    if(fbEnabled){ try{ jSavingRef.current=true; await fbDelJob(id); setSyncStatus("connected"); }catch{setSyncStatus("error");}finally{setTimeout(()=>jSavingRef.current=false,800);} }
  },[jobs,fbEnabled]);

  const syncColor={"connected":"#22c55e","syncing":"#f59e0b","offline":"#666","error":"#dc2626"}[syncStatus]||"#666";
  const syncLabel={"connected":"Synced","syncing":"Syncing","offline":"Offline","error":"Error"}[syncStatus];
  const tabTitles={"dashboard":"Dashboard","add":"Add Job","history":"History","payouts":"Payouts","inventory":"Inventory","expenses":"Expenses","settings":"Settings"};

  if(showSetup) return <SetupScreen onComplete={handleSetupComplete} onSkip={()=>{setShowSetup(false);setLoaded(true);}}/>;
  if(!loaded) return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,background:"#111"}}>
      <img src={`data:image/png;base64,${LOGO}`} style={{width:64,height:64,objectFit:"contain",borderRadius:12}}/>
      <div style={{color:"#555",fontSize:13,fontFamily:"IBM Plex Sans,sans-serif",letterSpacing:1}}>Loading...</div>
    </div>
  );

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <div style={{display:"flex",alignItems:"center"}}>
          <img src={`data:image/png;base64,${LOGO}`} className="header-logo" alt="Wheel Rush"/>
          <div>
            <div className="header-title">{tabTitles[tab]}</div>
            <div className="header-sub">Wheel Rush Mobile Tire Repair</div>
          </div>
        </div>
        <div className="sync-pill">
          <div className="sync-dot" style={{background:syncColor,boxShadow:syncStatus==="connected"?`0 0 5px ${syncColor}`:""}}/>
          <span className="sync-label">{syncLabel}</span>
        </div>
      </div>

      {/* Screens */}
      {tab==="dashboard" && <DashboardScreen jobs={jobs} settings={settings} setTab={setTab}/>}
      {tab==="add"       && <AddJobScreen onSave={saveJob} onSaveAdd={saveJobAndAdd} settings={settings}/>}
      {tab==="history"   && <HistoryScreen jobs={jobs} onDelete={deleteJob} onUpdate={updateJob} settings={settings} receipts={receipts}/>}
      {tab==="payouts"   && <PayoutsScreen jobs={jobs} settings={settings} receipts={receipts} setReceipts={setReceipts} fbEnabled={fbEnabled}/>}
      {tab==="inventory" && <InventoryScreen tires={tires} setTires={setTires} fbEnabled={fbEnabled} tireSales={tireSales} setTireSales={setTireSales}/>}
      {tab==="expenses"  && <ExpensesScreen receipts={receipts} setReceipts={setReceipts} settings={settings} fbEnabled={fbEnabled}/>}
      {tab==="settings"  && <SettingsScreen jobs={jobs} setJobs={setJobs} settings={settings} setSettings={setSettings} fbEnabled={fbEnabled} syncStatus={syncStatus} onSetupSync={()=>setShowSetup(true)} onDisconnect={handleDisconnect}/>}

      {/* Bottom nav */}
      <nav className="bottom-nav">
        <button className={`nav-btn${tab==="dashboard"?" active":""}`} onClick={()=>setTab("dashboard")}><span className="ico">📊</span>Dashboard</button>
        <button className={`nav-btn${tab==="add"?" active":""}`} onClick={()=>setTab("add")}><span className="ico" style={{fontSize:22}}>＋</span>Add Job</button>
        <button className={`nav-btn${tab==="history"?" active":""}`} onClick={()=>setTab("history")}><span className="ico">📋</span>History</button>
        <button className={`nav-btn${tab==="payouts"?" active":""}`} onClick={()=>setTab("payouts")}><span className="ico">💰</span>Payouts</button>
        <button className={`nav-btn${tab==="inventory"?" active":""}`} onClick={()=>setTab("inventory")}><span className="ico">🛞</span>Inventory</button>
        <button className={`nav-btn${tab==="expenses"?" active":""}`} onClick={()=>setTab("expenses")}><span className="ico">🧾</span>Expenses</button>
        <button className={`nav-btn${tab==="settings"?" active":""}`} onClick={()=>setTab("settings")}><span className="ico">⚙️</span>Settings</button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
