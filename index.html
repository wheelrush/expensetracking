<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wheel Rush" />
  <meta name="theme-color" content="#111111" />
  <title>Wheel Rush — Business Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;font-family:"IBM Plex Sans",sans-serif;background:#f4f4f4;overflow:hidden;color:#111}
    input,select,textarea,button{font-family:"IBM Plex Sans",sans-serif}
    input,select,textarea{font-size:16px!important}
    button{cursor:pointer}
    .app{height:100%;display:flex;flex-direction:column}
    .header{background:#111;color:#fff;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
    .header h1{font-size:18px;line-height:1.1;font-weight:700}
    .header p{font-size:11px;color:#666;margin-top:3px}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}
    .badge.dark{background:rgba(255,255,255,0.07);color:#888}
    .badge.green{background:rgba(74,222,128,0.15);color:#4ade80}
    .badge.orange{background:rgba(234,88,12,0.2);color:#fb923c}
    .screen{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
    .page{padding:14px 14px 100px}
    .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:#999;margin:18px 0 8px}
    .section-label:first-child{margin-top:0}
    .label{font-size:12px;color:#777}
    .sub{font-size:11px;color:#999}
    .value{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:700}
    .value.big{font-size:22px}
    .value.green{color:#16a34a}.value.red{color:#dc2626}.value.orange{color:#ea580c}
    .mono{font-family:"IBM Plex Mono",monospace}
    .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:10px}
    .card-pad{padding:14px 16px}
    .card-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid #f0f0f0}
    .card-row:last-child{border-bottom:none}
    .dark-card{background:#111;color:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.15);margin-bottom:10px}
    .dark-card .muted{color:#555}
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#ececec;border-radius:14px;overflow:hidden;margin-bottom:10px}
    .kpi-grid.three{grid-template-columns:1fr 1fr 1fr}
    .kpi-grid.four{grid-template-columns:1fr 1fr 1fr 1fr}
    .kpi{background:#fff;padding:14px}
    .kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#999;margin-bottom:5px}
    .kpi-value{font-family:"IBM Plex Mono",monospace;font-size:19px;font-weight:700;line-height:1.1}
    .kpi-sub{font-size:11px;color:#999;margin-top:4px}
    .goal-track{height:8px;background:#f0f0f0;border-radius:999px;overflow:hidden;margin:10px 0 6px}
    .goal-fill{height:100%;border-radius:999px;transition:width .4s ease}
    .goal-fill.full{background:#16a34a}
    .goal-fill.mid{background:#111}
    .goal-fill.low{background:#ea580c}
    .mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#ececec;border-radius:14px;overflow:hidden;margin-bottom:10px}
    .mini-box{background:#fff;padding:10px;text-align:center}
    .mini-box strong{display:block;font-family:"IBM Plex Mono",monospace;font-size:14px;line-height:1.2}
    .mini-box span{display:block;font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .stack{display:grid;gap:8px}
    .job-row{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .job-icon{width:38px;height:38px;border-radius:10px;background:#f4f4f4;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .job-main{flex:1;min-width:0}
    .job-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .job-meta{font-size:11px;color:#999;margin-top:3px;line-height:1.5}
    .job-right{text-align:right;flex-shrink:0}
    .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;line-height:1.4}
    .pill.green{background:#dcfce7;color:#166534}
    .pill.red{background:#fee2e2;color:#b91c1c}
    .pill.orange{background:#ffedd5;color:#c2410c}
    .pill.gray{background:#f3f4f6;color:#6b7280}
    .pill.blue{background:#dbeafe;color:#1d4ed8}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#888;margin-bottom:7px}
    .field input,.field select,.field textarea{width:100%;border:1.5px solid #e3e3e3;background:#fff;border-radius:12px;padding:12px 14px;outline:none;transition:border-color .15s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:#111}
    .field textarea{min-height:72px;resize:vertical}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
    .chip{border:1.5px solid #ddd;background:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;color:#666;transition:all .12s}
    .chip.active{background:#111;color:#fff;border-color:#111}
    .chip.sm{padding:5px 10px;font-size:11px}
    .preview{background:#f8f8f8;border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:14px}
    .preview-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:5px 0;font-size:13px;border-bottom:1px solid #f0f0f0}
    .preview-row:last-child{border-bottom:none;padding-top:10px;font-weight:700;font-size:14px}
    .btn{border:none;border-radius:12px;padding:14px 16px;font-weight:700;font-size:14px;transition:opacity .1s}
    .btn:active{opacity:.8}
    .btn.primary{background:#111;color:#fff}
    .btn.secondary{background:#fff;color:#111;border:1.5px solid #ddd}
    .btn.sm{padding:9px 13px;font-size:12px;border-radius:10px}
    .btn.danger{background:#fee2e2;color:#b91c1c}
    .btn.success{background:#dcfce7;color:#166534}
    .btn.blue{background:#dbeafe;color:#1d4ed8}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
    .pay-btn{border:1.5px solid #e3e3e3;border-radius:12px;padding:10px 4px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#666;transition:all .12s}
    .pay-btn.active{border-color:#111;background:#111;color:#fff}
    .pay-btn .pay-icon{font-size:18px}
    .bottom-nav{display:flex;background:#fff;border-top:1px solid #ececec;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
    .nav-btn{flex:1;border:none;background:none;padding:7px 2px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#bbb;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .nav-btn.active{color:#111}
    .nav-btn .ico{font-size:16px;line-height:1}
    .settings-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f1f1f1}
    .settings-row:last-child{border-bottom:none}
    .settings-inp{border:1.5px solid #e3e3e3;border-radius:10px;padding:10px 12px;font-family:"IBM Plex Sans",sans-serif;font-size:15px;outline:none}
    .settings-inp:focus{border-color:#111}
    .expense-row{display:grid;grid-template-columns:1fr 90px auto auto;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid #f2f2f2}
    .expense-row:last-child{border-bottom:none}
    .expense-row input{border:1.5px solid #e3e3e3;border-radius:10px;padding:9px 12px;width:100%;font-family:"IBM Plex Sans",sans-serif;font-size:15px;outline:none}
    .empty{padding:50px 20px;text-align:center}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty-title{font-size:15px;font-weight:700;margin-bottom:6px}
    .empty-sub{font-size:13px;color:#999;line-height:1.5}
    .tax-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-top:10px}
    .tax-box .tax-lbl{color:#92400e;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .tax-box .tax-amt{font-family:"IBM Plex Mono",monospace;font-size:18px;font-weight:700;color:#b45309}
    .tax-box .tax-hint{font-size:11px;color:#92400e;margin-top:4px}
    .inline-note{font-size:11px;color:#999;line-height:1.6;margin-bottom:14px}
    /* Inventory stepper */
    .stepper{display:flex;align-items:center;gap:0;border:1.5px solid #e3e3e3;border-radius:10px;overflow:hidden}
    .stepper button{background:#f4f4f4;border:none;width:36px;height:36px;font-size:18px;font-weight:700;color:#555;flex-shrink:0}
    .stepper button:active{background:#e0e0e0}
    .stepper input{border:none;text-align:center;font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:16px;width:48px;background:#fff;outline:none}
    /* Source chart */
    .source-bar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}
    .source-bar:last-child{border-bottom:none}
    .source-bar-track{flex:1;height:6px;background:#f0f0f0;border-radius:999px;overflow:hidden}
    .source-bar-fill{height:100%;background:#111;border-radius:999px}
    /* Auth screen */
    .auth-screen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;padding:32px 24px}
    .auth-title{color:#fff;font-size:24px;font-weight:700;margin-bottom:6px}
    .auth-sub{color:#555;font-size:13px;margin-bottom:32px;text-align:center}
    .auth-inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:16px;outline:none;margin-bottom:12px;font-family:"IBM Plex Sans",sans-serif}
    .auth-inp::placeholder{color:#444}
    .auth-inp:focus{border-color:rgba(255,255,255,.3)}
    /* Sync badge animation */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .syncing{animation:pulse 1.2s infinite}
    /* Trend chart */
    .trend-chart{display:flex;align-items:flex-end;gap:4px;height:48px;padding:0 4px}
    .trend-bar{flex:1;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
    @media(max-width:375px){
      .field-row{grid-template-columns:1fr}
      .mini-grid{grid-template-columns:repeat(2,1fr)}
      .pay-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>

// ─────────────────────────────────────────────────────────────────────────────
// BUSINESS LOGIC — direct cost never includes weekly fixed
// ─────────────────────────────────────────────────────────────────────────────
const jobDirectCost  = (j, s) => r2(Number(j.miles||0)*Number(s.costPerMile||0.65) + Number(j.tireCost||0) + Number(j.miscCost||0));
const jobGrossProfit = (j, s) => r2(Number(j.revenue||0) - jobDirectCost(j, s));
const weeklyFixed    = s => r2((s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0) * 12 / 52);
const monthlyFixed   = s => (s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0);

function premiums(j) {
  let p = 0;
  if (j.emergency) p += 20; if (j.lateNight) p += 20;
  if (j.highway)   p += 15; if (j.weekend)   p += 10;
  if (Number(j.miles||0) > 25) p += 20;
  return p;
}
function suggestedPrice(j, s) {
  const direct = jobDirectCost(j, s);
  const isRepl = /replacement|installation/i.test(j.service||'');
  const target = isRepl ? Number(s.replacementTarget||110) : Number(s.repairTarget||90);
  return Math.ceil((direct + target + premiums(j)) / 5) * 5;
}

// Goal-aware decision: if behind goal, lower the risky bar
function jobDecision(j, s, weekGrossProfit = 0) {
  const rev     = Number(j.revenue||0) || suggestedPrice(j, s);
  const profit  = r2(rev - jobDirectCost(j, s));
  const skip    = Number(s.skipThreshold||70);
  const miles   = Number(j.miles||0);
  const goal    = Number(s.weeklyGoal||1200);
  const goalPct = goal > 0 ? weekGrossProfit / goal : 0;

  if (profit < skip) return { label:'Skip', color:'red', reason:`Profit ${money(profit)} below min ${money(skip)}` };

  // If at/above goal, be stricter about risky jobs
  if (goalPct >= 1.0 && miles > Number(s.riskyMiles||25)) {
    return { label:'Skip', color:'red', reason:`Goal hit — skip the distance` };
  }
  // If behind goal, accept riskier jobs
  if (miles > Number(s.riskyMiles||25)) {
    const adjustedSkip = goalPct < 0.5 ? skip - 15 : skip;
    if (profit < adjustedSkip + 30) return { label:'Risky', color:'orange', reason:`${miles} mi + thin margin` };
  }
  return { label:'Take', color:'green', reason:`Profit ${money(profit)} looks good` };
}

function weekSummary(weekJobs, s) {
  const revenue     = r2(weekJobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const directCosts = r2(weekJobs.reduce((t,j)=>t+jobDirectCost(j,s),0));
  const grossProfit = r2(revenue - directCosts);
  const fixed       = weeklyFixed(s);
  const net         = r2(grossProfit - fixed);
  return { revenue, directCosts, grossProfit, fixed, net, jobCount:weekJobs.length };
}

// ─────────────────────────────────────────────────────────────────────────────
// DATE HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function getWeekStart(d) {
  const dt = new Date(d+'T00:00:00'), day = dt.getDay();
  dt.setDate(dt.getDate() - (day >= 5 ? day - 5 : day + 2));
  return dt.toISOString().slice(0,10);
}
function weekLabel(s) {
  const d = new Date(s+'T00:00:00'), e = new Date(d);
  e.setDate(e.getDate()+6);
  const f = dt => dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${f(d)} – ${f(e)}`;
}
function nextFriday() {
  const d = new Date(), diff = d.getDay()===5 ? 7 : (5-d.getDay()+7)%7;
  d.setDate(d.getDate()+diff);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function groupByWeek(jobs) {
  const map = {};
  [...jobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
    .forEach(j => { const k=getWeekStart(j.date); if(!map[k])map[k]=[]; map[k].push(j); });
  return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
}

// ─────────────────────────────────────────────────────────────────────────────
// CSV EXPORT
// ─────────────────────────────────────────────────────────────────────────────
function exportCSV(jobs, settings) {
  const headers = ['Date','Service','Area','Source','Revenue','Tire Cost','Misc Cost','Miles','Travel Cost','Direct Cost','Gross Profit','Payment','Tire Size','Qty','Emergency','Late Night','Highway','Weekend','Customer Name','Customer Phone','Notes'];
  const rows = [...jobs].sort((a,b)=>a.date.localeCompare(b.date)).map(j => {
    const dc = jobDirectCost(j, settings);
    const gp = jobGrossProfit(j, settings);
    return [
      j.date, j.service, j.area, j.source||'',
      Number(j.revenue||0).toFixed(2), Number(j.tireCost||0).toFixed(2),
      Number(j.miscCost||0).toFixed(2), Number(j.miles||0).toFixed(1),
      (Number(j.miles||0)*Number(settings.costPerMile||0.65)).toFixed(2),
      dc.toFixed(2), gp.toFixed(2),
      j.payment, j.tireSize||'', j.qty||1,
      j.emergency?'Yes':'No', j.lateNight?'Yes':'No', j.highway?'Yes':'No', j.weekend?'Yes':'No',
      j.customerName||'', j.customerPhone||'', (j.note||'').replace(/,/g,' ')
    ].map(v => `"${v}"`).join(',');
  });
  const csv  = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `wheel-rush-jobs-${TODAY()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function AuthScreen({ onAuth }) {
  const [email, setEmail] = useState('');

  const [err,   setErr]   = useState('');

  const submit = async () => {
    if (!email || !pass) { setErr('Enter email and password.'); return; }
    setBusy(true); setErr('');
    try {
      let cred;
      if (mode === 'login') {
        cred = await _auth.signInWithEmailAndPassword(email, pass);
      } else {
        cred = await _auth.createUserWithEmailAndPassword(email, pass);
      }
      onAuth(cred.user);
    } catch (e) {
      setErr(e.message || 'Auth failed.');
    } finally { setBusy(false); }
  };

  const google = async () => {
    try {
      const cred = await _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());

    } catch (e) { setErr(e.message); }
  };

  return (

      <button className="btn primary" style={{width:'100%',marginBottom:10}} onClick={submit} disabled={busy}>

  const [error, setError] = useState('');

  const recentSizes = useMemo(()=>[...new Set([...load(KEYS.sizes,[]),...DEFAULT_TIRE_SIZES])].slice(0,6),[tick]);

  // Current week gross for goal-aware decision
  const weekGross = useMemo(()=>{
    const thisWeek = getWeekStart(TODAY());
    return jobs.filter(j=>getWeekStart(j.date)===thisWeek).reduce((s,j)=>s+jobGrossProfit(j,settings),0);
  },[jobs,settings]);

  useEffect(()=>{
    if(prefill){
      setForm({...EMPTY_JOB(),service:prefill.service||'Tire Repair',area:prefill.area||'Miami',payment:prefill.payment||'Cash',source:prefill.source||'Google Search',tireSize:prefill.tireSize||'',qty:prefill.qty||1,tireCost:prefill.tireCost||'',miscCost:prefill.miscCost||'',miles:prefill.miles||'',emergency:!!prefill.emergency,lateNight:!!prefill.lateNight,highway:!!prefill.highway,weekend:!!prefill.weekend});
      if(onClearPrefill) onClearPrefill();
    }
  },[prefill]);

  const setF = (k,v) => { setForm(p=>({...p,[k]:v})); setError(''); };

  const directCost    = useMemo(()=>jobDirectCost(form,settings),[form,settings]);
  const suggested     = useMemo(()=>suggestedPrice(form,settings),[form,settings]);
  const decision      = useMemo(()=>jobDecision({...form,revenue:form.revenue||suggested},settings,weekGross),[form,settings,suggested,weekGross]);
  const enteredProfit = useMemo(()=>form.revenue?jobGrossProfit(form,settings):r2(suggested-directCost),[form,settings,suggested,directCost]);

  const save = (andAdd=false) => {
    const rev = Number(form.revenue||0);
    if(!rev){setError('Enter the job price.');return;}
    if(form.tireSize){try{const p=load(KEYS.sizes,[]);persist(KEYS.sizes,[form.tireSize,...p.filter(s=>s!==form.tireSize)].slice(0,10));}catch{}}
    const entry={...form,id:uid(),qty:Number(form.qty||1),revenue:r2(rev),tireCost:r2(form.tireCost),miscCost:r2(form.miscCost),miles:r2(form.miles)};
    onSave(entry,andAdd);
    setTick(t=>t+1);
    if(andAdd){setForm(EMPTY_JOB());setError('');}
  };

  // Google review SMS link
  const requestReview = () => {
    const url  = settings.googleReviewUrl||REVIEW_URL;
    const name = form.customerName;
    const msg  = encodeURIComponent(`Hi${name?' '+name:''}! Thanks for choosing Wheel Rush today. We'd really appreciate if you could leave us a quick Google review — it helps us grow! ${url}`);
    const phone= form.customerPhone;
    if(phone) window.open(`sms:${phone}?body=${msg}`);
    else window.open(`sms:?body=${msg}`);
  };

  const FLAGS=[['emergency','🚨 Emergency',20],['lateNight','🌙 Late Night',20],['highway','🛣 Highway',15],['weekend','📅 Weekend',10]];

  return (
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>New Job</div>
      {error&&<div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#b91c1c',marginBottom:14,fontWeight:600}}>{error}</div>}

      <div className="field-row">
        <div className="field"><label>Date</label><input type="date" value={form.date} onChange={e=>setF('date',e.target.value)}/></div>
        <div className="field"><label>Service</label><select value={form.service} onChange={e=>setF('service',e.target.value)}>{SERVICE_OPTIONS.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      <div className="field-row">
        <div className="field"><label>Area</label><select value={form.area} onChange={e=>setF('area',e.target.value)}>{AREA_OPTIONS.map(a=><option key={a}>{a}</option>)}</select></div>
        <div className="field"><label>Lead Source</label><select value={form.source} onChange={e=>setF('source',e.target.value)}>{SOURCE_OPTIONS.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      <div className="field-row">
        <div className="field"><label>Job Price ($)</label><input type="number" min="0" inputMode="decimal" value={form.revenue} onChange={e=>setF('revenue',e.target.value)} placeholder={String(suggested)} style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700}}/></div>
        <div className="field"><label>Miles Driven</label><input type="number" min="0" inputMode="decimal" value={form.miles} onChange={e=>setF('miles',e.target.value)} placeholder="0"/></div>
      </div>
      <div className="field-row">
        <div className="field"><label>Tire Cost ($)</label><input type="number" min="0" inputMode="decimal" value={form.tireCost} onChange={e=>setF('tireCost',e.target.value)} placeholder="0"/></div>
        <div className="field"><label>Misc Cost ($)</label><input type="number" min="0" inputMode="decimal" value={form.miscCost} onChange={e=>setF('miscCost',e.target.value)} placeholder="plugs, stems…"/></div>
      </div>

      {/* Tire size + chips */}
      <div className="field">
        <label>Tire Size</label>
        <input value={form.tireSize} onChange={e=>setF('tireSize',e.target.value)} placeholder="225/55R17"/>
        <div className="chip-row" style={{marginTop:8}}>
          {recentSizes.map(sz=><button type="button" key={sz} className={`chip sm ${form.tireSize===sz?'active':''}`} onClick={()=>setF('tireSize',sz)}>{sz}</button>)}
        </div>
      </div>

      <div className="field-row">
        <div className="field"><label>Qty</label><input type="number" min="1" value={form.qty} onChange={e=>setF('qty',e.target.value)}/></div>
        <div className="field"><label>Status</label><select value={form.status} onChange={e=>setF('status',e.target.value)}><option>Completed</option><option>Pending</option></select></div>
      </div>
      <div className="field-row">
        <div className="field"><label>Customer Name</label><input value={form.customerName} onChange={e=>setF('customerName',e.target.value)} placeholder="Optional"/></div>
        <div className="field"><label>Customer Phone</label><input type="tel" value={form.customerPhone} onChange={e=>setF('customerPhone',e.target.value)} placeholder="Optional"/></div>
      </div>

      {/* Payment tap grid */}
      <div className="field">
        <label>Payment Method</label>
        <div className="pay-grid">
          {PAYMENT_OPTIONS.map(({label,icon})=>(
            <button key={label} type="button" className={`pay-btn ${form.payment===label?'active':''}`} onClick={()=>setF('payment',label)}>
              <span className="pay-icon">{icon}</span>{label}
            </button>
          ))}
        </div>
      </div>

      {/* Flags */}
      <div className="field">
        <label>Conditions <span style={{textTransform:'none',fontWeight:400,color:'#bbb'}}>— tap to add premium</span></label>
        <div className="chip-row">
          {FLAGS.map(([key,label,amt])=>(
            <button type="button" key={key} className={`chip ${form[key]?'active':''}`} onClick={()=>setF(key,!form[key])}>
              {label}{form[key]?` +$${amt}`:''}
            </button>
          ))}
        </div>
      </div>

      <div className="field"><label>Notes</label><textarea value={form.note} onChange={e=>setF('note',e.target.value)} placeholder="Parking garage, roadside, no spare, etc."/></div>

      {/* Live preview */}
      <div className="preview">
        <div className="preview-row"><span>Suggested Price</span><strong className="mono">{money(suggested)}</strong></div>
        <div className="preview-row"><span>Direct Cost</span><strong className="mono" style={{color:'#dc2626'}}>{money(directCost)}</strong></div>
        <div className="preview-row"><span>Gross Profit</span><strong className="mono" style={{color:enteredProfit>=0?'#16a34a':'#dc2626'}}>{money(enteredProfit)}</strong></div>
        <div className="preview-row">
          <span>Decision</span>
          <div>
            <span className={`pill ${decision.color}`}>{decision.label}</span>
            <div style={{fontSize:10,color:'#999',marginTop:3}}>{decision.reason}</div>
          </div>
        </div>
      </div>
      <div className="inline-note">Direct cost = travel + tire + misc. Weekly fixed deducted at payout only.</div>

      <div className="btn-row">
        <button className="btn primary" onClick={()=>save(false)}>Save Job</button>
        <button className="btn secondary" onClick={()=>save(true)}>Save + Add Another</button>
      </div>

      {/* Request review button (shows after customer phone entered) */}
      {form.status==='Completed'&&(
        <button className="btn blue" style={{width:'100%',marginTop:10}} onClick={requestReview}>
          ⭐ Send Review Request {form.customerPhone?'via SMS':'(no phone entered)'}
        </button>
      )}
    </div></div>
  );
}

// HISTORY
// ─────────────────────────────────────────────────────────────────────────────
function History({ jobs, settings, setJobs, onRepeat }) {
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [view,   setView]   = useState('weeks');

  const cities   = useMemo(()=>Array.from(new Set(jobs.map(j=>j.area))),[jobs]);
  const filtered = useMemo(()=>{
    let j = jobs;
    if(filter==='Repair')      j=j.filter(x=>/repair/i.test(x.service));
    if(filter==='Replacement') j=j.filter(x=>/replacement|installation/i.test(x.service));
    if(!['All','Repair','Replacement'].includes(filter)) j=j.filter(x=>x.area===filter);
    if(search.trim()){
      const q=search.toLowerCase();
      j=j.filter(x=>(x.customerName||'').toLowerCase().includes(q)||(x.customerPhone||'').includes(q)||(x.tireSize||'').toLowerCase().includes(q)||(x.area||'').toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));
    }
    return [...j].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },[jobs,filter,search]);

  const weekGroups = useMemo(()=>groupByWeek(filtered),[filtered]);
  const remove = id=>{ if(!window.confirm('Delete this job?'))return; setJobs(prev=>prev.filter(j=>j.id!==id)); };

  // Week gross for decision context
  const thisWeekGross = useMemo(()=>{
    const tw=getWeekStart(TODAY());
    return jobs.filter(j=>getWeekStart(j.date)===tw).reduce((s,j)=>s+jobGrossProfit(j,settings),0);
  },[jobs,settings]);

  const JobRow = ({job})=>{
    const profit=jobGrossProfit(job,settings);
    const dec=jobDecision(job,settings,thisWeekGross);
    const reviewUrl = settings.googleReviewUrl||REVIEW_URL;
    const sendReview=()=>{
      const msg=encodeURIComponent(`Hi${job.customerName?' '+job.customerName:''}! Thanks for choosing Wheel Rush. We'd love a quick Google review! ${reviewUrl}`);
      window.open(job.customerPhone?`sms:${job.customerPhone}?body=${msg}`:`sms:?body=${msg}`);
    };
    return(
      <div className="job-row" key={job.id}>
        <div className="job-icon">🛞</div>
        <div className="job-main">
          <div className="job-title">{job.service} · {job.area}</div>
          <div className="job-meta">{job.date} · {job.tireSize||'No size'} · {job.payment}{job.source?` · ${job.source}`:''}</div>
          <div style={{marginTop:5,display:'flex',gap:6,flexWrap:'wrap'}}>
            <span className={`pill ${dec.color}`}>{dec.label}</span>
            {job.source&&<span className="pill blue">{job.source}</span>}
            {job.emergency&&<span className="pill orange">Emergency</span>}
            {job.lateNight&&<span className="pill gray">Late Night</span>}
          </div>
        </div>
        <div className="job-right">
          <div className="value">{money(job.revenue)}</div>
          <div className={`sub ${profit>=0?'green':'red'}`} style={{fontWeight:700}}>{money(profit)}</div>
          <div style={{display:'flex',gap:5,marginTop:8,justifyContent:'flex-end',flexWrap:'wrap'}}>
            <button className="btn success sm" onClick={()=>onRepeat(job)} title="Repeat job">🔁</button>
            <button className="btn blue sm" onClick={sendReview} title="Request review">⭐</button>
            <button className="btn danger sm" onClick={()=>remove(job.id)}>×</button>
          </div>
        </div>
      </div>
    );
  };

  return(
    <div className="screen"><div className="page">
      {/* Search */}
      <div className="field" style={{marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search by name, phone, tire size, area…" style={{width:'100%',border:'1.5px solid #e3e3e3',borderRadius:12,padding:'12px 14px',outline:'none',fontSize:15}}/>
      </div>

      {/* Filters */}
      <div className="chip-row" style={{marginBottom:10}}>
        {['All','Repair','Replacement',...cities].slice(0,8).map(c=>(
          <button key={c} className={`chip ${filter===c?'active':''}`} onClick={()=>setFilter(c)}>{c}</button>
        ))}
      </div>

      {/* View toggle */}
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className={`chip ${view==='weeks'?'active':''}`} onClick={()=>setView('weeks')}>By Week</button>
        <button className={`chip ${view==='list'?'active':''}`} onClick={()=>setView('list')}>All Jobs</button>
        <span style={{marginLeft:'auto',fontFamily:'"IBM Plex Mono",monospace',fontSize:12,color:'#999',alignSelf:'center'}}>{filtered.length} job{filtered.length!==1?'s':''}</span>
      </div>

      {filtered.length===0?(
        <EmptyState icon="📋" title="No jobs found" sub={search?'Try a different search term.':'No jobs match this filter.'}/>
      ):view==='weeks'?(
        weekGroups.map(([wk,wkJobs])=>{
          const t=weekSummary(wkJobs,settings);
          return(
            <div key={wk} style={{marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}}>
                <div><div style={{fontWeight:700,fontSize:13}}>{weekLabel(wk)}</div><div className="sub">{wkJobs.length} jobs · {money(t.revenue)} rev · {money(t.grossProfit)} gross</div></div>
                <div style={{textAlign:'right'}}><div className={`value ${t.net>=0?'green':'red'}`}>{money(t.net)}</div><div className="sub">net</div></div>
              </div>
              <div className="stack">{wkJobs.map(job=><JobRow key={job.id} job={job}/>)}</div>
            </div>
          );
        })
      ):(
        <div className="stack">{filtered.map(job=><JobRow key={job.id} job={job}/>)}</div>
      )}
    </div></div>
  );
}

// EXPENSES (Variable — on-the-fly)

function Expenses({ expenses, setExpenses }) {
  const [form, setForm] = useState({ date:TODAY(), category:'Fuel', amount:'', note:'' });
  const CATS = ['Fuel','Oil/Fluids','Equipment Repair','Supplies','Food','Tolls/Parking','Other'];
  const setF = (k,v) => setForm(p=>({...p,[k]:v}));

  const add = () => {
    const amt = Number(form.amount||0);
    if(!amt){ alert('Enter an amount.'); return; }
    setExpenses(prev=>[{...form,id:uid(),amount:amt},...prev]);
    setForm({date:TODAY(),category:'Fuel',amount:'',note:''});
  };
  const remove = id=>{ if(!window.confirm('Delete?'))return; setExpenses(prev=>prev.filter(e=>e.id!==id)); };

  const total = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const thisWeek = getWeekStart(TODAY());

        <div className="mini-box"><strong>{money(total)}</strong><span>All Time</span></div>
        <div className="mini-box"><strong>{expenses.length}</strong><span>Receipts</span></div>
        <div className="mini-box"><strong>{expenses.length?money(total/expenses.length):'—'}</strong><span>Avg</span></div>
      </div>

      {/* Quick add */}
      <div className="card" style={{marginBottom:14}}>
        <div className="card-pad">
          <div className="field-row">
            <div className="field" style={{marginBottom:8}}>
              <label>Date</label>
              <input type="date" value={form.date} onChange={e=>setF('date',e.target.value)}/>
            </div>
            <div className="field" style={{marginBottom:8}}>
              <label>Amount ($)</label>
              <input type="number" min="0" inputMode="decimal" value={form.amount} onChange={e=>setF('amount',e.target.value)} placeholder="0.00" style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700}}/>
            </div>
          </div>
          <div className="field" style={{marginBottom:8}}>
            <label>Category</label>
            <select value={form.category} onChange={e=>setF('category',e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
          </div>
          <div className="field" style={{marginBottom:10}}>
            <label>Note (optional)</label>
            <input value={form.note} onChange={e=>setF('note',e.target.value)} placeholder="BP station, Home Depot, etc."/>

          <button className="btn primary" style={{width:'100%'}} onClick={add}>+ Log Expense</button>

      </div>

      {/* List */}
      {expenses.length===0?<EmptyState icon="🧾" title="No expenses logged" sub="Track fuel, supplies, and repairs as you go."/>:(
        <div className="stack">
          {[...expenses].sort((a,b)=>b.date.localeCompare(a.date)).map(exp=>(
            <div className="job-row" key={exp.id}>
              <div className="job-icon" style={{fontSize:16}}>🧾</div>
              <div className="job-main">
                <div className="job-title">{exp.category}</div>
                <div className="job-meta">{exp.date}{exp.note?' · '+exp.note:''}</div>
              </div>
              <div className="job-right">
                <div className="value red">{money(exp.amount)}</div>
                <button className="btn danger sm" style={{marginTop:8}} onClick={()=>remove(exp.id)}>×</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div></div>
  );
}

// PAYOUTS
// ─────────────────────────────────────────────────────────────────────────────
function Payouts({ jobs, settings }) {
  const weeks = useMemo(()=>groupByWeek(jobs),[jobs]);
  if(!weeks.length) return <div className="screen"><div className="page"><EmptyState icon="💰" title="No payout history" sub="Log jobs to see weekly payout breakdowns."/></div></div>;
  return(
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Weekly Payouts</div>
      {weeks.map(([wk,weekJobs])=>{
        const t=weekSummary(weekJobs,settings);
        const ao1=settings.owner1Active!==false, ao2=settings.owner2Active!==false;
        const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
        const o1=t.net>0&&ao1?r2(t.net*(Number(settings.profitSplit1||50)/st)):0;
        const o2=t.net>0&&ao2?r2(t.net*(Number(settings.profitSplit2||50)/st)):0;
        const tax=t.net>0&&settings.taxRate>0?r2(t.net*(Number(settings.taxRate)/100)):0;
        return(
          <div className="card" key={wk} style={{marginBottom:14}}>
            <div className="card-pad" style={{borderBottom:'1px solid #f0f0f0'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><div style={{fontWeight:700,fontSize:14}}>{weekLabel(wk)}</div><div className="sub">{weekJobs.length} jobs</div></div>
                <div className={`value big ${t.net>=0?'green':'red'}`}>{money(t.net)}</div>
              </div>
            </div>
            <div className="card-row"><div className="label">Revenue</div><div className="value">{money(t.revenue)}</div></div>
            <div className="card-row"><div className="label">Direct Costs</div><div className="value red">{money(t.directCosts)}</div></div>
            <div className="card-row"><div className="label">Gross Profit</div><div className="value">{money(t.grossProfit)}</div></div>
            <div className="card-row"><div className="label">Weekly Fixed Expenses</div><div className="value red">{money(t.fixed)}</div></div>
            {[{name:settings.owner1Name,pct:settings.profitSplit1,amt:o1,active:ao1},{name:settings.owner2Name,pct:settings.profitSplit2,amt:o2,active:ao2}].map((o,i)=>(
              <div key={i} className="card-row" style={{background:'#f9f9f9',opacity:o.active?1:0.4}}>
                <div><div style={{display:'flex',gap:6,alignItems:'center'}}><div className="label">{o.name}</div>{!o.active&&<span style={{fontSize:10,background:'#eee',color:'#999',borderRadius:4,padding:'1px 5px',fontWeight:700}}>OFF</span>}</div><div className="sub">{o.pct}% split</div></div>
                <div className={`value ${o.active&&o.amt>0?'green':''}`}>{o.active?money(o.amt):'—'}</div>
              </div>
            ))}
            {tax>0&&<div className="card-pad"><div className="tax-box" style={{marginTop:0}}><div className="tax-lbl">💰 Tax Reserve ({settings.taxRate}%)</div><div className="tax-amt">{money(tax)}</div><div className="tax-hint">~{money(tax/2)} per owner</div></div></div>}
          </div>
        );
      })}
    </div></div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// INVENTORY — with +/- stepper and auto-deduct
// ─────────────────────────────────────────────────────────────────────────────
function Inventory({ inventory, setInventory }) {
  const update = (id,patch) => setInventory(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));
  const add    = () => setInventory(prev=>[{id:uid(),size:'',qty:0,cost:0,notes:''},...prev]);
  const remove = id=>{ if(!window.confirm('Remove this tire?'))return; setInventory(prev=>prev.filter(i=>i.id!==id)); };
  const step   = (id,delta) => setInventory(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(0,(Number(i.qty)||0)+delta)}:i));

  const totalQty   = inventory.reduce((s,i)=>s+Number(i.qty||0),0);
  const totalValue = inventory.reduce((s,i)=>s+Number(i.qty||0)*Number(i.cost||0),0);
  const lowStock   = inventory.filter(i=>Number(i.qty||0)<=LOW_STOCK&&Number(i.qty||0)>0);
  const outOfStock = inventory.filter(i=>Number(i.qty||0)===0);

  return(
    <div className="screen"><div className="page">
      <div className="kpi-grid three" style={{marginBottom:10}}>
        <div className="kpi"><div className="kpi-label">Total Tires</div><div className="kpi-value">{totalQty}</div><div className="kpi-sub">{inventory.length} sizes</div></div>
        <div className="kpi"><div className="kpi-label">Stock Value</div><div className="kpi-value">{money(totalValue)}</div><div className="kpi-sub">at cost</div></div>
        <div className="kpi"><div className="kpi-label">Low Stock</div><div className={`kpi-value ${lowStock.length+outOfStock.length>0?'red':'green'}`}>{lowStock.length+outOfStock.length}</div><div className="kpi-sub">need reorder</div></div>
      </div>

      {outOfStock.length>0&&(
        <div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>🚫 Out of Stock</div>
          {outOfStock.map(i=><div key={i.id} style={{fontSize:12,color:'#b91c1c'}}>{i.size||'Unnamed size'}</div>)}
        </div>
      )}
      {lowStock.length>0&&(
        <div style={{background:'#fff8f8',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>⚠️ Low Stock (≤{LOW_STOCK})</div>
          {lowStock.map(i=><div key={i.id} style={{fontSize:12,color:'#b91c1c'}}>{i.size||'Unnamed'} — {i.qty} left</div>)}
        </div>
      )}

      <button className="btn primary" style={{width:'100%',marginBottom:14}} onClick={add}>+ Add Tire Size</button>

      {inventory.length===0?<EmptyState icon="🛞" title="No inventory" sub="Add the tire sizes you carry in your van."/>:(
        <div className="card">
          {inventory.map(item=>(
            <div key={item.id} style={{padding:'14px 16px',borderBottom:'1px solid #f2f2f2',display:'grid',gridTemplateColumns:'1fr auto',gap:12,alignItems:'start'}}>
              <div>
                <input value={item.size} onChange={e=>update(item.id,{size:e.target.value})} placeholder="225/60R17"
                  style={{width:'100%',border:'1.5px solid #e3e3e3',borderRadius:10,padding:'9px 12px',fontSize:15,marginBottom:6,fontWeight:700,fontFamily:'"IBM Plex Mono",monospace',outline:'none'}}/>
                <div style={{display:'flex',gap:8,marginBottom:6}}>
                  <input value={item.cost} type="number" min="0" onChange={e=>update(item.id,{cost:Number(e.target.value||0)})} placeholder="Cost $"
                    style={{flex:1,border:'1.5px solid #e3e3e3',borderRadius:10,padding:'9px 12px',fontSize:14,outline:'none'}}/>
                  <input value={item.notes} onChange={e=>update(item.id,{notes:e.target.value})} placeholder="Notes"
                    style={{flex:2,border:'1.5px solid #e3e3e3',borderRadius:10,padding:'9px 12px',fontSize:14,outline:'none'}}/>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                <div className="stepper">
                  <button onClick={()=>step(item.id,-1)}>−</button>
                  <input type="number" min="0" value={item.qty} onChange={e=>update(item.id,{qty:Math.max(0,Number(e.target.value||0))})}
                    style={{color:Number(item.qty||0)===0?'#dc2626':Number(item.qty||0)<=LOW_STOCK?'#ea580c':'#111'}}/>
                  <button onClick={()=>step(item.id,1)}>+</button>
                </div>
                {Number(item.qty||0)===0&&<span style={{fontSize:9,fontWeight:700,color:'#dc2626',textTransform:'uppercase'}}>Out</span>}
                {Number(item.qty||0)>0&&Number(item.qty||0)<=LOW_STOCK&&<span style={{fontSize:9,fontWeight:700,color:'#ea580c',textTransform:'uppercase'}}>Low</span>}
                <button className="btn danger sm" onClick={()=>remove(item.id)} style={{fontSize:11,padding:'5px 10px'}}>Remove</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div></div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SETTINGS
// ─────────────────────────────────────────────────────────────────────────────
function Settings({ settings, setSettings, jobs, setJobs, inventory, expenses }) {
  const upd    = (k,v) => setSettings(p=>({...p,[k]:v}));
  const updExp = (id,patch) => setSettings(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...patch}:e)}));
  const addExp = () => setSettings(p=>({...p,expenses:[...p.expenses,{id:uid(),name:'New Expense',amount:0,active:true}]}));
  const delExp = id => setSettings(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));

  const exportData = () => {
    const payload = { jobs, settings, inventory, expenses, exportedAt:new Date().toISOString(), version:'3' };
    const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`wheel-rush-backup-${TODAY()}.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const importData = () => {
    const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
    inp.onchange = async e => {
      const file = e.target.files[0]; if(!file)return;
      try {
        const data = JSON.parse(await file.text());
        if(Array.isArray(data.jobs)) setJobs(data.jobs);
        if(data.settings&&typeof data.settings==='object') setSettings({...DEFAULT_SETTINGS,...data.settings});
        alert('Import complete.');
      } catch { alert('Could not import — must be a Wheel Rush backup.'); }
    };
    inp.click();
  };
  const clearAll = () => {
    if(!window.confirm('Clear ALL jobs and reset ALL settings? This cannot be undone.'))return;
    Object.values(KEYS).forEach(k=>localStorage.removeItem(k));
    window.location.reload();
  };

  const monthly = monthlyFixed(settings);
  const weekly  = weeklyFixed(settings);
  const ao1=settings.owner1Active!==false, ao2=settings.owner2Active!==false;
  const splitTotal=(ao1?Number(settings.profitSplit1||0):0)+(ao2?Number(settings.profitSplit2||0):0);

  return(
    <div className="screen"><div className="page">

      {/* Owners */}
      <div className="section-label" style={{marginTop:0}}>Owners & Split</div>
      <div className="card">
        {[{nk:'owner1Name',pk:'profitSplit1',ak:'owner1Active',lbl:'Owner 1'},{nk:'owner2Name',pk:'profitSplit2',ak:'owner2Active',lbl:'Owner 2'}].map(({nk,pk,ak,lbl})=>{
          const active=settings[ak]!==false;
          return(
            <div key={nk} style={{opacity:active?1:0.55}}>
              <div className="settings-row" style={{alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <div className="label">{lbl}</div>
                    <button onClick={()=>upd(ak,!active)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700,cursor:'pointer',background:active?'#111':'#e5e7eb',color:active?'#fff':'#9ca3af'}}>
                      {active?'● ON':'○ OFF'}
                    </button>
                  </div>
                  <input className="settings-inp" style={{width:'100%'}} value={settings[nk]} onChange={e=>upd(nk,e.target.value)} disabled={!active}/>
                </div>
                <div style={{flexShrink:0,marginLeft:12}}>
                  <div className="label" style={{marginBottom:6}}>Split %</div>
                  <input type="number" className="settings-inp" style={{width:80}} value={settings[pk]} onChange={e=>upd(pk,Number(e.target.value||0))} disabled={!active}/>
                </div>
              </div>
            </div>
          );
        })}
        {ao1&&ao2&&splitTotal!==100&&<div className="card-pad" style={{color:'#dc2626',fontSize:12,fontWeight:600}}>⚠️ Splits must add to 100% (currently {splitTotal}%)</div>}
        {!ao1&&!ao2&&<div className="card-pad" style={{color:'#ea580c',fontSize:12,fontWeight:600}}>⚠️ At least one owner must be active</div>}
      </div>

      {/* Goals */}
      <div className="section-label">Goals & Tax</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Weekly Goal (Gross Profit)</div></div><input type="number" className="settings-inp" style={{width:110}} value={settings.weeklyGoal} onChange={e=>upd('weeklyGoal',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Tax Rate (%)</div><div className="sub">For reserve display</div></div><input type="number" className="settings-inp" style={{width:80}} value={settings.taxRate} onChange={e=>upd('taxRate',Number(e.target.value||0))}/></div>
      </div>

      {/* Pricing */}
      <div className="section-label">Pricing & Decision</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Repair Target Profit</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.repairTarget} onChange={e=>upd('repairTarget',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Replacement Target Profit</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.replacementTarget} onChange={e=>upd('replacementTarget',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Skip Below ($)</div><div className="sub">Profit below this = Skip</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.skipThreshold} onChange={e=>upd('skipThreshold',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Risky Beyond (miles)</div><div className="sub">High distance = Risky</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.riskyMiles} onChange={e=>upd('riskyMiles',Number(e.target.value||0))}/></div>
        <div className="settings-row"><div><div className="label">Cost Per Mile ($)</div></div><input type="number" step="0.01" className="settings-inp" style={{width:90}} value={settings.costPerMile} onChange={e=>upd('costPerMile',Number(e.target.value||0))}/></div>
      </div>

      {/* Google Review URL */}
      <div className="section-label">Google Review Link</div>
      <div className="card">
        <div className="card-pad">
          <div className="label" style={{marginBottom:6}}>Your Google Review URL</div>
          <input className="settings-inp" style={{width:'100%'}} value={settings.googleReviewUrl||''} onChange={e=>upd('googleReviewUrl',e.target.value)} placeholder="https://g.page/r/…/review"/>
          <div className="sub" style={{marginTop:6}}>Find this in Google Business Profile → Get more reviews → Share review form</div>
        </div>
      </div>

      {/* Fixed expenses */}
      <div className="section-label">Monthly Fixed Expenses</div>
      <div className="card">
        {(settings.expenses||[]).map(exp=>(
          <div className="expense-row" key={exp.id}>
            <input value={exp.name} onChange={e=>updExp(exp.id,{name:e.target.value})} placeholder="Expense name"/>
            <input type="number" value={exp.amount} onChange={e=>updExp(exp.id,{amount:Number(e.target.value||0)})} placeholder="0"/>
            <button className={`btn sm ${exp.active?'success':'secondary'}`} onClick={()=>updExp(exp.id,{active:!exp.active})}>{exp.active?'On':'Off'}</button>
            <button className="btn danger sm" onClick={()=>delExp(exp.id)}>×</button>
          </div>
        ))}
        <div className="card-row">
          <button className="btn secondary sm" onClick={addExp}>+ Add Expense</button>
          <div style={{textAlign:'right'}}>
            <div className="value">{money(monthly)}/mo</div>
            <div className="sub">{money(weekly)}/wk</div>
          </div>
        </div>
      </div>

      {/* Data */}
      <div className="section-label">Data & Export</div>
      <div className="card">
        <div className="card-row"><div><div className="label">Export CSV</div><div className="sub">For QuickBooks / Excel</div></div><button className="btn secondary sm" onClick={()=>exportCSV(jobs,settings)}>CSV</button></div>
        <div className="card-row"><div><div className="label">Export Full Backup</div><div className="sub">Jobs, settings, inventory</div></div><button className="btn secondary sm" onClick={exportData}>JSON</button></div>
        <div className="card-row"><div><div className="label">Import Backup</div><div className="sub">Restore from .json file</div></div><button className="btn secondary sm" onClick={importData}>Import</button></div>
        <div className="card-row"><div><div className="label">Reset Everything</div><div className="sub" style={{color:'#dc2626'}}>Cannot be undone</div></div><button className="btn danger sm" onClick={clearAll}>Reset</button></div>
      </div>

      <div style={{padding:'8px 0 4px',textAlign:'center',fontSize:11,color:'#ccc'}}>Wheel Rush Business Tracker · v3 · Synced via Firebase</div>
    </div></div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [user,      setUser]      = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [tab,       setTab]       = useState('dashboard');
  const [jobs,      setJobs]      = useState(()=>load(KEYS.jobs,[]));
  const [settings,  setSettings]  = useState(()=>({...DEFAULT_SETTINGS,...load(KEYS.settings,{})}));
  const [inventory, setInventory] = useState(()=>load(KEYS.inventory, DEFAULT_INVENTORY));
  const [expenses,  setExpenses]  = useState(()=>load(KEYS.expenses,[]));
  const [prefill,   setPrefill]   = useState(null);
  const [sync,      setSync]      = useState('local');

  // Auth listener
  useEffect(()=>{
    if(!_auth){ setAuthReady(true); return; }
    const unsub = _auth.onAuthStateChanged(u=>{ setUser(u); setAuthReady(true); });
    return ()=>unsub();
  },[]);

  // Firebase listeners when signed in
  useEffect(()=>{
    if(!user||!_db) return;
    setSync('syncing');
    const u1 = fbListen(jobCol(), docs=>{ setJobs(docs); persist(KEYS.jobs,docs); setSync('connected'); });
    const u2 = fbListen(invCol(), docs=>{ if(docs.length) setInventory(docs); });
    const u3 = fbListen(expCol(), docs=>{ setExpenses(docs); persist(KEYS.expenses,docs); });
    return ()=>{ u1(); u2(); u3(); };
  },[user]);

  // Persist locally always
  useEffect(()=>persist(KEYS.settings,settings),[settings]);
  useEffect(()=>{ if(!user) persist(KEYS.jobs,jobs); },[jobs,user]);
  useEffect(()=>{ if(!user) persist(KEYS.inventory,inventory); },[inventory,user]);

  // Sync inventory changes to Firebase
  useEffect(()=>{
    if(!user) return;
    fbSetAll(invCol(), inventory);
  },[inventory, user]);

  const saveJob = useCallback(async (job, andAdd) => {
    // Auto-deduct inventory for tire replacements
    const isReplacement = /replacement|installation/i.test(job.service||'');
    if(isReplacement && job.tireSize) {
      setInventory(prev => prev.map(item => {
        if(item.size.toLowerCase()===job.tireSize.toLowerCase() && Number(item.qty||0)>0) {
          return { ...item, qty: Math.max(0, Number(item.qty||0) - Number(job.qty||1)) };
        }
        return item;
      }));
    }

    const entry = { ...job, id: job.id || uid() };
    setJobs(prev => {
      const next = [entry, ...prev.filter(j=>j.id!==entry.id)];
      if(!user) persist(KEYS.jobs, next);
      return next;
    });
    if(user) fbSet(jobCol(), entry.id, entry);
    if(!andAdd) setTab('dashboard');
  },[user]);

  const deleteJob = useCallback((id)=>{
    setJobs(prev=>prev.filter(j=>j.id!==id));
    if(user) fbDel(jobCol(), id);
  },[user]);

  const handleRepeat = useCallback((job)=>{ setPrefill(job); setTab('add'); },[]);

  const signOut = async () => { try { await _auth.signOut(); setUser(null); setSync('local'); } catch {} };

  const NAV = [
    {id:'dashboard',ico:'📊',label:'Home'},
    {id:'add',      ico:'＋',label:'Add'},
    {id:'history',  ico:'📋',label:'History'},
    {id:'payouts',  ico:'💰',label:'Payouts'},
    {id:'expenses', ico:'🧾',label:'Expenses'},
    {id:'inventory',ico:'🛞',label:'Stock'},
    {id:'settings', ico:'⚙️',label:'Settings'},
  ];

  if(!authReady) return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#111',flexDirection:'column',gap:14}}>
      <div style={{fontSize:48}}>🛞</div>
      <div style={{color:'#444',fontSize:13,fontFamily:'"IBM Plex Sans",sans-serif'}}>Loading…</div>
    </div>
  );

  if(!user) return <AuthScreen onAuth={u=>setUser(u)}/>;

  return(
    <div className="app">
      <Header settings={settings} syncStatus={sync} onSignOut={signOut}/>
      {tab==='dashboard' && <Dashboard jobs={jobs} varExpenses={expenses} settings={settings} setTab={setTab} onRepeat={handleRepeat}/>}
      {tab==='add'       && <AddJob onSave={saveJob} settings={settings} jobs={jobs} prefill={prefill} onClearPrefill={()=>setPrefill(null)}/>}
      {tab==='history'   && <History jobs={jobs} settings={settings} setJobs={ids=>{ setJobs(ids); if(user) ids.forEach(j=>fbSet(jobCol(),j.id,j)); }} onRepeat={handleRepeat}/>}
      {tab==='payouts'   && <Payouts jobs={jobs} settings={settings}/>}
      {tab==='expenses'  && <Expenses expenses={expenses} setExpenses={e=>{ setExpenses(e); if(user) e.forEach(x=>fbSet(expCol(),x.id,x)); }}/>}
      {tab==='inventory' && <Inventory inventory={inventory} setInventory={setInventory}/>}
      {tab==='settings'  && <Settings settings={settings} setSettings={setSettings} jobs={jobs} setJobs={setJobs} inventory={inventory} expenses={expenses}/>}
      <nav className="bottom-nav">
        {NAV.map(({id,ico,label})=>(
          <button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
            <span className="ico">{ico}</span>{label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
