// ── Review message builder ───────────────────────────────────────────────────
function buildReviewMsg(url, customerName, service, city) {
  var name     = (customerName||'').trim();
  var greeting = name ? 'Hi ' + name + ',' : 'Hi,';
  // Normalize service to a readable phrase
  var svcMap   = {
    'Tire Repair':        'flat tire repair',
    'Tire Replacement':   'tire replacement',
    'Tire Installation':  'tire installation',
    'Lug Nut Removal':    'lug nut removal',
    'Valve Stem Service': 'valve stem service',
    'Roadside Assistance':'roadside assistance',
    'Other':              'tire service',
  };
  var svcPhrase = svcMap[service] || (service ? service.toLowerCase() : 'tire service');
  var cityStr   = (city||'').trim() || 'your area';
  // Two line breaks become %0A%0A in SMS — use plain newlines, encodeURIComponent handles it
  var body = greeting + ' thanks again for choosing Wheel Rush. '
    + 'If you have a minute, please leave a review here:\n\n'
    + url + '\n\n'
    + 'Please mention the ' + svcPhrase + ' we did and that we helped you in ' + cityStr + '.';
  return body;
}

function openReviewSMS(phone, url, customerName, service, city) {
  if (!url) { alert('Set your Google Review URL in Settings first.'); return; }
  var msg = buildReviewMsg(url, customerName, service, city);
  var encoded = encodeURIComponent(msg);
  if (phone) {
    // Works on both iPhone (sms:+1xxx?body=) and Android (sms:+1xxx?body=)
    window.open('sms:' + phone + '?body=' + encoded);
  } else {
    window.open('sms:?body=' + encoded);
  }
}

const LOW_STOCK = 2;
const BEST_SELLER_COUNT = 5; // top N sizes by job frequency
function Inventory(props) {
  const inventory=Array.isArray(props.inventory)?props.inventory:[], setInventory=props.setInventory;
  const jobs = Array.isArray(props.jobs) ? props.jobs : [];
  const [search,setSearch] = useState('');
  const [editId,setEditId] = useState(null);

  // Top 5 Best Tires: built from job history
  const top5 = useMemo(function() {
    const stats = {};
    jobs.forEach(function(j) {
      const s = (j.tireSize||'').trim();
      if (!s) return;
      if (!stats[s]) stats[s] = {size:s, jobs:0, qtySold:0, revenue:0, profit:0};
      stats[s].jobs    += 1;
      stats[s].qtySold += Number(j.qty||1);
      stats[s].revenue += Number(j.revenue||0);
      stats[s].profit  += jobGrossProfit(j, {costPerMile:0.65});
    });
    return Object.values(stats)
      .sort(function(a,b){ return b.jobs!==a.jobs ? b.jobs-a.jobs : b.profit-a.profit; })
      .slice(0, 5);
  }, [jobs]);
  // List of best-seller size strings (for badge logic in the stock list)
  const bestSellers = top5.map(function(t){return t.size;});
  const sanitizeItem = function(i) {
    return {
      id:    String(i.id||uid()),
      size:  String(i.size||''),
      qty:   Math.max(0, Number(i.qty||0)),
      cost:  Number(i.cost||0),
      notes: String(i.notes||''),
    };
  };
  const saveInv = function(next, changedId, deleted) {
    persist(KEYS.inventory, next);
    if (!_db) return;
    if (deleted) {
      fbDel(invCol(), deleted);
    } else if (changedId) {
      var item = next.find(function(i){return i.id===changedId;});
      if (item) {
        // Write explicit plain fields only — never spread Firestore objects
        fbSet(invCol(), item.id, {
          id:item.id, size:item.size, qty:item.qty,
          cost:item.cost, notes:item.notes,
        });
      }
    }
  };
  const update = function(id,patch){
    setInventory(function(prev){
      const next=prev.map(function(i){return i.id===id?sanitizeItem({...i,...patch}):i;});
      // Only write to Firebase if item now has a non-blank size
      const item = next.find(function(i){return i.id===id;});
      if (item && item.size.trim() !== '') {
        saveInv(next, id);
      } else {
        persist(KEYS.inventory, next); // save locally only
      }
      return next;
    });
  };
  const add = function(){
    const id=uid();
    const newItem={id:id,size:'',qty:0,cost:0,notes:''};
    // Add to local state only — don't write to Firebase until user enters a size
    setInventory(function(prev){
      const next=[newItem,...prev];
      persist(KEYS.inventory, next); // persist locally but skip Firebase
      return next;
    });
    setEditId(id);
  };
  const remove = function(id){
    if(!window.confirm('Remove?'))return;
    setInventory(function(prev){
      const next=prev.filter(function(i){return i.id!==id;});
      saveInv(next, null, id); return next;
    });
    setEditId(null);
  };
  const step = function(id,delta){
    setInventory(function(prev){
      const next=prev.map(function(i){return i.id===id?sanitizeItem({...i,qty:Math.max(0,(Number(i.qty)||0)+delta)}):i;});
      saveInv(next, id); return next;
    });
  };
  const totalQty  = inventory.reduce(function(s,i){return s+Number(i.qty||0);},0);
  const totalValue= inventory.reduce(function(s,i){return s+Number(i.qty||0)*Number(i.cost||0);},0);
  const lowStock  = inventory.filter(function(i){return Number(i.qty||0)>0&&Number(i.qty||0)<=LOW_STOCK;});
  const outOfStock= inventory.filter(function(i){return Number(i.qty||0)===0;});
  const filtered  = search.trim()?inventory.filter(function(i){return (i.size||'').toLowerCase().includes(search.toLowerCase());}):inventory;
  const sorted    = [...filtered].sort(function(a,b) {
    const aBest = bestSellers.indexOf(a.size||'');
    const bBest = bestSellers.indexOf(b.size||'');
    // Best sellers first (by rank), then alpha
    if (aBest !== -1 && bBest === -1) return -1;
    if (aBest === -1 && bBest !== -1) return 1;
    if (aBest !== -1 && bBest !== -1) return aBest - bBest;
    return (a.size||'').localeCompare(b.size||'');
  });
  return (
    <div className="screen"><div className="page">
      <div className="kpi-grid three" style={{marginBottom:10}}>
        <div className="kpi"><div className="kpi-label">Total Tires</div><div className="kpi-value">{totalQty}</div><div className="kpi-sub">{inventory.length+' sizes'+(bestSellers.length?' · '+bestSellers.length+' hot':'')}</div></div>
        <div className="kpi"><div className="kpi-label">Stock Value</div><div className="kpi-value">{money(totalValue)}</div><div className="kpi-sub">at cost</div></div>
        <div className="kpi"><div className="kpi-label">Low Stock</div><div className={'kpi-value '+(lowStock.length+outOfStock.length>0?'red':'green')}>{lowStock.length+outOfStock.length}</div><div className="kpi-sub">need reorder</div></div>
      </div>
      {outOfStock.length>0 && <div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:8}}><div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>{'🚫 Out of Stock ('+outOfStock.length+')'}</div><div style={{fontSize:12,color:'#b91c1c',lineHeight:1.8}}>{outOfStock.map(function(i){return i.size||'Unnamed';}).join(' · ')}</div></div>}
      {lowStock.length>0  && <div style={{background:'#fff8f8',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:8}}><div style={{fontWeight:700,fontSize:12,color:'#b91c1c',marginBottom:4}}>{'⚠️ Low Stock ('+lowStock.length+')'}</div><div style={{fontSize:12,color:'#b91c1c',lineHeight:1.8}}>{lowStock.map(function(i){return i.size+' — '+i.qty;}).join(' · ')}</div></div>}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="🔍 Search tire size…" style={{flex:1,border:'1.5px solid #e3e3e3',borderRadius:12,padding:'11px 14px',fontSize:15,outline:'none',background:'#fff'}}/>
        <button className="btn primary" style={{flexShrink:0,padding:'11px 16px',fontSize:13}} onClick={add}>+ Add</button>
      </div>
      {!search && top5.length > 0 && (
        <div>
          <div className="section-label" style={{marginTop:0,marginBottom:8}}>🔥 Top 5 Best Sellers</div>
          <div className="card" style={{marginBottom:12}}>
            {top5.map(function(t, idx) {
              const inStock = inventory.find(function(i){return i.size===t.size;});
              const stockQty = inStock ? Number(inStock.qty||0) : 0;
              const stockColor = stockQty===0?'#dc2626':stockQty<=2?'#ea580c':'#16a34a';
              return (
                <div key={t.size} className="card-row" style={{alignItems:'center'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
                    <div style={{width:22,height:22,borderRadius:6,background:'#111',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{idx+1}</div>
                    <div style={{minWidth:0}}>
                      <div style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:14}}>{t.size}</div>
                      <div style={{fontSize:11,color:'#999',marginTop:1}}>{t.jobs+' job'+(t.jobs!==1?'s':'')+'  ·  '+t.qtySold+' tires sold'}</div>
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:14,color:'#16a34a'}}>{money(t.profit)}</div>
                    <div style={{fontSize:11,color:stockColor,marginTop:1,fontWeight:600}}>
                      {stockQty===0?'OUT':stockQty<=2?stockQty+' left':stockQty+' in stock'}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {sorted.length===0 ? (
        search ? <EmptyState icon="🔍" title="No match" sub={'No sizes matching "'+search+'"'}/> : <EmptyState icon="🛞" title="No inventory" sub="Tap + Add to add a tire size."/>
      ) : (
        <div className="card">
          {sorted.map(function(item,idx) {
            const isEditing=editId===item.id, qty=Number(item.qty||0);
            const isLow=qty>0&&qty<=LOW_STOCK, isOut=qty===0;
            return (
              <div key={item.id} style={{borderBottom:idx<sorted.length-1?'1px solid #f2f2f2':'none'}}>
                <div style={{display:'flex',alignItems:'center',padding:'11px 14px',gap:10,cursor:'pointer'}} onClick={function(){setEditId(isEditing?null:item.id);}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15}}>{item.size||<span style={{color:'#ccc'}}>No size</span>}</div>
                    {item.cost>0 && <div style={{fontSize:11,color:'#aaa',marginTop:1}}>{'Cost: '+money(item.cost)+' · Value: '+money(qty*item.cost)}</div>}
                  </div>
                  {bestSellers.includes(item.size||'') && <span style={{fontSize:10,fontWeight:700,background:'#fef9c3',color:'#854d0e',borderRadius:6,padding:'2px 7px',flexShrink:0}}>🔥 Best</span>}
                  {isOut && <span style={{fontSize:10,fontWeight:700,background:'#fee2e2',color:'#b91c1c',borderRadius:6,padding:'2px 7px'}}>OUT</span>}
                  {isLow&&!isOut && <span style={{fontSize:10,fontWeight:700,background:'#ffedd5',color:'#c2410c',borderRadius:6,padding:'2px 7px'}}>LOW</span>}
                  <div style={{display:'flex',alignItems:'center',border:'1.5px solid #e3e3e3',borderRadius:10,overflow:'hidden',flexShrink:0}} onClick={function(e){e.stopPropagation();}}>
                    <button onClick={function(){step(item.id,-1);}} style={{background:'#f4f4f4',border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:'#555'}}>−</button>
                    <div style={{width:42,textAlign:'center',fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:isOut?'#dc2626':isLow?'#ea580c':'#111'}}>{qty}</div>
                    <button onClick={function(){step(item.id,1);}} style={{background:'#f4f4f4',border:'none',width:34,height:34,fontSize:18,fontWeight:700,color:'#555'}}>+</button>
                  </div>
                  <div style={{color:'#ccc',fontSize:12}}>{isEditing?'▲':'▼'}</div>
                </div>
                {isEditing && (
                  <div style={{padding:'0 14px 14px',display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:8,alignItems:'center',background:'#fafafa'}}>
                    <input value={item.size} onChange={function(e){update(item.id,{size:e.target.value});}} placeholder="225/55R17" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:15,fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,outline:'none',width:'100%'}}/>
                    <input value={item.cost||''} type="number" min="0" onChange={function(e){update(item.id,{cost:Number(e.target.value||0)});}} placeholder="Cost $" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:14,outline:'none',width:'100%'}}/>
                    <button className="btn danger sm" onClick={function(){remove(item.id);}}>Remove</button>
                    <input value={item.notes} onChange={function(e){update(item.id,{notes:e.target.value});}} placeholder="Notes" style={{border:'1.5px solid #ddd',borderRadius:9,padding:'9px 12px',fontSize:14,outline:'none',width:'100%',gridColumn:'1/3'}}/>
                    <button className="btn secondary sm" onClick={function(){setEditId(null);}}>Done</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div></div>
  );
}

// ── Settings ───────────────────────────────────────────────────────────────────
function Settings(props) {
  const settings=props.settings, setSettings=props.setSettings;
  const jobs=props.jobs, setJobs=props.setJobs, inventory=props.inventory, expenses=props.expenses;
  const setInventory=props.setInventory||function(){};
  const upd    = function(k,v){setSettings(function(p){return {...p,[k]:v};});};
  const updExp = function(id,patch){setSettings(function(p){return {...p,expenses:p.expenses.map(function(e){return e.id===id?{...e,...patch}:e;})};});};
  const addExp = function(){setSettings(function(p){return {...p,expenses:[...p.expenses,{id:uid(),name:'New Expense',amount:0,active:true}]};});};
  const delExp = function(id){setSettings(function(p){return {...p,expenses:p.expenses.filter(function(e){return e.id!==id;})};});};
  const exportData = function(){
    const d={jobs,settings,inventory,expenses,exportedAt:new Date().toISOString(),version:'4'};
    const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download='wheel-rush-backup-'+TODAY()+'.json'; a.click(); URL.revokeObjectURL(url);
  };
  const importData = function(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
    inp.onchange=async function(e){
      const file=e.target.files[0]; if(!file) return;
      try{const data=JSON.parse(await file.text());if(Array.isArray(data.jobs))setJobs(data.jobs);if(data.settings&&typeof data.settings==='object')setSettings({...DEFAULT_SETTINGS,...data.settings});alert('Import complete.');}
      catch(err){alert('Could not import — must be a Wheel Rush backup.');}
    };
    inp.click();
  };
  const clearAll=function(){if(!window.confirm('Clear ALL data? Cannot be undone.'))return;Object.values(KEYS).forEach(function(k){localStorage.removeItem(k);});window.location.reload();};
  const resetInventory=function(){
    if(!window.confirm('Reset inventory to your 52-size list (91 tires)?\n\nThis will REPLACE the current '+inventory.length+' sizes / '+inventory.reduce(function(s,i){return s+Number(i.qty||0);},0)+' tires with your correct list.'))return;
    const fresh=DEFAULT_INVENTORY.map(function(i){return {...i};});
    setInventory(fresh);
    persist(KEYS.inventory,fresh);
    if(props.onResetInventory)props.onResetInventory(fresh);
    alert('✅ Done! Inventory reset to 52 sizes / 91 tires.');
  };
  const monthly=monthlyFixed(settings), weekly=weeklyFixed(settings);
  const ao1=settings.owner1Active!==false, ao2=settings.owner2Active!==false;
  const splitTotal=(ao1?Number(settings.profitSplit1||0):0)+(ao2?Number(settings.profitSplit2||0):0);
  return (
    <div className="screen"><div className="page">
      <div className="section-label" style={{marginTop:0}}>Owners &amp; Split</div>
      <div className="card">
        {[{nk:'owner1Name',pk:'profitSplit1',ak:'owner1Active',lbl:'Owner 1'},{nk:'owner2Name',pk:'profitSplit2',ak:'owner2Active',lbl:'Owner 2'}].map(function(cfg) {
          const nk=cfg.nk,pk=cfg.pk,ak=cfg.ak,lbl=cfg.lbl;
          const active=settings[ak]!==false;
          return (
            <div key={nk} style={{opacity:active?1:0.55}}>
              <div className="settings-row" style={{alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <div className="label">{lbl}</div>
                    <button onClick={function(){upd(ak,!active);}} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700,cursor:'pointer',background:active?'#111':'#e5e7eb',color:active?'#fff':'#9ca3af'}}>{active?'● ON':'○ OFF'}</button>
                  </div>
                  <input className="settings-inp" style={{width:'100%'}} value={settings[nk]} onChange={function(e){upd(nk,e.target.value);}} disabled={!active}/>
                </div>
                <div style={{flexShrink:0,marginLeft:12}}>
                  <div className="label" style={{marginBottom:6}}>Split %</div>
                  <input type="number" className="settings-inp" style={{width:80}} value={settings[pk]} onChange={function(e){upd(pk,Number(e.target.value||0));}} disabled={!active}/>
                </div>
              </div>
            </div>
          );
        })}
        {ao1&&ao2&&splitTotal!==100&&<div className="card-pad" style={{color:'#dc2626',fontSize:12,fontWeight:600}}>{'⚠️ Splits must add to 100% (currently '+splitTotal+'%)'}</div>}
      </div>
      <div className="section-label">Goals &amp; Tax</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Weekly Goal (Gross Profit)</div></div><input type="number" className="settings-inp" style={{width:110}} value={settings.weeklyGoal||''} onChange={function(e){upd('weeklyGoal',e.target.value===''?'':Number(e.target.value));}}/></div>
        <div className="settings-row"><div><div className="label">Tax Rate (%)</div></div><input type="number" className="settings-inp" style={{width:80}} value={settings.taxRate||''} onChange={function(e){upd('taxRate',e.target.value===''?'':Number(e.target.value));}}/></div>
      </div>
      <div className="section-label">Pricing &amp; Decision</div>
      <div className="card">
        <div className="settings-row"><div><div className="label">Repair Target Profit ($)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.repairTarget||''} onChange={function(e){upd('repairTarget',e.target.value===''?'':Number(e.target.value));}}/></div>
        <div className="settings-row"><div><div className="label">Replacement Target Profit ($)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.replacementTarget||''} onChange={function(e){upd('replacementTarget',e.target.value===''?'':Number(e.target.value));}}/></div>
        <div className="settings-row"><div><div className="label">Too Low Below ($)</div><div className="sub">Profit below this = Too Low</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.skipThreshold||''} onChange={function(e){upd('skipThreshold',e.target.value===''?'':Number(e.target.value));}}/></div>
        <div className="settings-row"><div><div className="label">Risky Beyond (miles)</div></div><input type="number" className="settings-inp" style={{width:90}} value={settings.riskyMiles||''} onChange={function(e){upd('riskyMiles',e.target.value===''?'':Number(e.target.value));}}/></div>
        <div className="settings-row"><div><div className="label">Cost Per Mile ($)</div></div><input type="number" step="0.01" className="settings-inp" style={{width:90}} value={settings.costPerMile||''} onChange={function(e){upd('costPerMile',e.target.value===''?'':Number(e.target.value));}}/></div>
      </div>
      <div className="section-label">Google Review Link</div>
      <div className="card"><div className="card-pad">
        <div className="label" style={{marginBottom:6}}>Your Google Review URL</div>
        <input className="settings-inp" style={{width:'100%'}} value={settings.googleReviewUrl||''} onChange={function(e){upd('googleReviewUrl',e.target.value);}} placeholder="https://g.page/r/…/review"/>
        {(settings.googleReviewUrl||'').trim()&&<button className="btn success sm" style={{marginTop:10,width:'100%'}} onClick={function(){window.open(settings.googleReviewUrl,'_blank');}}>✓ Test Link</button>}
      </div></div>
      <div className="section-label">Monthly Fixed Expenses</div>
      <div className="card">
        {(settings.expenses||[]).map(function(exp) {
          return (
            <div className="expense-row" key={exp.id}>
              <input value={exp.name} onChange={function(e){updExp(exp.id,{name:e.target.value});}} placeholder="Expense name"/>
              <input type="number" value={exp.amount} onChange={function(e){updExp(exp.id,{amount:Number(e.target.value||0)});}} placeholder="0"/>
              <button className={'btn sm '+(exp.active?'success':'secondary')} onClick={function(){updExp(exp.id,{active:!exp.active});}}>{exp.active?'On':'Off'}</button>
              <button className="btn danger sm" onClick={function(){delExp(exp.id);}}>×</button>
            </div>
          );
        })}
        <div className="card-row"><button className="btn secondary sm" onClick={addExp}>+ Add</button><div style={{textAlign:'right'}}><div className="value">{money(monthly)+'/mo'}</div><div className="sub">{money(weekly)+'/wk'}</div></div></div>
      </div>
      <div className="section-label">Data &amp; Export</div>
      <div className="card">
        <div className="card-row"><div><div className="label">Export CSV</div><div className="sub">For QuickBooks / Excel</div></div><button className="btn secondary sm" onClick={function(){exportCSV(jobs,settings);}}>CSV</button></div>
        <div className="card-row"><div><div className="label">Export Full Backup</div></div><button className="btn secondary sm" onClick={exportData}>JSON</button></div>
        <div className="card-row"><div><div className="label">Import Backup</div></div><button className="btn secondary sm" onClick={importData}>Import</button></div>
        <div className="card-row"><div><div className="label">Reset Inventory to My List</div><div className="sub">91 tires · 52 sizes</div></div><button className="btn orange sm" onClick={function(){resetInventory();}}>Reset Stock</button></div>
        <div className="card-row"><div><div className="label">Reset Everything</div><div className="sub" style={{color:'#dc2626'}}>Cannot be undone</div></div><button className="btn danger sm" onClick={clearAll}>Reset</button></div>
      </div>
      <div style={{padding:'8px 0 4px',textAlign:'center',fontSize:11,color:'#ccc'}}>Wheel Rush Business Tracker · v5 · Firebase Sync</div>
    </div></div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]           = useState(null);
  const [authReady,setAuthReady] = useState(false);
  const [tab,setTab]             = useState('dashboard');
  const [jobs,setJobs]           = useState(function(){return migrateOldJobs();});
  const [settings,setSettings]   = useState(function(){return {...DEFAULT_SETTINGS,...load(KEYS.settings,{})};});
  const [inventory,setInventory] = useState([]);  // Firebase listener populates this
  const [expenses,setExpenses]   = useState(function(){return load(KEYS.expenses,[]);});
  const [prefill,setPrefill]     = useState(null);
  const [editJob,setEditJob]     = useState(null);
  const [sync,setSync]           = useState('local');
  const settingsLoadedRef        = useRef(false);

  useEffect(function() {
    let authUnsub = null, cancelled = false;
    const giveUp = setTimeout(function(){ if(!cancelled) setAuthReady(true); }, 12000);
    const attachFirestore = function(u) {
      if (!u||!_db) return;
      setSync('syncing');
      const u1 = fbListen(jobCol(), function(docs) {
        if (docs.length>0) {
          const fbIds     = new Set(docs.map(function(d){return String(d.id);}));
          const localQueue= load('wr2-upload-queue',[]);
          const toUpload  = localQueue.filter(function(j){return !fbIds.has(String(j.id));});
          if (toUpload.length>0) { toUpload.forEach(function(j){fbSet(jobCol(),j.id,j);}); persist('wr2-upload-queue',[]); }
          setJobs(docs);
        } else {
          const local = load(KEYS.jobs,[]);
          if (local.length>0) { fbSetAll(jobCol(),local); persist('wr2-upload-queue',[]); }
          setJobs(local);
        }
        setSync('connected');
      });
      const u2 = fbListen(invCol(), function(docs) {
        // Sanitize: plain primitives only, skip blank-size junk
        var clean = docs.map(function(d) {
          return {
            id:    String(d.id||''),
            size:  (d.size||'').trim(),
            qty:   Math.max(0, Number(d.qty||0)),
            cost:  Number(d.cost||0),
            notes: String(d.notes||''),
          };
        }).filter(function(d){ return d.size !== ''; });

        if (clean.length === 0) {
          // Nothing valid — seed Firebase with DEFAULT_INVENTORY
          var fresh = DEFAULT_INVENTORY.map(function(i){
            return {id:i.id,size:i.size,qty:i.qty,cost:i.cost,notes:i.notes};
          });
          if (_db) {
            var b0 = _db.batch();
            docs.forEach(function(d){ b0.delete(invCol().doc(d.id)); });
            fresh.forEach(function(i){ b0.set(invCol().doc(i.id), i); });
            b0.commit().catch(function(e){ console.warn('inv seed:', e); });
          }
          setInventory(fresh);
          persist(KEYS.inventory, fresh);
          return;
        }

        // Deduplicate by canonical size key
        // Prefer docs with canonical IDs (inv001..inv052), keep highest qty
        var canonical = {};
        clean.forEach(function(d) {
          var key = d.size.toLowerCase().replace(/\s+/g, '');
          if (!canonical[key]) {
            canonical[key] = {id:d.id, size:d.size, qty:d.qty, cost:d.cost, notes:d.notes};
          } else {
            var ex = canonical[key];
            var dCan = /^inv\d+$/.test(d.id);
            var eCan = /^inv\d+$/.test(ex.id);
            if (dCan && !eCan) {
              canonical[key] = {id:d.id, size:d.size, qty:Math.max(d.qty, ex.qty), cost:d.cost||ex.cost, notes:d.notes||ex.notes};
            } else {
              canonical[key].qty  = Math.max(ex.qty, d.qty);
              if (!canonical[key].cost && d.cost) canonical[key].cost = d.cost;
            }
          }
        });
        var deduped = Object.values(canonical);

        // Detect problems: raw doc count > unique sizes = duplicates in Firestore
        var hasDuplicates = clean.length > deduped.length;
        var totalQty = deduped.reduce(function(s,d){ return s+d.qty; }, 0);
        var qtyInflated = totalQty > 150;

        if (hasDuplicates || qtyInflated) {
          // Clean Firestore: delete all, write only the correct set
          var toWrite = qtyInflated
            ? DEFAULT_INVENTORY.map(function(i){ return {id:i.id,size:i.size,qty:i.qty,cost:i.cost,notes:i.notes}; })
            : deduped;
          if (_db) {
            var b1 = _db.batch();
            docs.forEach(function(d){ b1.delete(invCol().doc(d.id)); });
            toWrite.forEach(function(i){ b1.set(invCol().doc(i.id), i); });
            b1.commit().catch(function(e){ console.warn('inv cleanup:', e); });
          }
          // Preserve pending local-only rows during cleanup
          var pendingLocal = load(KEYS.inventory, []).filter(function(l){
            return !l.size || l.size === '';
          });
          var cleanMerge = pendingLocal.length > 0
            ? pendingLocal.concat(toWrite.filter(function(d){
                return !pendingLocal.find(function(l){return l.id===d.id;});
              }))
            : toWrite;
          setInventory(cleanMerge);
          persist(KEYS.inventory, cleanMerge);
        } else {
          // Data is clean — but merge any pending local-only rows (blank size, not in Firebase)
          var localOnly = load(KEYS.inventory, []).filter(function(l){
            return l.size === '' || l.size === null || l.size === undefined;
          });
          var merged = localOnly.length > 0
            ? localOnly.concat(deduped.filter(function(d){
                return !localOnly.find(function(l){return l.id===d.id;});
              }))
            : deduped;
          setInventory(merged);
          persist(KEYS.inventory, merged);
        }
      });
      const u3 = fbListen(expCol(), function(docs){setExpenses(docs);});
      const sDoc = settingDoc();
      if (sDoc) {
        sDoc.get().then(function(snap) {
          if (snap.exists) {
            setSettings(function(){return {...DEFAULT_SETTINGS,...snap.data()};});
            setTimeout(function(){settingsLoadedRef.current=true;},100);
          } else {
            const local = load(KEYS.settings,{});
            sDoc.set({...DEFAULT_SETTINGS,...local}).catch(function(e){});
            settingsLoadedRef.current = true;
          }
        }).catch(function(e){});
      }
    };
    const init = function() {
      if (cancelled) return;
      if (!_auth||!_db) { setTimeout(init,100); return; }
      clearTimeout(giveUp);
      authUnsub = _auth.onAuthStateChanged(function(u) {
        if (cancelled) return;
        setUser(u||null); setAuthReady(true);
        attachFirestore(u);
        if (!u) { setSync('local'); settingsLoadedRef.current=true; }
      });
    };
    init();
    return function(){ cancelled=true; clearTimeout(giveUp); if(authUnsub)authUnsub(); };
  }, []);

  useEffect(function() {
    persist(KEYS.settings, settings);
    if (!settingsLoadedRef.current) return;
    const t = setTimeout(function(){const doc=settingDoc();if(user&&doc)doc.set(settings).catch(function(e){});},1000);
    return function(){clearTimeout(t);};
  }, [settings,user]);


  const deleteJob = useCallback(function(id) {
    setJobs(function(prev){
      const next = prev.filter(function(j){return j.id!==id;});
      persist(KEYS.jobs, next);
      return next;
    });
    if (user) fbDel(jobCol(), id);
    const q = load('wr2-upload-queue',[]);
    if (q.some(function(j){return j.id===id;})) persist('wr2-upload-queue', q.filter(function(j){return j.id!==id;}));
  }, [user]);

  const saveJob = useCallback(async function(job, andAdd) {
    var isRepl = /replacement|installation/i.test(job.service||'');
    if (isRepl && job.tireSize) {
      setInventory(function(prev){
        var next = prev.map(function(item){
          if (item.size.toLowerCase()===job.tireSize.toLowerCase()&&Number(item.qty||0)>0)
            return {...item, qty:Math.max(0,Number(item.qty||0)-Number(job.qty||1))};
          return item;
        });
        persist(KEYS.inventory, next);
        // Write the decremented item back to Firebase immediately
        if (user && _db) {
          var changed = next.find(function(i){
            return i.size.toLowerCase()===job.tireSize.toLowerCase();
          });
          if (changed) {
            fbSet(invCol(), changed.id, {
              id:changed.id, size:changed.size, qty:changed.qty,
              cost:changed.cost, notes:changed.notes,
            });
          }
        }
        return next;
      });
    }
    // Sanitize: only write known primitive fields to Firestore
    const entry = {
      id:            String(job.id||uid()),
      date:          String(job.date||''),
      service:       String(job.service||''),
      area:          String(job.area||''),
      payment:       String(job.payment||''),
      status:        String(job.status||'Completed'),
      source:        String(job.source||''),
      customerName:  String(job.customerName||''),
      customerPhone: String(job.customerPhone||''),
      tireSize:      String(job.tireSize||''),
      qty:           Number(job.qty||1),
      revenue:       Number(job.revenue||0),
      tireCost:      Number(job.tireCost||0),
      miscCost:      Number(job.miscCost||0),
      miles:         Number(job.miles||0),
      note:          String(job.note||''),
      emergency:     !!job.emergency,
      lateNight:     !!job.lateNight,
      highway:       !!job.highway,
      weekend:       !!job.weekend,
    };
    setJobs(function(prev){const next=[entry,...prev.filter(function(j){return j.id!==entry.id;})];persist(KEYS.jobs,next);return next;});
    if (user) { fbSet(jobCol(),entry.id,entry); }
    else {
      const q = load('wr2-upload-queue',[]);
      persist('wr2-upload-queue',[entry,...q.filter(function(j){return j.id!==entry.id;})]);
    }
    setEditJob(null);
    if (!andAdd) setTab('dashboard');
  }, [user]);

  const handleEdit = useCallback(function(job) {
    if (job._markPaidOnly) {
      const updated = {...job,status:'Completed'};
      delete updated._markPaidOnly;
      saveJob(updated, true);
      return;
    }
    setEditJob(job);
    setTab('add');
  }, [saveJob]);

  const signOut = async function(){try{await _auth.signOut();setUser(null);setSync('local');}catch(e){}};

  const NAV = [
    {id:'dashboard',ico:'📊',label:'Home'},
    {id:'add',ico:'＋',label:'Add'},
    {id:'history',ico:'📋',label:'History'},
    {id:'payouts',ico:'💰',label:'Payouts'},
    {id:'expenses',ico:'🧾',label:'Expenses'},
    {id:'inventory',ico:'🛞',label:'Stock'},
    {id:'settings',ico:'⚙️',label:'Settings'},
  ];

  if (!authReady) return (
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#111',flexDirection:'column',gap:14}}>
      <div style={{fontSize:48}}>🛞</div>
      <div style={{color:'#444',fontSize:13,fontFamily:'"IBM Plex Sans",sans-serif'}}>Loading…</div>
    </div>
  );
  if (!user) return <AuthScreen onAuth={function(u){setUser(u);}} />;

  return (
    <div className="app">
      <Header settings={settings} syncStatus={sync} onSignOut={signOut}/>
      {tab==='dashboard' && <Dashboard jobs={jobs} varExpenses={expenses} settings={settings} setTab={setTab} onRepeat={function(j){setPrefill(j);setTab('add');}}/>}
      {tab==='add'       && <AddJob onSave={saveJob} settings={settings} jobs={jobs} prefill={prefill} onClearPrefill={function(){setPrefill(null);}} editJob={editJob} onClearEdit={function(){setEditJob(null);}}/>}
      {tab==='history'   && <History jobs={jobs} settings={settings} onRepeat={function(j){setPrefill(j);setTab('add');}} onDelete={deleteJob} onEdit={handleEdit}/>}
      {tab==='payouts'   && <Payouts jobs={jobs} settings={settings}/>}
      {tab==='expenses'  && <Expenses expenses={expenses} setExpenses={function(e){setExpenses(e);if(user)e.forEach(function(x){fbSet(expCol(),x.id,{id:String(x.id||''),date:String(x.date||''),category:String(x.category||''),amount:Number(x.amount||0),note:String(x.note||'')});});}}/>}
      {tab==='inventory' && <Inventory inventory={inventory} setInventory={setInventory} jobs={jobs}/>}
      {tab==='settings'  && <Settings settings={settings} setSettings={setSettings} jobs={jobs} setJobs={setJobs} inventory={inventory} expenses={expenses} setInventory={setInventory} onResetInventory={function(fresh){
          if(user&&_db){
            invCol().get().then(function(snap){
              var b=_db.batch();
              snap.docs.forEach(function(d){b.delete(d.ref);});
              fresh.forEach(function(i){b.set(invCol().doc(i.id),i);});
              return b.commit();
            }).catch(function(e){console.warn('reset:',e);});
          }
        }}/>}
      <nav className="bottom-nav">
        {NAV.map(function(item){
          return <button key={item.id} className={'nav-btn'+(tab===item.id?' active':'')} onClick={function(){setTab(item.id);}}><span className="ico">{item.ico}</span>{item.label}</button>;
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</html>
