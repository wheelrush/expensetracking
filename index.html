// ── Payouts ───────────────────────────────────────────────────────────────────
function Payouts({jobs,settings}) {
  const safeJobs=Array.isArray(jobs)?jobs:[];
  const weeks=useMemo(()=>groupByWeek(safeJobs),[safeJobs]);
  if(!weeks.length)return html`<div class="screen"><div class="page page-enter"><${EmptyState} icon="💰" title="No payout history" sub="Log jobs to see weekly payout breakdowns."/></div></div>`;
  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label" style=${{marginTop:0}}>Weekly Payouts</div>
    ${weeks.map(([wk,wkJobs])=>{
      const t=weekSummary(wkJobs,settings);
      const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
      const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
      const o1=t.net>0&&ao1?r2(t.net*(Number(settings.profitSplit1||50)/st)):0;
      const o2=t.net>0&&ao2?r2(t.net*(Number(settings.profitSplit2||50)/st)):0;
      const tax=t.net>0&&settings.taxRate>0?r2(t.net*(Number(settings.taxRate)/100)):0;
      return html`<div class="card card-anim" key=${wk} style=${{marginBottom:14}}>
        <div class="card-pad"><div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style=${{fontWeight:700,fontSize:14}}>${weekLabel(wk)}</div><div class="sub">${wkJobs.length} jobs</div></div><div class=${"value big "+(t.net>=0?"green":"red")}>${money(t.net)}</div></div></div>
        <div class="card-row"><div class="label">Revenue</div><div class="value">${money(t.revenue)}</div></div>
        <div class="card-row"><div class="label">Direct Costs</div><div class="value red">${money(t.directCosts)}</div></div>
        <div class="card-row"><div class="label">Gross Profit</div><div class="value">${money(t.grossProfit)}</div></div>
        <div class="card-row"><div class="label">Weekly Fixed</div><div class="value red">${money(t.fixed)}</div></div>
        ${[{name:settings.owner1Name||"Owner 1",pct:settings.profitSplit1,amt:o1,active:ao1},{name:settings.owner2Name||"Owner 2",pct:settings.profitSplit2,amt:o2,active:ao2}].map((o,i)=>html`<div key=${i} class="card-row" style=${{background:"var(--s2)",opacity:o.active?1:0.4}}><div><div class="label">${o.name}</div><div class="sub">${o.pct}% split</div></div><div class=${"value "+(o.active&&o.amt>0?"green":"")}>${o.active?money(o.amt):"—"}</div></div>`)}
        ${tax>0&&html`<div class="card-pad"><div class="tax-box" style=${{marginTop:0}}><div class="tax-lbl">💰 Tax Reserve (${settings.taxRate}%)</div><div class="tax-amt">${money(tax)}</div><div class="tax-hint">~${money(tax/2)} per owner</div></div></div>`}
      </div>`;
    })}
  </div></div>`;
}

// ── Inventory ─────────────────────────────────────────────────────────────────
function Inventory({inventory, setInventory, jobs}) {
  const inv     = Array.isArray(inventory) ? inventory : [];
  const jobsArr = Array.isArray(jobs) ? jobs : [];

  const [search,  setSearch]  = useState('');
  const [editId,  setEditId]  = useState(null);
  const [newRows, setNewRows] = useState([]);   // brand-new unsaved rows only

  // ref used to focus the size input after a new row is added
  const newRowInputRef = useRef(null);

  // auto-focus the size input whenever a new blank row opens
  useEffect(function() {
    if (newRowInputRef.current) {
      newRowInputRef.current.focus();
    }
  }, [editId]);

  // ── best sellers ──────────────────────────────────────────────────────────
  const bestSellers = useMemo(function() {
    const c = {};
    jobsArr.forEach(function(j) {
      const s = (j.tireSize || '').trim();
      if (s) c[s] = (c[s] || 0) + 1;
    });
    return Object.keys(c).sort(function(a,b){ return c[b] - c[a]; }).slice(0, 5);
  }, [jobsArr]);

  // ── firebase helper ───────────────────────────────────────────────────────
  function fbWriteItem(item) {
    if (!_db) return;
    if (!(item.size || '').trim()) return;
    fbSet(invCol(), item.id, {
      id:    String(item.id),
      size:  item.size.trim(),
      qty:   Number(item.qty  || 0),
      cost:  Number(item.cost || 0),
      notes: String(item.notes || ''),
    });
  }

  // ── new-row functions (local state only, never touch setInventory) ─────────

  function addNew() {
    const id = uid();
    setNewRows(function(prev) {
      return [{id: id, size: '', qty: 1, cost: 0, notes: ''}, ...prev];
    });
    setEditId(id);
  }

  function patchNewRow(id, patch) {
    setNewRows(function(prev) {
      return prev.map(function(r) {
        if (r.id !== id) return r;
        return {
          id:    r.id,
          size:  patch.size  !== undefined ? String(patch.size)              : r.size,
          qty:   patch.qty   !== undefined ? Math.max(0, Number(patch.qty))  : r.qty,
          cost:  patch.cost  !== undefined ? Number(patch.cost)              : r.cost,
          notes: patch.notes !== undefined ? String(patch.notes)             : r.notes,
        };
      });
    });
  }

  function discardNewRow(id) {
    setNewRows(function(prev) { return prev.filter(function(r){ return r.id !== id; }); });
    setEditId(null);
  }

  function saveNewRow(id) {
    // find the row in newRows state using the functional form to get latest value
    setNewRows(function(prev) {
      const row = prev.find(function(r){ return r.id === id; });
      if (!row) return prev;
      if (!(row.size || '').trim()) {
        setTimeout(function(){ alert('Enter a tire size first.'); }, 0);
        return prev;
      }
      const item = {
        id:    String(row.id),
        size:  row.size.trim(),
        qty:   Math.max(0, Number(row.qty  || 0)),
        cost:  Number(row.cost  || 0),
        notes: String(row.notes || ''),
      };
      // add to main inventory
      setInventory(function(existing) {
        const arr  = Array.isArray(existing) ? existing : [];
        const next = [item, ...arr.filter(function(i){ return i.id !== id; })];
        persist(KEYS.inventory, next);
        return next;
      });
      // write to firebase outside setter
      setTimeout(function(){ fbWriteItem(item); }, 0);
      // remove from newRows
      return prev.filter(function(r){ return r.id !== id; });
    });
    setEditId(null);
  }

  // ── existing-row functions ────────────────────────────────────────────────

  function patchExisting(id, patch) {
    setInventory(function(prev) {
      const arr  = Array.isArray(prev) ? prev : [];
      const next = arr.map(function(i) {
        if (i.id !== id) return i;
        const merged = {
          id:    String(i.id),
          size:  patch.size  !== undefined ? String(patch.size)             : String(i.size  || ''),
          qty:   patch.qty   !== undefined ? Math.max(0,Number(patch.qty))  : Number(i.qty   || 0),
          cost:  patch.cost  !== undefined ? Number(patch.cost)             : Number(i.cost  || 0),
          notes: patch.notes !== undefined ? String(patch.notes)            : String(i.notes || ''),
        };
        return merged;
      });
      persist(KEYS.inventory, next);
      const changed = next.find(function(i){ return i.id === id; });
      if (changed) setTimeout(function(){ fbWriteItem(changed); }, 0);
      return next;
    });
  }

  function stepExisting(id, delta) {
    setInventory(function(prev) {
      const arr  = Array.isArray(prev) ? prev : [];
      const next = arr.map(function(i) {
        if (i.id !== id) return i;
        return {
          id:    String(i.id),
          size:  String(i.size  || ''),
          qty:   Math.max(0, (Number(i.qty) || 0) + delta),
          cost:  Number(i.cost  || 0),
          notes: String(i.notes || ''),
        };
      });
      persist(KEYS.inventory, next);
      const changed = next.find(function(i){ return i.id === id; });
      if (changed) setTimeout(function(){ fbWriteItem(changed); }, 0);
      return next;
    });
  }

  function removeExisting(id) {
    if (!window.confirm('Remove this tire?')) return;
    setInventory(function(prev) {
      const arr  = Array.isArray(prev) ? prev : [];
      const next = arr.filter(function(i){ return i.id !== id; });
      persist(KEYS.inventory, next);
      setTimeout(function(){ if (_db) fbDel(invCol(), id); }, 0);
      return next;
    });
    setEditId(function(cur){ return cur === id ? null : cur; });
  }

  // ── stats (uses saved rows only, NOT visible list) ─────────────────────────
  const deduped  = useMemo(function() {
    return dedupeInventory(inv.filter(function(i){ return (i.size || '').trim(); }));
  }, [inv]);
  const totalQty = deduped.reduce(function(s,i){ return s + Number(i.qty || 0); }, 0);
  const totalVal = deduped.reduce(function(s,i){ return s + Number(i.qty || 0) * Number(i.cost || 0); }, 0);
  const lowStock = deduped.filter(function(i){ return Number(i.qty||0) > 0 && Number(i.qty||0) <= LOW_STOCK; });
  const outStock = deduped.filter(function(i){ return Number(i.qty||0) === 0; });

  // visible saved rows (search filters ONLY these, never newRows)
  const searchLo   = search.trim().toLowerCase();
  const savedRows  = searchLo
    ? inv.filter(function(i){ return (i.size || '').toLowerCase().includes(searchLo); })
    : inv;

  // ── row renderer helpers ──────────────────────────────────────────────────
  function renderEditPanel(item, isNew) {
    return html`<div style=${{padding:'12px 18px 16px', background:'var(--s2)', borderTop:'1px solid var(--border2)'}}>
      <div style=${{marginBottom:10}}>
        <div style=${{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'1px',color:'var(--t3)',marginBottom:6}}>Tire Size</div>
        <input
          ref=${isNew ? newRowInputRef : null}
          value=${item.size || ''}
          onChange=${function(e){ isNew ? patchNewRow(item.id,{size:e.target.value}) : patchExisting(item.id,{size:e.target.value}); }}
          placeholder="e.g. 225/55R17"
          style=${{border:'1.5px solid var(--blue)',borderRadius:10,padding:'12px 14px',fontSize:16,
            fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,outline:'none',
            width:'100%',background:'var(--s1)',color:'var(--t1)'}}
        />
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <div>
          <div style=${{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'1px',color:'var(--t3)',marginBottom:6}}>Qty</div>
          <input type="number" min="0"
            value=${String(item.qty !== undefined ? item.qty : '')}
            onChange=${function(e){ isNew ? patchNewRow(item.id,{qty:Number(e.target.value||0)}) : patchExisting(item.id,{qty:Number(e.target.value||0)}); }}
            style=${{border:'1px solid var(--border)',borderRadius:10,padding:'11px 13px',fontSize:15,
              outline:'none',width:'100%',background:'var(--s1)',color:'var(--t1)'}}/>
        </div>
        <div>
          <div style=${{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'1px',color:'var(--t3)',marginBottom:6}}>Cost ($)</div>
          <input type="number" min="0"
            value=${String(item.cost || '')}
            onChange=${function(e){ isNew ? patchNewRow(item.id,{cost:Number(e.target.value||0)}) : patchExisting(item.id,{cost:Number(e.target.value||0)}); }}
            placeholder="0.00"
            style=${{border:'1px solid var(--border)',borderRadius:10,padding:'11px 13px',fontSize:14,
              outline:'none',width:'100%',background:'var(--s1)',color:'var(--t1)'}}/>
        </div>
      </div>
      ${isNew
        ? html`<div style=${{display:'flex',gap:8}}>
            <button class="btn primary press-scale" style=${{flex:1,fontSize:14}}
              onClick=${function(){ saveNewRow(item.id); }}>Save Tire ✓</button>
            <button class="btn danger" style=${{padding:'15px 14px'}}
              onClick=${function(){ discardNewRow(item.id); }}>×</button>
          </div>`
        : html`<div style=${{display:'flex',gap:8}}>
            <button class="btn secondary press-scale" style=${{flex:1}}
              onClick=${function(){ setEditId(null); }}>Done</button>
            <button class="btn danger" style=${{padding:'15px 14px'}}
              onClick=${function(){ removeExisting(item.id); }}>Remove</button>
          </div>`}
    </div>`;
  }

  function renderSavedRow(item, idx, total) {
    const isEditing = editId === item.id;
    const qty   = Number(item.qty || 0);
    const isLow = qty > 0 && qty <= LOW_STOCK;
    const isOut = qty === 0;
    const hasSz = (item.size || '').trim() !== '';
    return html`<div key=${item.id} style=${{borderBottom:idx<total-1?'1px solid var(--border2)':'none'}}>
      <div style=${{display:'flex',alignItems:'center',padding:'14px 18px',gap:12,cursor:'pointer'}}
        onClick=${function(){ setEditId(isEditing ? null : item.id); }}>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:'var(--t1)',letterSpacing:'-.3px'}}>
            ${hasSz ? item.size : html`<span style=${{color:'var(--t3)',fontWeight:500,fontSize:13}}>—</span>`}
          </div>
          ${item.cost>0&&html`<div style=${{fontSize:11,color:'var(--t3)',marginTop:2}}>Cost ${money(item.cost)}</div>`}
        </div>
        ${bestSellers.includes(item.size||'')&&hasSz&&html`<span style=${{fontSize:9,fontWeight:800,background:'var(--gold-dim)',color:'var(--gold)',borderRadius:999,padding:'3px 10px',flexShrink:0}}>BEST</span>`}
        ${isOut&&hasSz&&html`<span style=${{fontSize:9,fontWeight:800,color:'var(--t3)',background:'var(--s3)',borderRadius:999,padding:'3px 10px',flexShrink:0}}>OUT</span>`}
        ${isLow&&!isOut&&html`<span style=${{fontSize:9,fontWeight:800,color:'var(--amber)',background:'var(--amber-dim)',borderRadius:999,padding:'3px 10px',flexShrink:0}}>LOW</span>`}
        <div style=${{display:'flex',alignItems:'center',background:'var(--s3)',borderRadius:10,overflow:'hidden',flexShrink:0}}
          onClick=${function(e){ e.stopPropagation(); }}>
          <button onClick=${function(){ stepExisting(item.id,-1); }}
            style=${{background:'none',border:'none',width:36,height:36,fontSize:18,fontWeight:700,color:'var(--t2)',lineHeight:1}}>−</button>
          <div style=${{width:32,textAlign:'center',fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,
            color:isOut?'var(--t3)':isLow?'var(--amber)':'var(--t1)'}}>${qty}</div>
          <button onClick=${function(){ stepExisting(item.id,1); }}
            style=${{background:'none',border:'none',width:36,height:36,fontSize:18,fontWeight:700,color:'var(--t2)',lineHeight:1}}>+</button>
        </div>
      </div>
      ${isEditing && renderEditPanel(item, false)}
    </div>`;
  }

  // ── render ────────────────────────────────────────────────────────────────
  return html`<div class="screen"><div class="page page-enter">

    <!-- stats strip -->
    <div class="kpi-grid three card-anim">
      <div class="kpi"><div class="kpi-label">Total Tires</div><div class="kpi-value">${totalQty}</div><div class="kpi-sub">${deduped.length} sizes</div></div>
      <div class="kpi"><div class="kpi-label">Stock Value</div><div class="kpi-value" style=${{fontSize:16}}>${money(totalVal)}</div><div class="kpi-sub">at cost</div></div>
      <div class="kpi"><div class="kpi-label">Reorder</div><div class="kpi-value" style=${{fontSize:20,color:(outStock.length+lowStock.length)>0?'var(--amber)':'var(--t3)'}}>${outStock.length+lowStock.length}</div><div class="kpi-sub">sizes</div></div>
    </div>

    <!-- low/out alerts -->
    ${(outStock.length>0||lowStock.length>0)&&html`<div style=${{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:14,padding:'14px 18px',marginBottom:12}}>
      ${outStock.length>0&&html`<div style=${{marginBottom:lowStock.length>0?10:0}}>
        <div style=${{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'1px',color:'var(--t3)',marginBottom:6}}>Out of Stock</div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
          ${outStock.map(function(i){ return html`<span key=${i.id} style=${{background:'var(--s3)',color:'var(--t2)',padding:'4px 12px',borderRadius:999,fontSize:11,fontWeight:700}}>${i.size||'—'}</span>`; })}
        </div>
      </div>`}
      ${lowStock.length>0&&html`<div>
        <div style=${{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'1px',color:'var(--t3)',marginBottom:6}}>Low Stock</div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
          ${lowStock.map(function(i){ return html`<span key=${i.id} style=${{background:'var(--amber-dim)',color:'var(--amber)',padding:'4px 12px',borderRadius:999,fontSize:11,fontWeight:700}}>${(i.size||'—')} · ${i.qty}</span>`; })}
        </div>
      </div>`}
    </div>`}

    <!-- search + add -->
    <div style=${{display:'flex',gap:8,marginBottom:12}}>
      <input value=${search} onChange=${function(e){ setSearch(e.target.value); }}
        placeholder="Search sizes…"
        style=${{flex:1,background:'var(--s2)',border:'1px solid var(--border)',borderRadius:12,padding:'13px 16px',fontSize:15,outline:'none',color:'var(--t1)'}}/>
      <button class="btn primary press-scale"
        style=${{flexShrink:0,padding:'13px 20px',fontSize:14,borderRadius:12}}
        onClick=${addNew}>+ Add</button>
    </div>

    <!-- NEW ROWS: always shown at top, never filtered, always above saved list -->
    ${newRows.length>0&&html`<div class="card card-anim" style=${{marginBottom:10,border:'1px solid rgba(79,142,247,.25)',background:'rgba(79,142,247,.04)'}}>
      ${newRows.map(function(row, idx) {
        const isEditing = editId === row.id;
        const hasSz = (row.size || '').trim() !== '';
        return html`<div key=${row.id} style=${{borderBottom:idx<newRows.length-1?'1px solid var(--border2)':'none'}}>
          <div style=${{display:'flex',alignItems:'center',padding:'14px 18px',gap:12,cursor:'pointer'}}
            onClick=${function(){ setEditId(isEditing ? null : row.id); }}>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:'var(--blue)',letterSpacing:'-.3px'}}>
                ${hasSz ? row.size : html`<span style=${{color:'var(--blue)',fontWeight:600,fontSize:13}}>New tire — tap here to fill in ▾</span>`}
              </div>
            </div>
            <span style=${{fontSize:9,fontWeight:800,color:'var(--blue)',background:'var(--blue-dim)',borderRadius:999,padding:'3px 10px',flexShrink:0}}>UNSAVED</span>
          </div>
          ${isEditing && renderEditPanel(row, true)}
        </div>`;
      })}
    </div>`}

    <!-- SAVED ROWS -->
    ${savedRows.length===0&&newRows.length===0
      ? html`<${EmptyState} icon="🛞" title="No inventory" sub="Tap + Add to log a tire size."/>`
      : savedRows.length===0
        ? null
        : html`<div class="card card-anim">
            ${savedRows.map(function(item, idx){ return renderSavedRow(item, idx, savedRows.length); })}
          </div>`}

  </div></div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,jobs,setJobs,inventory,setInventory,expenses,onResetInventory}) {
  const exps=Array.isArray(settings.expenses)?settings.expenses:[];
  const upd=(k,v)=>setSettings(p=>({...p,[k]:v}));
  const updExp=(id,patch)=>setSettings(p=>({...p,expenses:(Array.isArray(p.expenses)?p.expenses:[]).map(e=>e.id===id?{...e,...patch}:e)}));
  const addExp=()=>setSettings(p=>({...p,expenses:[...(Array.isArray(p.expenses)?p.expenses:[]),{id:uid(),name:"New Expense",amount:0,active:true}]}));
  const delExp=id=>setSettings(p=>({...p,expenses:(Array.isArray(p.expenses)?p.expenses:[]).filter(e=>e.id!==id)}));
  const exportCSV=()=>{
    const headers=["Date","Service","Area","Source","Revenue","Tire Cost","Misc Cost","Miles","Direct Cost","Gross Profit","Payment","Tire Size","Qty","Customer","Phone","Notes"];
    const rows=[...(jobs||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(j=>{const dc=jobDirectCost(j,settings),gp=jobGrossProfit(j,settings);return[j.date,j.service,j.area,j.source||"",Number(j.revenue||0).toFixed(2),Number(j.tireCost||0).toFixed(2),Number(j.miscCost||0).toFixed(2),Number(j.miles||0).toFixed(1),dc.toFixed(2),gp.toFixed(2),j.payment,j.tireSize||"",j.qty||1,j.customerName||"",j.customerPhone||"",(j.note||"").replace(/,/g," ")].map(v=>'"'+v+'"').join(",");});
    const csv=[headers.join(",")].concat(rows).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="wheel-rush-"+TODAY()+".csv";a.click();URL.revokeObjectURL(url);
  };
  const exportData=()=>{const d={jobs,settings,inventory,expenses,exportedAt:new Date().toISOString(),version:"10"};const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="wheel-rush-backup-"+TODAY()+".json";a.click();URL.revokeObjectURL(url);};
  const importData=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const data=JSON.parse(await file.text());if(Array.isArray(data.jobs))setJobs(data.jobs);if(data.settings&&typeof data.settings==="object")setSettings({...DEFAULT_SETTINGS,...data.settings});alert("Import complete.");}catch{alert("Could not import.");}};inp.click();};
  const resetInventory=()=>{if(!window.confirm("Reset inventory to 52-size list?"))return;const fresh=DEFAULT_INVENTORY.map(i=>({...i}));setInventory(fresh);persist(KEYS.inventory,fresh);if(onResetInventory)onResetInventory(fresh);alert("Done!");};
  const clearAll=()=>{if(!window.confirm("Clear ALL data? Cannot be undone."))return;Object.values(KEYS).forEach(k=>localStorage.removeItem(k));window.location.reload();};
  const monthly=monthlyFixed(settings),weekly=weeklyFixed(settings);
  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label" style=${{marginTop:0}}>Owners &amp; Split</div>
    <div class="card card-anim">
      ${[{nk:"owner1Name",pk:"profitSplit1",ak:"owner1Active",lbl:"Owner 1"},{nk:"owner2Name",pk:"profitSplit2",ak:"owner2Active",lbl:"Owner 2"}].map(({nk,pk,ak,lbl})=>{const active=settings[ak]!==false;return html`<div key=${nk} class="settings-row" style=${{opacity:active?1:0.55}}><div style=${{flex:1}}><div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div class="label">${lbl}</div><button onClick=${()=>upd(ak,!active)} style=${{border:"none",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",background:active?"var(--t1)":"var(--s3)",color:active?"var(--bg)":"var(--t3)"}}>${active?"ON":"OFF"}</button></div><input class="settings-inp" style=${{width:"100%"}} value=${settings[nk]} onChange=${e=>upd(nk,e.target.value)} disabled=${!active}/></div><div style=${{flexShrink:0,marginLeft:12}}><div class="label" style=${{marginBottom:6}}>Split %</div><input type="number" class="settings-inp" style=${{width:80}} value=${settings[pk]} onChange=${e=>upd(pk,Number(e.target.value||0))} disabled=${!active}/></div></div>`;} )}
    </div>
    <div class="section-label">Goals &amp; Pricing</div>
    <div class="card card-anim">
      <div class="settings-row"><div class="label">Weekly Goal</div><input type="number" class="settings-inp" style=${{width:110}} value=${settings.weeklyGoal||""} onChange=${e=>upd("weeklyGoal",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Tax Rate %</div><input type="number" class="settings-inp" style=${{width:80}} value=${settings.taxRate||""} onChange=${e=>upd("taxRate",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Repair Target $</div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.repairTarget||""} onChange=${e=>upd("repairTarget",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Replacement Target $</div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.replacementTarget||""} onChange=${e=>upd("replacementTarget",Number(e.target.value||0))}/></div>
      <div class="settings-row"><div class="label">Cost Per Mile $</div><input type="number" step="0.01" class="settings-inp" style=${{width:90}} value=${settings.costPerMile||""} onChange=${e=>upd("costPerMile",Number(e.target.value||0))}/></div>
    </div>
    <div class="section-label">Google Review Link</div>
    <div class="card card-anim"><div class="card-pad"><input class="settings-inp" style=${{width:"100%"}} value=${settings.googleReviewUrl||""} onChange=${e=>upd("googleReviewUrl",e.target.value)} placeholder="https://g.page/r/…/review"/></div></div>
    <div class="section-label">Monthly Fixed Expenses</div>
    <div class="card card-anim">
      ${exps.map(exp=>html`<div class="expense-row" key=${exp.id}><input value=${exp.name} onChange=${e=>updExp(exp.id,{name:e.target.value})}/><input type="number" value=${exp.amount} onChange=${e=>updExp(exp.id,{amount:Number(e.target.value||0)})}/><button class=${"btn sm "+(exp.active?"success":"secondary")} onClick=${()=>updExp(exp.id,{active:!exp.active})}>${exp.active?"On":"Off"}</button><button class="btn danger sm" onClick=${()=>delExp(exp.id)}>×</button></div>`)}
      <div class="card-row"><button class="btn secondary sm press-scale" onClick=${addExp}>+ Add</button><div style=${{textAlign:"right"}}><div class="value">${money(monthly)}/mo</div><div class="sub">${money(weekly)}/wk</div></div></div>
    </div>
    <div class="section-label">Data</div>
    <div class="card card-anim">
      <div class="card-row"><div class="label">Export CSV</div><button class="btn secondary sm press-scale" onClick=${exportCSV}>CSV</button></div>
      <div class="card-row"><div class="label">Full Backup</div><button class="btn secondary sm press-scale" onClick=${exportData}>JSON</button></div>
      <div class="card-row"><div class="label">Import</div><button class="btn secondary sm press-scale" onClick=${importData}>Import</button></div>
      <div class="card-row"><div class="label">Reset Inventory</div><button class="btn orange sm press-scale" onClick=${resetInventory}>Reset</button></div>
      <div class="card-row"><div class="label" style=${{color:"var(--red)"}}>Reset Everything</div><button class="btn danger sm" onClick=${clearAll}>Reset</button></div>
    </div>
    <div style=${{padding:"8px 0 4px",textAlign:"center",fontSize:11,color:"var(--t3)"}}>Wheel Rush v10 Pro · Firebase Sync</div>
  </div></div>`;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]       = useState(null);
  const [authReady,setAuthReady] = useState(false);
  const [syncStatus,setSyncStatus] = useState("local");
  const [jobs,setJobs]       = useState(()=>load(KEYS.jobs,[]));
  const [settings,setSettings] = useState(()=>{
    const raw = load(KEYS.settings, {});
    const merged = {...DEFAULT_SETTINGS, ...raw};
    // Ensure expenses is always an array
    if (!Array.isArray(merged.expenses)) {
      try { const p=JSON.parse(merged.expenses||"[]"); merged.expenses=Array.isArray(p)?p:DEFAULT_SETTINGS.expenses; }
      catch { merged.expenses = DEFAULT_SETTINGS.expenses; }
    }
    return merged;
  });
  const [inventory,setInventory] = useState(()=>{const r=load(KEYS.inventory,null);return Array.isArray(r)?r:DEFAULT_INVENTORY.map(i=>({...i}));});
  const [expenses,setExpenses]   = useState(()=>{const r=load(KEYS.expenses,null);return Array.isArray(r)?r:[];});
  const [tab,setTab]     = useState("dashboard");
  const [saving,setSaving] = useState(false);
  const [prefill,setPrefill] = useState(null);
  const [editJob,setEditJob] = useState(null);
  const pendingRef = useRef([]);

  // ── Auth listener ────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!_auth) return setAuthReady(true);
    const unsub=_auth.onAuthStateChanged(u=>{setUser(u||null);setAuthReady(true);});
    return ()=>unsub();
  },[]);

  // ── Firebase listeners ───────────────────────────────────────────────────
  useEffect(()=>{
    if(!user){setSyncStatus("local");return;}
    setSyncStatus("syncing");
    const u1=fbListen(jobCol(),docs=>{setJobs(docs);persist(KEYS.jobs,docs);setSyncStatus("connected");});
    const u2=fbListen(invCol(),docs=>{
      if(docs.length>0){
        setInventory(prev=>{
          // Keep any blank/pending rows that exist in current local state
          const blankRows=(prev||[]).filter(i=>!(i.size||"").trim());
          const fbItems=docs.filter(d=>(d.size||"").trim());
          const deduped=dedupeInventory(fbItems);
          const merged=[...blankRows,...deduped];
          persist(KEYS.inventory,merged);
          return merged;
        });
        setSyncStatus("connected");
      }
    });
    const u3=fbListen(expCol(),docs=>{setExpenses(Array.isArray(docs)?docs:[]);persist(KEYS.expenses,docs);});
    let u4=()=>{};
    if(settingDoc()){
      u4=settingDoc().onSnapshot(snap=>{
        if(snap&&snap.exists){
          const d=snap.data();
          Object.keys(d).forEach(k=>{if(typeof d[k]==="string"){try{const p=JSON.parse(d[k]);if(Array.isArray(p))d[k]=p;}catch{}}});
          setSettings(prev=>{const merged={...DEFAULT_SETTINGS,...prev,...d};if(!Array.isArray(merged.expenses))merged.expenses=DEFAULT_SETTINGS.expenses;persist(KEYS.settings,merged);return merged;});
        }
      },()=>{});
    }
    return ()=>{u1();u2();u3();u4();};
  },[user]);

  // ── Persist settings ─────────────────────────────────────────────────────
  useEffect(()=>{
    persist(KEYS.settings,settings);
    if(user&&settingDoc()){
      const t=setTimeout(()=>{
        const clean={};Object.keys(settings).forEach(k=>{const v=settings[k];if(v!==null&&v!==undefined)clean[k]=typeof v==="object"?JSON.stringify(v):v;});
        settingDoc().set(clean).catch(()=>{});
      },1200);
      return ()=>clearTimeout(t);
    }
  },[settings,user]);

  useEffect(()=>{persist(KEYS.jobs,jobs);},[jobs]);
  useEffect(()=>{persist(KEYS.inventory,inventory);},[inventory]);

  // ── Save job ─────────────────────────────────────────────────────────────
  const saveJob=useCallback(async(job,addAnother)=>{
    setSaving(true);
    try{
      const id=job.id||uid();const full={...job,id};
      if(full.tireSize){const sz=load(KEYS.sizes,[]);persist(KEYS.sizes,[full.tireSize,...sz.filter(s=>s!==full.tireSize)].slice(0,12));}
      if(full.area){const ct=load(KEYS.cities,[]);persist(KEYS.cities,[full.area,...ct.filter(c=>c!==full.area)].slice(0,12));}
      if(/replacement|installation/i.test(full.service)&&full.tireSize){
        const qty=Number(full.qty||1);
        setInventory(prev=>{const next=prev.map(i=>i.size===full.tireSize?{...i,qty:Math.max(0,(Number(i.qty)||0)-qty)}:i);persist(KEYS.inventory,next);if(user)next.forEach(x=>fbSet(invCol(),x.id,{id:x.id,size:x.size||"",qty:Number(x.qty||0),cost:Number(x.cost||0),notes:x.notes||""}));return next;});
      }
      setJobs(prev=>{const exists=prev.find(j=>j.id===id);const next=exists?prev.map(j=>j.id===id?full:j):[full,...prev];persist(KEYS.jobs,next);return next;});
      if(user){await fbSet(jobCol(),id,{id,date:String(full.date||""),service:String(full.service||""),area:String(full.area||""),source:String(full.source||""),payment:String(full.payment||""),status:String(full.status||"Completed"),customerName:String(full.customerName||""),customerPhone:String(full.customerPhone||""),tireSize:String(full.tireSize||""),qty:Number(full.qty||1),revenue:Number(full.revenue||0),tireCost:Number(full.tireCost||0),miscCost:Number(full.miscCost||0),miles:Number(full.miles||0),note:String(full.note||""),emergency:!!full.emergency,lateNight:!!full.lateNight,highway:!!full.highway,weekend:!!full.weekend});}
      if(!addAnother){setTab("dashboard");setEditJob(null);}
    }catch(e){console.warn("saveJob:",e);}
    finally{setSaving(false);}
  },[user]);

  // ── Expense handler (BUG 3 FIX) ──────────────────────────────────────────
  const handleSetExpenses=useCallback(updater=>{
    setExpenses(prev=>{
      const prevArr=Array.isArray(prev)?prev:[];
      const next=typeof updater==="function"?updater(prevArr):Array.isArray(updater)?updater:prevArr;
      persist(KEYS.expenses,next);
      if(user){
        const nextIds=new Set(next.map(x=>x.id));
        prevArr.forEach(x=>{if(!nextIds.has(x.id))fbDel(expCol(),x.id);});
        next.forEach(x=>fbSet(expCol(),x.id,{id:String(x.id||""),date:String(x.date||""),category:String(x.category||""),amount:Number(x.amount||0),note:String(x.note||"")}));
      }
      return next;
    });
  },[user]);

  // ── Inventory handler ─────────────────────────────────────────────────────
  const handleSetInventory=useCallback(updater=>{
    setInventory(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      persist(KEYS.inventory,next);
      // Only push items that have a size to Firebase — blank rows stay local
      if(user) next.filter(x=>(x.size||"").trim()).forEach(x=>fbSet(invCol(),x.id,{id:x.id,size:x.size,qty:Number(x.qty||0),cost:Number(x.cost||0),notes:x.notes||""}));
      return next;
    });
  },[user]);

  const resetInventoryFb=useCallback(fresh=>{pendingRef.current=[];if(user&&invCol())fresh.forEach(x=>fbSet(invCol(),x.id,{id:x.id,size:x.size||"",qty:Number(x.qty||0),cost:Number(x.cost||0),notes:x.notes||""}));},[user]);
  const handleRepeat  =useCallback(job=>{setPrefill(job);setTab("add");},[]);
  const handleEdit    =useCallback(job=>{setEditJob(job);setTab("add");},[]);
  const handleStartJob=useCallback(qqForm=>{setPrefill({...EMPTY_JOB(),...qqForm});setTab("add");},[]);
  const signOut       =useCallback(()=>{if(_auth)_auth.signOut().catch(()=>{});},[]);
  const deleteJob     =useCallback(id=>{setJobs(prev=>{const next=prev.filter(j=>j.id!==id);persist(KEYS.jobs,next);return next;});if(user)fbDel(jobCol(),id);},[user]);

  // ── Loading ───────────────────────────────────────────────────────────────
  if(!authReady)return html`<div style=${{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
    <img src=${LOGO_SRC} alt="WR" class="logo-pulse" style=${{width:72,height:72,objectFit:"contain",borderRadius:16,boxShadow:"0 4px 24px rgba(0,0,0,.6), 0 0 0 1px rgba(79,142,247,.15)"}} onError=${e=>e.target.style.display="none"}/>
  </div>`;

  if(!user)return html`<${AuthScreen} onAuth=${u=>setUser(u)}/>`;

  const TABS=[
    {id:"dashboard",icon:"⚡",label:"Home"},
    {id:"add",icon:"＋",label:"Add"},
    {id:"history",icon:"📋",label:"Jobs"},
    {id:"payouts",icon:"💰",label:"Pay"},
    {id:"expenses",icon:"📊",label:"Costs"},
    {id:"inventory",icon:"🛞",label:"Stock"},
    {id:"settings",icon:"⚙️",label:"Setup"},
  ];

  let content=null;
  switch(tab){
    case "dashboard": content=html`<${Dashboard} jobs=${jobs} settings=${settings} setTab=${setTab} onRepeat=${handleRepeat} inventory=${inventory} onStartJob=${handleStartJob}/>`; break;
    case "add":       content=html`<${AddJob} onSave=${saveJob} settings=${settings} jobs=${jobs} prefill=${prefill} onClearPrefill=${()=>setPrefill(null)} editJob=${editJob} onClearEdit=${()=>setEditJob(null)} saving=${saving}/>`; break;
    case "history":   content=html`<${History} jobs=${jobs} settings=${settings} onEdit=${handleEdit} onDelete=${deleteJob} onRepeat=${handleRepeat}/>`; break;
    case "payouts":   content=html`<${Payouts} jobs=${jobs} settings=${settings}/>`; break;
    case "expenses":  content=html`<${Expenses} expenses=${expenses} setExpenses=${handleSetExpenses}/>`; break;
    case "inventory": content=html`<${Inventory} inventory=${inventory} setInventory=${handleSetInventory} jobs=${jobs}/>`; break;
    case "settings":  content=html`<${Settings} settings=${settings} setSettings=${setSettings} jobs=${jobs} setJobs=${setJobs} inventory=${inventory} setInventory=${handleSetInventory} expenses=${expenses} onResetInventory=${resetInventoryFb}/>`; break;
    default: content=null;
  }

  return html`<div style=${{display:"flex",flexDirection:"column",height:"100vh",background:"var(--bg)",overflow:"hidden"}}>
    <${Header} syncStatus=${syncStatus} onSignOut=${signOut}/>
    <div style=${{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch"}}>${content}</div>
    <nav class="bottom-nav">
      ${TABS.map(t=>html`<button key=${t.id} class=${"nav-btn"+(tab===t.id?" active":"")} data-id=${t.id} onClick=${()=>setTab(t.id)}>
        ${t.id==="dashboard"
          ?html`<img src=${LOGO_SRC} alt="" class="nav-logo-ico" style=${{width:22,height:22,objectFit:"contain",borderRadius:5,opacity:tab==="dashboard"?1:0.45,transition:"opacity .15s"}} onError=${e=>e.target.style.display="none"}/>`
          :html`<span class="ico">${t.icon}</span>`}
        <span>${t.label}</span>
      </button>`)}
    </nav>
  </div>`;
}

// ── Mount ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary, null, html`<${App}/>`));
</script>
</body>
</html>
