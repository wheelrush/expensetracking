    let j=safeJobs;
    if(filter==="Repair") j=j.filter(x=>/repair/i.test(x.service));
    else if(filter==="Replacement") j=j.filter(x=>/replacement|installation/i.test(x.service));
    else if(filter==="Pending") j=j.filter(x=>x.status==="Pending");
    else if(filter!=="All") j=j.filter(x=>x.area===filter);
    if(search.trim()){const q=search.toLowerCase(); j=j.filter(x=>(x.customerName||"").toLowerCase().includes(q)||(x.customerPhone||"").includes(q)||(x.tireSize||"").toLowerCase().includes(q)||(x.area||"").toLowerCase().includes(q)||(x.note||"").toLowerCase().includes(q));}
    return [...j].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },[safeJobs,filter,search]);
  const weekGroups=useMemo(()=>groupByWeek(filtered),[filtered]);
  const thisWeekGross=useMemo(()=>{const tw=getWeekStart(TODAY()); return safeJobs.filter(j=>getWeekStart(j.date)===tw).reduce((s,j)=>s+jobGrossProfit(j,settings),0);},[safeJobs,settings]);
  const handleDelete=id=>{if(!window.confirm("Delete this job?"))return; onDelete(id);};
  const markPaid=job=>{if(onEdit) onEdit({...job,status:"Completed",_markPaidOnly:true});};

    const JobRow=({job})=>{
    const profit=jobGrossProfit(job,settings);
    const pg=profit>=70,po=profit>=40&&profit<70;
    const profitCls=pg?"green":po?"orange":"red";
    const sendReview=()=>openReviewSMS(job.customerPhone,(settings.googleReviewUrl||"").trim(),job.customerName,job.service,job.area);
    return html`<div style=${{background:"var(--s1)",borderRadius:16,overflow:"hidden",border:"1px solid var(--border2)",boxShadow:"var(--sh-card)"}}>
      <div style=${{padding:"15px 17px",display:"flex",alignItems:"flex-start",gap:12}}>
        <div style=${{width:42,height:42,borderRadius:12,background:"var(--s3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:19}}>🛞</div>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{fontSize:14,fontWeight:700,color:"var(--t1)",letterSpacing:"-.2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${job.service}</div>
          <div style=${{fontSize:11,color:"var(--t3)",marginTop:2,lineHeight:1.6}}>${job.area} · ${job.date}${job.tireSize?" · "+job.tireSize:""}</div>
          ${(job.customerName||job.customerPhone)&&html`<div style=${{fontSize:11,color:"var(--t3)",marginTop:1}}>👤 ${job.customerName||""}${job.customerPhone?" · "+job.customerPhone:""}</div>`}
          <div style=${{marginTop:7,display:"flex",gap:6,flexWrap:"wrap"}}>
            <span class=${"pill "+profitCls}>${money(profit)}</span>
            ${job.emergency&&html`<span class="pill orange">🚨</span>`}
            ${job.lateNight&&html`<span class="pill gray">🌙</span>`}
            ${job.status==="Pending"&&html`<span class="pill gold">Pending</span>`}
          </div>
        </div>
        <div style=${{textAlign:"right",flexShrink:0}}>
          <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:18,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(job.revenue)}</div>
          <div style=${{fontSize:10,color:"var(--t3)",marginTop:2}}>${job.payment}</div>
        </div>
      </div>
      <div style=${{padding:"10px 17px 12px",borderTop:"1px solid var(--border2)",display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
        ${onEdit&&html`<button class="btn secondary xs" onClick=${()=>onEdit(job)}>✏️ Edit</button>`}
        <button class="btn secondary xs" onClick=${()=>onRepeat(job)}>🔁</button>
        <button class="btn secondary xs" onClick=${()=>sendInvoice(job,settings)}>🧾</button>
        <button class="btn secondary xs" onClick=${sendReview}>⭐</button>
        ${job.status==="Pending"&&html`<button class="btn success xs" onClick=${()=>markPaid(job)}>✓ Paid</button>`}
        ${job.customerPhone&&html`<button class="btn secondary xs" onClick=${()=>window.open("tel:"+job.customerPhone)}>📞</button>`}
        <button class="btn danger xs" onClick=${()=>handleDelete(job.id)}>×</button>
      </div>
    </div>`;
  };

  return html`<div class="screen"><div class="page">
        <div style=${{marginBottom:12}}>
      <input value=${search} onChange=${e=>setSearch(e.target.value)}
        placeholder="Search jobs, tires, customers…"
        style=${{width:"100%",background:"var(--s2)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 18px",outline:"none",fontSize:15,color:"var(--t1)"}}
      />
    </div></div>
    <div class="chip-row" style=${{marginBottom:10}}>
      ${["All","Repair","Replacement","Pending"].concat(cities).slice(0,9).map(c=>html`<button key=${c} class=${"chip"+(filter===c?" active":"")} onClick=${()=>setFilter(c)}>${c}</button>`)}
    </div>
    <div style=${{display:"flex",gap:8,marginBottom:14}}>
      <button class=${"chip sm"+(view==="weeks"?" active":"")} onClick=${()=>setView("weeks")}>By Week</button>
      <button class=${"chip sm"+(view==="list"?" active":"")} onClick=${()=>setView("list")}>All Jobs</button>
      <span style=${{marginLeft:"auto",fontFamily:"\"IBM Plex Mono\",monospace",fontSize:12,color:"#999",alignSelf:"center"}}>${filtered.length} jobs</span>
    </div>
    ${filtered.length===0?html`<${EmptyState} icon="📋" title="No jobs found" sub=${search?"Try different search.":"No jobs match."}/>`:view==="weeks"?html`<div>
      ${weekGroups.map(([wk,wkJobs])=>{ const t=weekSummary(wkJobs,settings); return html`<div key=${wk} style=${{marginBottom:20}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0"}}>
          <div><div style=${{fontWeight:700,fontSize:13}}>${weekLabel(wk)}</div><div class="sub">${wkJobs.length} jobs · ${money(t.revenue)} rev · ${money(t.grossProfit)} gross</div></div>
          <div style=${{textAlign:"right"}}><div class=${"value "+(t.net>=0?"green":"red")}>${money(t.net)}</div><div class="sub">net</div></div>
        </div>
        <div class="stack">${wkJobs.map(job=>html`<${JobRow} key=${job.id} job=${job}/>`)}</div>
      </div>`; })}
    </div>`:html`<div class="stack">${filtered.map(job=>html`<${JobRow} key=${job.id} job=${job}/>`)}</div>`}
  </div></div>`;
}

// ── Expenses ──────────────────────────────────────────────────────────────────
function Expenses({expenses,setExpenses}) {
  const safe=Array.isArray(expenses)?expenses:[];
  const [form,setForm]=useState({date:TODAY(),category:"Fuel",amount:"",note:""});
  const CATS=["Fuel","Oil/Fluids","Equipment Repair","Supplies","Food","Tolls/Parking","Other"];
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const add=()=>{ const amt=Number(form.amount||0); if(!amt){alert("Enter an amount.");return;} setExpenses(prev=>[{...form,id:uid(),amount:amt},...prev]); setForm({date:TODAY(),category:"Fuel",amount:"",note:""}); };
  const remove=id=>{ if(!window.confirm("Delete?"))return; setExpenses(prev=>prev.filter(e=>e.id!==id)); };
  const total=safe.reduce((s,e)=>s+Number(e.amount||0),0);
  const thisWeek=getWeekStart(TODAY());
  const weekTotal=safe.filter(e=>getWeekStart(e.date||TODAY())===thisWeek).reduce((s,e)=>s+Number(e.amount||0),0);
  return html`<div class="screen"><div class="page">
    <div class="section-label" style=${{marginTop:0}}>Variable Expenses</div>
    <div class="mini-grid" style=${{marginBottom:14}}>
      <div class="mini-box"><strong>${money(weekTotal)}</strong><span>This Week</span></div>
      <div class="mini-box"><strong>${money(total)}</strong><span>All Time</span></div>
      <div class="mini-box"><strong>${safe.length}</strong><span>Receipts</span></div>
      <div class="mini-box"><strong>${safe.length?money(total/safe.length):"—"}</strong><span>Avg</span></div>
    </div>
    <div class="card" style=${{marginBottom:14}}><div class="card-pad">
      <div class="field-row">
        <div class="field" style=${{marginBottom:8}}><label>Date</label><input type="date" value=${form.date} onChange=${e=>setF("date",e.target.value)}/></div>
        <div class="field" style=${{marginBottom:8}}><label>Amount ($)</label><input type="number" min="0" inputMode="decimal" value=${form.amount} onChange=${e=>setF("amount",e.target.value)} placeholder="0.00" style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700}}/></div>
      </div>
      <div class="field" style=${{marginBottom:8}}><label>Category</label><select value=${form.category} onChange=${e=>setF("category",e.target.value)}>${CATS.map(c=>html`<option key=${c}>${c}</option>`)}</select></div>
      <div class="field" style=${{marginBottom:10}}><label>Note (optional)</label><input value=${form.note} onChange=${e=>setF("note",e.target.value)} placeholder="BP station, etc."/></div>
      <button class="btn primary" style=${{width:"100%"}} onClick=${add}>+ Log Expense</button>
    </div></div>
    ${safe.length===0?html`<${EmptyState} icon="🧾" title="No expenses logged" sub="Track fuel, supplies, repairs."/>`:html`<div class="stack">
      ${[...safe].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(exp=>html`<div class="job-row" key=${exp.id}>
        <div class="job-icon" style=${{fontSize:16}}>🧾</div>
        <div class="job-main"><div class="job-title">${exp.category}</div><div class="job-meta">${exp.date}${exp.note?" · "+exp.note:""}</div></div>
        <div class="job-right"><div class="value red">${money(exp.amount)}</div><button class="btn danger sm" style=${{marginTop:8}} onClick=${()=>remove(exp.id)}>×</button></div>
      </div>`)}
    </div>`}
  </div></div>`;
}

// ── Payouts ───────────────────────────────────────────────────────────────────
function Payouts({jobs,settings}) {
  const safeJobs=Array.isArray(jobs)?jobs:[];
  const weeks=useMemo(()=>groupByWeek(safeJobs),[safeJobs]);
  if(!weeks.length) return html`<div class="screen"><div class="page"><${EmptyState} icon="💰" title="No payout history" sub="Log jobs to see weekly payout breakdowns."/></div></div>`;
  return html`<div class="screen"><div class="page">
    <div class="section-label" style=${{marginTop:0}}>Weekly Payouts</div>
    ${weeks.map(([wk,wkJobs])=>{
      const t=weekSummary(wkJobs,settings);
      const ao1=settings.owner1Active!==false, ao2=settings.owner2Active!==false;
      const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
      const o1=t.net>0&&ao1?r2(t.net*(Number(settings.profitSplit1||50)/st)):0;
      const o2=t.net>0&&ao2?r2(t.net*(Number(settings.profitSplit2||50)/st)):0;
      const tax=t.net>0&&settings.taxRate>0?r2(t.net*(Number(settings.taxRate)/100)):0;
      return html`<div class="card" key=${wk} style=${{marginBottom:14}}>
        <div class="card-pad" style=${{borderBottom:"1px solid #f0f0f0"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style=${{fontWeight:700,fontSize:14}}>${weekLabel(wk)}</div><div class="sub">${wkJobs.length} jobs</div></div>
            <div class=${"value big "+(t.net>=0?"green":"red")}>${money(t.net)}</div>
          </div>
        </div>
        <div class="card-row"><div class="label">Revenue</div><div class="value">${money(t.revenue)}</div></div>
        <div class="card-row"><div class="label">Direct Costs</div><div class="value red">${money(t.directCosts)}</div></div>
        <div class="card-row"><div class="label">Gross Profit</div><div class="value">${money(t.grossProfit)}</div></div>
        <div class="card-row"><div class="label">Weekly Fixed</div><div class="value red">${money(t.fixed)}</div></div>
        ${[{name:settings.owner1Name||"Owner 1",pct:settings.profitSplit1,amt:o1,active:ao1},{name:settings.owner2Name||"Owner 2",pct:settings.profitSplit2,amt:o2,active:ao2}].map((o,i)=>html`<div key=${i} class="card-row" style=${{background:"var(--s2)",opacity:o.active?1:0.4}}>
          <div><div class="label">${o.name}</div><div class="sub">${o.pct}% split</div></div>
          <div class=${"value "+(o.active&&o.amt>0?"green":"")}>${o.active?money(o.amt):"—"}</div>
        </div>`)}
        ${tax>0&&html`<div class="card-pad"><div class="tax-box" style=${{marginTop:0}}><div class="tax-lbl">💰 Tax Reserve (${settings.taxRate}%)</div><div class="tax-amt">${money(tax)}</div><div class="tax-hint">~${money(tax/2)} per owner</div></div></div>`}
      </div>`;
    })}
  </div></div>`;
}

// ── Inventory ─────────────────────────────────────────────────────────────────
function Inventory({inventory,setInventory,jobs}) {
  const inv=Array.isArray(inventory)?inventory:[];
  const jobsArr=Array.isArray(jobs)?jobs:[];
  const [search,setSearch]=useState('');
  const [editId,setEditId]=useState(null);
  // pendingRef holds new blank rows that haven't been saved to Firebase yet
  // This prevents the Firebase listener from wiping them
  const pendingRef=useRef([]);

  // Top 5 from job history
  const top5=useMemo(()=>{
    const stats={};
    jobsArr.forEach(j=>{ const s=(j.tireSize||'').trim(); if(!s) return; if(!stats[s]) stats[s]={size:s,jobs:0,qtySold:0,profit:0}; stats[s].jobs+=1; stats[s].qtySold+=Number(j.qty||1); stats[s].profit+=jobGrossProfit(j,{costPerMile:0.65}); });
    return Object.values(stats).sort((a,b)=>b.jobs!==a.jobs?b.jobs-a.jobs:b.profit-a.profit).slice(0,5);
  },[jobsArr]);
  const bestSellers=top5.map(t=>t.size);

  const sanitize=i=>({
    id:     String(i.id||uid()),
    size:   String(i.size||''),
    qty:    Math.max(0,Number(i.qty||0)),
    cost:   Number(i.cost||0),
    notes:  String(i.notes||''),
  });

  // Write one doc to Firebase (only when size is non-blank)
  const fbWrite=(item)=>{
    if(!_db||!item.size.trim()) return;
    fbSet(invCol(),item.id,{id:item.id,size:item.size,qty:item.qty,cost:item.cost,notes:item.notes});
  };

  const saveLocal=(next)=>{ persist(KEYS.inventory,next); };

  const saveInv=(next,changedId,deleted)=>{
    saveLocal(next);
    if(!_db) return;
    if(deleted){
      fbDel(invCol(),deleted);
      // Also remove from pendingRef if it was there
      pendingRef.current=pendingRef.current.filter(r=>r.id!==deleted);
    } else if(changedId){
      const item=next.find(i=>i.id===changedId);
      if(item&&item.size.trim()){
        fbWrite(item);
        // Move out of pendingRef once it has a size
        pendingRef.current=pendingRef.current.filter(r=>r.id!==changedId);
      }
    }
  };

  const update=(id,patch)=>{
    setInventory(prev=>{
      const next=prev.map(i=>i.id===id?sanitize({...i,...patch}):i);
      const item=next.find(i=>i.id===id);
      saveInv(next,id);
      // If item now has a size, remove from pendingRef
      if(item&&item.size.trim()){
        pendingRef.current=pendingRef.current.filter(r=>r.id!==id);
      } else {
        // Update pendingRef copy too
        pendingRef.current=pendingRef.current.map(r=>r.id===id?{...r,...patch}:r);
      }
      return next;
    });
  };

  const add=()=>{
    const id=uid();
    const newItem={id,size:'',qty:0,cost:0,notes:''};
    // Track in pendingRef so Firebase listener can't wipe it
    pendingRef.current=[newItem,...pendingRef.current];
    setInventory(prev=>{
      const next=[newItem,...prev];
      saveLocal(next);
      return next;
    });
    setEditId(id);
  };

  const remove=id=>{
    if(!window.confirm('Remove?'))return;
    pendingRef.current=pendingRef.current.filter(r=>r.id!==id);
    setInventory(prev=>{
      const next=prev.filter(i=>i.id!==id);
      saveInv(next,null,id);
      return next;
    });
    setEditId(null);
  };

  const step=(id,delta)=>{
    setInventory(prev=>{
      const next=prev.map(i=>i.id===id?sanitize({...i,qty:Math.max(0,(Number(i.qty)||0)+delta)}):i);
      saveInv(next,id);
      return next;
    });
  };

  // Deduped stats (for KPIs only — list shows all including pending blanks)
  const deduped=useMemo(()=>dedupeInventory(inv.filter(i=>i.size.trim())),[inv]);
  const totalQty=deduped.reduce((s,i)=>s+Number(i.qty||0),0);
  const totalValue=deduped.reduce((s,i)=>s+Number(i.qty||0)*Number(i.cost||0),0);
  const lowStock=deduped.filter(i=>Number(i.qty||0)>0&&Number(i.qty||0)<=LOW_STOCK);
  const outOfStock=deduped.filter(i=>Number(i.qty||0)===0);

  const filtered=search.trim()?inv.filter(i=>(i.size||'').toLowerCase().includes(search.toLowerCase())):inv;
  const sorted=[...filtered].sort((a,b)=>{
    // Blank (new/pending) rows always float to top
    const aBlank=!(a.size||'').trim(), bBlank=!(b.size||'').trim();
    if(aBlank&&!bBlank) return -1; if(!aBlank&&bBlank) return 1;
    const aBest=bestSellers.indexOf(a.size||''), bBest=bestSellers.indexOf(b.size||'');
    if(aBest!==-1&&bBest===-1) return -1; if(aBest===-1&&bBest!==-1) return 1;
    if(aBest!==-1&&bBest!==-1) return aBest-bBest;
    return (a.size||'').localeCompare(b.size||'');
  });

  return html`<div class="screen"><div class="page">

    <!-- Summary strip -->
    <div class="kpi-grid three">
      <div class="kpi">
        <div class="kpi-label">Total Tires</div>
        <div class="kpi-value">${totalQty}</div>
        <div class="kpi-sub">${deduped.length} sizes</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Stock Value</div>
        <div class="kpi-value" style=${{fontSize:16}}>${money(totalValue)}</div>
        <div class="kpi-sub">at cost</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Attention</div>
        <div class="kpi-value" style=${{fontSize:20,color:outOfStock.length>0?"var(--amber)":"var(--t3)"}}>${outOfStock.length+lowStock.length}</div>
        <div class="kpi-sub">need reorder</div>
      </div>
    </div>

    <!-- Alerts — quiet, not red-dominated -->
    ${(outOfStock.length>0||lowStock.length>0)&&html`<div style=${{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 18px",marginBottom:12}}>
      ${outOfStock.length>0&&html`<div style=${{marginBottom:lowStock.length>0?10:0}}>
        <div style=${{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:"1px",color:"var(--t3)",marginBottom:6}}>Out of Stock</div>
        <div style=${{display:"flex",flexWrap:"wrap",gap:6}}>
          ${outOfStock.map(i=>html`<span key=${i.id} style=${{background:"var(--s3)",color:"var(--t2)",padding:"4px 12px",borderRadius:999,fontSize:11,fontWeight:700}}>${i.size||"—"}</span>`)}
        </div>
      </div>`}
      ${lowStock.length>0&&html`<div>
        <div style=${{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:"1px",color:"var(--t3)",marginBottom:6}}>Low Stock</div>
        <div style=${{display:"flex",flexWrap:"wrap",gap:6}}>
          ${lowStock.map(i=>html`<span key=${i.id} style=${{background:"var(--amber-bg)",color:"var(--amber)",padding:"4px 12px",borderRadius:999,fontSize:11,fontWeight:700}}>${i.size} · ${i.qty}</span>`)}
        </div>
      </div>`}
    </div>`}

    <!-- Top 5 Best Sellers — premium insight section -->
    ${!search&&top5.length>0&&html`<div>
      <div class="section-label">Best Sellers — Insights</div>
      <div class="card">
        ${top5.map((t,i)=>{
          const inStock=inv.find(x=>x.size===t.size);
          const sq=inStock?Number(inStock.qty||0):0;
          const isFirst=i===0;
          return html`<div key=${t.size} style=${{
            display:"flex",alignItems:"center",padding:"15px 20px",
            borderBottom:i<top5.length-1?"1px solid var(--border2)":"none",
            background:isFirst?"rgba(192,149,74,.04)":"transparent"
          }}>
            <div style=${{
              width:28,height:28,borderRadius:9,flexShrink:0,marginRight:14,
              background:isFirst?"var(--gold)":"var(--s3)",
              color:isFirst?"var(--bg)":"var(--t3)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:11,fontWeight:800
            }}>${i+1}</div>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:"var(--t1)",letterSpacing:"-.3px"}}>${t.size}</div>
              <div style=${{fontSize:11,color:"var(--t3)",marginTop:2}}>${t.jobs} job${t.jobs!==1?"s":""} · ${t.qtySold} sold</div>
            </div>
            <div style=${{textAlign:"right"}}>
              <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:"var(--green)"}}>${money(t.profit)}</div>
              <div style=${{fontSize:10,marginTop:2,fontWeight:700,color:sq===0?"var(--t3)":sq<=LOW_STOCK?"var(--amber)":"var(--t3)"}}>
                ${sq===0?"out":sq<=LOW_STOCK?sq+" left":sq+" in stock"}
              </div>
            </div>
          </div>`;
        })}
      </div>
    </div>`}

    <!-- Search + Add row -->
    <div style=${{display:"flex",gap:8,marginBottom:12}}>
      <input value=${search} onChange=${e=>setSearch(e.target.value)}
        placeholder="Search by tire size…"
        style=${{
          flex:1,background:"var(--s2)",border:"1px solid var(--border)",
          borderRadius:12,padding:"13px 16px",fontSize:15,outline:"none",color:"var(--t1)"
        }}
      />
      <button class="btn primary" style=${{flexShrink:0,padding:"13px 20px",fontSize:14,borderRadius:12}} onClick=${add}>+ Add</button>
    </div>

    <!-- Inventory list -->
    ${sorted.length===0
      ? html`<${EmptyState} icon="🛞" title="No inventory" sub="Tap + Add to add a tire size."/>`
      : html`<div class="card">
        ${sorted.map((item,idx)=>{
          const isEditing=editId===item.id;
          const qty=Number(item.qty||0);
          const isLow=qty>0&&qty<=LOW_STOCK, isOut=qty===0;
          const isPending=!(item.size||'').trim();
          return html`<div key=${item.id} style=${{borderBottom:idx<sorted.length-1?"1px solid var(--border2)":"none",background:isPending?"rgba(192,149,74,.04)":"transparent"}}>
            <div style=${{display:"flex",alignItems:"center",padding:"14px 18px",gap:12,cursor:"pointer"}} onClick=${()=>setEditId(isEditing?null:item.id)}>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,
                  color:isPending?"var(--gold)":"var(--t1)",letterSpacing:"-.3px"
                }}>
                  ${isPending?html`<span style=${{fontSize:13,fontWeight:600}}>Enter tire size →</span>`:item.size}
                </div>
                ${item.cost>0&&html`<div style=${{fontSize:11,color:"var(--t3)",marginTop:2}}>Cost ${money(item.cost)} · Value ${money(qty*item.cost)}</div>`}
              </div>
              ${bestSellers.includes(item.size||'')&&!isPending&&html`<span style=${{fontSize:9,fontWeight:800,background:"var(--gold-bg)",color:"var(--gold)",borderRadius:999,padding:"3px 10px",letterSpacing:".3px",flexShrink:0}}>BEST</span>`}
              ${isOut&&!isPending&&html`<span style=${{fontSize:9,fontWeight:800,color:"var(--t3)",background:"var(--s3)",borderRadius:999,padding:"3px 10px",flexShrink:0}}>OUT</span>`}
              ${isLow&&!isOut&&html`<span style=${{fontSize:9,fontWeight:800,color:"var(--amber)",background:"var(--amber-bg)",borderRadius:999,padding:"3px 10px",flexShrink:0}}>LOW</span>`}
              <!-- Stepper -->
              <div style=${{display:"flex",alignItems:"center",gap:0,background:"var(--s3)",borderRadius:10,overflow:"hidden",flexShrink:0}} onClick=${e=>e.stopPropagation()}>
                <button onClick=${()=>step(item.id,-1)} style=${{background:"none",border:"none",width:36,height:36,fontSize:18,fontWeight:700,color:"var(--t2)",lineHeight:1}}>−</button>
                <div style=${{width:32,textAlign:"center",fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,fontSize:15,color:isOut?"var(--t3)":isLow?"var(--amber)":"var(--t1)"}}>${qty}</div>
                <button onClick=${()=>step(item.id,1)} style=${{background:"none",border:"none",width:36,height:36,fontSize:18,fontWeight:700,color:"var(--t2)",lineHeight:1}}>+</button>
              </div>
              <div style=${{color:"var(--t3)",fontSize:11,width:14,textAlign:"center"}}>${isEditing?"▲":"▼"}</div>
            </div>
            ${isEditing&&html`<div style=${{padding:"0 18px 16px",display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:10,alignItems:"end",background:"var(--s2)",borderTop:"1px solid var(--border2)"}}>
              <div>
                <div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1px",color:"var(--t3)",marginBottom:6}}>Tire Size</div>
                <input
                  autoFocus=${isPending}
                  value=${item.size}
                  onChange=${e=>update(item.id,{size:e.target.value})}
                  placeholder="e.g. 225/55R17"
                  style=${{border:"1px solid "+(isPending?"var(--gold)":"var(--border)"),borderRadius:10,padding:"11px 13px",fontSize:15,fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,outline:"none",width:"100%",background:"var(--s1)",color:"var(--t1)"}}
                />
              </div>
              <div>
                <div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1px",color:"var(--t3)",marginBottom:6}}>Cost ($)</div>
                <input value=${item.cost||""} type="number" min="0" onChange=${e=>update(item.id,{cost:Number(e.target.value||0)})} placeholder="0.00" style=${{border:"1px solid var(--border)",borderRadius:10,padding:"11px 13px",fontSize:14,outline:"none",width:"100%",background:"var(--s1)",color:"var(--t1)"}}/>
              </div>
              <button class="btn danger sm" style=${{alignSelf:"end",height:44}} onClick=${()=>remove(item.id)}>Remove</button>
              <div style=${{gridColumn:"1/3"}}>
                <div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1px",color:"var(--t3)",marginBottom:6}}>Notes</div>
                <input value=${item.notes} onChange=${e=>update(item.id,{notes:e.target.value})} placeholder="Optional" style=${{border:"1px solid var(--border)",borderRadius:10,padding:"11px 13px",fontSize:14,outline:"none",width:"100%",background:"var(--s1)",color:"var(--t1)"}}/>
              </div>
              <button class="btn secondary sm" style=${{height:44}} onClick=${()=>setEditId(null)}>Done ✓</button>
            </div>`}
          </div>`;
        })}
      </div>`}

  </div></div>`;
}


function Settings({settings,setSettings,jobs,setJobs,inventory,setInventory,expenses,onResetInventory}) {
  const upd=(k,v)=>setSettings(p=>({...p,[k]:v}));
  const updExp=(id,patch)=>setSettings(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...patch}:e)}));
  const addExp=()=>setSettings(p=>({...p,expenses:[...p.expenses,{id:uid(),name:"New Expense",amount:0,active:true}]}));
  const delExp=id=>setSettings(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
  const exportData=()=>{
    const d={jobs,settings,inventory,expenses,exportedAt:new Date().toISOString(),version:"5"};
    const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="wheel-rush-backup-"+TODAY()+".json"; a.click(); URL.revokeObjectURL(url);
  };
  const importData=()=>{
    const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
    inp.onchange=async e=>{ const file=e.target.files[0]; if(!file) return; try{const data=JSON.parse(await file.text()); if(Array.isArray(data.jobs))setJobs(data.jobs); if(data.settings&&typeof data.settings==="object")setSettings({...DEFAULT_SETTINGS,...data.settings}); alert("Import complete.");}catch{alert("Could not import.");} };
    inp.click();
  };
  const resetInventory=()=>{
    const curTotal=inventory.reduce((s,i)=>s+Number(i.qty||0),0);
    if(!window.confirm("Reset inventory to your 52-size list (91 tires)?\n\nCurrent: "+inventory.length+" sizes / "+curTotal+" tires\nNew: 52 sizes / 91 tires")) return;
    const fresh=DEFAULT_INVENTORY.map(i=>({id:i.id,size:i.size,qty:i.qty,cost:i.cost,notes:i.notes}));
    setInventory(fresh); persist(KEYS.inventory,fresh);
    if(onResetInventory) onResetInventory(fresh);
    alert("✅ Done! Inventory reset to 52 sizes / 91 tires.");
  };
  const clearAll=()=>{ if(!window.confirm("Clear ALL data? Cannot be undone."))return; Object.values(KEYS).forEach(k=>localStorage.removeItem(k)); window.location.reload(); };
  const exportCSV=()=>{
    const headers=["Date","Service","Area","Source","Revenue","Tire Cost","Misc Cost","Miles","Direct Cost","Gross Profit","Payment","Tire Size","Qty","Customer","Phone","Notes"];
    const rows=[...(jobs||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(j=>{ const dc=jobDirectCost(j,settings),gp=jobGrossProfit(j,settings); return [j.date,j.service,j.area,j.source||"",Number(j.revenue||0).toFixed(2),Number(j.tireCost||0).toFixed(2),Number(j.miscCost||0).toFixed(2),Number(j.miles||0).toFixed(1),dc.toFixed(2),gp.toFixed(2),j.payment,j.tireSize||"",j.qty||1,j.customerName||"",j.customerPhone||"",(j.note||"").replace(/,/g," ")].map(v=>'"'+v+'"').join(","); });
    const csv=[headers.join(",")].concat(rows).join("\n");
    const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="wheel-rush-"+TODAY()+".csv"; a.click(); URL.revokeObjectURL(url);
  };
  const monthly=monthlyFixed(settings), weekly=weeklyFixed(settings);
  const ao1=settings.owner1Active!==false, ao2=settings.owner2Active!==false;
  const splitTotal=(ao1?Number(settings.profitSplit1||0):0)+(ao2?Number(settings.profitSplit2||0):0);
  return html`<div class="screen"><div class="page">
    <div class="section-label" style=${{marginTop:0}}>Owners &amp; Split</div>
    <div class="card">
      ${[{nk:"owner1Name",pk:"profitSplit1",ak:"owner1Active",lbl:"Owner 1"},{nk:"owner2Name",pk:"profitSplit2",ak:"owner2Active",lbl:"Owner 2"}].map(({nk,pk,ak,lbl})=>{
        const active=settings[ak]!==false;
        return html`<div key=${nk} style=${{opacity:active?1:0.55}}>
          <div class="settings-row" style=${{alignItems:"flex-start"}}>
            <div style=${{flex:1}}>
              <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div class="label">${lbl}</div>
                <button onClick=${()=>upd(ak,!active)} style=${{border:"none",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",background:active?"var(--t1)":"var(--s3)",color:active?"var(--bg)":"var(--t3)"}}>${active?"● ON":"○ OFF"}</button>
              </div>
              <input class="settings-inp" style=${{width:"100%"}} value=${settings[nk]} onChange=${e=>upd(nk,e.target.value)} disabled=${!active}/>
            </div>
            <div style=${{flexShrink:0,marginLeft:12}}>
              <div class="label" style=${{marginBottom:6}}>Split %</div>
              <input type="number" class="settings-inp" style=${{width:80}} value=${settings[pk]} onChange=${e=>upd(pk,Number(e.target.value||0))} disabled=${!active}/>
            </div>
          </div>
        </div>`;
      })}
      ${ao1&&ao2&&splitTotal!==100&&html`<div class="card-pad" style=${{color:"#dc2626",fontSize:12,fontWeight:600}}>⚠️ Splits must add to 100% (currently ${splitTotal}%)</div>`}
    </div>
    <div class="section-label">Goals &amp; Tax</div>
    <div class="card">
      <div class="settings-row"><div><div class="label">Weekly Goal (Gross Profit)</div></div><input type="number" class="settings-inp" style=${{width:110}} value=${settings.weeklyGoal||""} onChange=${e=>upd("weeklyGoal",e.target.value===""?"":Number(e.target.value))}/></div>
      <div class="settings-row"><div><div class="label">Tax Rate (%)</div></div><input type="number" class="settings-inp" style=${{width:80}} value=${settings.taxRate||""} onChange=${e=>upd("taxRate",e.target.value===""?"":Number(e.target.value))}/></div>
    </div>
    <div class="section-label">Pricing &amp; Decision</div>
    <div class="card">
      <div class="settings-row"><div><div class="label">Repair Target Profit ($)</div></div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.repairTarget||""} onChange=${e=>upd("repairTarget",e.target.value===""?"":Number(e.target.value))}/></div>
      <div class="settings-row"><div><div class="label">Replacement Target ($)</div></div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.replacementTarget||""} onChange=${e=>upd("replacementTarget",e.target.value===""?"":Number(e.target.value))}/></div>
      <div class="settings-row"><div><div class="label">Too Low Below ($)</div></div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.skipThreshold||""} onChange=${e=>upd("skipThreshold",e.target.value===""?"":Number(e.target.value))}/></div>
      <div class="settings-row"><div><div class="label">Risky Beyond (miles)</div></div><input type="number" class="settings-inp" style=${{width:90}} value=${settings.riskyMiles||""} onChange=${e=>upd("riskyMiles",e.target.value===""?"":Number(e.target.value))}/></div>
      <div class="settings-row"><div><div class="label">Cost Per Mile ($)</div></div><input type="number" step="0.01" class="settings-inp" style=${{width:90}} value=${settings.costPerMile||""} onChange=${e=>upd("costPerMile",e.target.value===""?"":Number(e.target.value))}/></div>
    </div>
    <div class="section-label">Google Review Link</div>
    <div class="card"><div class="card-pad">
      <div class="label" style=${{marginBottom:6}}>Your Google Review URL</div>
      <input class="settings-inp" style=${{width:"100%"}} value=${settings.googleReviewUrl||""} onChange=${e=>upd("googleReviewUrl",e.target.value)} placeholder="https://g.page/r/…/review"/>
      ${(settings.googleReviewUrl||"").trim()&&html`<button class="btn success sm" style=${{marginTop:10,width:"100%"}} onClick=${()=>window.open(settings.googleReviewUrl,"_blank")}>✓ Test Link</button>`}
    </div></div>
    <div class="section-label">Monthly Fixed Expenses</div>
    <div class="card">
      ${(settings.expenses||[]).map(exp=>html`<div class="expense-row" key=${exp.id}>
        <input value=${exp.name} onChange=${e=>updExp(exp.id,{name:e.target.value})} placeholder="Expense name"/>
        <input type="number" value=${exp.amount} onChange=${e=>updExp(exp.id,{amount:Number(e.target.value||0)})} placeholder="0"/>
        <button class=${"btn sm "+(exp.active?"success":"secondary")} onClick=${()=>updExp(exp.id,{active:!exp.active})}>${exp.active?"On":"Off"}</button>
        <button class="btn danger sm" onClick=${()=>delExp(exp.id)}>×</button>
      </div>`)}
      <div class="card-row"><button class="btn secondary sm" onClick=${addExp}>+ Add</button><div style=${{textAlign:"right"}}><div class="value">${money(monthly)}/mo</div><div class="sub">${money(weekly)}/wk</div></div></div>
    </div>
    <div class="section-label">Data &amp; Export</div>
    <div class="card">
      <div class="card-row"><div><div class="label">Export CSV</div><div class="sub">QuickBooks / Excel</div></div><button class="btn secondary sm" onClick=${exportCSV}>CSV</button></div>
      <div class="card-row"><div><div class="label">Export Full Backup</div></div><button class="btn secondary sm" onClick=${exportData}>JSON</button></div>
      <div class="card-row"><div><div class="label">Import Backup</div></div><button class="btn secondary sm" onClick=${importData}>Import</button></div>
      <div class="card-row"><div><div class="label">Reset Inventory to My List</div><div class="sub">91 tires · 52 sizes</div></div><button class="btn orange sm" onClick=${resetInventory}>Reset Stock</button></div>
      <div class="card-row"><div><div class="label">Reset Everything</div><div class="sub" style=${{color:"#dc2626"}}>Cannot be undone</div></div><button class="btn danger sm" onClick=${clearAll}>Reset</button></div>
    </div>
    <div style=${{padding:"8px 0 4px",textAlign:"center",fontSize:11,color:"#ccc"}}>Wheel Rush v6 · No Babel · Firebase Sync</div>
  </div></div>`;
}

// ── App (root) ────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]           = useState(null);
  const [authReady,setAuthReady] = useState(false);
  const [tab,setTab]             = useState("dashboard");
  const [jobs,setJobs]           = useState(()=>migrateOldJobs());
  const [settings,setSettings]   = useState(()=>({...DEFAULT_SETTINGS,...load(KEYS.settings,{})}));
  const [inventory,setInventory] = useState([]);
  const [expenses,setExpenses]   = useState(()=>load(KEYS.expenses,[]));
  const [prefill,setPrefill]     = useState(null);
  const [editJob,setEditJob]     = useState(null);
  const [sync,setSync]           = useState("local");
  const [saving,setSaving]       = useState(false);
  const settingsLoadedRef        = useRef(false);

  useEffect(()=>{
    let authUnsub=null, cancelled=false;
    const giveUp=setTimeout(()=>{ if(!cancelled) setAuthReady(true); },12000);
    const attachFirestore=u=>{
      if(!u||!_db) return;
      setSync("syncing");
      // Jobs listener
      const u1=fbListen(jobCol(),docs=>{
        if(docs.length>0){
          const fbIds=new Set(docs.map(d=>String(d.id)));
          const queue=load("wr2-upload-queue",[]);
          const toUp=queue.filter(j=>!fbIds.has(String(j.id)));
          if(toUp.length>0){toUp.forEach(j=>fbSet(jobCol(),j.id,j));persist("wr2-upload-queue",[]);}
          setJobs(docs);
        } else {
          const local=load(KEYS.jobs,[]);
          if(local.length>0){local.forEach(j=>fbSet(jobCol(),j.id,j));persist("wr2-upload-queue",[]);}
          setJobs(local);
        }
        setSync("connected");
      });
      // Inventory listener — Firebase is source of truth when signed in
      const u2=fbListen(invCol(),docs=>{
        // Sanitize and filter junk
        const clean=docs.map(d=>({id:String(d.id||""),size:(d.size||"").trim(),qty:Math.max(0,Number(d.qty||0)),cost:Number(d.cost||0),notes:String(d.notes||"")})).filter(d=>d.size!=="");
        if(clean.length===0){
          // Seed Firebase with defaults
          const fresh=DEFAULT_INVENTORY.map(i=>({id:i.id,size:i.size,qty:i.qty,cost:i.cost,notes:i.notes}));
          if(_db){const b=_db.batch();docs.forEach(d=>b.delete(invCol().doc(d.id)));fresh.forEach(i=>b.set(invCol().doc(i.id),i));b.commit().catch(()=>{});}
          setInventory(fresh); persist(KEYS.inventory,fresh); return;
        }
        // Deduplicate by normalized size
        const canonical={};
        clean.forEach(d=>{ const key=d.size.toLowerCase().replace(/\s+/g,""); if(!canonical[key]) canonical[key]={...d}; else { const dCan=/^inv\d+$/.test(d.id),eCan=/^inv\d+$/.test(canonical[key].id); if(dCan&&!eCan) canonical[key]={...d,qty:Math.max(d.qty,canonical[key].qty)}; else {canonical[key].qty=Math.max(canonical[key].qty,d.qty);if(!canonical[key].cost&&d.cost)canonical[key].cost=d.cost;} } });
        const deduped=Object.values(canonical);
        const hasDups=clean.length>deduped.length;
        const totalQty=deduped.reduce((s,d)=>s+d.qty,0);
        const inflated=totalQty>150;
        // Preserve pending local rows (blank size)
        const pendingLocal=load(KEYS.inventory,[]).filter(l=>!l.size||l.size==="");
        if(hasDups||inflated){
          const toWrite=inflated?DEFAULT_INVENTORY.map(i=>({id:i.id,size:i.size,qty:i.qty,cost:i.cost,notes:i.notes})):deduped;
          if(_db){const b=_db.batch();docs.forEach(d=>b.delete(invCol().doc(d.id)));toWrite.forEach(i=>b.set(invCol().doc(i.id),i));b.commit().catch(()=>{});}
          const merged=pendingLocal.length>0?[...pendingLocal,...toWrite.filter(d=>!pendingLocal.find(l=>l.id===d.id))]:toWrite;
          setInventory(merged); persist(KEYS.inventory,merged);
        } else {
          const merged=pendingLocal.length>0?[...pendingLocal,...deduped.filter(d=>!pendingLocal.find(l=>l.id===d.id))]:deduped;
          setInventory(merged); persist(KEYS.inventory,merged);
        }
      });
      const u3=fbListen(expCol(),docs=>setExpenses(docs));
      const sDoc=settingDoc();
      if(sDoc){
        sDoc.get().then(snap=>{
          if(snap.exists){setSettings(()=>({...DEFAULT_SETTINGS,...snap.data()}));setTimeout(()=>settingsLoadedRef.current=true,100);}
          else{const local=load(KEYS.settings,{});sDoc.set({...DEFAULT_SETTINGS,...local}).catch(()=>{});settingsLoadedRef.current=true;}
        }).catch(()=>{});
      }
    };
    const init=()=>{
      if(cancelled) return;
      if(!_auth||!_db){setTimeout(init,100);return;}
      clearTimeout(giveUp);
      authUnsub=_auth.onAuthStateChanged(u=>{
        if(cancelled) return;
        setUser(u||null); setAuthReady(true);
        attachFirestore(u);
        if(!u){setSync("local");settingsLoadedRef.current=true;const local=load(KEYS.inventory,[]);setInventory(local.length>0?local:DEFAULT_INVENTORY);}
      });
    };
    init();
    return ()=>{cancelled=true;clearTimeout(giveUp);if(authUnsub)authUnsub();};
  },[]);

  // Persist settings changes
  useEffect(()=>{
    persist(KEYS.settings,settings);
    if(!settingsLoadedRef.current) return;
    const t=setTimeout(()=>{const doc=settingDoc();if(user&&doc)doc.set(settings).catch(()=>{});},1000);
    return ()=>clearTimeout(t);
  },[settings,user]);

  const deleteJob=useCallback(id=>{
    setJobs(prev=>{const next=prev.filter(j=>j.id!==id);persist(KEYS.jobs,next);return next;});
    if(user) fbDel(jobCol(),id);
    const q=load("wr2-upload-queue",[]);
    if(q.some(j=>j.id===id)) persist("wr2-upload-queue",q.filter(j=>j.id!==id));
  },[user]);

  const saveJob=useCallback(async(job,andAdd)=>{
    setSaving(true);
    try{
      // Decrement inventory if replacement
      const isRepl=/replacement|installation/i.test(job.service||"");
      if(isRepl&&job.tireSize){
        setInventory(prev=>{
          const next=prev.map(item=>{
            if(item.size.toLowerCase()===job.tireSize.toLowerCase()&&Number(item.qty||0)>0)
              return {...item,qty:Math.max(0,Number(item.qty||0)-Number(job.qty||1))};
            return item;
          });
          persist(KEYS.inventory,next);
          if(user&&_db){const changed=next.find(i=>i.size.toLowerCase()===job.tireSize.toLowerCase());if(changed)fbSet(invCol(),changed.id,{id:changed.id,size:changed.size,qty:changed.qty,cost:changed.cost,notes:changed.notes});}
          return next;
        });
      }
      const entry=sanitizeJob(job);
      setJobs(prev=>{const next=[entry,...prev.filter(j=>j.id!==entry.id)];persist(KEYS.jobs,next);return next;});
      if(user) await fbSet(jobCol(),entry.id,entry);
      else{const q=load("wr2-upload-queue",[]);persist("wr2-upload-queue",[entry,...q.filter(j=>j.id!==entry.id)]);}
      setEditJob(null);
      if(!andAdd) setTab("dashboard");
    } finally{setSaving(false);}
  },[user]);

  const handleEdit=useCallback(job=>{
    if(job._markPaidOnly){const updated=sanitizeJob({...job,status:"Completed"});delete updated._markPaidOnly;saveJob(updated,true);return;}
    setEditJob(job);setTab("add");
  },[saveJob]);

  const signOut=async()=>{ try{await _auth.signOut();setUser(null);setSync("local");}catch{} };

  const NAV=[{id:"dashboard",ico:"📊",label:"Home"},{id:"add",ico:"＋",label:"Add"},{id:"history",ico:"📋",label:"History"},{id:"payouts",ico:"💰",label:"Payouts"},{id:"expenses",ico:"🧾",label:"Expenses"},{id:"inventory",ico:"🛞",label:"Stock"},{id:"settings",ico:"⚙️",label:"Settings"}];

  if(!authReady) return html`<div style=${{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#111",flexDirection:"column",gap:14}}>
    <div style=${{fontSize:48}}>🛞</div>
    <div style=${{color:"#444",fontSize:13,fontFamily:"\"IBM Plex Sans\",sans-serif"}}>Loading…</div>
  </div>`;
  if(!user) return html`<${AuthScreen} onAuth=${u=>setUser(u)}/>`;

  return html`<div class="app">
    <${Header} syncStatus=${sync} onSignOut=${signOut}/>
    ${tab==="dashboard"&&html`<${Dashboard} jobs=${jobs} settings=${settings} setTab=${setTab} onRepeat=${j=>{setPrefill(j);setTab("add");}} inventory=${inventory}/>`}
    ${tab==="add"&&html`<${AddJob} onSave=${saveJob} settings=${settings} jobs=${jobs} prefill=${prefill} onClearPrefill=${()=>setPrefill(null)} editJob=${editJob} onClearEdit=${()=>setEditJob(null)} saving=${saving}/>`}
    ${tab==="history"&&html`<${History} jobs=${jobs} settings=${settings} onRepeat=${j=>{setPrefill(j);setTab("add");}} onDelete=${deleteJob} onEdit=${handleEdit}/>`}
    ${tab==="payouts"&&html`<${Payouts} jobs=${jobs} settings=${settings}/>`}
    ${tab==="expenses"&&html`<${Expenses} expenses=${expenses} setExpenses=${e=>{setExpenses(e);if(user)e.forEach(x=>fbSet(expCol(),x.id,{id:String(x.id||""),date:String(x.date||""),category:String(x.category||""),amount:Number(x.amount||0),note:String(x.note||"")}));}}/>`}
    ${tab==="inventory"&&html`<${Inventory} inventory=${inventory} setInventory=${setInventory} jobs=${jobs}/>`}
    ${tab==="settings"&&html`<${Settings} settings=${settings} setSettings=${setSettings} jobs=${jobs} setJobs=${setJobs} inventory=${inventory} setInventory=${setInventory} expenses=${expenses} onResetInventory=${fresh=>{
      if(user&&_db){invCol().get().then(snap=>{const b=_db.batch();snap.docs.forEach(d=>b.delete(d.ref));fresh.forEach(i=>b.set(invCol().doc(i.id),i));return b.commit();}).catch(()=>{});}
    }}/>`}
    <nav class="bottom-nav">
      ${NAV.map(item=>html`<button key=${item.id} class=${"nav-btn"+(tab===item.id?" active":"")} onClick=${()=>setTab(item.id)}><span class="ico">${item.ico}</span>${item.label}</button>`)}
    </nav>
  </div>`;
}



ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
