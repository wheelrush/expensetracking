<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wheel Rush" />
  <meta name="theme-color" content="#111111" />
  <title>Wheel Rush — Business Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
  <link rel="manifest" href="./manifest.json">
<style>
  /* ═══════════════════════════════════════════════════════════════
     WHEEL RUSH — PREMIUM OPERATOR OS  v10 (Pro Edition)
     Premium dark · Blue accent · Orange CTA · Animated · Pro Dashboard
     ═══════════════════════════════════════════════════════════════ */
  :root {
    --bg:       #0a0a0f;
    --s1:       #13131a;
    --s2:       #1c1c26;
    --s3:       #242432;
    --s4:       #2e2e40;
    --border:   rgba(255,255,255,.06);
    --border2:  rgba(255,255,255,.03);
    --t1: #f0f0fa;
    --t2: #8888a8;
    --t3: #44445a;
    --blue:     #4f8ef7;
    --blue-dim: rgba(79,142,247,.12);
    --blue-glow:rgba(79,142,247,.25);
    --orange:   #ff7d3b;
    --orange-dim:rgba(255,125,59,.12);
    --orange-glow:rgba(255,125,59,.3);
    --green:    #22c55e;
    --green-dim:rgba(34,197,94,.12);
    --red:      #ef4444;
    --red-dim:  rgba(239,68,68,.10);
    --amber:    #f59e0b;
    --amber-dim:rgba(245,158,11,.10);
    --gold:     #c8a44a;
    --gold-dim: rgba(200,164,74,.12);
    --r1: 22px;
    --r2: 16px;
    --r3: 12px;
    --r4: 8px;
    --sh-card:  0 1px 0 rgba(255,255,255,.04) inset, 0 4px 24px rgba(0,0,0,.5);
    --sh-hero:  0 0 0 1px rgba(79,142,247,.2), 0 8px 40px rgba(79,142,247,.15);
    --sh-cta:   0 0 0 1px rgba(255,125,59,.25), 0 8px 32px rgba(255,125,59,.2);
    --sh-float: 0 12px 48px rgba(0,0,0,.7);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body,#root { height:100%; font-family:"IBM Plex Sans",sans-serif; background:var(--bg); overflow:hidden; color:var(--t1); }
  input,select,textarea,button { font-family:"IBM Plex Sans",sans-serif; }
  input,select,textarea { font-size:16px !important; color:var(--t1); }
  button { cursor:pointer; }
  .app    { height:100%; display:flex; flex-direction:column; }
  .screen { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; background:var(--bg); }
  .page   { padding:20px 16px calc(120px + env(safe-area-inset-bottom)); }

  /* ══ PREMIUM ANIMATIONS ══════════════════════════════════════════ */
  @keyframes fadeSlideUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeSlideIn {
    from { opacity:0; transform:translateX(-12px); }
    to   { opacity:1; transform:translateX(0); }
  }
  @keyframes scaleIn {
    from { opacity:0; transform:scale(.92); }
    to   { opacity:1; transform:scale(1); }
  }
  @keyframes shimmer {
    0%   { background-position:-200% center; }
    100% { background-position:200% center; }
  }
  @keyframes ringPulse {
    0%,100% { filter:drop-shadow(0 0 3px currentColor); }
    50%     { filter:drop-shadow(0 0 10px currentColor); }
  }
  @keyframes countUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes heroGlow {
    0%,100% { opacity:.6; }
    50%     { opacity:1; }
  }
  @keyframes confettiDrop {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(100px) rotate(360deg); opacity:0; }
  }
  @keyframes tickerScroll {
    0%   { transform:translateY(100%); opacity:0; }
    15%  { transform:translateY(0); opacity:1; }
    85%  { transform:translateY(0); opacity:1; }
    100% { transform:translateY(-100%); opacity:0; }
  }
  @keyframes gradientShift {
    0%   { background-position:0% 50%; }
    50%  { background-position:100% 50%; }
    100% { background-position:0% 50%; }
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes logoPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.94)} }
  .syncing    { animation:pulse 1.4s infinite; }
  .logo-pulse { animation:logoPulse 2s ease-in-out infinite; }

  /* Page transition wrapper */
  .page-enter { animation: fadeSlideUp .35s cubic-bezier(.4,0,.2,1) both; }

  /* Card entrance stagger */
  .card-anim { animation: fadeSlideUp .4s cubic-bezier(.4,0,.2,1) both; }
  .card-anim:nth-child(1) { animation-delay:.05s; }
  .card-anim:nth-child(2) { animation-delay:.1s; }
  .card-anim:nth-child(3) { animation-delay:.15s; }
  .card-anim:nth-child(4) { animation-delay:.2s; }
  .card-anim:nth-child(5) { animation-delay:.25s; }
  .card-anim:nth-child(6) { animation-delay:.3s; }

  /* Micro-interactions */
  .press-scale { transition:transform .1s, opacity .1s; }
  .press-scale:active { transform:scale(.96); opacity:.85; }

  /* Shimmer loader */
  .shimmer-text {
    background:linear-gradient(90deg, var(--t1) 25%, var(--blue) 50%, var(--t1) 75%);
    background-size:200% auto;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
  }

  /* ── Header ── */
  .header-compact {
    background: linear-gradient(180deg, #16161f 0%, #0f0f17 100%);
    padding: 12px 18px;
    padding-top: calc(12px + env(safe-area-inset-top));
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    flex-shrink:0;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(79,142,247,.1);
  }
  .header-compact h1 { font-size:16px; font-weight:700; letter-spacing:-.4px; color:var(--t1); }
  .header-compact p  { font-size:10px; color:var(--t3); margin-top:2px; }

  /* ══ PRO DASHBOARD HERO ══════════════════════════════════════════ */
  .pro-hero {
    background: linear-gradient(145deg, #12121e 0%, #0d1020 40%, #101828 100%);
    border:1px solid rgba(79,142,247,.15);
    border-radius:var(--r1); padding:24px 22px;
    position:relative; overflow:hidden;
    box-shadow: 0 0 0 1px rgba(79,142,247,.08), 0 12px 48px rgba(0,0,0,.6), 0 0 80px rgba(79,142,247,.06);
    margin-bottom:16px;
  }
  .pro-hero::before {
    content:''; position:absolute;
    top:-60px; right:-40px; width:220px; height:220px;
    background:radial-gradient(circle, rgba(79,142,247,.1) 0%, transparent 65%);
    pointer-events:none; animation:heroGlow 4s ease-in-out infinite;
  }
  .pro-hero::after {
    content:''; position:absolute;
    bottom:-40px; left:-30px; width:160px; height:160px;
    background:radial-gradient(circle, rgba(34,197,94,.06) 0%, transparent 65%);
    pointer-events:none;
  }

  /* Revenue ticker */
  .revenue-ticker {
    font-family:"IBM Plex Mono",monospace;
    font-size:38px; font-weight:700; letter-spacing:-2px;
    line-height:1; color:var(--t1);
    text-shadow:0 0 30px rgba(255,255,255,.1);
    animation:countUp .6s cubic-bezier(.4,0,.2,1) both;
  }
  .revenue-ticker .currency { font-size:22px; color:var(--t2); font-weight:600; }

  /* Progress Ring */
  .progress-ring { position:relative; display:inline-flex; align-items:center; justify-content:center; }
  .progress-ring svg { transform:rotate(-90deg); }
  .progress-ring-bg { fill:none; stroke:var(--s4); }
  .progress-ring-fill {
    fill:none; stroke-linecap:round;
    transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
    filter:drop-shadow(0 0 6px currentColor);
  }
  .progress-ring-label {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }

  /* ── Section labels ── */
  .section-label {
    font-size:9px; font-weight:800; text-transform:uppercase;
    letter-spacing:1.8px; color:var(--t3); margin:28px 0 10px;
  }
  .section-label:first-child { margin-top:0; }

  /* ── Card system ── */
  .card {
    background:var(--s1); border-radius:var(--r1); overflow:hidden;
    box-shadow:var(--sh-card); border:1px solid var(--border); margin-bottom:12px;
    transition:transform .2s, box-shadow .2s;
  }
  .card:hover { box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 8px 32px rgba(0,0,0,.6); }
  .card-pad  { padding:18px 20px; }
  .card-row  { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:15px 20px; border-bottom:1px solid var(--border2); }
  .card-row:last-child { border-bottom:none; }

  /* ── Hero CTA ── */
  .hero-cta {
    background: linear-gradient(135deg, #1a1a28 0%, #14141e 100%);
    border:1px solid rgba(79,142,247,.2);
    border-radius:var(--r1); padding:20px;
    box-shadow:var(--sh-hero);
    margin-bottom:14px;
    position:relative; overflow:hidden;
  }
  .hero-cta::before {
    content:''; position:absolute;
    top:-40px; right:-40px; width:180px; height:180px;
    background:radial-gradient(circle, rgba(79,142,247,.12) 0%, transparent 70%);
    pointer-events:none;
  }

  /* ── Orange action button / CTA ── */
  .cta-btn {
    background: linear-gradient(135deg, #ff8c4b 0%, #ff6420 100%);
    color:#fff; border:none; border-radius:var(--r3);
    padding:15px 22px; font-size:15px; font-weight:800;
    letter-spacing:-.2px; box-shadow:var(--sh-cta);
    transition:opacity .15s, transform .15s, box-shadow .15s;
    display:flex; align-items:center; gap:8px; justify-content:center;
    width:100%;
  }
  .cta-btn:active { opacity:.85; transform:scale(.97); box-shadow:0 0 0 1px rgba(255,125,59,.4), 0 4px 16px rgba(255,125,59,.3); }

  /* ── KPI grids ── */
  .kpi-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:1px; background:var(--border);
    border-radius:var(--r1); overflow:hidden; margin-bottom:12px;
    box-shadow:var(--sh-card);
  }
  .kpi-grid.three { grid-template-columns:1fr 1fr 1fr; }
  .kpi { background:var(--s1); padding:17px 16px 15px; }
  .kpi-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--t3); margin-bottom:8px; }
  .kpi-value { font-family:"IBM Plex Mono",monospace; font-size:20px; font-weight:700; line-height:1; letter-spacing:-.8px; color:var(--t1); }
  .kpi-value.green  { color:var(--green); }
  .kpi-value.red    { color:var(--red); }
  .kpi-value.blue   { color:var(--blue); }
  .kpi-sub  { font-size:10px; color:var(--t3); margin-top:6px; font-weight:500; }

  /* ── Mini stat strip ── */
  .mini-grid {
    display:grid; grid-template-columns:repeat(4,1fr);
    gap:1px; background:var(--border);
    border-radius:var(--r1); overflow:hidden; margin-bottom:12px;
    box-shadow:var(--sh-card);
  }
  .mini-box { background:var(--s1); padding:15px 8px; text-align:center; }
  .mini-box strong { display:block; font-family:"IBM Plex Mono",monospace; font-size:15px; font-weight:700; color:var(--t1); letter-spacing:-.3px; }
  .mini-box span   { display:block; font-size:8px; color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-top:5px; font-weight:700; }

  /* ── Goal track ── */
  .goal-track { height:3px; background:var(--s4); border-radius:999px; overflow:hidden; margin:14px 0 8px; }
  .goal-fill  { height:100%; border-radius:999px; transition:width .7s cubic-bezier(.4,0,.2,1); }
  .goal-fill.full  { background:var(--green); box-shadow:0 0 8px var(--green); }
  .goal-fill.mid   { background:var(--blue);  box-shadow:0 0 8px var(--blue-glow); }
  .goal-fill.low   { background:var(--amber); }

  /* ── Stack / job rows ── */
  .stack { display:grid; gap:10px; }
  .job-row {
    background:var(--s1); border-radius:var(--r2); padding:15px 17px;
    display:flex; align-items:flex-start; gap:13px;
    box-shadow:var(--sh-card); border:1px solid var(--border);
    transition:transform .15s, box-shadow .15s;
  }
  .job-row:active { transform:scale(.985); }
  .job-icon  { width:42px; height:42px; border-radius:12px; background:var(--s3); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
  .job-main  { flex:1; min-width:0; }
  .job-title { font-size:14px; font-weight:700; color:var(--t1); letter-spacing:-.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-meta  { font-size:11px; color:var(--t3); margin-top:3px; line-height:1.6; }
  .job-right { text-align:right; flex-shrink:0; }

  /* ── Pending banner ── */
  .pending-banner {
    background:var(--gold-dim); border:1px solid rgba(200,164,74,.2);
    border-radius:var(--r2); padding:15px 18px; margin-bottom:12px;
    display:flex; justify-content:space-between; align-items:center;
    box-shadow:0 0 20px rgba(200,164,74,.08);
  }
  .pending-banner-title { font-size:13px; font-weight:700; color:var(--gold); }
  .pending-banner-sub   { font-size:11px; color:rgba(200,164,74,.6); margin-top:3px; font-weight:600; }

  /* ── Source bars ── */
  .source-bar         { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border2); }
  .source-bar:last-child { border-bottom:none; }
  .source-bar-track   { flex:1; height:2px; background:var(--s4); border-radius:999px; overflow:hidden; }
  .source-bar-fill    { height:100%; background:var(--blue); border-radius:999px; box-shadow:0 0 6px var(--blue-glow); transition:width .8s cubic-bezier(.4,0,.2,1); }

  /* ── Typography helpers ── */
  .label { font-size:11px; color:var(--t2); font-weight:500; }
  .sub   { font-size:11px; color:var(--t3); font-weight:500; }
  .mono  { font-family:"IBM Plex Mono",monospace; }
  .value { font-family:"IBM Plex Mono",monospace; font-size:14px; font-weight:700; color:var(--t1); }
  .value.big    { font-size:22px; }
  .value.green  { color:var(--green); }
  .value.red    { color:var(--red); }
  .value.orange { color:var(--orange); }
  .sub.green    { color:var(--green); font-weight:700; }
  .sub.red      { color:var(--red);   font-weight:700; }
  .sub.orange   { color:var(--orange); font-weight:700; }

  /* ── Pills ── */
  .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:10px; font-weight:800; line-height:1.5; letter-spacing:.2px; }
  .pill.green  { background:var(--green-dim); color:var(--green); }
  .pill.red    { background:var(--red-dim);   color:var(--red); }
  .pill.orange { background:var(--orange-dim);color:var(--orange); }
  .pill.gray   { background:var(--s3);        color:var(--t2); }
  .pill.blue   { background:var(--blue-dim);  color:var(--blue); }
  .pill.gold   { background:var(--gold-dim);  color:var(--gold); }

  /* ── Fields ── */
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; color:var(--t2); margin-bottom:8px; }
  .field input, .field select, .field textarea {
    width:100%; border:1px solid var(--border); background:var(--s3);
    border-radius:var(--r3); padding:13px 15px; outline:none;
    transition:border-color .15s, box-shadow .15s; color:var(--t1);
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }
  .field select option { background:var(--s2); color:var(--t1); }
  .field textarea { min-height:72px; resize:vertical; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  /* ── Chips ── */
  .chip-row { display:flex; flex-wrap:wrap; gap:7px; margin-top:2px; }
  .chip { border:1px solid var(--border); background:var(--s3); border-radius:999px; padding:8px 14px; font-size:12px; font-weight:700; color:var(--t2); transition:all .15s; }
  .chip.active { background:var(--blue-dim); color:var(--blue); border-color:rgba(79,142,247,.3); transform:scale(1.03); }
  .chip.sm { padding:6px 12px; font-size:11px; }

  /* ── City ── */
  .city-input-wrap  { position:relative; }
  .city-dropdown    { position:absolute; top:calc(100%+6px); left:0; right:0; background:var(--s2); border:1px solid var(--border); border-radius:var(--r2); box-shadow:var(--sh-float); z-index:200; max-height:240px; overflow-y:auto; animation:fadeSlideUp .2s ease; }
  .city-option      { padding:13px 16px; font-size:14px; border-bottom:1px solid var(--border2); cursor:pointer; display:flex; align-items:center; gap:8px; color:var(--t1); transition:background .1s; }
  .city-option:last-child { border-bottom:none; }
  .city-option:active { background:var(--s3); }
  .city-section-head{ padding:8px 16px 4px; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--t3); background:var(--s3); }

  /* ── Quick quote ── */
  .quote-box {
    background: linear-gradient(135deg, var(--s2) 0%, #181824 100%);
    border-radius:var(--r1); padding:18px; margin-bottom:14px;
    border:1px solid rgba(79,142,247,.15);
    box-shadow: 0 0 0 1px rgba(79,142,247,.06), var(--sh-card);
  }
  .qq-suggested       { text-align:center; padding:14px 10px 12px; border-bottom:1px solid var(--border2); }
  .qq-suggested-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.4px; color:var(--t3); margin-bottom:6px; }
  .qq-suggested-price { font-family:"IBM Plex Mono",monospace; font-size:42px; font-weight:700; color:var(--t1); line-height:1; letter-spacing:-2px; animation:countUp .4s ease both; }
  .qq-dec-badge       { display:inline-flex; align-items:center; gap:5px; padding:5px 14px; border-radius:999px; font-size:11px; font-weight:800; margin-top:10px; }
  .qq-dec-badge.take  { background:var(--green-dim); color:var(--green); }
  .qq-dec-badge.raise { background:var(--amber-dim); color:var(--amber); }
  .qq-dec-badge.low   { background:var(--red-dim);   color:var(--red); }
  .qq-apply-row       { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:12px; }
  .qq-apply-btn       { border:none; border-radius:var(--r3); padding:10px 4px; font-size:11px; font-weight:800; cursor:pointer; line-height:1.3; transition:all .15s; }
  .qq-apply-btn:active{ opacity:.75; transform:scale(.95); }
  .qq-apply-btn.suggested { background:var(--green-dim); color:var(--green); border:1px solid rgba(34,197,94,.2); }
  .qq-apply-btn.premium   { background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,125,59,.2); }
  .qq-apply-btn.custom    { background:var(--s3); color:var(--t2); border:1px solid var(--border); }
  .qq-apply-btn.active-sel{ outline:1.5px solid currentColor; outline-offset:2px; }

  /* ── Src / pay grids ── */
  .src-grid { display:flex; flex-wrap:wrap; gap:7px; margin-top:4px; }
  .src-btn  { border:1px solid var(--border); background:var(--s3); border-radius:var(--r3); padding:9px 12px; font-size:12px; font-weight:700; color:var(--t2); transition:all .15s; display:flex; align-items:center; gap:5px; }
  .src-btn.active { background:var(--blue-dim); color:var(--blue); border-color:rgba(79,142,247,.3); transform:scale(1.03); }
  .pay-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px; }
  .pay-btn  { border:1px solid var(--border); border-radius:var(--r2); padding:11px 4px; background:var(--s3); display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:700; color:var(--t2); transition:all .15s; }
  .pay-btn.active { background:var(--blue-dim); color:var(--blue); border-color:rgba(79,142,247,.3); transform:scale(1.03); }
  .pay-btn .pay-icon { font-size:18px; }

  /* ── Sticky save ── */
  .sticky-save {
    position:sticky; bottom:0; left:0; right:0;
    background:linear-gradient(180deg, rgba(10,10,15,.0) 0%, #0a0a0f 12px);
    padding:0 16px 0; padding-bottom:calc(0px + env(safe-area-inset-bottom));
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    z-index:50; padding-top:0;
  }
  .sticky-save::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:var(--border);
  }

  /* ── Buttons ── */
  .btn { border:none; border-radius:var(--r3); padding:15px 18px; font-weight:700; font-size:14px; transition:all .15s; letter-spacing:-.1px; }
  .btn:active { opacity:.8; transform:scale(.97); }
  .btn.primary   { background:linear-gradient(135deg,#5a97ff,#3d7ef5); color:#fff; box-shadow:0 4px 16px rgba(79,142,247,.3); }
  .btn.secondary { background:var(--s3); color:var(--t2); border:1px solid var(--border); }
  .btn.sm  { padding:9px 14px; font-size:12px; border-radius:var(--r4); }
  .btn.xs  { padding:6px 10px; font-size:11px; border-radius:7px; font-weight:700; }
  .btn.danger  { background:var(--red-dim);   color:var(--red); }
  .btn.success { background:var(--green-dim); color:var(--green); }
  .btn.blue    { background:var(--blue-dim);  color:var(--blue); }
  .btn.orange  { background:var(--orange-dim);color:var(--orange); }
  .btn.gold    { background:var(--gold-dim);  color:var(--gold); }

  /* ── Form groups ── */
  .form-group { background:var(--s1); border-radius:var(--r1); padding:16px 18px; margin-bottom:10px; box-shadow:var(--sh-card); border:1px solid var(--border); }
  .form-group-title { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.4px; color:var(--t2); margin-bottom:14px; }

  /* ── Success strip ── */
  .success-strip { background:var(--green-dim); border:1px solid rgba(34,197,94,.2); border-radius:var(--r2); padding:14px 16px; margin-bottom:14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; animation:scaleIn .3s ease; }
  .success-strip-title { font-size:12px; font-weight:700; color:var(--green); width:100%; margin-bottom:4px; }

  /* ── Bottom nav ── */
  .bottom-nav {
    display:flex; background:linear-gradient(180deg,#0f0f17 0%,#0a0a0f 100%);
    border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom); flex-shrink:0;
    box-shadow:0 -8px 40px rgba(0,0,0,.6), 0 -1px 0 rgba(79,142,247,.08);
  }
  .nav-btn {
    flex:1; border:none; background:none; padding:10px 2px 9px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; color:var(--t3); font-size:7.5px; font-weight:800;
    text-transform:uppercase; letter-spacing:.6px; position:relative; transition:color .15s;
  }
  .nav-btn.active { color:var(--blue); }
  .nav-btn.active::after {
    content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:24px; height:2px;
    background:linear-gradient(90deg,var(--blue),#7ab4ff);
    border-radius:0 0 4px 4px;
    box-shadow:0 0 8px var(--blue-glow);
  }
  .nav-btn .ico { font-size:19px; line-height:1; transition:transform .15s; }
  .nav-btn.active .ico { transform:scale(1.1); filter:drop-shadow(0 0 4px var(--blue-glow)); }
  .nav-btn[data-id="add"] { color:var(--t2); }
  .nav-btn[data-id="add"].active { color:var(--orange); }
  .nav-btn[data-id="add"].active::after { background:linear-gradient(90deg,var(--orange),#ffa060); box-shadow:0 0 8px var(--orange-glow); }
  .nav-btn[data-id="add"].active .ico { filter:drop-shadow(0 0 4px var(--orange-glow)); }

  /* ── Settings / expenses ── */
  .settings-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--border2); }
  .settings-row:last-child { border-bottom:none; }
  .settings-inp { border:1px solid var(--border); border-radius:var(--r4); padding:10px 13px; font-size:15px; outline:none; background:var(--s3); color:var(--t1); transition:border-color .15s; }
  .settings-inp:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }
  .expense-row { display:grid; grid-template-columns:1fr 90px auto auto; gap:8px; align-items:center; padding:11px 20px; border-bottom:1px solid var(--border2); }
  .expense-row:last-child { border-bottom:none; }
  .expense-row input { border:1px solid var(--border); border-radius:var(--r4); padding:9px 12px; font-size:15px; outline:none; background:var(--s3); color:var(--t1); width:100%; }

  /* ── Empty state ── */
  .empty { padding:60px 20px; text-align:center; }
  .empty-icon  { font-size:40px; margin-bottom:14px; opacity:.7; }
  .empty-title { font-size:15px; font-weight:700; margin-bottom:6px; color:var(--t1); }
  .empty-sub   { font-size:13px; color:var(--t3); line-height:1.6; }

  /* ── Tax box ── */
  .tax-box { background:var(--gold-dim); border:1px solid rgba(200,164,74,.2); border-radius:var(--r3); padding:13px 16px; margin-top:12px; }
  .tax-box .tax-lbl  { color:var(--gold); font-weight:800; font-size:9px; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .tax-box .tax-amt  { font-family:"IBM Plex Mono",monospace; font-size:18px; font-weight:700; color:var(--gold); }
  .tax-box .tax-hint { font-size:11px; color:rgba(200,164,74,.6); margin-top:4px; }
  .inline-note { font-size:11px; color:var(--t3); line-height:1.6; margin-bottom:14px; }

  /* ── Auth ── */
  .auth-field { margin-bottom:14px; }
  .auth-label { display:block; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; color:var(--t3); margin-bottom:8px; }
  .auth-inp2 { width:100%; background:var(--s2); border:1px solid var(--border); border-radius:var(--r2); padding:16px 18px; color:var(--t1); font-size:17px; outline:none; transition:border-color .15s, box-shadow .15s; }
  .auth-inp2::placeholder { color:var(--t3); }
  .auth-inp2:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }
  .auth-btn-main  { width:100%; background:linear-gradient(135deg,#5a97ff,#3d7ef5); color:#fff; border:none; border-radius:var(--r2); padding:17px; font-size:16px; font-weight:700; margin-bottom:10px; box-shadow:0 4px 20px rgba(79,142,247,.3); transition:all .15s; }
  .auth-btn-main:active { opacity:.85; transform:scale(.98); }
  .auth-btn-google { width:100%; background:var(--s2); color:var(--t1); border:1px solid var(--border); border-radius:var(--r2); padding:15px; font-size:15px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:18px; transition:all .15s; }
  .auth-btn-google:active { transform:scale(.98); }

  /* ── Nav logo ── */
  .nav-logo-ico { display:block; border-radius:5px; }
  .nav-btn.active .nav-logo-ico { box-shadow:0 0 0 1.5px rgba(79,142,247,.4); border-radius:6px; filter:brightness(1.1); }

  /* ── Responsive ── */
  @media(min-width:600px){
    .app{max-width:480px;margin:0 auto;box-shadow:0 0 80px rgba(0,0,0,.9)}
    html,body,#root{background:#05050a}
  }
  @media(max-width:360px){
    .pay-grid{grid-template-columns:repeat(2,1fr)!important}
    .field-row{grid-template-columns:1fr!important}
    .kpi-grid{grid-template-columns:1fr 1fr!important}
    .mini-grid{grid-template-columns:1fr 1fr!important}
    .page{padding:16px 14px calc(110px + env(safe-area-inset-bottom))}
  }
  @media(min-height:812px){
    .page{padding:24px 18px calc(130px + env(safe-area-inset-bottom))}
  }

async function fbSet(col, id, data) {

// ── Business logic ───────────────────────────────────────────────────────────
const jobDirectCost  = (j,s) => r2(Number(j.miles||0)*Number(s.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.miscCost||0));
const jobGrossProfit = (j,s) => r2(Number(j.revenue||0)-jobDirectCost(j,s));
const weeklyFixed    = s => r2((s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0)*12/52);
const monthlyFixed   = s => (s.expenses||[]).filter(e=>e.active).reduce((t,e)=>t+Number(e.amount||0),0);
function premiums(j) {
  let p = 0;
  if (j.emergency) p+=20; if (j.lateNight) p+=20;
  if (j.highway) p+=15; if (j.weekend) p+=10;
  if (Number(j.miles||0)>25) p+=20;
  return p;
}
function suggestedPrice(j,s) {
  const direct = jobDirectCost(j,s);
  const isRepl = /replacement|installation/i.test(j.service||"");
  const target = isRepl ? Number(s.replacementTarget||110) : Number(s.repairTarget||90);
  return Math.ceil((direct+target+premiums(j))/5)*5;
}
function getWeekStart(d) {
  const dt = new Date(d+"T12:00:00"), day = dt.getDay();
  dt.setDate(dt.getDate()-(day>=5?day-5:day+2));
  return dt.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function weekLabel(s) {
  const d = new Date(s+"T12:00:00"), e = new Date(d);
  e.setDate(e.getDate()+6);
  const f = dt => dt.toLocaleDateString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric"});
  return f(d)+" – "+f(e)+", "+e.toLocaleDateString("en-US",{timeZone:"America/New_York",year:"numeric"}).split("/")[2];
}
function nextFriday() {
  const now = new Date();
  const dayStr = now.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short"});
  const dm = {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
  const day = dm[dayStr.slice(0,3)];
  const fri = new Date(now); fri.setDate(fri.getDate()+(day===5?7:(5-day+7)%7));
  return fri.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
}
function groupByWeek(jobs) {
  const map = {};
  [...(jobs||[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
    .forEach(j => { const k=getWeekStart(j.date); if(!map[k]) map[k]=[]; map[k].push(j); });
  return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
}
function weekSummary(weekJobs,s) {
  const jobs = Array.isArray(weekJobs)?weekJobs:[];
  const revenue     = r2(jobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const directCosts = r2(jobs.reduce((t,j)=>t+jobDirectCost(j,s),0));
  const grossProfit = r2(revenue-directCosts);
  const fixed       = weeklyFixed(s);
  const net         = r2(grossProfit-fixed);
  return {revenue,directCosts,grossProfit,fixed,net};
}
function dedupeInventory(items) {
  const seen = {};
  (items||[]).filter(i=>(i.size||"").trim()).forEach(i => {
    const key = i.size.toLowerCase().replace(/\s+/g,"");
    if (!seen[key]) { seen[key]={...i}; }
    else { seen[key].qty = Math.max(seen[key].qty, Number(i.qty||0)); if (!seen[key].cost && i.cost) seen[key].cost = i.cost; }
  });
  return Object.values(seen);
}

function ProgressRing({size,stroke,pct,color,children}) {
  const radius = (size-stroke)/2;
  const circ = 2*Math.PI*radius;
  const offset = circ - (clamp(pct,0,100)/100)*circ;
  return html`<div class="progress-ring" style=${{width:size,height:size}}>
    <svg width=${size} height=${size}>
      <circle class="progress-ring-bg" cx=${size/2} cy=${size/2} r=${radius} stroke-width=${stroke}/>
      <circle class="progress-ring-fill" cx=${size/2} cy=${size/2} r=${radius} stroke-width=${stroke}
        stroke=${color} style=${{strokeDasharray:circ,strokeDashoffset:offset,color:color}}/>
    </svg>
    <div class="progress-ring-label">${children}</div>
  </div>`;
}

      <div style=${{fontSize:13,color:"var(--t2)",fontWeight:600}}>Enter job details above</div>
      <div style=${{fontSize:11,color:"var(--t3)",marginTop:4}}>Miles · Tire cost · Misc → auto-calculates</div>

      <div class="qq-suggested">
        <div class="qq-suggested-label">${priceMode==="custom"?"Custom Price":priceMode==="premium"?"Premium Price":"Suggested Price"}</div>
        <div class="qq-suggested-price">${money(dispPrice)}</div>
        <div style=${{display:"flex",justifyContent:"center",gap:16,marginTop:8,marginBottom:8}}>
          <div style=${{textAlign:"center"}}><div style=${{fontSize:10,color:"var(--t3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:2}}>Cost</div><div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:15,fontWeight:700,color:"var(--t2)"}}>${money(directCost)}</div></div>
          <div style=${{width:1,background:"var(--border)"}}/>
          <div style=${{textAlign:"center"}}><div style=${{fontSize:10,color:"var(--t3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:2}}>Profit</div><div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:15,fontWeight:700,color:profit>=skip?"#4ade80":"#ef4444"}}>${money(profit)}</div></div>
          ${prem>0&&html`<div style=${{width:1,background:"var(--border)"}}/><div style=${{textAlign:"center"}}><div style=${{fontSize:10,color:"var(--t3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:2}}>Surcharge</div><div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:15,fontWeight:700,color:"#fb923c"}}>+${money(prem)}</div></div>`}
        </div>
        <span class=${"qq-dec-badge "+decCls}>${decLabel}</span>

      <div class="qq-apply-row">
        <button class=${"qq-apply-btn suggested press-scale"+(priceMode==="suggested"?" active-sel":"")} onClick=${()=>handleMode("suggested",suggested)}>${priceMode==="suggested"?"✓ ":""}${money(suggested)}<br/><span style=${{fontSize:10,opacity:.8}}>Suggested</span></button>
        <button class=${"qq-apply-btn premium press-scale"+(priceMode==="premium"?" active-sel":"")} onClick=${()=>handleMode("premium",premiumPrice)}>${priceMode==="premium"?"✓ ":""}${money(premiumPrice)}<br/><span style=${{fontSize:10,opacity:.8}}>Premium</span></button>
        <button class=${"qq-apply-btn custom press-scale"+(priceMode==="custom"?" active-sel":"")} onClick=${()=>handleMode("custom","")}>${priceMode==="custom"?"✓ ":""}Custom<br/><span style=${{fontSize:10,opacity:.8}}>Enter →</span></button>
      </div>
      ${priceMode==="custom"&&html`<div style=${{padding:"10px 10px 4px"}}>
        <div style=${{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".6px",color:"var(--t2)",marginBottom:6,textAlign:"center"}}>Custom Price ($)</div>
        <input ref=${customRef} type="number" min="0" inputMode="decimal" placeholder="0.00" value=${form.revenue||""} onChange=${e=>onFormChange("revenue",e.target.value)} style=${{background:"rgba(255,255,255,.12)",border:"2px solid rgba(255,255,255,.3)",borderRadius:10,padding:"12px",color:"#fff",fontSize:22,outline:"none",width:"100%",fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700,textAlign:"center"}}/>
        <div style=${{fontSize:10,color:"var(--t3)",textAlign:"center",marginTop:5}}>Profit: ${money(r2(Number(form.revenue||0)-directCost))}</div>
      </div>`}
    </div>`}
  </div>`;
}

// ── Auth screen ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth}) {
  const [email,setEmail]=useState("");const [pass,setPass]=useState("");
  const [mode,setMode]=useState("login");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const submit=async()=>{
    if(!email||!pass){setErr("Enter your email and password.");return;}
    setBusy(true);setErr("");
    try{const c=mode==="login"?await _auth.signInWithEmailAndPassword(email,pass):await _auth.createUserWithEmailAndPassword(email,pass);onAuth(c.user);}
    catch(e){setErr(e.message||"Auth failed.");}finally{setBusy(false);}
  };
  const google=async()=>{try{const c=await _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());onAuth(c.user);}catch(e){setErr(e.message);}};
  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",background:"#0a0a0a",padding:"0 24px",paddingTop:"env(safe-area-inset-top)"}}>
    <div style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",paddingBottom:16}}>
      <img src=${LOGO_SRC} alt="Wheel Rush" onError=${e=>e.target.style.display="none"} style=${{width:80,height:80,objectFit:"contain",borderRadius:18,marginBottom:20,boxShadow:"0 4px 20px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06)",animation:"scaleIn .5s ease"}}/>
      <div class="shimmer-text" style=${{fontSize:26,fontWeight:700,marginBottom:4}}>Wheel Rush</div>
      <div style=${{color:"#555",fontSize:13,fontWeight:600}}>Mobile Tire Repair · Miami</div>
    </div>
    <div style=${{paddingBottom:"calc(32px + env(safe-area-inset-bottom))"}}>
      ${err&&html`<div style=${{background:"var(--red-dim)",border:"1px solid rgba(239,68,68,.3)",color:"#f87171",padding:"12px 16px",borderRadius:12,fontSize:13,fontWeight:600,marginBottom:16,animation:"fadeSlideUp .3s ease"}}>${err}</div>`}
      <div class="auth-field"><label class="auth-label">Email</label><input class="auth-inp2" type="email" placeholder="you@email.com" value=${email} onChange=${e=>setEmail(e.target.value)} autoCapitalize="off"/></div>
      <div class="auth-field" style=${{marginBottom:20}}><label class="auth-label">Password</label><input class="auth-inp2" type="password" placeholder="••••••••" value=${pass} onChange=${e=>setPass(e.target.value)} onKeyDown=${e=>e.key==="Enter"&&submit()}/></div>
      <button class="auth-btn-main press-scale" onClick=${submit} disabled=${busy}>${busy?"Working…":mode==="login"?"Sign In":"Create Account"}</button>
      <button class="auth-btn-google press-scale" onClick=${google}>
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      <div style=${{textAlign:"center"}}><button style=${{background:"none",border:"none",color:"#444",fontSize:13,cursor:"pointer",padding:"8px"}} onClick=${()=>{setMode(m=>m==="login"?"signup":"login");setErr("");}}>
        ${mode==="login"?"New here? Create account":"Have an account? Sign in"}
      </button></div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// ── PRO DASHBOARD (Redesigned) ───────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function Dashboard({jobs,settings,setTab,onRepeat,inventory,onStartJob}) {
  // QuickQuote state (lives here so it's on Dashboard)
  const [qqForm,setQqForm]=useState({service:"Tire Repair",miles:"",tireCost:"",miscCost:"",qty:1,revenue:"",emergency:false,lateNight:false,highway:false,weekend:false});
  const [qqMode,setQqMode]=useState("suggested");
  const qqChange=(k,v)=>setQqForm(p=>({...p,[k]:v}));
  const qqApply=price=>setQqForm(p=>({...p,revenue:price}));
  const safeJobs=Array.isArray(jobs)?jobs:[];
  const today=TODAY(), thisWeek=getWeekStart(today);
  const weekJobs=useMemo(()=>safeJobs.filter(j=>getWeekStart(j.date)===thisWeek),[safeJobs,thisWeek]);
  const todayJobs=useMemo(()=>safeJobs.filter(j=>j.date===today),[safeJobs,today]);
  const totals=useMemo(()=>weekSummary(weekJobs,settings),[weekJobs,settings]);
  const avgProfit=weekJobs.length?r2(totals.grossProfit/weekJobs.length):0;
  const goalPct=clamp((totals.grossProfit/(settings.weeklyGoal||1))*100,0,100);
  const jobsNeeded=avgProfit>0?Math.max(0,Math.ceil(((settings.weeklyGoal||0)-totals.grossProfit)/avgProfit)):"—";
  const fixed=weeklyFixed(settings);
  const sources=useMemo(()=>{const m={};safeJobs.forEach(j=>{const s=j.source||"Other";m[s]=(m[s]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[safeJobs]);
  const maxSrc=sources.length?sources[0][1]:1;
  const recent=useMemo(()=>[...safeJobs].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,5),[safeJobs]);
  const top5Tires=useMemo(()=>{const counts={};safeJobs.forEach(j=>{if(j.tireSize){counts[j.tireSize]=(counts[j.tireSize]||0)+Number(j.qty||1);}});return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([size,sold],i)=>({id:"bs"+i,size,sold}));},[safeJobs]);
  const pendingJobs=useMemo(()=>safeJobs.filter(j=>j.status==="Pending"),[safeJobs]);
  const pendingTotal=pendingJobs.reduce((s,j)=>s+Number(j.revenue||0),0);

  // Week-over-week comparison
  const lastWeekStart=useMemo(()=>{const d=new Date(thisWeek+"T12:00:00");d.setDate(d.getDate()-7);return d.toLocaleDateString("en-CA",{timeZone:"America/New_York"});},[thisWeek]);
  const lastWeekJobs=useMemo(()=>safeJobs.filter(j=>getWeekStart(j.date)===lastWeekStart),[safeJobs,lastWeekStart]);
  const lastWeekGross=lastWeekJobs.reduce((s,j)=>s+jobGrossProfit(j,settings),0);
  const wowChange=lastWeekGross>0?Math.round(((totals.grossProfit-lastWeekGross)/lastWeekGross)*100):0;

  const ringColor=goalPct>=100?"var(--green)":goalPct>=60?"var(--blue)":"var(--amber)";

  return html`<div class="screen"><div class="page page-enter">
    <div class="pro-hero card-anim">
      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <div style=${{flex:1}}>
          <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1.6px",color:"var(--blue)"}}>This Week</div>
            ${wowChange!==0&&html`<div style=${{fontSize:10,fontWeight:700,color:wowChange>0?"var(--green)":"var(--red)",background:wowChange>0?"var(--green-dim)":"var(--red-dim)",padding:"2px 8px",borderRadius:999}}>
              ${wowChange>0?"+":""}${wowChange}%
            </div>`}
          </div>
          <div class="revenue-ticker">
            <span class="currency">$</span>${Math.floor(totals.grossProfit).toLocaleString()}
          </div>
          <div style=${{fontSize:11,color:"var(--t3)",marginTop:8,fontWeight:500}}>
            gross profit · ${weekJobs.length} job${weekJobs.length!==1?"s":""} · ${money(totals.revenue)} rev
          </div>
        </div>
        <${ProgressRing} size=${88} stroke=${6} pct=${goalPct} color=${ringColor}>
          <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:18,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${Math.round(goalPct)}%</div>
          <div style=${{fontSize:8,fontWeight:800,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t3)",marginTop:1}}>Goal</div>
        <//>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,padding:"14px 0 6px",borderTop:"1px solid var(--border)"}}>
        <div style=${{textAlign:"center"}}>
          <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:17,fontWeight:700,color:"var(--green)",letterSpacing:"-1px"}}>${money(totals.net)}</div>
          <div style=${{fontSize:9,color:"var(--t3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginTop:3}}>Take-Home</div>
        </div>
        <div style=${{textAlign:"center"}}>
          <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:17,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(fixed)}</div>
          <div style=${{fontSize:9,color:"var(--t3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginTop:3}}>Fixed/Wk</div>
        </div>
        <div style=${{textAlign:"center"}}>
          <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:17,fontWeight:700,color:"var(--blue)",letterSpacing:"-1px"}}>${typeof jobsNeeded==="number"?jobsNeeded:"—"}</div>
          <div style=${{fontSize:9,color:"var(--t3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginTop:3}}>Jobs Left</div>
        </div>
      </div>
      ${goalPct>=100&&html`<div style=${{textAlign:"center",marginTop:12,animation:"scaleIn .4s ease"}}>
        <span style=${{background:"var(--green-dim)",color:"var(--green)",padding:"6px 16px",borderRadius:999,fontSize:12,fontWeight:800,border:"1px solid rgba(34,197,94,.25)"}}>🎯 Weekly Goal Achieved!</span>
      </div>`}
    </div>

    <div class="card-anim" style=${{marginBottom:16}}>
      <button class="cta-btn press-scale" onClick=${()=>setTab("add")}>
        <span style=${{fontSize:18}}>＋</span><span>New Job</span>
      </button>
    </div>

    <div class="card-anim">
      <div class="section-label" style=${{marginTop:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span>Quick Quote</span>
        ${Number(qqForm.revenue||0)>0&&html`<button class="btn primary sm press-scale" style=${{fontSize:11,padding:"4px 12px"}} onClick=${()=>{if(onStartJob)onStartJob(qqForm);setQqForm({service:"Tire Repair",miles:"",tireCost:"",miscCost:"",qty:1,revenue:"",emergency:false,lateNight:false,highway:false,weekend:false});setQqMode("suggested");}}>Start Job →</button>`}
      </div>
      <div style=${{marginBottom:4}}>
        <div style=${{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",padding:"0 1px"}}>
          ${["Tire Repair","Tire Replacement","Tire Installation"].map(s=>html`<button key=${s} class=${"chip press-scale"+(qqForm.service===s?" active":"")} onClick=${()=>qqChange("service",s)} style=${{fontSize:11,padding:"5px 10px"}}>${s.replace("Tire ","")}</button>`)}
        </div>
        <div style=${{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",padding:"0 1px"}}>
          ${FLAGS.map(([k,label])=>html`<button key=${k} class=${"chip press-scale"+(qqForm[k]?" active":"")} onClick=${()=>qqChange(k,!qqForm[k])} style=${{fontSize:10,padding:"4px 8px"}}>${label}</button>`)}
        </div>
      </div>
      <${QuickQuote} form=${qqForm} settings=${settings} onApply=${qqApply} onFormChange=${qqChange} priceMode=${qqMode} setPriceMode=${setQqMode}/>
    </div>

    ${todayJobs.length>0&&html`<div class="card-anim">
      <div class="section-label" style=${{marginTop:0}}>Today</div>
      <div class="mini-grid">
        <div class="mini-box"><strong>${todayJobs.length}</strong><span>Jobs</span></div>
        <div class="mini-box"><strong>${money(todayJobs.reduce((s,j)=>s+Number(j.revenue||0),0))}</strong><span>Revenue</span></div>
        <div class="mini-box"><strong style=${{color:"var(--green)"}}>${money(todayJobs.reduce((s,j)=>s+jobGrossProfit(j,settings),0))}</strong><span>Profit</span></div>
        <div class="mini-box"><strong>${todayJobs.filter(j=>j.status==="Completed").length}</strong><span>Done</span></div>
      </div>
    </div>`}

    ${pendingJobs.length>0&&html`<div class="pending-banner card-anim press-scale" onClick=${()=>setTab("history")}>
      <div><div class="pending-banner-title">⏳ ${pendingJobs.length} Pending</div><div class="pending-banner-sub">${money(pendingTotal)} to collect</div></div>
      <span style=${{fontSize:12,fontWeight:700,color:"var(--gold)"}}>Collect →</span>
    </div>`}

    <div class="card card-anim">
      <div class="card-pad">
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div class="kpi-label">Weekly Target</div>
            <div style=${{display:"flex",alignItems:"baseline",gap:6,marginTop:4}}>
              <span style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:20,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(totals.grossProfit)}</span>
              <span style=${{fontSize:12,color:"var(--t3)"}}>/ ${money(settings.weeklyGoal)}</span>
            </div>
          </div>
          <div style=${{fontSize:11,color:"var(--t3)"}}>${nextFriday()}</div>
        </div>
        <div class="goal-track" style=${{marginTop:12,marginBottom:6}}>
          <div class=${"goal-fill "+(goalPct>=100?"full":goalPct>=50?"mid":"low")} style=${{width:goalPct+"%"}}/>
        </div>
      </div>
    </div>

    ${top5Tires.length>0&&html`<div class="card-anim">
      <div class="section-label">Best Sellers</div>
      <div class="card">
        ${top5Tires.map((t,i)=>html`<div key=${t.id} class="card-row">
          <div style=${{display:"flex",alignItems:"center",gap:12}}>
            <div style=${{width:26,height:26,borderRadius:8,flexShrink:0,background:i===0?"var(--blue-dim)":"var(--s3)",color:i===0?"var(--blue)":"var(--t3)",border:i===0?"1px solid rgba(79,142,247,.25)":"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>${i+1}</div>
            <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700,fontSize:14,color:"var(--t1)",letterSpacing:"-.3px"}}>${t.size}</div>
          </div>
          <div><span style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:12,color:"var(--t2)",fontWeight:700}}>${t.sold} sold</span></div>
        </div>`)}
      </div>
    </div>`}

    ${sources.length>0&&html`<div class="card-anim">
      <div class="section-label">Lead Sources</div>
      <div class="card"><div class="card-pad">
        ${sources.slice(0,6).map(([srcName,count])=>html`<div class="source-bar" key=${srcName}>
          <div style=${{fontSize:12,fontWeight:600,color:"var(--t2)",width:130,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${srcName}</div>
          <div class="source-bar-track"><div class="source-bar-fill" style=${{width:((count/maxSrc)*100)+"%"}}/></div>
          <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:11,color:"var(--t3)",width:20,textAlign:"right",flexShrink:0,fontWeight:700}}>${count}</div>
        </div>`)}
      </div></div>
    </div>`}

    <div class="section-label card-anim">Recent Jobs</div>
    ${recent.length>0?html`<div class="stack">${recent.map((job,idx)=>{
      const profit=jobGrossProfit(job,settings);
      const pg=profit>=70,po=profit>=40&&profit<70;
      return html`<div class="job-row card-anim press-scale" key=${job.id} style=${{cursor:"pointer",animationDelay:(0.05*idx)+"s"}} onClick=${()=>onRepeat(job)}>
        <div class="job-icon">🛞</div>
        <div class="job-main">
          <div class="job-title">${job.service}</div>
          <div class="job-meta">${job.area} · ${job.date}${job.tireSize?" · "+job.tireSize:""}</div>
          <div style=${{marginTop:7,display:"flex",gap:6}}>
            <span class=${"pill "+(pg?"green":po?"orange":"red")}>${money(profit)}</span>
            ${job.status==="Pending"&&html`<span class="pill gold">Pending</span>`}
          </div>
        </div>
        <div class="job-right">
          <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:18,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(job.revenue)}</div>
          <div style=${{fontSize:10,color:"var(--t3)",marginTop:3}}>${job.payment}</div>
        </div>
      </div>`;
    })}</div>`:html`<${EmptyState} icon="🛞" title="No jobs yet" sub="Tap New Job above to get started." action=${html`<button class="btn primary press-scale" onClick=${()=>setTab("add")}>New Job</button>`}/>`}

// ── AddJob (BUG 1 FIXED: no more <> fragments) ──────────────────────────────
function AddJob({onSave,settings,jobs,prefill,onClearPrefill,editJob,onClearEdit,saving}) {
  const [form,setForm]=useState(EMPTY_JOB());const [error,setError]=useState("");const [saved,setSaved]=useState(null);const [tick,setTick]=useState(0);const [editingId,setEditingId]=useState(null);const [priceMode,setPriceMode]=useState("suggested");
  const isEditing=!!editingId;
  const recentSizes=useMemo(()=>[...new Set([...load(KEYS.sizes,[]),...DEFAULT_TIRE_SIZES])].slice(0,8),[tick]);
  const lastJob=useMemo(()=>[...(jobs||[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).find(j=>j.id!==editingId)||null,[jobs,editingId]);
  useEffect(()=>{
    if(editJob&&editJob.id){setForm({...EMPTY_JOB(),...editJob,revenue:String(editJob.revenue||""),tireCost:String(editJob.tireCost||""),miscCost:String(editJob.miscCost||""),miles:String(editJob.miles||"")});setEditingId(editJob.id);setSaved(null);setError("");setPriceMode("suggested");if(onClearEdit)onClearEdit();return;}

  },[prefill,editJob]);
  const setF=(k,v)=>{setForm(p=>({...p,[k]:v}));setError("");};
  const useLastJob=()=>{if(!lastJob)return;setForm({...EMPTY_JOB(),service:lastJob.service,area:lastJob.area,payment:lastJob.payment,source:lastJob.source,tireSize:lastJob.tireSize,tireCost:String(lastJob.tireCost||""),miscCost:String(lastJob.miscCost||""),miles:String(lastJob.miles||""),emergency:lastJob.emergency,lateNight:lastJob.lateNight,highway:lastJob.highway,weekend:lastJob.weekend});};

    await onSave(entry,isEditing?false:andAdd);setTick(t=>t+1);
    if(isEditing){setEditingId(null);setForm(EMPTY_JOB());setError("");setPriceMode("suggested");}
    else{setSaved(entry);if(andAdd){setForm(EMPTY_JOB());setError("");setSaved(null);setPriceMode("suggested");}}
  };
  const cancelEdit=()=>{setEditingId(null);setPriceMode("suggested");setForm(EMPTY_JOB());setError("");setSaved(null);};
  const requestReview=()=>openReviewSMS(form.customerPhone,(settings.googleReviewUrl||"").trim(),form.customerName,form.service,form.area);

        <button class="btn secondary sm press-scale" onClick=${cancelEdit}>Cancel</button>

        ${lastJob&&!isEditing&&html`<button type="button" class="btn secondary sm press-scale" onClick=${useLastJob}>↩ Last Job</button>`}
        ${!isEditing&&html`<button type="button" class="btn secondary sm press-scale" onClick=${()=>{setForm(EMPTY_JOB());setSaved(null);setError("");setPriceMode("suggested");}}>✕ Clear</button>`}
      </div>
      ${error&&html`<div style=${{background:"var(--red-dim)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"var(--red)",marginBottom:14,fontWeight:600,animation:"fadeSlideUp .3s ease"}}>${error}</div>`}
      ${saved&&!isEditing&&html`<div class="success-strip">
        <div class="success-strip-title">✅ ${money(saved.revenue)} · ${money(jobGrossProfit(saved,settings))} profit</div>
        <button class="btn primary sm press-scale" onClick=${()=>sendInvoice(saved,settings)}>🧾 Invoice</button>
        ${saved.status==="Completed"&&html`<button class="btn success sm press-scale" onClick=${requestReview}>⭐ Review</button>`}
        <button class="btn secondary sm press-scale" onClick=${()=>{setForm({...saved,id:"",revenue:String(saved.revenue)});setSaved(null);}}>🔁 Dup</button>
      </div>`}
      <${QuickQuote} form=${form} settings=${settings} onApply=${v=>setF("revenue",v)} onFormChange=${setF} priceMode=${priceMode} setPriceMode=${setPriceMode}/>
      <div class="form-group card-anim">
        <div class="form-group-title">Pricing & Costs</div>

        </div>

        <div class="field"><label>Payment Method</label><div class="pay-grid">${PAYMENT_OPTIONS.map(p=>html`<button key=${p.label} type="button" class=${"pay-btn press-scale"+(form.payment===p.label?" active":"")} onClick=${()=>setF("payment",p.label)}><span class="pay-icon">${p.icon}</span>${p.label}</button>`)}</div></div>

// ── History (BUG 3 FIXED: .page div structure) ───────────────────────────────
function History({jobs,settings,onRepeat,onDelete,onEdit}) {
  const safeJobs=Array.isArray(jobs)?jobs:[];
  const [filter,setFilter]=useState("All");const [search,setSearch]=useState("");const [view,setView]=useState("weeks");
  const cities=useMemo(()=>Array.from(new Set(safeJobs.map(j=>j.area))),[safeJobs]);
  const filtered=useMemo(()=>{
    let j=safeJobs;
    if(filter==="Repair")j=j.filter(x=>/repair/i.test(x.service));
    else if(filter==="Replacement")j=j.filter(x=>/replacement|installation/i.test(x.service));
    else if(filter==="Pending")j=j.filter(x=>x.status==="Pending");

          <div style=${{marginTop:7,display:"flex",gap:6,flexWrap:"wrap"}}><span class=${"pill "+profitCls}>${money(profit)}</span>${job.status==="Pending"&&html`<span class="pill gold">Pending</span>`}</div>
        </div>
        <div style=${{textAlign:"right",flexShrink:0}}>
          <div style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontSize:18,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(job.revenue)}</div>
          <div style=${{fontSize:10,color:"var(--t3)",marginTop:2}}>${job.payment}</div>

      <div style=${{padding:"10px 17px 12px",borderTop:"1px solid var(--border2)",display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
        ${onEdit&&html`<button class="btn secondary xs press-scale" onClick=${()=>onEdit(job)}>✏️</button>`}
        <button class="btn secondary xs press-scale" onClick=${()=>onRepeat(job)}>🔁</button>
        <button class="btn blue xs press-scale" onClick=${()=>sendInvoice(job,settings)}>🧾</button>

    </div>

      ${["All","Repair","Replacement","Pending"].concat(cities).slice(0,9).map(c=>html`<button key=${c} class=${"chip"+(filter===c?" active":"")} onClick=${()=>setFilter(c)}>${c}</button>`)}
    </div>
    <div style=${{display:"flex",gap:8,marginBottom:14}}>
      <button class=${"chip sm"+(view==="weeks"?" active":"")} onClick=${()=>setView("weeks")}>By Week</button>
      <button class=${"chip sm"+(view==="list"?" active":"")} onClick=${()=>setView("list")}>All Jobs</button>

// ── Expenses ──────────────────────────────────────────────────────────────────
function Expenses({expenses,setExpenses}) {
  const safe=Array.isArray(expenses)?expenses:[];
  const [form,setForm]=useState({date:TODAY(),category:"Fuel",amount:"",note:""});
  const CATS=["Fuel","Oil/Fluids","Equipment Repair","Supplies","Food","Tolls/Parking","Other"];
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const add=()=>{const amt=Number(form.amount||0);if(!amt){alert("Enter an amount.");return;}setExpenses(prev=>[{...form,id:uid(),amount:amt},...prev]);setForm({date:TODAY(),category:"Fuel",amount:"",note:""});};
  const remove=id=>{if(!window.confirm("Delete?"))return;setExpenses(prev=>prev.filter(e=>e.id!==id));};
  const total=safe.reduce((s,e)=>s+Number(e.amount||0),0);
  const thisWeek=getWeekStart(TODAY());
  const weekTotal=safe.filter(e=>getWeekStart(e.date||TODAY())===thisWeek).reduce((s,e)=>s+Number(e.amount||0),0);
  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label" style=${{marginTop:0}}>Variable Expenses</div>
    <div class="mini-grid card-anim">
      <div class="mini-box"><strong>${money(weekTotal)}</strong><span>This Week</span></div>
      <div class="mini-box"><strong>${money(total)}</strong><span>All Time</span></div>
      <div class="mini-box"><strong>${safe.length}</strong><span>Receipts</span></div>
      <div class="mini-box"><strong>${safe.length?money(total/safe.length):"—"}</strong><span>Avg</span></div>
    </div>
    <div class="card card-anim" style=${{marginBottom:14}}><div class="card-pad">
      <div class="field-row"><div class="field" style=${{marginBottom:8}}><label>Date</label><input type="date" value=${form.date} onChange=${e=>setF("date",e.target.value)}/></div><div class="field" style=${{marginBottom:8}}><label>Amount ($)</label><input type="number" min="0" inputMode="decimal" value=${form.amount} onChange=${e=>setF("amount",e.target.value)} placeholder="0.00" style=${{fontFamily:"\"IBM Plex Mono\",monospace",fontWeight:700}}/></div></div>
      <div class="field" style=${{marginBottom:8}}><label>Category</label><select value=${form.category} onChange=${e=>setF("category",e.target.value)}>${CATS.map(c=>html`<option key=${c}>${c}</option>`)}</select></div>
      <div class="field" style=${{marginBottom:10}}><label>Note</label><input value=${form.note} onChange=${e=>setF("note",e.target.value)} placeholder="BP station, etc."/></div>
      <button class="btn primary press-scale" style=${{width:"100%"}} onClick=${add}>+ Log Expense</button>
    </div></div>
    ${safe.length===0?html`<${EmptyState} icon="🧾" title="No expenses logged" sub="Track fuel, supplies, repairs."/>`:html`<div class="stack">${[...safe].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(exp=>html`<div class="job-row card-anim" key=${exp.id}><div class="job-icon" style=${{fontSize:16}}>🧾</div><div class="job-main"><div class="job-title">${exp.category}</div><div class="job-meta">${exp.date}${exp.note?" · "+exp.note:""}</div></div><div class="job-right"><div class="value red">${money(exp.amount)}</div><button class="btn danger sm press-scale" style=${{marginTop:8}} onClick=${()=>remove(exp.id)}>×</button></div></div>`)}</div>`}
  </div></div>`;
}

// ── Payouts ───────────────────────────────────────────────────────────────────
function Payouts({jobs,settings}) {
  const safeJobs=Array.isArray(jobs)?jobs:[];
  const weeks=useMemo(()=>groupByWeek(safeJobs),[safeJobs]);
  if(!weeks.length)return html`<div class="screen"><div class="page page-enter"><${EmptyState} icon="💰" title="No payout history" sub="Log jobs to see weekly payout breakdowns."/></div></div>`;
  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label" style=${{marginTop:0}}>Weekly Payouts</div>
    ${weeks.map(([wk,wkJobs])=>{
      const t=weekSummary(wkJobs,settings);
      const ao1=settings.owner1Active!==false,ao2=settings.owner2Active!==false;
      const st=(ao1?Number(settings.profitSplit1||50):0)+(ao2?Number(settings.profitSplit2||50):0)||100;
      const o1=t.net>0&&ao1?r2(t.net*(Number(settings.profitSplit1||50)/st)):0;
      const o2=t.net>0&&ao2?r2(t.net*(Number(settings.profitSplit2||50)/st)):0;
      const tax=t.net>0&&settings.taxRate>0?r2(t.net*(Number(settings.taxRate)/100)):0;
      return html`<div class="card card-anim" key=${wk} style=${{marginBottom:14}}>
        <div class="card-pad"><div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style=${{fontWeight:700,fontSize:14}}>${weekLabel(wk)}</div><div class="sub">${wkJobs.length} jobs</div></div><div class=${"value big "+(t.net>=0?"green":"red")}>${money(t.net)}</div></div></div>
        <div class="card-row"><div class="label">Revenue</div><div class="value">${money(t.revenue)}</div></div>
        <div class="card-row"><div class="label">Direct Costs</div><div class="value red">${money(t.directCosts)}</div></div>
        <div class="card-row"><div class="label">Gross Profit</div><div class="value">${money(t.grossProfit)}</div></div>
        <div class="card-row"><div class="label">Weekly Fixed</div><div class="value red">${money(t.fixed)}</div></div>
        ${[{name:settings.owner1Name||"Owner 1",pct:settings.profitSplit1,amt:o1,active:ao1},{name:settings.owner2Name||"Owner 2",pct:settings.profitSplit2,amt:o2,active:ao2}].map((o,i)=>html`<div key=${i} class="card-row" style=${{background:"var(--s2)",opacity:o.active?1:0.4}}><div><div class="label">${o.name}</div><div class="sub">${o.pct}% split</div></div><div class=${"value "+(o.active&&o.amt>0?"green":"")}>${o.active?money(o.amt):"—"}</div></div>`)}
        ${tax>0&&html`<div class="card-pad"><div class="tax-box" style=${{marginTop:0}}><div class="tax-lbl">💰 Tax Reserve (${settings.taxRate}%)</div><div class="tax-amt">${money(tax)}</div><div class="tax-hint">~${money(tax/2)} per owner</div></div></div>`}
      </div>`;
    })}
  </div></div>`;
}
